apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: capability-mcp-factory
  namespace: default
  labels:
    app: capability-mcp-factory
    layer: factory
    role: cross-manufacturer-mcp
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      serviceAccountName: capability-mcp-server
      volumes:
      - name: argo-token
        secret:
          secretName: argo-token
      containers:
      - name: capability-mcp-factory
        image: healthidpuaeacr.azurecr.io/capability-mcp-factory:user1000
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: ARGO_SERVER_URL
          value: "http://argo-server.argo:2746"
        - name: ARGO_TOKEN_FILE
          value: "/var/run/secrets/argo/token"
        - name: OAM_NAMESPACE
          value: "default"
        - name: CAPABILITY_FACTORY_DIR
          value: "/capability-factory"
        - name: GITHUB_OWNER
          value: "shlapolosa"
        - name: GITOPS_REPO
          value: "health-service-idp-gitops"
        - name: GITOPS_BRANCH
          value: "main"
        - name: PERSONAL_ACCESS_TOKEN
          valueFrom:
            secretKeyRef: { name: github-credentials, key: personal-access-token }
        - name: CLASSIFY_ROUTER_URL
          value: "http://classify-router.default.svc.cluster.local"
        - name: CLASSIFY_ROUTER_TIMEOUT_SECONDS
          value: "5"
        - name: CAFE_SPEC_ROOT
          value: "/cafe-spec"
        - name: OBSERVE_AUDIT_SINK_URL
          value: "http://observe-audit-sink.default.svc.cluster.local"
        - name: OBSERVE_AUDIT_SINK_TIMEOUT_SECONDS
          value: "5"
        - name: AUTH_DISABLED
          value: "true"
        - name: APIM_AUDIENCE
          value: ""
        - name: ENTRA_TENANT
          value: ""
        - name: ALLOWED_OIDS
          value: ""
        - name: ALLOWED_HOSTS
          value: ""
        volumeMounts:
        - name: argo-token
          mountPath: /var/run/secrets/argo
          readOnly: true
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
