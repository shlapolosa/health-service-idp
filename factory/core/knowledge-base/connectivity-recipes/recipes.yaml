# Connectivity recipes (P8.5) — pre-approved patterns the architect picks from when synthesising
# composite OAM. One row per recipe. The LLM never invents recipes; it picks from this file.
#
# Each recipe declares:
#   triggers — conditions that match the recipe (intake QA fields, composite shape, KB profile)
#   emit     — list of TraitDefinition / Secret / config artifacts to bundle with the CD
#   docs     — short text the ADR cites when explaining why the recipe was applied
recipes:

  - id: web-service-exposed
    triggers:
      and:
        - { category: compute-service }
        - { qa: { exposure: public } }
    emit:
      - oam/traits/expose-https.yaml
    docs: |
      Public compute services get an HTTPS-terminating Knative VirtualService + cert-manager
      Issuer. Cert is auto-renewed via ACME.

  - id: web-service-needs-db
    triggers:
      composite:
        contains: [compute-service, datastore]
    emit:
      - oam/traits/datastore-secret-binding.yaml
    docs: |
      Service consuming a datastore gets a Secret reference populated with the datastore's
      connection string (host, port, db, user/password from Crossplane). Bound as env vars
      DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD on the compute pod.

  - id: producer-needs-broker
    triggers:
      composite:
        contains: [compute-service, messaging]
    emit:
      - oam/traits/broker-producer-binding.yaml
    docs: |
      Producer service consuming a messaging capability gets BROKER_URL + auth env vars from
      the messaging component's service. Best practice: idempotent producers + at-least-once
      semantics.

  - id: consumer-needs-broker
    triggers:
      composite:
        contains: [messaging, analytics]
    emit:
      - oam/traits/broker-consumer-binding.yaml
    docs: |
      Consumer service consuming a messaging capability gets BROKER_URL + consumer group +
      subscription config. Best practice: graceful shutdown + dead-letter routing.

  - id: cache-aside-db
    triggers:
      composite:
        contains: [datastore, cache]
    emit:
      - oam/traits/cache-binding.yaml
    docs: |
      Cache + datastore composite: emit CACHE_URL env. Pattern is cache-aside (read-through
      app-managed; no write-through automation). Document TTL strategy in the ADR.

  - id: secret-from-key-vault
    triggers:
      kb_profile:
        requires_external_secrets: true
    emit:
      - oam/traits/external-secret-binding.yaml
    docs: |
      For components with sensitive credentials, materialise via Crossplane ExternalSecret
      pointing at kv-socrates-6706. Avoid storing secrets in OAM properties directly.
