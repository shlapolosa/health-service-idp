# Crossplane v2 Composition: application-claim-composition
# Rendered via function-go-templating (replaces function-patch-and-transform).
# Behavioural equivalent to the prior P&T shim — same 7 provider-kubernetes Objects,
# same Job manifests, shell scripts preserved verbatim. Env-var wiring moved from
# P&T patches to Go-template substitution on the XR spec.
#
# WHY: function-patch-and-transform under Crossplane v2.3.1 fatally rejects string
# transforms missing the required `string.type` field. Instead of bandaiding ~50
# transforms, we rewrote the function input in the idiomatic v2 language.
#
# OUT OF SCOPE (handled in later PRs):
#   - dropping the provider-kubernetes Object wrapping (Crossplane Operations)
#   - converting XRD to mode: Namespaced
#   - refactoring the embedded shell scripts
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: application-claim-composition
  labels:
    crossplane.io/xrd: applicationclaims.platform.example.org
    provider: github-kubernetes-helm
spec:
  writeConnectionSecretsToNamespace: crossplane-system
  compositeTypeRef:
    apiVersion: platform.example.org/v1alpha1
    kind: ApplicationClaim
  mode: Pipeline
  pipeline:
  - step: render
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ .observed.composite.resource.spec.name }}-microservice-creator'
            namespace: '{{ .observed.composite.resource.metadata.namespace | default "default" }}'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: '{{ .observed.composite.resource.spec.name }}-microservice-creator-rn'
          spec:
            forProvider:
              manifest:
                apiVersion: batch/v1
                kind: Job
                metadata:
                  # Short suffix keeps the auto-injected `job-name` label
                  # ≤63 chars (microservice-creator was too long for the
                  # 43-char `need-an-webservice-…-api` service name).
                  name: '{{ .observed.composite.resource.spec.name }}-mscv'
                  namespace: default
                spec:
                  ttlSecondsAfterFinished: 600
                  backoffLimit: 2
                  template:
                    metadata:
                      annotations:
                        sidecar.istio.io/inject: 'false'
                    spec:
                      serviceAccountName: crossplane-github-provider
                      restartPolicy: OnFailure
                      containers:
                      - name: microservice-creator
                        # HARD-1 (#168): the ~288-line scaffold bash heredoc that
                        # used to live inline here has been EXTRACTED into a
                        # versioned, testable image. The Job now just runs the
                        # image entrypoint; behaviour is byte-equivalent.
                        # Scripts:   factory/production-lines/traditional-cloud/adapters/mscv-image/scripts/
                        # CI build:  .github/workflows/mscv-image.yml
                        # Image is PINNED (never :latest). The image baked-in the
                        # same tools the old Job ran via `apk add` (git curl jq + bash).
                        # OPS: build+push mscv:v1.0.0 to ACR BEFORE this change
                        # reaches the cluster (else ImagePullBackOff) \u2014 see image README.
                        image: healthidpuaeacr.azurecr.io/mscv:v1.0.0
                        command:
                        - /scripts/entrypoint.sh
                        env:
                        - name: APP_CONTAINER
                          value: '{{ .observed.composite.resource.spec.appContainer }}'
                        - name: SERVICE_NAME
                          value: '{{ .observed.composite.resource.spec.name }}'
                        - name: LANGUAGE
                          value: '{{ .observed.composite.resource.spec.language }}'
                        - name: FRAMEWORK
                          value: '{{ .observed.composite.resource.spec.framework }}'
                        - name: SERVICE_FLAVOR
                          value: '{{ .observed.composite.resource.spec.serviceFlavor | default "webservice" }}'
                        - name: GITHUB_TOKEN
                          valueFrom:
                            secretKeyRef:
                              name: github-credentials
                              key: token
                        - name: GITHUB_USER
                          valueFrom:
                            secretKeyRef:
                              name: github-credentials
                              key: user
                        - name: DOCKER_REGISTRY
                          valueFrom:
                            secretKeyRef:
                              name: docker-credentials
                              key: registry
                        - name: DOCKER_USER
                          valueFrom:
                            secretKeyRef:
                              name: docker-credentials
                              key: username
            providerConfigRef:
              kind: ClusterProviderConfig
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ .observed.composite.resource.spec.name }}-gitops-creator'
            namespace: '{{ .observed.composite.resource.metadata.namespace | default "default" }}'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: '{{ .observed.composite.resource.spec.name }}-gitops-creator-rn'
          spec:
            forProvider:
              manifest:
                apiVersion: batch/v1
                kind: Job
                metadata:
                  name: '{{ .observed.composite.resource.spec.name }}-gitops-creator'
                  namespace: default
                spec:
                  ttlSecondsAfterFinished: 600
                  backoffLimit: 2
                  template:
                    metadata:
                      annotations:
                        sidecar.istio.io/inject: 'false'
                    spec:
                      serviceAccountName: crossplane-github-provider
                      restartPolicy: OnFailure
                      containers:
                      - name: gitops-manifest-creator
                        image: alpine:3.18
                        command:
                        - /bin/sh
                        - -c
                        - "set -euo pipefail\n# Install git, curl, and jq\napk add --no-cache git curl jq\necho \"Adding GitOps manifests for $SERVICE_NAME in $APP_CONTAINER-gitops...\"\n\nTEMP_DIR=\"/tmp/gitops-$APP_CONTAINER\"\nmkdir -p $TEMP_DIR\ncd $TEMP_DIR\n\n# Clone the AppContainer GitOps repository\ngit clone https://$GITHUB_TOKEN@github.com/$GITHUB_USER/$APP_CONTAINER-gitops.git .\n\n# Create manifests directory for the service\nmkdir -p manifests/$SERVICE_NAME\ncd manifests/$SERVICE_NAME\n\n# Create ConfigMap for environment variables\ncat > configmap.yaml << EOF\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: $SERVICE_NAME-config\n  namespace: default\ndata:\n  APP_ENV: \"production\"\n  SERVICE_NAME: \"$SERVICE_NAME\"\nEOF\n\n# Add database config if needed\nif [ \"$DATABASE\" = \"postgres\" ]; then\n  cat >> configmap.yaml << EOF\n  DATABASE_URL: \"postgresql://\\$DATABASE_USER:\\$DATABASE_PASSWORD@$APP_CONTAINER-postgres-rw.$APP_CONTAINER.svc.cluster.local:5432/$SERVICE_NAME\"\nEOF\nfi\n\n# Add cache config if needed  \nif [ \"$CACHE\" = \"redis\" ]; then\n  cat >> configmap.yaml << EOF\n  REDIS_URL: \"redis://:\\$REDIS_PASSWORD@$APP_CONTAINER-redis-master.$APP_CONTAINER.svc.cluster.local:6379/0\"\nEOF\nfi\n\n\n# Commit and push GitOps manifests\ncd ../..\ngit config user.name \"ApplicationClaim GitOps\"\ngit config user.email \"applicationclaim-gitops@platform.local\"\ngit add manifests/$SERVICE_NAME/\n\n# Only commit if there are changes\nif ! git diff --cached --quiet; then\n  git commit -m \"Add GitOps manifests for $SERVICE_NAME microservice\n\n- Add ConfigMap for environment variables\n- Ready for ArgoCD deployment  \n- Service: $SERVICE_NAME in AppContainer: $APP_CONTAINER\"\n  git push\n  echo \"\u2705 GitOps manifests added for $SERVICE_NAME\"\nelse\n  echo \"\u2705 GitOps manifests already exist for $SERVICE_NAME\"\nfi\n"
                        env:
                        - name: APP_CONTAINER
                          value: '{{ .observed.composite.resource.spec.appContainer }}'
                        - name: SERVICE_NAME
                          value: '{{ .observed.composite.resource.spec.name }}'
                        - name: DATABASE
                          value: '{{ .observed.composite.resource.spec.database }}'
                        - name: CACHE
                          value: '{{ .observed.composite.resource.spec.cache }}'
                        - name: GITHUB_TOKEN
                          valueFrom:
                            secretKeyRef:
                              name: github-credentials
                              key: token
                        - name: GITHUB_USER
                          valueFrom:
                            secretKeyRef:
                              name: github-credentials
                              key: user
                        - name: DOCKER_REGISTRY
                          valueFrom:
                            secretKeyRef:
                              name: docker-credentials
                              key: registry
                        - name: DOCKER_USER
                          valueFrom:
                            secretKeyRef:
                              name: docker-credentials
                              key: username
            providerConfigRef:
              kind: ClusterProviderConfig
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ .observed.composite.resource.spec.name }}-register-argocd'
            namespace: '{{ .observed.composite.resource.metadata.namespace | default "default" }}'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: '{{ .observed.composite.resource.spec.name }}-register-argocd-rn'
          spec:
            forProvider:
              manifest:
                apiVersion: batch/v1
                kind: Job
                metadata:
                  name: '{{ .observed.composite.resource.spec.name }}-register-argocd'
                  namespace: default
                spec:
                  ttlSecondsAfterFinished: 600
                  backoffLimit: 2
                  template:
                    metadata:
                      annotations:
                        sidecar.istio.io/inject: 'false'
                    spec:
                      serviceAccountName: crossplane-admin
                      restartPolicy: OnFailure
                      containers:
                      - name: register-argocd
                        image: alpine/k8s:1.28.4
                        command:
                        - /bin/sh
                        - -c
                        - "set -euo pipefail\necho \"\U0001F517 Registering vCluster with ArgoCD for OAM deployment...\"\n\n# Skip if deploying to host cluster\nif [ \"${VCLUSTER_NAME}\" = \"host\" ] || [ -z \"${VCLUSTER_NAME}\" ]; then\n  echo \"\U0001F3E0 Deploying to host cluster - skipping vCluster registration\"\n  exit 0\nfi\n\n# Install required tools\napk add --no-cache curl jq\n\n# Install ArgoCD CLI\necho \"\U0001F4E6 Installing ArgoCD CLI...\"\ncurl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/download/v2.13.0/argocd-linux-amd64\nchmod +x /usr/local/bin/argocd\n\n# Install vcluster CLI\necho \"\U0001F4E6 Installing vCluster CLI...\"\ncurl -L -o /usr/local/bin/vcluster https://github.com/loft-sh/vcluster/releases/download/v0.19.5/vcluster-linux-amd64\nchmod +x /usr/local/bin/vcluster\n\n# Wait for vCluster to be ready\necho \"\u23F3 Waiting for vCluster to be ready...\"\nfor i in $(seq 1 60); do\n  if kubectl get secret -n ${VCLUSTER_NAMESPACE} | grep -q \"vc-${VCLUSTER_NAME}\"; then\n    echo \"\u2705 vCluster secret found\"\n    break\n  fi\n  echo \"Waiting for vCluster secret... ($i/60)\"\n  sleep 5\ndone\n\n# Get vCluster kubeconfig using vcluster CLI\necho \"\U0001F4E5 Getting vCluster kubeconfig...\"\nvcluster connect ${VCLUSTER_NAME} -n ${VCLUSTER_NAMESPACE} --print > /tmp/vcluster.kubeconfig || {\n  # Fallback to manual extraction\n  kubectl get secret vc-${VCLUSTER_NAME} -n ${VCLUSTER_NAMESPACE} \\\n    -o jsonpath='{.data.config}' | base64 -d > /tmp/vcluster.kubeconfig\n}\n\n# ArgoCD Configuration\nARGOCD_INGRESS_URL=\"${ARGOCD_INGRESS_URL:-af433f091b55640038c23af3a641d716-112208284.us-west-2.elb.amazonaws.com}\"\nARGOCD_PASSWORD=$(kubectl get secret argocd-initial-admin-secret -n argocd -o jsonpath=\"{.data.password}\" | base64 -d)\n\n# Login to ArgoCD\necho \"\U0001F510 Logging into ArgoCD...\"\nargocd login ${ARGOCD_INGRESS_URL}:80 \\\n  --grpc-web-root-path /argocd \\\n  --username admin \\\n  --password ${ARGOCD_PASSWORD} \\\n  --insecure \\\n  --plaintext || {\n    echo \"\u26A0\uFE0F Failed to login to ArgoCD, continuing anyway\"\n  }\n\n# Register vCluster with ArgoCD using CLI\necho \"\U0001F4DD Registering vCluster with ArgoCD...\"\n\n# Check if already registered\nif argocd cluster list | grep -q \"${VCLUSTER_NAME}\"; then\n  echo \"Cluster already registered, removing old registration\"\n  argocd cluster rm ${VCLUSTER_NAME} -y 2>/dev/null || true\nfi\n\n# Add the cluster\nCONTEXT_NAME=$(kubectl config get-contexts --kubeconfig=/tmp/vcluster.kubeconfig -o name | head -1)\nargocd cluster add ${CONTEXT_NAME} \\\n  --kubeconfig /tmp/vcluster.kubeconfig \\\n  --name ${VCLUSTER_NAME} \\\n  --yes || {\n    echo \"\u26A0\uFE0F Failed to add vCluster to ArgoCD\"\n    # Continue anyway as this might be a transient issue\n  }\n\necho \"\u2705 vCluster registered with ArgoCD successfully\"\n"
                        env:
                        - name: VCLUSTER_NAME
                          value: '{{ .observed.composite.resource.spec.targetVCluster | default "" }}'
                        - name: VCLUSTER_NAMESPACE
                          value: '{{ .observed.composite.resource.spec.targetVCluster | default "" }}'
                        - name: APP_NAME
                          value: '{{ .observed.composite.resource.spec.name }}'
            providerConfigRef:
              kind: ClusterProviderConfig
              name: kubernetes-provider
            # v1alpha2 Object supports the plural list (storage version, no
            # conversion webhook involved — see provider-kubernetes-conversion
            # task #100 for the underlying webhook flake).
            managementPolicies:
            - Create
            - Observe
            - Delete
          ---
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ .observed.composite.resource.spec.name }}-oam-updater'
            namespace: '{{ .observed.composite.resource.metadata.namespace | default "default" }}'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: '{{ .observed.composite.resource.spec.name }}-oam-updater-rn'
          spec:
            forProvider:
              manifest:
                apiVersion: batch/v1
                kind: Job
                metadata:
                  name: '{{ .observed.composite.resource.spec.name }}-oam-updater'
                  namespace: default
                spec:
                  ttlSecondsAfterFinished: 600
                  backoffLimit: 2
                  template:
                    metadata:
                      annotations:
                        sidecar.istio.io/inject: 'false'
                    spec:
                      serviceAccountName: crossplane-github-provider
                      restartPolicy: OnFailure
                      containers:
                      - name: oam-updater
                        image: alpine/k8s:1.28.4
                        command:
                        - /bin/sh
                        - -c
                        - "set -euo pipefail\n# kubectl, git, jq already on PATH in alpine/k8s:1.28.4\necho \"Updating OAM Application with webservice component for $SERVICE_NAME...\"\n\nTEMP_DIR=\"/tmp/oam-update-$APP_CONTAINER\"\nmkdir -p $TEMP_DIR\ncd $TEMP_DIR\n\n# Clone the GitOps repository\ngit clone https://$GITHUB_TOKEN@github.com/$GITHUB_USER/$APP_CONTAINER-gitops.git .\n\n# Configure git\ngit config user.name \"ApplicationClaim OAM Updater\"\ngit config user.email \"applicationclaim@platform.local\"\n\n# Determine target vCluster from ApplicationClaim spec or annotation\n# CLAIM_NAMESPACE is patched from spec.claimRef.namespace (see patches below).\n# Fall back to \"default\" only when the claimRef namespace is empty (legacy callers).\nCLAIM_NS=\"${CLAIM_NAMESPACE:-default}\"\necho \"\U0001F50D Looking up ApplicationClaim: $SERVICE_NAME in namespace: $CLAIM_NS\"\nkubectl get applicationclaim $SERVICE_NAME -n \"$CLAIM_NS\" -o yaml | head -20 || {\n  echo \"\u26A0\uFE0F  Not found by name in $CLAIM_NS \u2014 falling back to cross-namespace lookup by spec.appName\"\n  FOUND_NS=$(kubectl get applicationclaim -A -o jsonpath=\"{range .items[?(@.spec.appName=='$SERVICE_NAME')]}{.metadata.namespace}{'\\n'}{end}\" | head -1)\n  if [ -n \"$FOUND_NS\" ]; then\n    echo \"   resolved namespace via -A lookup: $FOUND_NS\"\n    CLAIM_NS=\"$FOUND_NS\"\n  fi\n}\n\nVCLUSTER_TARGET=$(kubectl get applicationclaim $SERVICE_NAME -n \"$CLAIM_NS\" -o jsonpath='{.spec.targetVCluster}' 2>/dev/null || echo \"\")\necho \"   spec.targetVCluster value: '$VCLUSTER_TARGET'\"\n\nif [ -z \"$VCLUSTER_TARGET\" ]; then\n  echo \"   spec.targetVCluster is empty, checking annotation...\"\n  VCLUSTER_TARGET=$(kubectl get applicationclaim $SERVICE_NAME -n \"$CLAIM_NS\" -o jsonpath='{.metadata.annotations.webservice\\.oam\\.dev/vcluster}' 2>/dev/null || echo \"\")\n  echo \"   annotation value: '$VCLUSTER_TARGET'\"\nfi\n\nif [ -z \"$VCLUSTER_TARGET\" ]; then\n  echo \"   No vCluster target found, using default...\"\n  VCLUSTER_TARGET=\"development-vcluster\"\nfi\necho \"\U0001F3AF Target vCluster: $VCLUSTER_TARGET\"\n\n# Create vCluster-specific directory structure\nmkdir -p vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME\n\n# Check if this is an OAM-driven ApplicationClaim (should NOT update OAM to avoid circular dependency)\n# Default to api-driven if not explicitly set\nSOURCE=\"${BOOTSTRAP_SOURCE:-api-driven}\"\n\nif [ \"$SOURCE\" == \"OAM-driven\" ]; then\n  echo \"\U0001F504 OAM-driven ApplicationClaim detected (source: $SOURCE)\"\n  echo \"\u26A0\uFE0F  Skipping OAM update to avoid circular dependency\"\n  echo \"\u2139\uFE0F  User should manually update OAM Application if needed\"\n  exit 0\nfi\n\necho \"\u2705 Processing ApplicationClaim (source: $SOURCE)\"\n\necho \"\U0001F504 API-driven ApplicationClaim detected - proceeding with OAM update\"\n\n# Check if OAM application file exists\nif [ ! -f \"oam/applications/application.yaml\" ]; then\n  echo \"\u274C OAM application file not found\"\n  exit 1\nfi\n\necho \"\U0001F4CB Current OAM Application:\"\ncat oam/applications/application.yaml\n\n# Check if component already exists in OAM Application\nCOMPONENT_EXISTS=false\nif grep -q \"name: $SERVICE_NAME\" oam/applications/application.yaml; then\n  echo \"\u26A0\uFE0F  Component '$SERVICE_NAME' already exists in OAM Application\"\n  echo \"\U0001F504 Component will be replaced with ApplicationClaim specifications...\"\n  COMPONENT_EXISTS=true\nelse\n  echo \"\u2705 Component '$SERVICE_NAME' not found - proceeding with addition\"\nfi\n\n# Create new component definition - choose correct ComponentDefinition based on framework\nif [ \"$FRAMEWORK\" = \"chatbot\" ]; then\n  COMPONENT_TYPE=\"rasa-chatbot\"\n  COMPONENT_PORT=\"5005\"\nelse\n  COMPONENT_TYPE=\"webservice\"\n  COMPONENT_PORT=\"8080\"\nfi\n\n# Determine registry based on configuration\n# Check if we should use ACR or Docker Hub\nDEFAULT_REGISTRY=\"${DEFAULT_REGISTRY:-acr}\"  # Default to ACR\n\nif [ \"$DEFAULT_REGISTRY\" = \"acr\" ]; then\n  IMAGE_REGISTRY=\"healthidpuaeacr.azurecr.io\"\n  IMAGE_PREFIX=\"\"\nelse\n  IMAGE_REGISTRY=\"docker.io\"\n  IMAGE_PREFIX=\"socrates12345/\"\nfi\n\n# Bug-B: image tag defaults to ${DEFAULT_IMAGE_TAG:-latest}.\n# WARN: bypasses image-source-policy when defaulted \u2014 callers\n# SHOULD set DEFAULT_IMAGE_TAG (or override the image entirely\n# via the consumer OAM) so an immutable digest/tag is used.\nIMAGE_TAG_DEFAULT=\"${DEFAULT_IMAGE_TAG:-latest}\"\nCOMPONENT_YAML=\"\n  - name: $SERVICE_NAME\n    type: $COMPONENT_TYPE\n    properties:\n      name: $SERVICE_NAME\n      image: ${IMAGE_REGISTRY}/${IMAGE_PREFIX}$SERVICE_NAME:${IMAGE_TAG_DEFAULT}\n      language: $LANGUAGE\n      framework: $FRAMEWORK\n      port: $COMPONENT_PORT\n      healthPath: /health\"\n\n# Add realtime platform integration if specified\nif [ -n \"$REALTIME_PLATFORM\" ] && [ \"$REALTIME_PLATFORM\" != \"none\" ]; then\n  COMPONENT_YAML=\"${COMPONENT_YAML}\n      realtime: $REALTIME_PLATFORM\n      websocket: true\"\nfi\n\n# Add database if specified\nif [ \"$DATABASE\" != \"none\" ] && [ -n \"$DATABASE\" ]; then\n  COMPONENT_YAML=\"${COMPONENT_YAML}\n      database: $DATABASE\"\nfi\n\n# Add cache if specified\nif [ \"$CACHE\" != \"none\" ] && [ -n \"$CACHE\" ]; then\n  COMPONENT_YAML=\"${COMPONENT_YAML}\n      cache: $CACHE\"\nfi\n\n# Add AppContainer reference\nCOMPONENT_YAML=\"${COMPONENT_YAML}\n      appContainer: $APP_CONTAINER\n      exposeApi: true\"\n\n# If component exists, we'll replace it entirely\nif [ \"$COMPONENT_EXISTS\" = \"true\" ]; then\n  echo \"\U0001F504 Replacing existing component...\"\n  \n  # Create a new OAM application with just our component (simpler approach)\n  # Keep everything before components section\n  sed -n '1,/components:/p' oam/applications/application.yaml > temp_app.yaml\n  \n  # Add our component\n  echo \"$COMPONENT_YAML\" | sed 's/^/        /' >> temp_app.yaml\n  \n  # Keep everything after policies (if exists) or add policies section\n  if grep -q \"policies:\" oam/applications/application.yaml; then\n    sed -n '/policies:/,$p' oam/applications/application.yaml >> temp_app.yaml\n  fi\n  \n  mv temp_app.yaml oam/applications/application.yaml\n  \nelif grep -q \"components: \\[\\]\" oam/applications/application.yaml; then\n  echo \"\U0001F504 Adding first component to empty OAM Application...\"\n  \n  # Replace empty components array with the new component\n  sed -i \"s/components: \\[\\]/components:$COMPONENT_YAML/\" oam/applications/application.yaml\n  \nelif grep -q \"components:\" oam/applications/application.yaml; then\n  echo \"\U0001F504 Adding component to existing OAM Application...\"\n  \n  # Find the line number of components: and add the new component\n  COMPONENTS_LINE=$(grep -n \"components:\" oam/applications/application.yaml | cut -d: -f1)\n  \n  # Create temp file with the new component added\n  head -n $COMPONENTS_LINE oam/applications/application.yaml > temp_app.yaml\n  echo \"$COMPONENT_YAML\" | sed 's/^/        /' >> temp_app.yaml\n  tail -n +$((COMPONENTS_LINE + 1)) oam/applications/application.yaml >> temp_app.yaml\n  \n  mv temp_app.yaml oam/applications/application.yaml\n  \nelse\n  echo \"\u274C No components section found in OAM Application\"\n  exit 1\nfi\n\n# Add or update topology policy for multi-cluster deployment\n# Check if targetVCluster is \"host\" - if so, skip topology policy\nif [ \"$VCLUSTER_TARGET\" = \"host\" ]; then\n  echo \"\U0001F3E0 Deploying to host cluster - skipping topology policy\"\n  # Remove any existing topology policy if present\n  if grep -q \"deploy-to-vcluster\" oam/applications/application.yaml; then\n    echo \"Removing existing topology policy for host deployment...\"\n    # Remove the policy section\n    sed -i '/- name: deploy-to-vcluster/,+4d' oam/applications/application.yaml\n    # If policies section is now empty, remove it too\n    if grep -q \"policies: \\[\\]\" oam/applications/application.yaml; then\n      sed -i '/policies: \\[\\]/d' oam/applications/application.yaml\n    fi\n  fi\nelse\n  echo \"\U0001F3AF Adding topology policy for vCluster deployment...\"\n  if ! grep -q \"policies:\" oam/applications/application.yaml; then\n    echo \"  policies:\" >> oam/applications/application.yaml\n    echo \"  - name: deploy-to-vcluster\" >> oam/applications/application.yaml\n    echo \"    type: topology\" >> oam/applications/application.yaml\n    echo \"    properties:\" >> oam/applications/application.yaml\n    echo \"      clusters: [\\\"$VCLUSTER_TARGET\\\"]\" >> oam/applications/application.yaml\n    echo \"      namespace: \\\"default\\\"\" >> oam/applications/application.yaml\n  else\n    # Update existing policy\n    if grep -q \"deploy-to-vcluster\" oam/applications/application.yaml; then\n      echo \"\U0001F504 Updating existing topology policy...\"\n      # Update the clusters line\n      sed -i \"s/clusters: \\[.*\\]/clusters: [\\\"$VCLUSTER_TARGET\\\"]/\" oam/applications/application.yaml\n      sed -i \"s/namespace: \\\".*\\\"/namespace: \\\"default\\\"/\" oam/applications/application.yaml\n    else\n      # Add new policy to existing policies section\n      echo \"  - name: deploy-to-vcluster\" >> oam/applications/application.yaml\n      echo \"    type: topology\" >> oam/applications/application.yaml\n      echo \"    properties:\" >> oam/applications/application.yaml\n      echo \"      clusters: [\\\"$VCLUSTER_TARGET\\\"]\" >> oam/applications/application.yaml\n      echo \"      namespace: \\\"default\\\"\" >> oam/applications/application.yaml\n    fi\n  fi\nfi\n\necho \"\u2705 Updated OAM Application with topology policy:\"\ncat oam/applications/application.yaml\n\n# Create vCluster-specific manifests\necho \"\U0001F4C1 Creating vCluster-specific manifests for $VCLUSTER_TARGET...\"\n\n# Create ApplicationClaim for vCluster processing\ncat > vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME/application-claim.yaml << EOF\napiVersion: platform.example.org/v1alpha1\n\
                          kind: ApplicationClaim\nmetadata:\n  name: $SERVICE_NAME\n  namespace: default\n  annotations:\n    webservice.oam.dev/source: \"$BOOTSTRAP_SOURCE\"\n    webservice.oam.dev/processed-by: \"host-cluster-composition\"\nspec:\n  appContainer: $APP_CONTAINER\n  name: $SERVICE_NAME\n  language: $LANGUAGE\n  framework: $FRAMEWORK\n  database: $DATABASE\n  cache: $CACHE\nEOF\n\n# Create OAM Application for vCluster KubeVela processing\n# ALWAYS use default namespace for OAM Application (where WorkloadDefinitions exist)\n# The topology policy will handle deployment to the correct location\nOAM_NAMESPACE=\"default\"\n\n# Bug-B: image tag defaults to ${DEFAULT_IMAGE_TAG:-v1.0.0}.\n# WARN: bypasses image-source-policy when defaulted \u2014 callers\n# SHOULD set DEFAULT_IMAGE_TAG (or override via consumer OAM).\nIMAGE_TAG_DEFAULT=\"${DEFAULT_IMAGE_TAG:-v1.0.0}\"\ncat > vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME/oam-application.yaml << EOF\napiVersion: core.oam.dev/v1beta1\nkind: Application\nmetadata:\n  name: $SERVICE_NAME-app\n  namespace: $OAM_NAMESPACE\nspec:\n  components:\n  - name: $SERVICE_NAME\n    type: webservice\n    properties:\n      image: \"${IMAGE_REGISTRY}/${IMAGE_PREFIX}$SERVICE_NAME:${IMAGE_TAG_DEFAULT}\"\n      port: 8080\n      healthPath: \"/health\"\n      language: $LANGUAGE\n      framework: $FRAMEWORK\n$(if [ \"$DATABASE\" != \"none\" ]; then\necho \"      database: $DATABASE\n      envFrom:\n      - secretRef:\n          name: \\\"${SERVICE_NAME}-db-secret\\\"\"\nfi)\n      environment:\n        LOG_LEVEL: \"INFO\"\n        AGENT_TYPE: \"$SERVICE_NAME\"\n  policies:\n  - name: deploy-to-vcluster\n    type: topology\n    properties:\n      clusters: [\"$VCLUSTER_TARGET\"]\n      namespace: \"default\"\nEOF\n\n# Create ArgoCD Application for this service\ncat > vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME/argocd-app.yaml << EOF\napiVersion: argoproj.io/v1alpha1\nkind: Application\nmetadata:\n  name: $SERVICE_NAME\n  namespace: argocd\nspec:\n  project: default\n  source:\n    repoURL: https://github.com/$GITHUB_USER/$APP_CONTAINER-gitops\n    targetRevision: main\n    path: vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME\n    directory:\n      include: '{application-claim.yaml,oam-application.yaml}'\n  destination:\n    server: https://kubernetes.default.svc\n    namespace: default\n  syncPolicy:\n    automated:\n      prune: true\n      selfHeal: true\nEOF\n\necho \"\u2705 Created vCluster-specific manifests in vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME/\"\n\n# Commit and push changes\ngit add oam/applications/application.yaml\ngit add vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME/\ngit commit -m \"Add $SERVICE_NAME webservice component to OAM Application (Target: $VCLUSTER_TARGET, Lang: $LANGUAGE, Framework: $FRAMEWORK, DB: $DATABASE, Cache: $CACHE)\"\n\ngit push\n\necho \"\U0001F389 Successfully updated OAM Application with $SERVICE_NAME webservice component\"\n"
