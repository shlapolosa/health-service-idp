          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ .observed.composite.resource.spec.name }}-argocd-setup'
            namespace: '{{ .observed.composite.resource.metadata.namespace | default "default" }}'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: '{{ .observed.composite.resource.spec.name }}-argocd-setup-rn'
          spec:
            forProvider:
              manifest:
                apiVersion: batch/v1
                kind: Job
                metadata:
                  name: '{{ .observed.composite.resource.spec.name }}-argocd-setup'
                  namespace: default
                spec:
                  ttlSecondsAfterFinished: 600
                  backoffLimit: 2
                  template:
                    metadata:
                      annotations:
                        sidecar.istio.io/inject: 'false'
                    spec:
                      serviceAccountName: crossplane-github-provider
                      restartPolicy: OnFailure
                      containers:
                      - name: argocd-setup
                        image: alpine/k8s:1.28.4
                        command:
                        - /bin/sh
                        - -c
                        - "set -euo pipefail\necho \"\U0001F527 Setting up ArgoCD for $SERVICE_NAME...\"\n\n# Wait for GitOps repo to be ready\nsleep 30\n\n# Direct kubectl approach (simpler for in-cluster)\necho \"\U0001F4DD Creating ArgoCD Application via kubectl...\"\n\n# Add repository secret for authentication\necho \"\U0001F511 Creating repository secret...\"\ncat <<EOFS | kubectl apply -f -\napiVersion: v1\nkind: Secret\nmetadata:\n  name: repo-$APP_CONTAINER-gitops\n  namespace: argocd\n  labels:\n    argocd.argoproj.io/secret-type: repository\ntype: Opaque\nstringData:\n  type: git\n  url: https://github.com/$GITHUB_USER/$APP_CONTAINER-gitops\n  username: $GITHUB_USER\n  password: $GITHUB_TOKEN\nEOFS\n\necho \"\u2705 Repository secret created\"\n\n# Determine target vCluster\nif [ -n \"$TARGET_VCLUSTER\" ] && [ \"$TARGET_VCLUSTER\" != \"\" ]; then\n  echo \"\U0001F3AF Deploying to vCluster: $TARGET_VCLUSTER\"\n  # For vCluster deployments, we need to register the vCluster first\n  # The actual application will be applied to the vCluster once registered\n  DEST_SERVER=\"https://kubernetes.default.svc\"\n  # Use apps directory which contains the App of Apps pattern\n  APP_PATH=\"apps\"\nelse\n  echo \"\U0001F3AF Deploying to default cluster\"\n  DEST_SERVER=\"https://kubernetes.default.svc\"\n  APP_PATH=\"apps\"\nfi\n\n# Create ArgoCD Application\ncat <<EOFA | kubectl apply -f -\napiVersion: argoproj.io/v1alpha1\nkind: Application\nmetadata:\n  name: $SERVICE_NAME-app\n  namespace: argocd\n  finalizers:\n    - resources-finalizer.argocd.argoproj.io\nspec:\n  project: default\n  source:\n    repoURL: https://github.com/$GITHUB_USER/$APP_CONTAINER-gitops\n    targetRevision: main\n    path: $APP_PATH\n  destination:\n    server: $DEST_SERVER\n    namespace: default\n  syncPolicy:\n    automated:\n      prune: true\n      selfHeal: true\n    syncOptions:\n      - CreateNamespace=true\nEOFA\n\necho \"\u2705 ArgoCD Application created\"\n\n# Trigger initial sync\necho \"\U0001F504 Triggering initial sync...\"\nkubectl patch application $SERVICE_NAME-app -n argocd --type merge -p '{\"operation\":{\"sync\":{\"revision\":\"HEAD\"}}}' || echo \"Sync triggered\"\n\necho \"\U0001F389 ArgoCD setup completed for $SERVICE_NAME\"\necho \"\U0001F4CA Application will be synced to namespace: default\"\necho \"\U0001F517 Repository: https://github.com/$GITHUB_USER/$APP_CONTAINER-gitops\"\n"
                        env:
