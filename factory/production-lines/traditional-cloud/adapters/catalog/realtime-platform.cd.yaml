---
# Real-time Platform ComponentDefinition
# Architecturally identical to webservice pattern: OAM Component → Knative Service + Infrastructure Claims
apiVersion: core.oam.dev/v1beta1
kind: ComponentDefinition
metadata:
  name: realtime-platform
  annotations:
    definition.oam.dev/description: "Complete real-time streaming platform with IoT, analytics, and stream processing"
    definition.oam.dev/requires-source-code: "false"
    definition.oam.dev/shape: application-claim
spec:
  workload:
    definition:
      apiVersion: platform.example.org/v1alpha1
      kind: RealtimePlatformClaim
  schematic:
    cue:
      template: |
        // Primary Output: RealtimePlatformClaim (the platform's real workload).
        //
        // 2026-06-12: the former primary output — a companion ksvc
        // "<name>-realtime-service" on the shared realtime_data_pipeline:latest
        // image — was REMOVED. It violated HARD-3 (mutable :latest pin), ran as
        // root, and never produced a ready revision on ANY platform instance
        // (rtdemo and rtdemo2 both RevisionMissing forever). RT-2 role-based
        // realtime-service components supersede it. The output was standalone
        // (nothing referenced the ksvc); on the next render vela GCs the dead
        // ksvc — desired — while this claim and the conn-secret converge
        // unchanged (same GVK/namespace/name as before).
        output: {
          apiVersion: "platform.example.org/v1alpha1"
          kind: "RealtimePlatformClaim"
          metadata: {
            name: context.name + "-infrastructure"
            namespace: context.namespace
            labels: {
              "app.kubernetes.io/name": context.name
              "app.kubernetes.io/component": "realtime-infrastructure"
              "app.kubernetes.io/part-of": "realtime-platform"
            }
          }
          spec: {
            name: context.name
            appContainer: (*parameter.repository | context.name)
            database: parameter.database
            visualization: parameter.visualization
            iot: parameter.iot
            if parameter.dataRetention != _|_ {
              dataRetention: parameter.dataRetention
            }
            if parameter.mqttUsers != _|_ {
              mqttUsers: parameter.mqttUsers
            }
            // RT-1: declarative topics flow into the XRD so the composition's
            // topic-provisioning Job POSTs each to Lenses. Backward compat:
            // absent -> composition keeps the default health-domain topic set.
            if parameter.topics != _|_ {
              topics: parameter.topics
            }
          }
        }

        // Secondary Outputs
        outputs: {
          // RT-1: aggregate <name>-conn Secret (binding-contract normalization,
          // pure-CUE output like postgresql/redis CDs). ADDITIVE — the five
          // legacy <name>-*-secret refs rendered by the RealtimePlatformClaim
          // composition remain for one release. Service DNS is deterministic
          // (<name>-kafka.<name>-realtime.svc...), so these can be computed here.
          "conn-secret": {
            apiVersion: "v1"
            kind:       "Secret"
            metadata: {
              name:      context.name + "-conn"
              namespace: context.namespace
              labels: {
                "binding.cafe.io/category": "realtime"
                "app.oam.dev/component":    context.name
              }
            }
            type: "Opaque"
            stringData: {
              KAFKA_BOOTSTRAP_SERVERS:   "demo-kafka." + context.name + "-realtime.svc.cluster.local:9092"
              KAFKA_SCHEMA_REGISTRY_URL: "http://demo-kafka." + context.name + "-realtime.svc.cluster.local:8081"
              LENSES_URL:                "http://lenses-hq." + context.name + "-realtime.svc.cluster.local:9991"
              LENSES_HQ_URL:             "http://lenses-hq." + context.name + "-realtime.svc.cluster.local:9991"
              LENSES_WS_URL:             "ws://lenses-hq." + context.name + "-realtime.svc.cluster.local:9991"
              REALTIME_PLATFORM_NAME:    context.name
              REALTIME_INTEGRATION_ENABLED: "true"
              if parameter.topics != _|_ {
                for t in parameter.topics {
                  "TOPIC_\(t.name)": t.name
                }
              }
            }
          }
        }
        
        // Repository Creation (conditional - claim path, RETIRE-WFT-2 #152).
        // NOTE: realtime backing infra (Kafka/MQTT/DB/websocket/visualization) is
        // provisioned by the ALWAYS-created RealtimePlatformClaim above, NOT by this
        // block. The old workflow-trigger only did source-repo scaffolding (same
        // microservice-creation params as webservice), so it maps cleanly to an
        // AppContainerClaim (same pattern as auto-scaffold-bootstrap / webservice).
        // Idempotent by claim name; server-side apply converges with day-0 claims.
        // RECREATE-STORM (#175): scaffold-claim emission gated behind EXPLICIT
        // `bootstrap: true` (was `language != _|_`, which duplicated ownership
        // under UNIFY-1 — see realtime-service.cd.yaml for the full rationale).
        if parameter.bootstrap != _|_ if parameter.bootstrap {
          outputs: {
            // Add scaffold claim when bootstrap requested (the infrastructure
            // claim is the primary `output` above — always rendered).
            "scaffold-claim": {
              apiVersion: "platform.example.org/v1alpha1"
              kind:       "AppContainerClaim"
              metadata: {
                // Deterministic name = component name; converges with any day-0 claim.
                name:      context.name
                namespace: context.namespace
                labels: {
                  "app.kubernetes.io/name":       context.name
                  "app.kubernetes.io/component":  "scaffold-claim"
                  "app.kubernetes.io/managed-by": "kubevela"
                  "app.kubernetes.io/part-of":    "realtime-platform"
                }
                annotations: {
                  "realtime-platform.oam.dev/source":        "oam-driven"
                  "realtime-platform.oam.dev/platform-type": "realtime"
                }
              }
              spec: {
                name:           context.name
                description:    "OAM-driven realtime platform via ComponentDefinition (declarative spine)"
                gitHubOrg:      "shlapolosa"
                dockerRegistry: "healthidpuaeacr.azurecr.io"
                // Map language onto the ApplicationClaim XRD enum [python, java, rasa, nodejs].
                // First-match-default: pass through supported values, else default python
                // (realtime base image is fastapi/python; "go" is not a template — falls to python).
                language: [if parameter.language == "java" {"java"}, if parameter.language == "nodejs" {"nodejs"}, "python"][0]
                // Framework derived from chosen language: java->springboot, nodejs->graphql-gateway, else fastapi.
                framework: [if parameter.language == "java" {"springboot"}, if parameter.language == "nodejs" {"graphql-gateway"}, "fastapi"][0]
                // First-match-default: explicit targetEnvironment, else "host".
                deliveryTarget: [if parameter.targetEnvironment != _|_ {parameter.targetEnvironment}, "host"][0]
              }
            }
          }
        }
        
        parameter: {
          // #175: opt-in standalone scaffold claim (single-component OAMs
          // only — under UNIFY-1 scaffolding belongs to the app-level claim).
          bootstrap?: bool
          // DEPRECATED (2026-06-12, ignored): these parameters fed ONLY the
          // removed companion ksvc. They are KEPT in the schema (declared but
          // unused) so existing consumer OAMs that set them keep validating —
          // removal here would be a breaking schema change. Drop after one
          // release once no consumer OAM still sets them.
          image?: string
          port: *8080 | int
          version: *"latest" | string
          healthPath: *"/health" | string
          resources: *{
            cpu: "1000m"
            memory: "2Gi"
          } | {
            cpu?: string
            memory?: string
          }
          environment: *{} | {[string]: string}
          envFrom?: [...{
            secretRef: {
              name: string
            }
          }]

          // Optional Infrastructure Bootstrap (for repository creation equivalence)
          language?: string     // Triggers bootstrap: python, nodejs, java, go
          framework?: string    // fastapi, express, spring, gin
          repository?: string   // Git repository template name (defaults to name)
          
          // Realtime Platform Configuration
          database: *"postgres" | "postgres" | "mysql" | "mongodb"
          visualization: *"metabase" | "metabase" | "grafana"
          iot: *true | bool

          // RT-1: declarative topics (first-class). Each is provisioned to Lenses
          // by the composition's topic Job and surfaced via <name>-conn TOPIC_*.
          // Omit for backward compat (composition seeds the health-domain set).
          topics?: [...{
            name: string
            partitions: *3 | int
            retention:  *604800000 | int
          }]
          
          // Advanced optional
          dataRetention?: string // "7d", "30d", etc.
          mqttUsers?: [...{
            username: string
            password: string
          }]
          targetEnvironment?: string  // vCluster deployment target
        }