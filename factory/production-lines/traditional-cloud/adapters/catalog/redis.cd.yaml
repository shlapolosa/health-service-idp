# Native Redis ComponentDefinition (Crossplane-managed via Helm)
apiVersion: core.oam.dev/v1beta1
kind: ComponentDefinition
metadata:
  name: redis
  annotations:
    definition.oam.dev/description: "Native Redis deployment via Helm with Crossplane-managed lifecycle"
    definition.oam.dev/shape: helm-release
spec:
  workload:
    definition:
      apiVersion: helm.crossplane.io/v1beta1
      kind: Release
    type: releases.helm.crossplane.io
  schematic:
    cue:
      template: |
        output: {
          apiVersion: "helm.crossplane.io/v1beta1"
          kind: "Release"
          metadata: {
            name: context.name
            namespace: "crossplane-system"
          }
          spec: {
            forProvider: {
              chart: {
                name: "redis"
                repository: "https://charts.bitnami.com/bitnami"
                version: "17.11.3"
              }
              namespace: context.namespace
              values: {
                auth: {
                  enabled: parameter.authEnabled
                  password: parameter.password
                }
                architecture: parameter.architecture
                master: {
                  persistence: {
                    enabled: parameter.persistenceEnabled
                    size: parameter.storageSize
                  }
                }
                replica: {
                  replicaCount: parameter.replicaCount
                  persistence: {
                    enabled: parameter.persistenceEnabled
                    size: parameter.storageSize
                  }
                }
                metrics: {
                  enabled: parameter.metricsEnabled
                }
              }
            }
          }
        }
        
        // Binding contract (2026-06-06): normalized connection Secret.
        // Webservices referencing this component via `cache: <name>` get
        // envFrom "<name>-conn" automatically (webservice CD).
        // Host mirrors bitnami fullname logic: release name containing
        // "redis" => fullname == release; otherwise "<release>-redis".
        // Master service carries writes in both architectures.
        outputs: {
          "conn-secret": {
            // Hidden fields (stripped at render). Host mirrors bitnami fullname:
            // release containing "redis" => fullname == release; else "<release>-redis".
            // =~ instead of strings.Contains: vela 1.10.3 CUE-import bug; the
            // webhook also rejects template-top-level context refs, hence in-block.
            _fn: string
            if context.name =~ "redis" {
              _fn: context.name
            }
            if !(context.name =~ "redis") {
              _fn: context.name + "-redis"
            }
            _host: _fn + "-master." + context.namespace + ".svc.cluster.local"
            apiVersion: "v1"
            kind:       "Secret"
            metadata: {
              name:      context.name + "-conn"
              namespace: context.namespace
              labels: {
                "binding.cafe.io/category": "cache"
                "app.oam.dev/component":    context.name
              }
            }
            type: "Opaque"
            stringData: {
              REDIS_HOST: _host
              REDIS_PORT: "6379"
              if parameter.authEnabled {
                REDIS_PASSWORD: parameter.password
                REDIS_URL:      "redis://:" + parameter.password + "@" + _host + ":6379/0"
                CACHE_URL:      "redis://:" + parameter.password + "@" + _host + ":6379/0"
              }
              if !parameter.authEnabled {
                REDIS_URL: "redis://" + _host + ":6379/0"
                CACHE_URL: "redis://" + _host + ":6379/0"
              }
            }
          }
        }

        parameter: {
          authEnabled: *true | bool
          password: *"redis-password" | string
          architecture: *"replication" | "standalone" | "replication" | "sentinel"
          persistenceEnabled: *true | bool
          storageSize: *"8Gi" | string
          replicaCount: *2 | int
          metricsEnabled: *true | bool
        }
