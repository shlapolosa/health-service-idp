# RT-1 (#156): realtime-service ComponentDefinition.
# A deployable websocket+kafka app (NOT infra). Reuses the fastapi scaffold +
# agent_common.realtime_fastapi (create_realtime_agent_app) via the serviceFlavor:
# realtime hint on the scaffold claim — no new template repo, no new framework
# enum. Renders a Knative Service that envFroms <realtime>-conn and exposes /ws.
apiVersion: core.oam.dev/v1beta1
kind: ComponentDefinition
metadata:
  name: realtime-service
  annotations:
    definition.oam.dev/description: "Websocket+Kafka realtime service (consumes/produces declared topics, exposes /ws). Reuses fastapi scaffold + agent_common.realtime_fastapi."
    definition.oam.dev/requires-source-code: "true"
    definition.oam.dev/shape: knative-service
spec:
  workload:
    definition:
      apiVersion: serving.knative.dev/v1
      kind: Service
    type: services.serving.knative.dev
  schematic:
    cue:
      template: |
        output: {
          apiVersion: "serving.knative.dev/v1"
          kind: "Service"
          metadata: {
            name: context.name
            namespace: context.namespace
            labels: {
              "app.kubernetes.io/name":       context.name
              "app.kubernetes.io/component":  "realtime-service"
              "app.kubernetes.io/managed-by": "kubevela"
            }
            annotations: {
              if parameter.targetEnvironment != _|_ {
                "app.oam.dev/cluster": parameter.targetEnvironment
              }
              if parameter.language != _|_ {
                "realtime-service.oam.dev/bootstrap": "true"
                "realtime-service.oam.dev/language": parameter.language
              }
              if parameter.realtime != _|_ {
                "realtime.platform.example.org/integration": parameter.realtime
              }
            }
          }
          spec: {
            template: {
              metadata: {
                annotations: {
                  "autoscaling.knative.dev/minScale": "1"
                  "autoscaling.knative.dev/maxScale": "10"
                }
                labels: {
                  "app.kubernetes.io/name": context.name
                }
              }
              spec: {
                serviceAccountName: "knative-docker-sa"
                containers: [{
                  image: parameter.image
                  securityContext: {
                    runAsUser: 1000
                    runAsNonRoot: true
                    allowPrivilegeEscalation: false
                  }
                  ports: [{
                    containerPort: parameter.port
                    name: "http1"
                  }]
                  resources: {
                    limits: {
                      cpu: parameter.resources.cpu
                      memory: parameter.resources.memory
                    }
                    requests: {
                      cpu: "250m"
                      memory: "256Mi"
                    }
                  }
                  env: [
                    {
                      name: "WEBSOCKET_ENABLED"
                      value: "\(parameter.websocket)"
                    },
                    {
                      name: "REALTIME_PLATFORM_NAME"
                      value: [if parameter.realtime != _|_ {parameter.realtime}, context.name][0]
                    },
                    {
                      name: "REALTIME_INTEGRATION_ENABLED"
                      value: "true"
                    },
                  ] + [
                    // CONSUME_TOPICS / PRODUCE_TOPICS as comma-joined would need a
                    // CUE import; instead emit one CONSUME_<name>/PRODUCE_<name>=name
                    // var per topic. The scaffolded service also reads TOPIC_* from
                    // <realtime>-conn for discovery.
                    if parameter.consumes != _|_ {
                      for t in parameter.consumes {
                        {
                          name:  "CONSUME_" + t
                          value: t
                        }
                      }
                    }
                  ] + [
                    if parameter.produces != _|_ {
                      for t in parameter.produces {
                        {
                          name:  "PRODUCE_" + t
                          value: t
                        }
                      }
                    }
                  ] + [
                    for k, v in parameter.environment {
                      name: k
                      value: v
                    }
                  ]
                  envFrom: [
                    if parameter.envFrom != _|_ {
                      for ref in parameter.envFrom {
                        ref
                      }
                    }
                  ] + [
                    // RT-1: realtime binding (KAFKA_*/LENSES_*/TOPIC_*). optional:false
                    // per the day-0 lesson — block boot until the binding exists.
                    if parameter.realtime != _|_ {
                      {
                        secretRef: {
                          name:     parameter.realtime + "-conn"
                          optional: false
                        }
                      }
                    },
                    // Identity (auth0) for the in-service WS JWT verify (§8).
                    if parameter.identity != _|_ if parameter.identity != "none" {
                      {
                        secretRef: {
                          name:     parameter.identity + "-conn"
                          optional: true
                        }
                      }
                    },
                  ]
                  livenessProbe: {
                    httpGet: {
                      path: parameter.healthPath
                      port: parameter.port
                    }
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    failureThreshold: 6
                  }
                  readinessProbe: {
                    httpGet: {
                      path: parameter.healthPath
                      port: parameter.port
                    }
                    initialDelaySeconds: 5
                    periodSeconds: 5
                  }
                }]
              }
            }
          }
        }

        // RT-1 (#156) §8: Istio-level JWT on the WS upgrade. Rendered ONLY when
        // the issuer is supplied literally (jwtIssuer/jwtJwksUri) — Istio
        // RequestAuthentication cannot read the issuer from <identity>-conn at
        // render time. When omitted, auth falls back to the in-service verify_token
        // gate in agent_common.realtime_fastapi (see CD doc / plan §8 limits).
        if parameter.jwtIssuer != _|_ {
          outputs: {
            "ws-request-auth": {
              apiVersion: "security.istio.io/v1"
              kind:       "RequestAuthentication"
              metadata: {
                name:      context.name + "-ws-jwt"
                namespace: context.namespace
              }
              spec: {
                selector: matchLabels: "app.kubernetes.io/name": context.name
                jwtRules: [{
                  issuer: parameter.jwtIssuer
                  if parameter.jwtJwksUri != _|_ {
                    jwksUri: parameter.jwtJwksUri
                  }
                  fromParams: ["token"]
                }]
              }
            }
            "ws-authz": {
              apiVersion: "security.istio.io/v1"
              kind:       "AuthorizationPolicy"
              metadata: {
                name:      context.name + "-ws-authz"
                namespace: context.namespace
              }
              spec: {
                selector: matchLabels: "app.kubernetes.io/name": context.name
                action: "ALLOW"
                rules: [{
                  from: [{source: requestPrincipals: ["*"]}]
                  to: [{operation: paths: ["/ws", "/ws/events"]}]
                }, {
                  // Non-/ws paths (health/openapi) stay open for probes + APIM.
                  to: [{operation: notPaths: ["/ws", "/ws/events"]}]
                }]
              }
            }
          }
        }

        // Scaffold claim (RT-1): one AppContainerClaim carrying serviceFlavor:
        // realtime so the ApplicationClaim composition seeds the fastapi realtime
        // variant (overwrites src/main.py -> create_realtime_agent_app, adds
        // aiokafka+websockets). Mirrors realtime-platform/webservice scaffold path.
        if parameter.language != _|_ {
          outputs: {
            "scaffold-claim": {
              apiVersion: "platform.example.org/v1alpha1"
              kind:       "AppContainerClaim"
              metadata: {
                name:      context.name
                namespace: context.namespace
                labels: {
                  "app.kubernetes.io/name":       context.name
                  "app.kubernetes.io/component":  "scaffold-claim"
                  "app.kubernetes.io/managed-by": "kubevela"
                }
                annotations: {
                  "realtime-service.oam.dev/source": "oam-driven"
                }
              }
              spec: {
                name:           context.name
                description:    "OAM-driven realtime-service (websocket+kafka flavor)"
                gitHubOrg:      "shlapolosa"
                dockerRegistry: "healthidpuaeacr.azurecr.io"
                language:       "python"
                framework:      "fastapi"
                deliveryTarget: [if parameter.targetEnvironment != _|_ {parameter.targetEnvironment}, "host"][0]
                services: [{
                  name:      context.name
                  language:  "python"
                  framework: "fastapi"
                  flavor:    "realtime"
                }]
              }
            }
          }
        }

        parameter: {
          // Container image (HARD-3 #170). The `*default | string` form means:
          // when OAM `properties.image` IS supplied it is used VERBATIM; the
          // ":latest" placeholder only applies on the FIRST render (bootstrap),
          // before generated-repo CI has built microservices/<name>. CI then
          // commit-backs the immutable <repo>:<sha> into the gitops OAM AND bumps
          // app.oam.dev/publishVersion (see comprehensive-gitops-template.yml +
          // deployment-update.yml in app-container-claim-composition.yaml) — that
          // re-pin is what unsticks the Knative revision from the stale :latest
          // digest. A provided image MUST NOT end in ":latest"; that guard lives
          // in the CI commit-back (RE2 has no negative-lookahead, so it is not
          // cleanly expressible as a vela 1.10 CUE regex constraint).
          image: *"healthidpuaeacr.azurecr.io/\(context.name):latest" | string
          port: *8080 | int
          version: *"latest" | string
          healthPath: *"/health" | string
          websocket: *true | bool
          resources: *{
            cpu: "500m"
            memory: "512Mi"
          } | {
            cpu?: string
            memory?: string
          }
          environment: *{} | {[string]: string}
          envFrom?: [...{
            secretRef: {
              name: string
            }
          }]
          // Scaffold trigger (python/fastapi only — realtime flavor).
          language?: "python"
          // Realtime platform binding (required for a useful realtime-service).
          realtime?: string
          // Topics this service reads / writes (must be declared on the platform).
          consumes?: [...string]
          produces?: [...string]
          // Identity component for WS JWT verify (in-service gate via -conn).
          identity?: string
          // RT-1 §8: literal issuer/jwks for the optional Istio RequestAuthentication
          // on /ws. Supply these to enforce JWT at the mesh edge in ADDITION to the
          // in-service gate. Omit to rely solely on the in-service verify_token.
          jwtIssuer?: string
          jwtJwksUri?: string
          targetEnvironment?: string
        }
