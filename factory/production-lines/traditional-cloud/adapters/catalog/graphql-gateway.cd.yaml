---
# GraphQL Gateway ComponentDefinition
# Architecturally follows the same pattern as realtime-platform: OAM Component → Knative Service + Infrastructure Claims
apiVersion: core.oam.dev/v1beta1
kind: ComponentDefinition
metadata:
  name: graphql-gateway
  annotations:
    definition.oam.dev/description: "Auto-generating GraphQL API gateway that discovers and federates Knative services"
    definition.oam.dev/requires-source-code: "false"
    definition.oam.dev/shape: knative-service
spec:
  workload:
    definition:
      apiVersion: serving.knative.dev/v1
      kind: Service
    type: services.serving.knative.dev
  schematic:
    cue:
      template: |
        import "encoding/json"

        // Primary Output: GraphQL Gateway Knative Service (OAM-compliant workload)
        output: {
          apiVersion: "serving.knative.dev/v1"
          kind: "Service"
          metadata: {
            name: context.name
            namespace: context.namespace
            labels: {
              "app.kubernetes.io/name": context.name
              "app.kubernetes.io/component": "graphql-gateway"
              "app.kubernetes.io/managed-by": "kubevela"
              "app.kubernetes.io/part-of": "graphql-platform"
              "app": context.name
            }
            annotations: {
              // Multi-cluster deployment support
              if parameter.targetEnvironment != _|_ {
                "app.oam.dev/cluster": parameter.targetEnvironment
              }
              "graphql-gateway.oam.dev/bootstrap": "true"
              "graphql-gateway.oam.dev/auto-schema": "\(parameter.autoSchema)"
              if parameter.repository != _|_ {
                "graphql-gateway.oam.dev/repository": parameter.repository
                "graphql-gateway.oam.dev/trigger-repo-creation": "true"
              }
            }
          }
          spec: {
            template: {
              metadata: {
                annotations: {
                  "autoscaling.knative.dev/minScale": "1"
                  "autoscaling.knative.dev/maxScale": "10"
                  "run.googleapis.com/execution-environment": "gen2"
                }
                labels: {
                  "app.kubernetes.io/name": context.name
                  "app.kubernetes.io/version": parameter.version
                  "app.kubernetes.io/part-of": "graphql-platform"
                  "app": context.name
                }
              }
              spec: {
                serviceAccountName: "graphql-gateway-sa"
                volumes: [
                  {
                    // Writable scratch for the gateway's runtime-generated
                    // .meshrc.yml. GQL-1 moved mesh sources to the MESH_SOURCES
                    // env (app.submit-injected); the gateway synthesises
                    // /app/config/.meshrc.yml at startup from those sources, so
                    // /app/config MUST be writable. A configMap mount made it
                    // read-only → "EROFS: read-only file system, open
                    // '/app/config/.meshrc.yml'" (caught patient9-graph
                    // 2026-06-08). emptyDir is writable and needs no creator.
                    name: "gateway-config"
                    emptyDir: {}
                  }
                ]
                containers: [{
                  // Use the image parameter directly (parity with webservice CD).
                  // Defaults to the ACR :latest placeholder (CI builds microservices/<name>);
                  // consumers / W3 digest commit-back override via OAM `properties.image`
                  // (without this param the OAM image was silently dropped and the gateway
                  // was stuck on a stale :latest digest — caught patient9-graph 2026-06-08).
                  image: parameter.image
                  ports: [{
                    containerPort: 8080
                    name: "http1"
                  }]
                  resources: {
                    limits: {
                      cpu: parameter.resources.cpu
                      memory: parameter.resources.memory
                    }
                    requests: {
                      cpu: "100m"
                      memory: "128Mi"
                    }
                  }
                  // Numeric runAsUser (not the image's USER mesh): Knative
                  // secure-pod-defaults enforce runAsNonRoot, which can't verify
                  // a non-numeric username (caught patient9-graph 2026-06-08;
                  // same class as #136 for the webservice CD).
                  securityContext: {
                    runAsUser: 1000
                    runAsNonRoot: true
                    allowPrivilegeEscalation: false
                  }
                  volumeMounts: [
                    {
                      name: "gateway-config"
                      mountPath: "/app/config"
                    }
                  ]
                  env: [
                    {
                      name: "GATEWAY_NAME"
                      value: context.name
                    },
                    {
                      name: "NAMESPACE"
                      value: context.namespace
                    },
                    {
                      name: "SERVICE_SELECTOR_LABELS"
                      value: "graphql.federation/enabled=true"
                    },
                    {
                      name: "AUTO_DISCOVERY"
                      value: "\(parameter.autoSchema)"
                    },
                    {
                      name: "DISCOVERY_INTERVAL"
                      value: parameter.schemaRefreshInterval
                    },
                    {
                      name: "GATEWAY_PORT"
                      value: "8080"
                    },
                    {
                      name: "HOST"
                      value: "0.0.0.0"
                    },
                    {
                      name: "FEDERATION_ANNOTATION"
                      value: "graphql.federation/enabled"
                    },
                  ] + [
                    // GQL-1 (#155): explicit federated sources injected by app.submit
                    // (or set directly by the consumer). When present, the template
                    // prefers this authoritative list over runtime kubectl discovery.
                    if parameter.sources != _|_ {
                      {
                        name:  "MESH_SOURCES"
                        value: json.Marshal(parameter._meshSources)
                      }
                    },
                    if parameter.sources != _|_ {
                      {
                        name:  "EXPLICIT_SOURCES"
                        value: "true"
                      }
                    },
                    // Forward the incoming Authorization JWT to every upstream when an
                    // identity is bound (single-identity invariant => all upstreams
                    // trust the same issuer).
                    if parameter.identity != _|_ {
                      {
                        name:  "FORWARD_AUTH"
                        value: "true"
                      }
                    },
                  ] + [
                    for k, v in parameter.environment {
                      name: k
                      value: v
                    }
                  ]
                  // Binding-contract parity with webservice CD (2026-06-06): identity/
                  // database/cache refs envFrom the sibling component's "<name>-conn"
                  // Secret. optional:true so the ksvc starts before the backing release
                  // converges. presence checks only — CUE does not short-circuit && over
                  // optional fields.
                  if parameter.envFrom != _|_ || parameter.database != _|_ || parameter.cache != _|_ || parameter.identity != _|_ {
                    envFrom: [
                      if parameter.envFrom != _|_ {
                        for envRef in parameter.envFrom {
                          envRef
                        }
                      }
                    ] + [
                      if parameter.identity != _|_ if parameter.identity != "none" {
                        {
                          secretRef: {
                            name:     parameter.identity + "-conn"
                            optional: true
                          }
                        }
                      },
                      if parameter.database != _|_ if parameter.database != "none" {
                        {
                          secretRef: {
                            name:     parameter.database + "-conn"
                            optional: true
                          }
                        }
                      },
                      if parameter.cache != _|_ if parameter.cache != "none" {
                        {
                          secretRef: {
                            name:     parameter.cache + "-conn"
                            optional: true
                          }
                        }
                      },
                    ]
                  }
                  // Health checks for robust deployment
                  // GQL-1 (#155): probe /health to match the platform contract served
                  // by every other shape (python/java). The template aliases
                  // /health -> /healthz so legacy /healthz keeps working too.
                  livenessProbe: {
                    httpGet: {
                      path: "/health"
                      port: 8080
                    }
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  }
                  readinessProbe: {
                    httpGet: {
                      path: "/health"
                      port: 8080
                    }
                    initialDelaySeconds: 5
                    periodSeconds: 5
                  }
                }]
              }
            }
          }
        }
        
        // Secondary Output: GraphQL Platform Infrastructure (always created)
        outputs: {
          "graphql-infrastructure": {
            apiVersion: "platform.example.org/v1alpha1"
            kind: "GraphQLPlatformClaim"
            metadata: {
              name: context.name + "-infrastructure"
              namespace: context.namespace
              labels: {
                "app.kubernetes.io/name": context.name
                "app.kubernetes.io/component": "graphql-infrastructure"
                "app.kubernetes.io/part-of": "graphql-platform"
              }
            }
            spec: {
              name: context.name
              serviceSelector: parameter.serviceSelector
              autoSchema: parameter.autoSchema
              schemaRefreshInterval: parameter.schemaRefreshInterval
              exposeIntrospection: parameter.exposeIntrospection
              exposePlayground: parameter.exposePlayground
              enableCors: parameter.enableCors
              if parameter.customResolvers != _|_ {
                customResolvers: parameter.customResolvers
              }
              resources: {
                cpu: parameter.resources.cpu
                memory: parameter.resources.memory
              }
              if parameter.targetEnvironment != _|_ {
                targetEnvironment: parameter.targetEnvironment
              }
            }
          }
        }
        
        // Optional output: Istio Gateway for external access
        if parameter.enableIstioGateway != _|_ && parameter.enableIstioGateway == true {
          outputs: "istio-gateway": {
            apiVersion: "networking.istio.io/v1beta1"
            kind:       "Gateway"
            metadata: {
              name:      context.name + "-gateway"
              namespace: context.namespace
              annotations: {
                // Multi-cluster deployment support
                if parameter.targetEnvironment != _|_ {
                  "app.oam.dev/cluster": parameter.targetEnvironment
                }
                "graphql-gateway.oam.dev/component": context.name
              }
              labels: {
                "app.kubernetes.io/name": context.name
                "app.kubernetes.io/component": "istio-gateway"
                "app.kubernetes.io/part-of": "graphql-platform"
              }
            }
            spec: {
              selector: {
                istio: "ingressgateway"
              }
              servers: [{
                port: {
                  number:   80
                  name:     "http"
                  protocol: "HTTP"
                }
                hosts: [(*parameter.gatewayHost | context.name + ".local")]
                if parameter.enableTLS == true {
                  tls: {
                    httpsRedirect: true
                  }
                }
              }]
              if parameter.enableTLS == true {
                servers: [{
                  port: {
                    number:   80
                    name:     "http"
                    protocol: "HTTP"
                  }
                  hosts: [(*parameter.gatewayHost | context.name + ".local")]
                  tls: {
                    httpsRedirect: true
                  }
                }, {
                  port: {
                    number:   443
                    name:     "https"
                    protocol: "HTTPS"
                  }
                  hosts: [(*parameter.gatewayHost | context.name + ".local")]
                  tls: {
                    mode: "SIMPLE"
                    credentialName: context.name + "-tls-secret"
                  }
                }]
              }
            }
          }

          outputs: "istio-virtualservice": {
            apiVersion: "networking.istio.io/v1beta1"
            kind:       "VirtualService"
            metadata: {
              name:      context.name + "-vs"
              namespace: context.namespace
              annotations: {
                // Multi-cluster deployment support
                if parameter.targetEnvironment != _|_ {
                  "app.oam.dev/cluster": parameter.targetEnvironment
                }
                "graphql-gateway.oam.dev/component": context.name
              }
              labels: {
                "app.kubernetes.io/name": context.name
                "app.kubernetes.io/component": "istio-virtualservice"
                "app.kubernetes.io/part-of": "graphql-platform"
              }
            }
            spec: {
              hosts: [(*parameter.gatewayHost | context.name + ".local")]
              gateways: [context.name + "-gateway"]
              http: [{
                match: [{
                  uri: {
                    prefix: "/"
                  }
                }]
                rewrite: {
                  uri: "/"
                }
                route: [{
                  destination: {
                    host: context.name + "." + context.namespace + ".svc.cluster.local"
                    port: {
                      number: 80
                    }
                  }
                }]
              }]
            }
          }
        }
        
        // Optional: Repository Creation (claim path, RETIRE-WFT-2 #152).
        // Replaces the curl-Job that fired the oam-driven-contract Argo workflow
        // with a declarative AppContainerClaim (same pattern as auto-scaffold-bootstrap
        // / webservice). The claim's composition scaffolds source+gitops repos and
        // (when deliveryTarget is set) an ArgoCD Application. Idempotent by claim name;
        // server-side apply converges with any day-0 claim from app.submit.
        if parameter.language != _|_ {
          outputs: {
            // Always include infrastructure
            "graphql-infrastructure": outputs["graphql-infrastructure"]

            // Add scaffold claim when language specified
            "scaffold-claim": {
              apiVersion: "platform.example.org/v1alpha1"
              kind:       "AppContainerClaim"
              metadata: {
                // Deterministic name = component name; converges with any day-0 claim.
                name:      context.name
                namespace: context.namespace
                labels: {
                  "app.kubernetes.io/name":       context.name
                  "app.kubernetes.io/component":  "scaffold-claim"
                  "app.kubernetes.io/managed-by": "kubevela"
                  "app.kubernetes.io/part-of":    "graphql-platform"
                }
                annotations: {
                  "graphql-gateway.oam.dev/source":        "oam-driven"
                  "graphql-gateway.oam.dev/platform-type": "graphql"
                }
              }
              spec: {
                name:           context.name
                description:    "OAM-driven GraphQL gateway via ComponentDefinition (declarative spine)"
                gitHubOrg:      "shlapolosa"
                dockerRegistry: "healthidpuaeacr.azurecr.io"
                // GraphQL scaffolding language -> graphql-federation-gateway-template (ApplicationClaim XRD enum).
                language: "nodejs"
                // Framework derived: nodejs -> graphql-gateway.
                framework: "graphql-gateway"
                // First-match-default: explicit targetEnvironment, else "host".
                deliveryTarget: [if parameter.targetEnvironment != _|_ {parameter.targetEnvironment}, "host"][0]
              }
            }
          }
        }
        
        parameter: {
          // Container image — defaults to the ACR :latest placeholder; overridable via
          // OAM `properties.image` (BYO image or W3 digest pin). Parity with webservice CD.
          // HARD-3 #170: `*default | string` keeps a provided image VERBATIM; :latest
          // applies ONLY on the first (bootstrap) render before generated-repo CI has
          // built it. CI commit-backs <repo>:<sha> + bumps publishVersion so the ksvc
          // revision is re-pinned off the stale :latest digest. A provided image MUST
          // NOT end in ":latest" — guard enforced in the CI commit-back (RE2 has no
          // negative-lookahead → not cleanly expressible as a vela 1.10 CUE regex).
          image: *"healthidpuaeacr.azurecr.io/\(context.name):latest" | string

          // Repository-based image generation (required when repository specified)
          gatewayImage: *"" | string
          
          // Service Discovery
          serviceSelector: *{
            "graphql.federation/enabled": "true"
          } | {[string]: string}
          
          // Schema Management
          autoSchema: *true | bool
          schemaRefreshInterval: *"5m" | string
          exposeIntrospection: *false | bool
          
          // GraphQL Gateway Configuration
          exposePlayground: *true | bool
          enableCors: *true | bool
          
          // Resource Management
          resources: *{
            cpu: "500m"
            memory: "512Mi"
          } | {
            cpu?: string
            memory?: string
          }
          
          // Service Configuration
          version: *"latest" | string
          
          // Environment Variables
          environment: *{} | {[string]: string}
          
          // Environment Variables from Secrets
          envFrom?: [...{
            secretRef: {
              name: string
            }
          }]
          
          // Optional Infrastructure Bootstrap (for repository creation)
          language?: string     // Triggers bootstrap: nodejs, typescript
          framework?: string    // graphql-gateway
          repository?: string   // Git repository template name (defaults to name)
          
          // GQL-1 (#155): explicit federated sources. Each entry is either a bare
          // component name (resolved to the in-cluster FQDN + /openapi.json) or an
          // object with an explicit url/openApiPath (external/custom upstreams).
          // app.submit auto-fills this from sibling webservice components when omitted.
          sources?: [...( string | {
            name:        string
            url?:        string  // full base URL; if set, used verbatim with openApiPath
            openApiPath?: string // defaults to /openapi.json
            headers?:    {[string]: string}
          })]

          // Computed (internal): normalized Mesh source list -> MESH_SOURCES env JSON.
          // Bare name => http://<name>.<ns>.svc.cluster.local/openapi.json.
          // Object    => (url | http://<name>.<ns>.svc.cluster.local) + (openApiPath | /openapi.json).
          if parameter.sources != _|_ {
            _meshSources: [
              for s in parameter.sources {
                if (s & string) != _|_ {
                  name:   s
                  source: "http://" + s + "." + context.namespace + ".svc.cluster.local/openapi.json"
                }
                if (s & string) == _|_ {
                  name:   s.name
                  source: [if s.url != _|_ {s.url}, "http://" + s.name + "." + context.namespace + ".svc.cluster.local"][0] + [if s.openApiPath != _|_ {s.openApiPath}, "/openapi.json"][0]
                  if s.headers != _|_ {
                    headers: s.headers
                  }
                }
              },
            ]
          }

          // Binding-contract refs (parity with webservice CD): sibling component names
          // whose normalized "<name>-conn" Secret is mounted via envFrom.
          identity?: string  // auth0-idp component; enables Authorization pass-through
          database?: string
          cache?:    string

          // Advanced Options
          customResolvers?: [...{
            name: string
            endpoint: string
            headers?: {[string]: string}
          }]
          
          // Multi-cluster support
          targetEnvironment?: string  // vCluster deployment target
          
          // External access (optional)
          enableIstioGateway?: bool
          gatewayHost?: string
          enableTLS?: bool
          
          // Configuration
          configMapName?: string  // ConfigMap name for gateway configuration
        }