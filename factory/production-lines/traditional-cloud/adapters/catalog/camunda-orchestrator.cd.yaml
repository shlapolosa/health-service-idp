---
# Enhanced Camunda Orchestrator ComponentDefinition with Full UI Stack
# Includes Camunda Operate (monitoring), Tasklist (human tasks), and optional Optimize (analytics)
apiVersion: core.oam.dev/v1beta1
kind: ComponentDefinition
metadata:
  name: camunda-orchestrator
  annotations:
    definition.oam.dev/description: "Camunda 8 orchestrator with full UI stack for process design, monitoring, and human task management"
    definition.oam.dev/requires-source-code: "true"
    definition.oam.dev/shape: knative-service
spec:
  workload:
    definition:
      apiVersion: serving.knative.dev/v1
      kind: Service
    type: services.serving.knative.dev
  schematic:
    cue:
      template: |
        // Primary Output: Camunda Orchestrator (Zeebe) Knative Service
        output: {
          apiVersion: "serving.knative.dev/v1"
          kind: "Service"
          metadata: {
            name: context.name
            namespace: context.namespace
            labels: {
              "app.kubernetes.io/name": context.name
              "app.kubernetes.io/component": "camunda-orchestrator"
              "app.kubernetes.io/managed-by": "kubevela"
              "app.kubernetes.io/part-of": "orchestration-platform"
              "orchestration.platform/type": "camunda"
              "camunda.io/component": "zeebe"
              // HARD-4 (#171): opt the Zeebe gateway ksvc into the post-deploy
              // contract-test gate. The sensor watches this label and fires the
              // contract-test runner (CHECK_TYPE=camunda-orchestrator) which
              // deploys a trivial BPMN to Zeebe and starts an instance to prove
              // the data-plane (the workflow engine accepts + runs a process),
              // not merely that the pod is Ready.
              "contract-test.cafe.io/enabled": "true"
            }
            annotations: {
              if parameter.targetEnvironment != _|_ {
                "app.oam.dev/cluster": parameter.targetEnvironment
              }
              "orchestrator.oam.dev/realtime-platform": parameter.realtimePlatform
              "orchestrator.oam.dev/workflow-patterns": "saga,choreography,orchestration"
              "orchestrator.oam.dev/ui-enabled": "\(parameter.enableUI)"
              if parameter.repository != _|_ {
                "orchestrator.oam.dev/repository": parameter.repository
                "orchestrator.oam.dev/trigger-repo-creation": "true"
              }
            }
          }
          spec: {
            template: {
              metadata: {
                annotations: {
                  "autoscaling.knative.dev/minScale": "\(parameter.minScale)"
                  "autoscaling.knative.dev/maxScale": "\(parameter.maxScale)"
                  if parameter.targetConcurrency != _|_ {
                    "autoscaling.knative.dev/target": "\(parameter.targetConcurrency)"
                  }
                }
                labels: {
                  "app.kubernetes.io/name": context.name
                  "app.kubernetes.io/version": parameter.version
                  "orchestration.platform/type": "camunda"
                  "camunda.io/component": "zeebe"
                }
              }
              spec: {
                serviceAccountName: "camunda-orchestrator-sa"
                volumes: [
                  {
                    name: "workflow-config"
                    configMap: {
                      name: (*parameter.configMapName | context.name + "-config")
                    }
                  },
                  {
                    name: "bpmn-models"
                    configMap: {
                      name: (*parameter.bpmnConfigMapName | context.name + "-bpmn")
                    }
                  }
                ]
                containers: [{
                  image: (*parameter.zeebeImage | "camunda/zeebe:8.3.3")
                  name: "zeebe"
                  ports: [{
                    containerPort: 9600
                    name: "grpc"
                  }, {
                    containerPort: 8080
                    name: "http"
                  }]
                  resources: {
                    limits: {
                      cpu: parameter.resources.cpu
                      memory: parameter.resources.memory
                    }
                    requests: {
                      cpu: "500m"
                      memory: "512Mi"
                    }
                  }
                  volumeMounts: [
                    {
                      name: "workflow-config"
                      mountPath: "/app/config"
                    },
                    {
                      name: "bpmn-models"
                      mountPath: "/app/bpmn"
                    }
                  ]
                  env: [
                    {
                      name: "ZEEBE_BROKER_CLUSTER_NODEID"
                      value: "0"
                    },
                    {
                      name: "ZEEBE_BROKER_CLUSTER_PARTITIONSCOUNT"
                      value: "1"
                    },
                    {
                      name: "ZEEBE_BROKER_CLUSTER_REPLICATIONFACTOR"
                      value: "1"
                    },
                    {
                      name: "ZEEBE_BROKER_CLUSTER_CLUSTERSIZE"
                      value: "1"
                    },
                    {
                      name: "ZEEBE_BROKER_GATEWAY_ENABLE"
                      value: "true"
                    },
                    {
                      name: "REALTIME_PLATFORM_SERVICE"
                      value: parameter.realtimePlatform + "." + context.namespace + ".svc.cluster.local"
                    },
                    {
                      name: "EVENT_STREAMING_ENABLED"
                      value: "\(parameter.enableEventStreaming)"
                    },
                    {
                      name: "KAFKA_TOPICS_PREFIX"
                      value: parameter.topicsPrefix
                    },
                    {
                      name: "ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME"
                      value: "io.camunda.zeebe.exporter.ElasticsearchExporter"
                    },
                    {
                      name: "ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL"
                      value: "http://" + context.name + "-elasticsearch:9200"
                    }
                  ] + [
                    for k, v in parameter.environment {
                      name: k
                      value: v
                    },
                  ]
                  if parameter.envFrom != _|_ {
                    envFrom: parameter.envFrom
                  }
                  livenessProbe: {
                    httpGet: {
                      path: "/ready"
                      port: 9600
                    }
                    initialDelaySeconds: 30
                    periodSeconds: 30
                  }
                  readinessProbe: {
                    httpGet: {
                      path: "/health"
                      port: 9600
                    }
                    initialDelaySeconds: 30
                    periodSeconds: 30
                  }
                }]
              }
            }
          }
        }
        
        // Base outputs always include infrastructure
        outputs: {
          "orchestration-infrastructure": {
            apiVersion: "platform.example.org/v1alpha1"
            kind: "OrchestrationPlatformClaim"
            metadata: {
              name: context.name + "-infrastructure"
              namespace: context.namespace
              labels: {
                "app.kubernetes.io/name": context.name
                "app.kubernetes.io/component": "orchestration-infrastructure"
                "app.kubernetes.io/part-of": "orchestration-platform"
              }
            }
            spec: {
              orchestratorName: context.name
              realtimePlatformService: parameter.realtimePlatform
              camundaMode: parameter.camundaMode
              enableEventStreaming: parameter.enableEventStreaming
              sagaPatterns: parameter.sagaPatterns
              enableUI: parameter.enableUI
              resources: {
                cpu: parameter.resources.cpu
                memory: parameter.resources.memory
              }
              if parameter.targetEnvironment != _|_ {
                targetEnvironment: parameter.targetEnvironment
              }
            }
          }

          // Binding contract (mirrors realtime-platform / postgresql / redis):
          // normalized <name>-conn Secret so sibling webservices and job-workers
          // can connect to the Camunda stack with `envFrom: <name>-conn` (the
          // webservice CD wires it automatically when a component references this
          // orchestrator). Service DNS is deterministic (the Zeebe gateway ksvc is
          // context.name; the Operate/Tasklist ksvcs are context.name-operate /
          // -tasklist), so every value is computed in pure CUE — public-repo safe,
          // no secrets baked in.
          "conn-secret": {
            apiVersion: "v1"
            kind:       "Secret"
            metadata: {
              name:      context.name + "-conn"
              namespace: context.namespace
              labels: {
                "binding.cafe.io/category": "orchestration"
                "app.oam.dev/component":    context.name
              }
            }
            type: "Opaque"
            stringData: {
              // Zeebe gateway gRPC address (job-workers + clients connect here).
              ZEEBE_ADDRESS:        context.name + "." + context.namespace + ".svc.cluster.local:80"
              ZEEBE_GRPC_ADDRESS:   context.name + "." + context.namespace + ".svc.cluster.local:80"
              // Plaintext for self-managed in-cluster (no TLS on the mesh hop).
              ZEEBE_INSECURE:       "true"
              ZEEBE_CLIENT_SECURITY_PLAINTEXT: "true"
              // Monitoring + human-task surfaces (the externally-exposed UIs).
              OPERATE_URL:          "http://" + context.name + "-operate." + context.namespace + ".svc.cluster.local"
              TASKLIST_URL:         "http://" + context.name + "-tasklist." + context.namespace + ".svc.cluster.local"
              CAMUNDA_PLATFORM_NAME: context.name
              CAMUNDA_INTEGRATION_ENABLED: "true"
              // Event-streaming bridge (Camunda<->realtime-platform) discovery.
              if parameter.enableEventStreaming {
                KAFKA_TOPICS_PREFIX: parameter.topicsPrefix
              }
            }
          }
        }

        // Conditional outputs based on UI enablement
        if parameter.enableUI != _|_ && parameter.enableUI == true {
          outputs: {
            // Always include infrastructure
            "orchestration-infrastructure": outputs["orchestration-infrastructure"]
            // Binding contract: keep the <name>-conn secret in every conditional branch.
            "conn-secret": outputs["conn-secret"]
            
            // Camunda Operate - Process Monitoring UI
            "camunda-operate": {
              apiVersion: "serving.knative.dev/v1"
              kind: "Service"
              metadata: {
                name: context.name + "-operate"
                namespace: context.namespace
                labels: {
                  "app.kubernetes.io/name": context.name + "-operate"
                  "app.kubernetes.io/component": "camunda-operate"
                  "app.kubernetes.io/part-of": "orchestration-platform"
                  "camunda.io/component": "operate"
                }
                annotations: {
                  if parameter.targetEnvironment != _|_ {
                    "app.oam.dev/cluster": parameter.targetEnvironment
                  }
                }
              }
              spec: {
                template: {
                  metadata: {
                    annotations: {
                      "autoscaling.knative.dev/minScale": "1"
                      "autoscaling.knative.dev/maxScale": "3"
                    }
                  }
                  spec: {
                    serviceAccountName: "camunda-orchestrator-sa"
                    containers: [{
                      image: (*parameter.operateImage | "camunda/operate:8.3.3")
                      name: "operate"
                      ports: [{
                        containerPort: 8080
                        name: "http"
                      }]
                      resources: {
                        limits: {
                          cpu: "500m"
                          memory: "1Gi"
                        }
                        requests: {
                          cpu: "200m"
                          memory: "512Mi"
                        }
                      }
                      env: [
                        {
                          name: "CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS"
                          value: context.name + "." + context.namespace + ".svc.cluster.local:9600"
                        },
                        {
                          name: "CAMUNDA_OPERATE_ELASTICSEARCH_URL"
                          value: "http://" + context.name + "-elasticsearch:9200"
                        },
                        {
                          name: "CAMUNDA_OPERATE_ELASTICSEARCH_HOST"
                          value: context.name + "-elasticsearch"
                        },
                        {
                          name: "CAMUNDA_OPERATE_ELASTICSEARCH_PORT"
                          value: "9200"
                        },
                        {
                          name: "SPRING_PROFILES_ACTIVE"
                          value: "dev"
                        },
                        {
                          name: "LOGGING_LEVEL_IO_CAMUNDA"
                          value: "INFO"
                        }
                      ]
                      livenessProbe: {
                        httpGet: {
                          path: "/actuator/health"
                          port: 8080
                        }
                        initialDelaySeconds: 60
                        periodSeconds: 30
                      }
                      readinessProbe: {
                        httpGet: {
                          path: "/actuator/health/readiness"
                          port: 8080
                        }
                        initialDelaySeconds: 30
                        periodSeconds: 30
                      }
                    }]
                  }
                }
              }
            }
            
            // Camunda Tasklist - Human Task Management UI
            "camunda-tasklist": {
              apiVersion: "serving.knative.dev/v1"
              kind: "Service"
              metadata: {
                name: context.name + "-tasklist"
                namespace: context.namespace
                labels: {
                  "app.kubernetes.io/name": context.name + "-tasklist"
                  "app.kubernetes.io/component": "camunda-tasklist"
                  "app.kubernetes.io/part-of": "orchestration-platform"
                  "camunda.io/component": "tasklist"
                }
                annotations: {
                  if parameter.targetEnvironment != _|_ {
                    "app.oam.dev/cluster": parameter.targetEnvironment
                  }
                }
              }
              spec: {
                template: {
                  metadata: {
                    annotations: {
                      "autoscaling.knative.dev/minScale": "1"
                      "autoscaling.knative.dev/maxScale": "3"
                    }
                  }
                  spec: {
                    serviceAccountName: "camunda-orchestrator-sa"
                    containers: [{
                      image: (*parameter.tasklistImage | "camunda/tasklist:8.3.3")
                      name: "tasklist"
                      ports: [{
                        containerPort: 8080
                        name: "http"
                      }]
                      resources: {
                        limits: {
                          cpu: "500m"
                          memory: "1Gi"
                        }
                        requests: {
                          cpu: "200m"
                          memory: "512Mi"
                        }
                      }
                      env: [
                        {
                          name: "CAMUNDA_TASKLIST_ZEEBE_GATEWAYADDRESS"
                          value: context.name + "." + context.namespace + ".svc.cluster.local:9600"
                        },
                        {
                          name: "CAMUNDA_TASKLIST_ELASTICSEARCH_URL"
                          value: "http://" + context.name + "-elasticsearch:9200"
                        },
                        {
                          name: "CAMUNDA_TASKLIST_ELASTICSEARCH_HOST"
                          value: context.name + "-elasticsearch"
                        },
                        {
                          name: "CAMUNDA_TASKLIST_ELASTICSEARCH_PORT"
                          value: "9200"
                        },
                        {
                          name: "SPRING_PROFILES_ACTIVE"
                          value: "dev"
                        },
                        {
                          name: "GRAPHQL_PLAYGROUND_ENABLED"
                          value: "true"
                        }
                      ]
                      livenessProbe: {
                        httpGet: {
                          path: "/actuator/health"
                          port: 8080
                        }
                        initialDelaySeconds: 60
                        periodSeconds: 30
                      }
                      readinessProbe: {
                        httpGet: {
                          path: "/actuator/health/readiness"
                          port: 8080
                        }
                        initialDelaySeconds: 30
                        periodSeconds: 30
                      }
                    }]
                  }
                }
              }
            }
          }
        }
        
        // Optional: Camunda Optimize for analytics (when explicitly enabled)
        if parameter.enableOptimize != _|_ && parameter.enableOptimize == true && parameter.enableUI == true {
          outputs: {
            // Include all previous outputs
            "orchestration-infrastructure": outputs["orchestration-infrastructure"]
            // Binding contract: keep the <name>-conn secret in every conditional branch.
            "conn-secret": outputs["conn-secret"]
            "camunda-operate": outputs["camunda-operate"]
            "camunda-tasklist": outputs["camunda-tasklist"]
            
            // Add Optimize
            "camunda-optimize": {
              apiVersion: "serving.knative.dev/v1"
              kind: "Service"
              metadata: {
                name: context.name + "-optimize"
                namespace: context.namespace
                labels: {
                  "app.kubernetes.io/name": context.name + "-optimize"
                  "app.kubernetes.io/component": "camunda-optimize"
                  "app.kubernetes.io/part-of": "orchestration-platform"
                  "camunda.io/component": "optimize"
                }
              }
              spec: {
                template: {
                  spec: {
                    serviceAccountName: "camunda-orchestrator-sa"
                    containers: [{
                      image: (*parameter.optimizeImage | "camunda/optimize:3.11.0")
                      name: "optimize"
                      ports: [{
                        containerPort: 8090
                        name: "http"
                      }]
                      resources: {
                        limits: {
                          cpu: "1000m"
                          memory: "2Gi"
                        }
                        requests: {
                          cpu: "500m"
                          memory: "1Gi"
                        }
                      }
                      env: [
                        {
                          name: "CAMUNDA_OPTIMIZE_ZEEBE_ENABLED"
                          value: "true"
                        },
                        {
                          name: "CAMUNDA_OPTIMIZE_ZEEBE_NAME"
                          value: context.name
                        },
                        {
                          name: "CAMUNDA_OPTIMIZE_ZEEBE_CONTACTPOINT"
                          value: context.name + "." + context.namespace + ".svc.cluster.local:9600"
                        },
                        {
                          name: "CAMUNDA_OPTIMIZE_ELASTICSEARCH_HOST"
                          value: context.name + "-elasticsearch"
                        }
                      ]
                    }]
                  }
                }
              }
            }
          }
        }
        
        // Optional: Istio Gateway for external UI access
        if parameter.enableIstioGateway != _|_ && parameter.enableIstioGateway == true {
          outputs: {
            // Include all previous outputs
            "orchestration-infrastructure": outputs["orchestration-infrastructure"]
            // Binding contract: keep the <name>-conn secret in every conditional branch.
            "conn-secret": outputs["conn-secret"]
            if parameter.enableUI {
              "camunda-operate": outputs["camunda-operate"]
              "camunda-tasklist": outputs["camunda-tasklist"]
              if parameter.enableOptimize {
                "camunda-optimize": outputs["camunda-optimize"]
              }
            }
            
            "istio-gateway": {
              apiVersion: "networking.istio.io/v1beta1"
              kind: "Gateway"
              metadata: {
                name: context.name + "-gateway"
                namespace: context.namespace
                labels: {
                  "app.kubernetes.io/name": context.name
                  "app.kubernetes.io/component": "istio-gateway"
                }
              }
              spec: {
                // Shared cluster ingress (same selector rasa/realtime UIs use).
                selector: {
                  istio: "ingressgateway"
                }
                servers: [{
                  port: {
                    number: 80
                    name: "http"
                    protocol: "HTTP"
                  }
                  // Externally-exposed workflow UIs on DISTINCT nip.io hosts
                  // (matches the rasa/realtime convention: one host per UI on the
                  // shared *.20.233.105.82.nip.io ingress IP). The old single
                  // path-prefixed *.orchestration.local host is retained too so any
                  // existing consumer that set `gatewayHost` keeps working.
                  hosts: [
                    context.name + "-zeebe." + (*parameter.nipHost | "20.233.105.82.nip.io"),
                    if parameter.enableUI {
                      context.name + "-operate." + (*parameter.nipHost | "20.233.105.82.nip.io")
                    },
                    if parameter.enableUI {
                      context.name + "-tasklist." + (*parameter.nipHost | "20.233.105.82.nip.io")
                    },
                    if parameter.enableOptimize {
                      context.name + "-optimize." + (*parameter.nipHost | "20.233.105.82.nip.io")
                    },
                    (*parameter.gatewayHost | context.name + ".orchestration.local"),
                  ]
                }]
              }
            }

            "istio-virtualservice": {
              apiVersion: "networking.istio.io/v1beta1"
              kind: "VirtualService"
              metadata: {
                name: context.name + "-vs"
                namespace: context.namespace
                labels: {
                  "app.kubernetes.io/name": context.name
                  "app.kubernetes.io/component": "istio-virtualservice"
                }
              }
              spec: {
                // VS binds every host the gateway serves; host-based routing sends
                // each distinct nip.io host to its own ksvc. The legacy
                // *.orchestration.local host keeps the path-prefix routes.
                hosts: [
                  context.name + "-zeebe." + (*parameter.nipHost | "20.233.105.82.nip.io"),
                  if parameter.enableUI {
                    context.name + "-operate." + (*parameter.nipHost | "20.233.105.82.nip.io")
                  },
                  if parameter.enableUI {
                    context.name + "-tasklist." + (*parameter.nipHost | "20.233.105.82.nip.io")
                  },
                  if parameter.enableOptimize {
                    context.name + "-optimize." + (*parameter.nipHost | "20.233.105.82.nip.io")
                  },
                  (*parameter.gatewayHost | context.name + ".orchestration.local"),
                ]
                gateways: [context.name + "-gateway"]
                http: [
                  // Host-based: <name>-operate.<nip> -> Operate ksvc.
                  if parameter.enableUI {
                    {
                      match: [{
                        authority: {
                          prefix: context.name + "-operate."
                        }
                      }]
                      route: [{
                        destination: {
                          host: context.name + "-operate." + context.namespace + ".svc.cluster.local"
                          port: {
                            number: 80
                          }
                        }
                      }]
                    }
                  },
                  // Host-based: <name>-tasklist.<nip> -> Tasklist ksvc.
                  if parameter.enableUI {
                    {
                      match: [{
                        authority: {
                          prefix: context.name + "-tasklist."
                        }
                      }]
                      route: [{
                        destination: {
                          host: context.name + "-tasklist." + context.namespace + ".svc.cluster.local"
                          port: {
                            number: 80
                          }
                        }
                      }]
                    }
                  },
                  // Host-based: <name>-optimize.<nip> -> Optimize ksvc.
                  if parameter.enableOptimize && parameter.enableUI {
                    {
                      match: [{
                        authority: {
                          prefix: context.name + "-optimize."
                        }
                      }]
                      route: [{
                        destination: {
                          host: context.name + "-optimize." + context.namespace + ".svc.cluster.local"
                          port: {
                            number: 80
                          }
                        }
                      }]
                    }
                  },
                  // Legacy path-prefix routes (the *.orchestration.local host).
                  {
                    match: [{
                      uri: {
                        prefix: "/zeebe"
                      }
                    }]
                    rewrite: {
                      uri: "/"
                    }
                    route: [{
                      destination: {
                        host: context.name + "." + context.namespace + ".svc.cluster.local"
                        port: {
                          number: 80
                        }
                      }
                    }]
                  },
                  if parameter.enableUI {
                    {
                      match: [{
                        uri: {
                          prefix: "/operate"
                        }
                      }]
                      rewrite: {
                        uri: "/"
                      }
                      route: [{
                        destination: {
                          host: context.name + "-operate." + context.namespace + ".svc.cluster.local"
                          port: {
                            number: 80
                          }
                        }
                      }]
                    }
                  },
                  if parameter.enableUI {
                    {
                      match: [{
                        uri: {
                          prefix: "/tasklist"
                        }
                      }]
                      rewrite: {
                        uri: "/"
                      }
                      route: [{
                        destination: {
                          host: context.name + "-tasklist." + context.namespace + ".svc.cluster.local"
                          port: {
                            number: 80
                          }
                        }
                      }]
                    }
                  },
                  if parameter.enableOptimize && parameter.enableUI {
                    {
                      match: [{
                        uri: {
                          prefix: "/optimize"
                        }
                      }]
                      rewrite: {
                        uri: "/"
                      }
                      route: [{
                        destination: {
                          host: context.name + "-optimize." + context.namespace + ".svc.cluster.local"
                          port: {
                            number: 80
                          }
                        }
                      }]
                    }
                  },
                  // Default route -> Zeebe gateway (also serves <name>-zeebe.<nip>).
                  {
                    match: [{
                      uri: {
                        prefix: "/"
                      }
                    }]
                    route: [{
                      destination: {
                        host: context.name + "." + context.namespace + ".svc.cluster.local"
                        port: {
                          number: 80
                        }
                      }
                    }]
                  }
                ]
              }
            }
          }
        }
        
        // Optional: Repository Creation Workflow (when language specified)
        if parameter.language != _|_ {
          outputs: {
            // Include all previous outputs
            "orchestration-infrastructure": outputs["orchestration-infrastructure"]
            // Binding contract: keep the <name>-conn secret in every conditional branch.
            "conn-secret": outputs["conn-secret"]
            if parameter.enableUI {
              "camunda-operate": outputs["camunda-operate"]
              "camunda-tasklist": outputs["camunda-tasklist"]
              if parameter.enableOptimize {
                "camunda-optimize": outputs["camunda-optimize"]
              }
            }
            if parameter.enableIstioGateway {
              "istio-gateway": outputs["istio-gateway"]
              "istio-virtualservice": outputs["istio-virtualservice"]
            }
            
            // Add scaffold claim (claim path, RETIRE-WFT-2 #152).
            // NOTE: orchestrator backing infra (Zeebe/event-streaming/saga wiring) is
            // provisioned by the ALWAYS-created OrchestrationPlatformClaim above, and the
            // UI stack (Operate/Tasklist/Optimize) by the Knative outputs above. The old
            // workflow-trigger only did source-repo scaffolding (same microservice-creation
            // params as webservice), so it maps cleanly to an AppContainerClaim (same
            // pattern as auto-scaffold-bootstrap / webservice). Idempotent by claim name;
            // server-side apply converges with any day-0 claim from app.submit.
            "scaffold-claim": {
              apiVersion: "platform.example.org/v1alpha1"
              kind:       "AppContainerClaim"
              metadata: {
                // Deterministic name = component name; converges with any day-0 claim.
                name:      context.name
                namespace: context.namespace
                labels: {
                  "app.kubernetes.io/name":       context.name
                  "app.kubernetes.io/component":  "scaffold-claim"
                  "app.kubernetes.io/managed-by": "kubevela"
                  "app.kubernetes.io/part-of":    "orchestration-platform"
                }
                annotations: {
                  "orchestrator.oam.dev/source":        "oam-driven"
                  "orchestrator.oam.dev/platform-type": "camunda-orchestrator"
                }
              }
              spec: {
                name:           context.name
                description:    "OAM-driven Camunda orchestrator via ComponentDefinition (declarative spine)"
                gitHubOrg:      "shlapolosa"
                dockerRegistry: "healthidpuaeacr.azurecr.io"
                // CAMUNDA-WORKFLOW: the variant repo holds processes/*.bpmn +
                // workers/ (job-worker handlers) — a NEW scaffold flavor whose
                // language is "camunda" / framework "zeebe-worker" (mirrors the
                // rasa "rasa"/"chatbot" flavor). java/nodejs are still honored if a
                // consumer brings a Spring Zeebe / nodejs worker; otherwise default
                // to the camunda variant flavor (NOT python — a python webservice
                // would not get a worker scaffold). mscv's template-select maps
                // camunda/zeebe-worker -> the bpmn+worker variant.
                language: [if parameter.language == "java" {"java"}, if parameter.language == "nodejs" {"nodejs"}, "camunda"][0]
                // Framework derived from chosen language.
                framework: [if parameter.language == "java" {"springboot"}, if parameter.language == "nodejs" {"graphql-gateway"}, "zeebe-worker"][0]
                // First-match-default: explicit targetEnvironment, else "host".
                deliveryTarget: [if parameter.targetEnvironment != _|_ {parameter.targetEnvironment}, "host"][0]
              }
            }
          }
        }
        
        parameter: {
          // Camunda Configuration
          camundaMode: *"embedded" | "remote" // embedded: Camunda 8 Self-Managed, remote: Camunda SaaS
          
          // Realtime Platform Integration (required)
          realtimePlatform: string  // Name of realtime-platform service for event streaming
          
          // UI Configuration  
          enableUI: *true | bool           // Enable Operate & Tasklist UIs
          enableOptimize: *false | bool    // Enable Optimize analytics (requires license)
          
          // Event-Driven Architecture
          enableEventStreaming: *true | bool
          topicsPrefix: *"orchestration" | string
          
          // Orchestration Patterns
          sagaPatterns: *["compensation", "timeout", "retry"] | [...string]
          
          // Service Discovery
          microserviceSelector: *{
            "orchestration.platform/managed": "true"
          } | {[string]: string}
          
          // Scaling Configuration
          minScale: *1 | int
          maxScale: *10 | int
          targetConcurrency?: int
          
          // Resource Management
          resources: *{
            cpu: "2000m"     // Increased for UI components
            memory: "2Gi"    // Increased for UI components
          } | {
            cpu?: string
            memory?: string
          }
          
          // Service Configuration
          version: *"8.3.3" | string
          
          // Custom Images (optional)
          zeebeImage?: string      // Override Zeebe image
          operateImage?: string    // Override Operate image
          tasklistImage?: string   // Override Tasklist image
          optimizeImage?: string   // Override Optimize image
          
          // Environment Variables
          environment: *{} | {[string]: string}
          
          // Environment Variables from Secrets
          envFrom?: [...{
            secretRef: {
              name: string
            }
          }]
          
          // Optional Infrastructure Bootstrap (for repository creation)
          language?: string     // Triggers bootstrap: nodejs, java, python
          framework?: string    // camunda-orchestrator
          repository?: string   // Git repository template name (defaults to name)
          
          // Multi-cluster support
          targetEnvironment?: string  // vCluster deployment target
          
          // External access. The workflow UIs (Operate/Tasklist) are
          // externally-exposed by DEFAULT now (matches rasa/realtime UIs), each on
          // its own nip.io host off the shared ingress. Set enableIstioGateway:false
          // to keep them cluster-internal.
          enableIstioGateway: *true | bool
          gatewayHost?: string         // legacy single host (path-prefix routes)
          nipHost?: string             // base nip.io domain for the per-UI hosts
          enableTLS?: bool
          
          // Configuration
          configMapName?: string     // ConfigMap name for orchestrator configuration
          bpmnConfigMapName?: string // ConfigMap name for BPMN workflow models
        }