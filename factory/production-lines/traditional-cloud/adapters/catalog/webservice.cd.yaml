# Enhanced webservice ComponentDefinition with automatic infrastructure bootstrap
apiVersion: core.oam.dev/v1beta1
kind: ComponentDefinition
metadata:
  name: webservice
  annotations:
    definition.oam.dev/description: "Enhanced webservice with automatic infrastructure bootstrap via embedded workflows"
    definition.oam.dev/shape: knative-service
spec:
  workload:
    definition:
      apiVersion: serving.knative.dev/v1
      kind: Service
    type: services.serving.knative.dev
  schematic:
    cue:
      template: |
        output: {
          apiVersion: "serving.knative.dev/v1"
          kind: "Service"
          metadata: {
            name: context.name
            namespace: context.namespace
            labels: {
              "app.kubernetes.io/name": context.name
              "app.kubernetes.io/component": "web-service"
              "app.kubernetes.io/managed-by": "kubevela"
              if parameter.enableGraphQLFederation != _|_ {
                if parameter.enableGraphQLFederation == true {
                  "graphql.federation/enabled": "true"
                }
              }
            }
            annotations: {
              // Multi-cluster deployment support
              if parameter.targetEnvironment != _|_ {
                "app.oam.dev/cluster": parameter.targetEnvironment
              }
              if parameter.language != _|_ {
                "webservice.oam.dev/bootstrap": "true"
                "webservice.oam.dev/language": parameter.language
                // framework is optional; only label when explicitly set
                // (regression-fix 2026-06-01: was unconditional, broke language-only path)
                if parameter.framework != _|_ {
                  "webservice.oam.dev/framework": parameter.framework
                }
                if parameter.source != _|_ {
                  "webservice.oam.dev/source": parameter.source
                }
                if parameter.source == _|_ {
                  "webservice.oam.dev/source": "api-driven"
                }
              }
              if parameter.realtime != _|_ {
                "realtime.platform.example.org/integration": parameter.realtime
                "webservice.oam.dev/secret-discovery": "enabled"
                "webservice.oam.dev/secret-pattern": parameter.realtime + "-*-secret"
              }
              if parameter.enableGraphQLFederation != _|_ {
                if parameter.enableGraphQLFederation == true {
                  "graphql.federation/enabled": "true"
                  if parameter.openApiPath != _|_ {
                    "graphql.federation/openapi-path": parameter.openApiPath
                  }
                  if parameter.apiVersion != _|_ {
                    "graphql.federation/api-version": parameter.apiVersion
                  }
                }
              }
            }
          }
          spec: {
            template: {
              metadata: {
                annotations: {
                  "autoscaling.knative.dev/minScale": "0"
                  "autoscaling.knative.dev/maxScale": "10"
                  "run.googleapis.com/execution-environment": "gen2"
                }
                labels: {
                  "app.kubernetes.io/name": context.name
                }
              }
              spec: {
                serviceAccountName: "knative-docker-sa"
                containers: [{
                  // Use the image parameter directly (always provided)
                  image: parameter.image
                  // Inject numeric runAsUser so Knative's runAsNonRoot enforcement
                  // can verify non-root even when the image uses a named USER
                  // (e.g. `USER app` from auto-scaffolded Dockerfiles).
                  // Without this, kubelet errors:
                  //   "container has runAsNonRoot and image has non-numeric user, cannot verify"
                  securityContext: {
                    runAsUser: 1000
                    runAsNonRoot: true
                    allowPrivilegeEscalation: false
                  }
                  ports: [{
                    containerPort: parameter.port
                    name: "http1"
                  }]
                  resources: {
                    limits: {
                      cpu: parameter.resources.cpu
                      memory: parameter.resources.memory
                    }
                    requests: {
                      cpu: "100m"
                      memory: "128Mi"
                    }
                  }
                  env: [
                    for k, v in parameter.environment {
                      name: k
                      value: v
                    }
                  ] + [
                    if parameter.realtime != _|_ {
                      {
                        name: "REALTIME_PLATFORM_NAME"
                        value: parameter.realtime
                      }
                    },
                    if parameter.realtime != _|_ {
                      {
                        name: "REALTIME_INTEGRATION_ENABLED"
                        value: "true"
                      }
                    },
                    if parameter.realtime != _|_ {
                      {
                        name: "WEBSERVICE_NAME"
                        value: context.name
                      }
                    }
                  ]
                  // Binding contract (2026-06-06): database/cache refs envFrom the
                  // sibling component's normalized "<name>-conn" Secret (rendered
                  // by the postgresql/redis CDs). Keys: DB_* + DATABASE_URL,
                  // REDIS_* + CACHE_URL. optional:true so the ksvc starts even
                  // before the backing release converges.
                  // presence checks only - CUE does not short-circuit && over optional fields
                  if parameter.envFrom != _|_ || parameter.realtime != _|_ || parameter.database != _|_ || parameter.cache != _|_ {
                    envFrom: [
                      if parameter.envFrom != _|_ {
                        for envRef in parameter.envFrom {
                          envRef
                        }
                      }
                    ] + [
                      if parameter.database != _|_ if parameter.database != "none" {
                        {
                          secretRef: {
                            name: parameter.database + "-conn"
                            optional: true
                          }
                        }
                      },
                      if parameter.cache != _|_ if parameter.cache != "none" {
                        {
                          secretRef: {
                            name: parameter.cache + "-conn"
                            optional: true
                          }
                        }
                      },
                      if parameter.realtime != _|_ {
                        {
                          secretRef: {
                            name: parameter.realtime + "-kafka-secret"
                            optional: true
                          }
                        }
                      },
                      if parameter.realtime != _|_ {
                        {
                          secretRef: {
                            name: parameter.realtime + "-mqtt-secret" 
                            optional: true
                          }
                        }
                      },
                      if parameter.realtime != _|_ {
                        {
                          secretRef: {
                            name: parameter.realtime + "-db-secret"
                            optional: true
                          }
                        }
                      },
                      if parameter.realtime != _|_ {
                        {
                          secretRef: {
                            name: parameter.realtime + "-metabase-secret"
                            optional: true
                          }
                        }
                      },
                      if parameter.realtime != _|_ {
                        {
                          secretRef: {
                            name: parameter.realtime + "-lenses-secret"
                            optional: true
                          }
                        }
                      }
                    ]
                  }
                  // Health checks for robust deployment
                  livenessProbe: {
                    httpGet: {
                      path: parameter.healthPath
                      port: parameter.port
                    }
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  }
                  readinessProbe: {
                    httpGet: {
                      path: parameter.healthPath
                      port: parameter.port
                    }
                    initialDelaySeconds: 5
                    periodSeconds: 5
                  }
                }]
              }
            }
          }
        }
        
        // Declarative-spine (2026-06-06): the legacy "workflow-trigger" Job that
        // curl-POSTed oam-driven-contract on every render was REMOVED here.
        // It had been dead since U8 (stale argo-server.argo URL) and is
        // superseded by the claim-driven bootstrap (app.submit ->
        // AppContainerClaim -> ApplicationClaim) / auto-scaffold-bootstrap trait.

        parameter: {
          // image defaults to ACR placeholder built by the auto-scaffold workflow
          // when `language:` is set. Consumers can override to BYO image.
          // (Regression-fix 2026-06-01: CUE-R5 removed this default and broke
          //  the architect-v1 A5(a) language-only auto-scaffold path.)
          image: *"healthidpuaeacr.azurecr.io/\(context.name):latest" | string

          port: *8080 | int
          healthPath: *"/health" | string
          resources: *{
            cpu: "500m"
            memory: "512Mi"
          } | {
            cpu?: string
            memory?: string
          }
          environment: *{} | {[string]: string}
          envFrom?: [...{
            secretRef: {
              name: string
            }
          }]
          // Narrowed 2026-06-01 to match XRD/WFT enum constraint (PR #23).
          // Only python+java have working scaffold paths; anything else passes
          // catalog.validate() but fast-fails at oam-driven-contract
          // validate-parameters. Tightening here closes the feedback loop so
          // architect-v1 gets schema-side rejection at catalog time, before
          // the workflow is even fired.
          language?: "python" | "java"
          framework?: "fastapi" | "springboot"
          source?: string
          realtime?: string
          repository?: string
          targetEnvironment?: string  // vCluster deployment target
          
          // GraphQL Federation Support
          enableGraphQLFederation?: bool  // Mark service for GraphQL federation
          openApiPath?: string           // Custom OpenAPI spec path (e.g., "/api/v1/openapi.json")
          apiVersion?: string            // API version for GraphQL federation (e.g., "v1", "v2")
          
          // Optional database and cache settings
          database?: string
          cache?: string
        }
