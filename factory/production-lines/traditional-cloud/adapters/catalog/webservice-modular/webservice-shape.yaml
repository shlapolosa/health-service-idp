apiVersion: core.oam.dev/v1beta1
kind: ComponentDefinition
metadata:
  name: webservice-shape
  namespace: default
  annotations:
    definition.oam.dev/description: >
      Shape-only ComponentDefinition for a webservice — renders a Knative
      Service from image + port + healthPath + resources + environment.
      No bootstrap, no language inference, no GraphQL/realtime knobs.
      Bootstrap concerns belong to the auto-scaffold-bootstrap TraitDefinition.
      Image-source / language-enum constraints belong to the corresponding
      PolicyDefinitions.
    oam.dev/modular-replacement-for: webservice
    oam.dev/single-responsibility: "true"
    definition.oam.dev/shape: knative-service
spec:
  workload:
    definition:
      apiVersion: serving.knative.dev/v1
      kind: Service
    type: services.serving.knative.dev
  schematic:
    cue:
      template: |
        output: {
          apiVersion: "serving.knative.dev/v1"
          kind: "Service"
          metadata: {
            name: context.name
            namespace: context.namespace
            labels: {
              "app.kubernetes.io/name":       context.name
              "app.kubernetes.io/component":  "web-service"
              "app.kubernetes.io/managed-by": "kubevela"
              "oam.dev/cd":                   "webservice-shape"
            }
          }
          spec: {
            template: {
              metadata: {
                annotations: {
                  "autoscaling.knative.dev/minScale": "0"
                  "autoscaling.knative.dev/maxScale": "10"
                }
                labels: {
                  "app.kubernetes.io/name":    context.name
                  "app.kubernetes.io/version": parameter.version
                }
              }
              spec: {
                serviceAccountName: "knative-docker-sa"
                if parameter.registrySecret != _|_ {
                  imagePullSecrets: [{name: parameter.registrySecret}]
                }
                containers: [{
                  // +usage=Container image — registry constraint enforced by image-source policy.
                  image: parameter.image
                  ports: [{
                    containerPort: parameter.port
                    name: "http1"
                  }]
                  resources: {
                    limits: {
                      cpu:    parameter.resources.cpu
                      memory: parameter.resources.memory
                    }
                    requests: {
                      cpu:    "100m"
                      memory: "128Mi"
                    }
                  }
                  env: [
                    for k, v in parameter.environment {
                      name:  k
                      value: v
                    }
                  ]
                  // Binding contract (2026-06-06): database/cache refs envFrom the
                  // sibling component's normalized "<name>-conn" Secret. optional:true
                  // so the ksvc starts before the backing release converges.
                  if parameter.envFrom != _|_ || parameter.database != _|_ || parameter.cache != _|_ || parameter.identity != _|_ || parameter.realtime != _|_ {
                    envFrom: [
                      if parameter.envFrom != _|_ {
                        for ref in parameter.envFrom { ref }
                      }
                    ] + [
                      if parameter.database != _|_ if parameter.database != "none" {
                        {
                          secretRef: {
                            name:     parameter.database + "-conn"
                            optional: true
                          }
                        }
                      },
                      if parameter.cache != _|_ if parameter.cache != "none" {
                        {
                          secretRef: {
                            name:     parameter.cache + "-conn"
                            optional: true
                          }
                        }
                      },
                      if parameter.identity != _|_ if parameter.identity != "none" {
                        {
                          secretRef: {
                            name:     parameter.identity + "-conn"
                            optional: true
                          }
                        }
                      },
                      // RT-1 (#156): realtime binding parity with webservice.cd.yaml.
                      // Aggregate <realtime>-conn (KAFKA_*/LENSES_*/TOPIC_*).
                      // optional:false per the day-0 lesson (expose-api.yaml).
                      if parameter.realtime != _|_ if parameter.realtime != "none" {
                        {
                          secretRef: {
                            name:     parameter.realtime + "-conn"
                            optional: false
                          }
                        }
                      },
                    ]
                  }
                  livenessProbe: {
                    httpGet: {
                      path: parameter.healthPath
                      port: parameter.port
                    }
                    // JVM boot grace - see webservice.cd.yaml liveness comment.
                    initialDelaySeconds: 90
                    periodSeconds:       10
                    failureThreshold:    6
                  }
                  readinessProbe: {
                    httpGet: {
                      path: parameter.healthPath
                      port: parameter.port
                    }
                    initialDelaySeconds: 5
                    periodSeconds:       5
                  }
                }]
              }
            }
          }
        }

        parameter: {
          // +usage=Full container image. MUST be from healthidpuaeacr.azurecr.io or docker.io/socrates12345 (regex-enforced at vela dry-run; supersedes the deleted image-source PolicyDefinition).
          image: =~"^(healthidpuaeacr\\.azurecr\\.io/|docker\\.io/socrates12345/)"

          // +usage=Optional secret name for private-registry pulls (defaults to none).
          registrySecret?: string

          // +usage=Container port. Defaults to 8080.
          port: *8080 | int

          // +usage=Service version label, populates app.kubernetes.io/version. Defaults to "latest".
          version: *"latest" | string

          // +usage=HTTP path for liveness/readiness probes. Defaults to /health.
          healthPath: *"/health" | string

          // +usage=Container resource limits. Defaults to {cpu: 500m, memory: 512Mi}.
          resources: *{
            cpu:    "500m"
            memory: "512Mi"
          } | {
            cpu?:    string
            memory?: string
          }

          // +usage=Plain env vars as a map. Defaults to {}.
          environment: *{} | {[string]: string}

          // +usage=Optional list of envFrom sources (secretRefs).
          envFrom?: [...{
            secretRef: {
              name: string
            }
          }]

          // +usage=Name of a sibling datastore component (e.g. postgresql) to bind. Injects envFrom "<name>-conn" (DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORD/DATABASE_URL).
          database?: string

          // +usage=Name of a sibling cache component (e.g. redis) to bind. Injects envFrom "<name>-conn" (REDIS_HOST/REDIS_PORT/REDIS_PASSWORD/REDIS_URL/CACHE_URL).
          cache?: string

          // +usage=Name of a sibling identity component (e.g. auth0-idp) to bind. Injects envFrom "<name>-conn" (AUTH0_*/JWT_ISSUER_URI/JWT_JWK_SET_URI).
          identity?: string

          // +usage=Name of a sibling realtime-platform component to bind. Injects envFrom "<name>-conn" (KAFKA_BOOTSTRAP_SERVERS/KAFKA_SCHEMA_REGISTRY_URL/LENSES_URL/LENSES_WS_URL/TOPIC_*).
          realtime?: string
        }
