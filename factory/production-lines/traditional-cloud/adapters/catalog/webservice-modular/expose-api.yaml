apiVersion: core.oam.dev/v1beta1
kind: TraitDefinition
metadata:
  name: expose-api
  namespace: default
  annotations:
    definition.oam.dev/description: >
      Publishes the service's OpenAPI spec to Azure APIM (BIND-2, 2026-06-06).
      Renders a Job that logs in with the cluster's azure-credentials SP, waits
      for the service's public /openapi.json (Knative URL through the Istio
      ingress), then `az apim api import`s it. Result: the spec is externally
      browsable in the APIM developer portal with auth/rate-limits, one API per
      component (multi-webservice OAMs publish one API each). Re-running the
      Job upserts (same --api-id). Activates the long-dormant exposeApi intent.
spec:
  appliesToWorkloads:
    - webservice
    - webservice-shape
  podDisruptive: false
  schematic:
    cue:
      template: |
        // EVENT-2 (#151): stamp the ksvc workload so the substrate sensor
        // (factory/substrate/argo-events/ksvc-ready-apim-publish.yaml) can fire
        // an APIM-publish Job the instant the service reports Ready - instead of
        // the trait Job polling $PUBLIC_URL$SPEC_PATH and burning retries during
        // the day-0 CI build. The label is the EventSource selector; the
        // annotations carry everything the sensor-built Job needs (it has no
        // access to these trait parameters otherwise). The trait Job below is
        // KEPT (sensor-as-accelerator, belt-and-braces): the zero-touch contract
        // must not depend on a healthy event-bus, and both Jobs upsert by the
        // same --api-id so they are mutually idempotent.
        patch: {
          metadata: {
            labels: {
              "expose-api.cafe.io/publish": "true"
            }
            annotations: {
              "expose-api.cafe.io/path-prefix": parameter.apiPathPrefix
              "expose-api.cafe.io/apim-name":   parameter.apimName
              "expose-api.cafe.io/apim-rg":     parameter.apimResourceGroup
              "expose-api.cafe.io/spec-path":   parameter.openApiPath
              "expose-api.cafe.io/public-host": parameter.publicHost
              // identity is optional - first-match idiom emits the bound name or "".
              "expose-api.cafe.io/identity": [
                if parameter.identity != _|_ {parameter.identity},
                "",
              ][0]
            }
          }
        }

        outputs: {
          "apim-publish": {
            apiVersion: "batch/v1"
            kind:       "Job"
            metadata: {
              name:      context.name + "-apim-publish"
              namespace: context.namespace
              labels: {
                "app.kubernetes.io/name":       context.name
                "app.kubernetes.io/component":  "apim-publish"
                "app.kubernetes.io/managed-by": "kubevela"
                "trait.oam.dev/name":           "expose-api"
              }
            }
            spec: {
              ttlSecondsAfterFinished: 3600
              backoffLimit: 4
              template: {
                spec: {
                  restartPolicy: "OnFailure"
                  volumes: [{
                    name: "azure-creds"
                    secret: { secretName: "azure-credentials" }
                  }]
                  containers: [{
                    name:  "apim-publish"
                    image: "mcr.microsoft.com/azure-cli:2.64.0"
                    volumeMounts: [{
                      name:      "azure-creds"
                      mountPath: "/azure"
                      readOnly:  true
                    }]
                    if parameter.identity != _|_ {
                      envFrom: [{
                        secretRef: {
                          // REQUIRED (not optional): envFrom binds at container
                          // start, and on day-0 the ESO-synced "<identity>-conn"
                          // secret can land seconds AFTER this pod starts -
                          // optional:true silently published the API without
                          // validate-jwt (caught in E2E re-run 2026-06-06).
                          // optional:false makes kubelet hold the container
                          // (CreateContainerConfigError -> retry) until the
                          // secret exists - declarative gating, no polling.
                          name:     parameter.identity + "-conn"
                          optional: false
                        }
                      }]
                    }
                    env: [
                      { name: "SVC_NAME",   value: context.name },
                      { name: "SVC_NS",     value: context.namespace },
                      { name: "PUBLIC_URL", value: "http://" + context.name + "." + context.namespace + "." + parameter.publicHost },
                      { name: "SPEC_PATH",  value: parameter.openApiPath },
                      { name: "APIM_NAME",  value: parameter.apimName },
                      { name: "APIM_RG",    value: parameter.apimResourceGroup },
                      { name: "API_SUFFIX", value: parameter.apiPathPrefix + "/" + context.name },
                    ]
                    command: ["/bin/sh", "-c"]
                    args: ["""
                      set -e
                      echo "expose-api: publishing $SVC_NAME OpenAPI to APIM $APIM_NAME"
                      CID=$(python3 -c "import json;print(json.load(open('/azure/azure-creds.json'))['clientId'])")
                      CSC=$(python3 -c "import json;print(json.load(open('/azure/azure-creds.json'))['clientSecret'])")
                      TEN=$(python3 -c "import json;print(json.load(open('/azure/azure-creds.json'))['tenantId'])")
                      SUB=$(python3 -c "import json;print(json.load(open('/azure/azure-creds.json'))['subscriptionId'])")
                      az login --service-principal -u "$CID" -p "$CSC" --tenant "$TEN" >/dev/null
                      az account set --subscription "$SUB"

                      # Wait for the service's spec to be publicly reachable. This
                      # is now the FALLBACK path (EVENT-2 #151): the substrate
                      # ksvc-ready sensor normally publishes the moment the service
                      # reports Ready, so this trait Job only has to cover the case
                      # where the event-bus is unhealthy. Poll reduced 30x20s ->
                      # 10x30s (still ~5min) - backoffLimit + the event accelerator
                      # cover the day-0 CI-build long tail without burning retries.
                      for i in $(seq 1 10); do
                        if curl -fsS --max-time 10 "$PUBLIC_URL$SPEC_PATH" -o /tmp/openapi.json; then
                          echo "spec fetched from $PUBLIC_URL$SPEC_PATH"
                          break
                        fi
                        echo "spec not ready yet ($i/10), retrying in 30s..."
                        sleep 30
                      done
                      test -s /tmp/openapi.json || { echo "spec never became reachable"; exit 1; }

                      # --display-name overrides the spec's info.title: scaffolded
                      # services may share the template's default title and APIM
                      # requires unique display names (caught: patient2-api vs
                      # items-api both titled "template-service").
                      az apim api import \\
                        --resource-group "$APIM_RG" \\
                        --service-name "$APIM_NAME" \\
                        --api-id "$SVC_NAME" \\
                        --display-name "$SVC_NAME" \\
                        --path "$API_SUFFIX" \\
                        --specification-format OpenApiJson \\
                        --specification-path /tmp/openapi.json \\
                        --service-url "$PUBLIC_URL" \\
                        --protocols https http \\
                        --subscription-required false
                      echo "published: APIM api-id=$SVC_NAME path=$API_SUFFIX -> $PUBLIC_URL"

                      # Identity wiring: when an identity component is bound, lock the
                      # API behind validate-jwt - APIM verifies tokens minted by the
                      # IdP (JWT_ISSUER_URI/AUTH0_AUDIENCE from "<identity>-conn").
                      if [ -n "${JWT_ISSUER_URI:-}" ]; then
                        printf '<policies><inbound><base /><validate-jwt header-name="Authorization" failed-validation-httpcode="401" failed-validation-error-message="Unauthorized"><openid-config url="%s.well-known/openid-configuration" /><audiences><audience>%s</audience></audiences></validate-jwt></inbound><backend><base /></backend><outbound><base /></outbound><on-error><base /></on-error></policies>' "$JWT_ISSUER_URI" "$AUTH0_AUDIENCE" > /tmp/policy.xml
                        python3 -c "import json; json.dump({'properties':{'format':'xml','value':open('/tmp/policy.xml').read()}}, open('/tmp/policy.json','w'))"
                        APIM_ID=$(az apim show -g "$APIM_RG" -n "$APIM_NAME" --query id -o tsv)
                        az rest --method PUT --url "https://management.azure.com${APIM_ID}/apis/${SVC_NAME}/policies/policy?api-version=2022-08-01" --body @/tmp/policy.json
                        echo "validate-jwt policy applied: issuer=$JWT_ISSUER_URI audience=$AUTH0_AUDIENCE"
                      else
                        echo "no identity bound - API published WITHOUT jwt validation"
                      fi
                      """]
                  }]
                }
              }
            }
          }
        }

        parameter: {
          // +usage=External wildcard host the Knative ingress serves (default: cluster nip.io domain).
          publicHost: *"20.233.105.82.nip.io" | string

          // +usage=Path serving the OpenAPI JSON spec (FastAPI default /openapi.json).
          openApiPath: *"/openapi.json" | string

          // +usage=Azure APIM instance to publish into.
          apimName: *"aigw-apim-dev-w4x7ibwk4e2is" | string

          // +usage=Resource group of the APIM instance.
          apimResourceGroup: *"rg-ai-gateway-dev-uae" | string

          // +usage=APIM URL path prefix; final API path is <prefix>/<component-name>.
          apiPathPrefix: *"svc" | string

          // +usage=Name of a sibling identity component (e.g. auth0-idp). When set, the published API is locked behind an APIM validate-jwt policy using that component's JWT_ISSUER_URI/AUTH0_AUDIENCE.
          identity?: string
        }
