apiVersion: core.oam.dev/v1beta1
kind: TraitDefinition
metadata:
  name: auto-scaffold-bootstrap
  namespace: default
  annotations:
    definition.oam.dev/description: >
      Trait that, when attached to a webservice-shape component, declares the
      bootstrap intent as an AppContainerClaim. The claim's composition creates
      the source + gitops repos (deletionPolicy Orphan), seeds boilerplate +
      CI, and (when deliveryTarget is set) an ArgoCD Application pointing at
      the per-service gitops repo. Replaces the previous curl-Job that fired
      the oam-driven-contract Argo workflow (declarative-spine W2): no Argo
      REST call, no token, idempotent by claim name. Apply to webservice-shape
      components only. NOTE: renders on the host cluster only - Crossplane
      claims do not exist inside vclusters; for vcluster-targeted apps the
      day-0 claim is created by app.submit on the host.
    trait.oam.dev/replaces: "scaffold-trigger curl Job (Argo REST) + language-as-bootstrap field on webservice"
spec:
  appliesToWorkloads:
    - webservice-shape
  podDisruptive: false
  schematic:
    cue:
      template: |
        outputs: {
          "scaffold-claim": {
            apiVersion: "platform.example.org/v1alpha1"
            kind:       "AppContainerClaim"
            metadata: {
              // Deterministic name = component name. The same claim may already
              // have been created by app.submit (day-0); server-side apply
              // converges both writers onto one object.
              name:      context.name
              namespace: context.namespace
              labels: {
                "app.kubernetes.io/name":       context.name
                "app.kubernetes.io/managed-by": "kubevela"
                "trait.oam.dev/name":           "auto-scaffold-bootstrap"
              }
            }
            spec: {
              name:           context.name
              description:    "scaffolded via auto-scaffold-bootstrap trait (declarative spine)"
              gitHubOrg:      parameter.githubOrg
              dockerRegistry: parameter.dockerRegistry
              language:       parameter.language
              framework:      parameter.framework
              if parameter.deliveryTarget != _|_ {
                deliveryTarget: parameter.deliveryTarget
              }
            }
          }
        }

        parameter: {
          // +usage=Language of the service to scaffold. CUE-enforced enum (single source of truth; matches webservice CD + XRD).
          language: "python" | "java"

          // +usage=Framework matching the language (fastapi for python, springboot for java).
          framework: *"fastapi" | "springboot"

          // +usage=GitHub org for the new source repo. Defaults to shlapolosa.
          githubOrg: *"shlapolosa" | string

          // +usage=Docker registry the build pipeline pushes to.
          dockerRegistry: *"healthidpuaeacr.azurecr.io" | string

          // +usage=Where the platform reconciles the app: "host" or a vcluster name. Omit for external tenancy (repo handover only, no ArgoCD Application).
          deliveryTarget?: string
        }
