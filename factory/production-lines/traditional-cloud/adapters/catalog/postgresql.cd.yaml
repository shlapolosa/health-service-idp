apiVersion: core.oam.dev/v1beta1
kind: ComponentDefinition
metadata:
  name: postgresql
  namespace: default
  annotations:
    definition.oam.dev/description: PostgreSQL database via Crossplane Helm provider
    definition.oam.dev/shape: helm-release
spec:
  workload:
    definition:
      apiVersion: helm.crossplane.io/v1beta1
      kind: Release
  schematic:
    cue:
      template: |
        output: {
          apiVersion: "helm.crossplane.io/v1beta1"
          kind: "Release"
          metadata: {
            name: context.name + "-postgresql"
            namespace: context.namespace
            // Multi-cluster deployment support
            if parameter.targetEnvironment != _|_ {
              annotations: {
                "app.oam.dev/cluster": parameter.targetEnvironment
              }
            }
          }
          spec: {
            forProvider: {
              chart: {
                name: "postgresql"
                repository: "https://charts.bitnami.com/bitnami"
                version: "13.2.24"
              }
              namespace: context.namespace
              skipCreateNamespace: false
              values: {
                // Bitnami removed old tags from docker.io/bitnami (2025 catalog
                // migration); pinned chart 13.2.24 references them. bitnamilegacy/
                // is the official archive mirror.
                image: {
                  repository: "bitnamilegacy/postgresql"
                }
                auth: {
                  enablePostgresUser: true
                  postgresPassword: parameter.auth.postgresPassword
                  username: parameter.auth.username
                  password: parameter.auth.password
                  database: parameter.database
                }
                primary: {
                  persistence: {
                    enabled: true
                    size: parameter.storage
                    storageClass: parameter.storageClass
                  }
                  resources: {
                    requests: {
                      cpu: parameter.resources.cpu
                      memory: parameter.resources.memory
                    }
                    limits: {
                      cpu: parameter.resources.cpuLimit
                      memory: parameter.resources.memoryLimit
                    }
                  }
                  readinessProbe: {
                    enabled: true
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  }
                  livenessProbe: {
                    enabled: true
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  }
                }
                metrics: {
                  enabled: parameter.metrics
                  serviceMonitor: {
                    enabled: false
                  }
                }
                backup: {
                  enabled: false
                }
              }
            }
            providerConfigRef: {
              name: "default"
            }
          }
        }

        // Binding contract (2026-06-06): normalized connection Secret.
        // Webservices referencing this component via `database: <name>` get
        // envFrom "<name>-conn" automatically (webservice CD). Keys follow
        // the platform contract documented in connectivity-recipes.
        // Host = bitnami fullname: release "<name>-postgresql" contains the
        // chart name, so service == release name.
        outputs: {
          "conn-secret": {
            apiVersion: "v1"
            kind:       "Secret"
            metadata: {
              name:      context.name + "-conn"
              namespace: context.namespace
              labels: {
                "binding.cafe.io/category":  "datastore"
                "app.oam.dev/component":     context.name
              }
            }
            type: "Opaque"
            stringData: {
              DB_HOST:      context.name + "-postgresql." + context.namespace + ".svc.cluster.local"
              DB_PORT:      "5432"
              DB_NAME:      parameter.database
              DB_USER:      parameter.auth.username
              DB_PASSWORD:  parameter.auth.password
              DATABASE_URL: "postgresql://" + parameter.auth.username + ":" + parameter.auth.password + "@" + context.name + "-postgresql." + context.namespace + ".svc.cluster.local:5432/" + parameter.database
            }
          }
        }

        parameter: {
          // Required
          database: string
          
          // Authentication
          auth: {
            username: *"appuser" | string
            password: *"changeme" | string
            postgresPassword: *"adminpass" | string
          }

          // Storage
          storage: *"10Gi" | string
          storageClass: *"gp2" | string

          // Resources
          resources: {
            cpu: *"250m" | string
            memory: *"256Mi" | string
            cpuLimit: *"500m" | string
            memoryLimit: *"512Mi" | string
          }
          
          // Monitoring
          metrics: *false | bool
          
          // Multi-cluster support
          targetEnvironment?: string  // vCluster deployment target
        }