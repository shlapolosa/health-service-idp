---
# Rasa Chatbot ComponentDefinition
# Architecturally follows realtime-platform pattern: OAM Component → Dual Knative Services + Optional Infrastructure
#
# RASA-CONTAINER (#178): invariant container + variant repo.
#   - INVARIANT (rasa-plus runtime, python deps, server settings, endpoints/
#     credentials plumbing, train-cache entrypoint) is prebaked into
#     healthidpuaeacr.azurecr.io/rasa-base:vX.Y.Z
#     (factory/production-lines/traditional-cloud/adapters/rasa-base-image/).
#   - VARIANT (domain.yml, config.yml, data/, actions/actions.py — the
#     developer/dev-agent edit surface) is scaffolded create-if-absent into
#     the generated app monorepo by mscv (scripts/lib/rasa.sh), with THIN
#     Dockerfiles (FROM rasa-base + COPY) at the CI-watched paths
#     docker/rasa/Dockerfile and docker/rasa-actions/Dockerfile.
#   This CD is unchanged on purpose: rasaImage/actionsImage stay REQUIRED
#   version-pinned strings supplied by the app spec (HARD-3: no :latest
#   defaults; the `version` parameter below is a label, not an image tag).
#   The speedup comes from the thin CI layer build, not from the render.
apiVersion: core.oam.dev/v1beta1
kind: ComponentDefinition
metadata:
  name: rasa-chatbot
  annotations:
    definition.oam.dev/description: "Complete Rasa chatbot with dual-container pattern (Rasa server + Actions server) and automatic service discovery"
    definition.oam.dev/requires-source-code: "true"
    definition.oam.dev/shape: knative-service
spec:
  workload:
    definition:
      apiVersion: serving.knative.dev/v1
      kind: Service
    type: services.serving.knative.dev
  schematic:
    cue:
      template: |
        // Primary Output: Rasa Server Knative Service (OAM-compliant workload)
        output: {
          apiVersion: "serving.knative.dev/v1"
          kind: "Service"
          metadata: {
            name: context.name + "-rasa"
            namespace: context.namespace
            labels: {
              "app.kubernetes.io/name": context.name
              "app.kubernetes.io/component": "rasa-server"
              "app.kubernetes.io/managed-by": "kubevela"
              "app.kubernetes.io/part-of": "rasa-chatbot"
            }
            annotations: {
              // Multi-cluster deployment support
              if parameter.targetEnvironment != _|_ {
                "app.oam.dev/cluster": parameter.targetEnvironment
              }
              "rasa-chatbot.oam.dev/bootstrap": "true"
              "rasa-chatbot.oam.dev/actions-service": context.name + "-actions"
              "rasa-chatbot.oam.dev/component-type": "rasa-server"
            }
          }
          spec: {
            template: {
              metadata: {
                annotations: {
                  "autoscaling.knative.dev/minScale": "\(parameter.minScale)"
                  "autoscaling.knative.dev/maxScale": "\(parameter.maxScale)"
                  if parameter.targetConcurrency != _|_ {
                    "autoscaling.knative.dev/target": "\(parameter.targetConcurrency)"
                  }
                  "run.googleapis.com/execution-environment": "gen2"
                }
                labels: {
                  "app.kubernetes.io/name": context.name
                  "app.kubernetes.io/version": parameter.version
                  "app.kubernetes.io/part-of": "rasa-chatbot"
                }
              }
              spec: {
                serviceAccountName: "knative-docker-sa"
                containers: [{
                  image: parameter.rasaImage
                  ports: [{
                    containerPort: 5005
                    name: "http1"
                  }]
                  resources: {
                    limits: {
                      cpu: parameter.resources.cpu
                      memory: parameter.resources.memory
                    }
                    requests: {
                      cpu: "250m"
                      memory: "512Mi"
                    }
                  }
                  env: [
                    {
                      name: "RASA_ACTION_ENDPOINT"
                      value: "http://" + context.name + "-actions." + context.namespace + ".svc.cluster.local:5055/webhook"
                    },
                    {
                      name: "ACTIONS_SERVER_HOST"
                      value: context.name + "-actions." + context.namespace + ".svc.cluster.local"
                    },
                    {
                      name: "ACTIONS_SERVER_PORT"
                      value: "5055"
                    },
                    {
                      name: "ACTION_ENDPOINT_URL"
                      value: "http://" + context.name + "-actions." + context.namespace + ".svc.cluster.local:5055/webhook"
                    },
                    {
                      name: "RASA_WEBHOOK_URL"
                      value: "http://" + context.name + "-rasa." + context.namespace + ".svc.cluster.local:5005/webhooks/rest/webhook"
                    },
                    {
                      name: "AGENT_TYPE"
                      value: "rasa-chatbot"
                    },
                    {
                      name: "LOG_LEVEL"
                      value: "INFO"
                    },
                    {
                      name: "RASA_TELEMETRY_ENABLED"
                      value: "false"
                    }
                  ] + [
                    for k, v in parameter.environment {
                      name: k
                      value: v
                    }
                  ]
                  if parameter.envFrom != _|_ {
                    envFrom: parameter.envFrom
                  }
                  // Health checks for robust deployment
                  livenessProbe: {
                    httpGet: {
                      path: "/api/status"
                      port: 5005
                    }
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  }
                  readinessProbe: {
                    httpGet: {
                      path: "/api/status"
                      port: 5005
                    }
                    initialDelaySeconds: 5
                    periodSeconds: 5
                  }
                }]
              }
            }
          }
        }
        
        // Secondary Outputs: Actions Server + Optional Infrastructure
        outputs: {
          // Actions Server Knative Service (always created)
          "actions-server": {
            apiVersion: "serving.knative.dev/v1"
            kind: "Service"
            metadata: {
              name: context.name + "-actions"
              namespace: context.namespace
              labels: {
                "app.kubernetes.io/name": context.name
                "app.kubernetes.io/component": "actions-server"
                "app.kubernetes.io/managed-by": "kubevela"
                "app.kubernetes.io/part-of": "rasa-chatbot"
              }
              annotations: {
                // Multi-cluster deployment support
                if parameter.targetEnvironment != _|_ {
                  "app.oam.dev/cluster": parameter.targetEnvironment
                }
                "rasa-chatbot.oam.dev/component-type": "actions-server"
                "rasa-chatbot.oam.dev/rasa-service": context.name + "-rasa"
              }
            }
            spec: {
              template: {
                metadata: {
                  annotations: {
                    "autoscaling.knative.dev/minScale": "\(parameter.actionsMinScale)"
                    "autoscaling.knative.dev/maxScale": "\(parameter.actionsMaxScale)"
                    if parameter.actionsTargetConcurrency != _|_ {
                      "autoscaling.knative.dev/target": "\(parameter.actionsTargetConcurrency)"
                    }
                    "run.googleapis.com/execution-environment": "gen2"
                  }
                  labels: {
                    "app.kubernetes.io/name": context.name
                    "app.kubernetes.io/version": parameter.version
                    "app.kubernetes.io/part-of": "rasa-chatbot"
                  }
                }
                spec: {
                  serviceAccountName: "knative-docker-sa"
                  containers: [{
                    image: parameter.actionsImage
                    ports: [{
                      containerPort: 5055
                      name: "http1"
                    }]
                    resources: {
                      limits: {
                        cpu: parameter.actionsResources.cpu
                        memory: parameter.actionsResources.memory
                      }
                      requests: {
                        cpu: "100m"
                        memory: "256Mi"
                      }
                    }
                    env: [
                      {
                        name: "RASA_URL"
                        value: "http://" + context.name + "-rasa." + context.namespace + ".svc.cluster.local:5005"
                      },
                      {
                        name: "RASA_WEBHOOK_URL"
                        value: "http://" + context.name + "-rasa." + context.namespace + ".svc.cluster.local:5005/webhooks/rest/webhook"
                      },
                      {
                        name: "AGENT_TYPE"
                        value: "rasa-actions"
                      },
                      {
                        name: "LOG_LEVEL"
                        value: "INFO"
                      },
                      {
                        name: "PYTHONUNBUFFERED"
                        value: "1"
                      }
                    ] + [
                      for k, v in parameter.environment {
                        name: k
                        value: v
                      }
                    ]
                    if parameter.envFrom != _|_ {
                      envFrom: parameter.envFrom
                    }
                    // Health checks for robust deployment
                    livenessProbe: {
                      httpGet: {
                        path: "/health"
                        port: 5055
                      }
                      initialDelaySeconds: 30
                      periodSeconds: 10
                    }
                    readinessProbe: {
                      httpGet: {
                        path: "/health"
                        port: 5055
                      }
                      initialDelaySeconds: 5
                      periodSeconds: 5
                    }
                  }]
                }
              }
            }
          }
        }
        
        // Repository Creation (conditional - claim path, RETIRE-WFT-2 #152).
        // Replaces the curl-Job that fired the oam-driven-contract Argo workflow
        // with a declarative AppContainerClaim (same pattern as auto-scaffold-bootstrap
        // / webservice). The claim's composition scaffolds source+gitops repos and
        // (when deliveryTarget is set) an ArgoCD Application. Idempotent by claim name;
        // server-side apply converges with any day-0 claim from app.submit.
        // RECREATE-STORM (#175): scaffold-claim emission gated behind EXPLICIT
        // `bootstrap: true` (was `language != _|_`, which duplicated ownership
        // under UNIFY-1 — see realtime-service.cd.yaml for the full rationale).
        if parameter.bootstrap != _|_ if parameter.bootstrap {
          outputs: {
            // Always include actions server
            "actions-server": outputs["actions-server"]

            // Add scaffold claim when language specified
            "scaffold-claim": {
              apiVersion: "platform.example.org/v1alpha1"
              kind:       "AppContainerClaim"
              metadata: {
                // Deterministic name = component name; converges with any day-0 claim.
                name:      context.name
                namespace: context.namespace
                labels: {
                  "app.kubernetes.io/name":       context.name
                  "app.kubernetes.io/component":  "scaffold-claim"
                  "app.kubernetes.io/managed-by": "kubevela"
                  "app.kubernetes.io/part-of":    "rasa-chatbot"
                }
                annotations: {
                  "rasa-chatbot.oam.dev/source":        "oam-driven"
                  "rasa-chatbot.oam.dev/platform-type": "chatbot"
                }
              }
              spec: {
                name:           context.name
                description:    "OAM-driven RASA chatbot via ComponentDefinition (declarative spine)"
                gitHubOrg:      "shlapolosa"
                dockerRegistry: "healthidpuaeacr.azurecr.io"
                // Rasa scaffolding language -> chat-template (ApplicationClaim XRD enum).
                language: "rasa"
                // Framework derived: rasa -> chatbot.
                framework: "chatbot"
                // First-match-default: explicit targetEnvironment, else "host".
                deliveryTarget: [if parameter.targetEnvironment != _|_ {parameter.targetEnvironment}, "host"][0]
              }
            }
          }
        }
        
        parameter: {
          // #175: opt-in standalone scaffold claim (single-component OAMs
          // only — under UNIFY-1 scaffolding belongs to the app-level claim).
          bootstrap?: bool
          // Required (following realtime-platform pattern)
          rasaImage: string
          actionsImage: string
          
          // Service Configuration  
          version: *"latest" | string
          
          // Resource Management (Rasa Server)
          resources: *{
            cpu: "500m"
            memory: "1Gi"
          } | {
            cpu?: string
            memory?: string
          }
          
          // Resource Management (Actions Server)
          actionsResources: *{
            cpu: "250m"
            memory: "512Mi"
          } | {
            cpu?: string
            memory?: string
          }
          
          // Scaling Configuration (Rasa Server)
          minScale: *1 | int
          maxScale: *10 | int
          targetConcurrency?: int
          
          // Scaling Configuration (Actions Server)
          actionsMinScale: *0 | int
          actionsMaxScale: *5 | int
          actionsTargetConcurrency?: int
          
          // Environment Variables
          environment: *{} | {[string]: string}
          
          // Environment Variables from Secrets
          envFrom?: [...{
            secretRef: {
              name: string
            }
          }]
          
          // Optional Infrastructure Bootstrap (for repository creation equivalence)
          language?: string     // Triggers bootstrap: rasa
          framework?: string    // chatbot
          repository?: string   // Git repository template name (defaults to name)
          
          // External Access Configuration (optional)
          enableIstioGateway?: bool
          chatbotHost?: string
          enableTLS?: bool
          
          targetEnvironment?: string  // vCluster deployment target
        }