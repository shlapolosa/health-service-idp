# Binding-contract example (BIND-1/2/3, 2026-06-06) — the canonical "components
# that KNOW each other" OAM. Render-verified via vela dry-run.
#
# What happens:
#  - orders-db (postgresql) renders Secret "orders-db-conn"
#    (DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORD/DATABASE_URL)
#  - orders-cache (redis) renders Secret "orders-cache-conn"
#    (REDIS_HOST/REDIS_PORT/REDIS_PASSWORD/REDIS_URL/CACHE_URL)
#  - orders-api binds BOTH by name (database:/cache: refs -> envFrom <ref>-conn)
#    and publishes its OpenAPI spec to Azure APIM via the expose-api trait
#  - billing-api shows the multi-webservice case: a second webservice in the
#    same OAM binding the SAME datastore, no cache
apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: binding-contract-example
  namespace: default
spec:
  components:
  - name: orders-db
    type: postgresql
    properties:
      database: orders
  - name: orders-cache
    type: redis
    properties: {}
  - name: orders-api
    type: webservice
    properties:
      name: orders-api
      language: python
      database: orders-db
      cache: orders-cache
    traits:
    - type: expose-api
      properties: {}
  - name: billing-api
    type: webservice
    properties:
      name: billing-api
      language: python
      database: orders-db
