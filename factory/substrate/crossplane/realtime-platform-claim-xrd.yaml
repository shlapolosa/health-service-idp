# RealtimePlatformClaim XRD (Custom Resource Definition)
# Defines the API schema for real-time platform claims

apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xrealtimeplatformclaims.platform.example.org
spec:
  group: platform.example.org
  names:
    kind: XRealtimePlatformClaim
    plural: xrealtimeplatformclaims
  claimNames:
    kind: RealtimePlatformClaim
    plural: realtimeplatformclaims
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              # Minimal required properties
              name:
                type: string
                description: "Name of the real-time system (used for all resources)"
                pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                maxLength: 63
              appContainer:
                type: string
                description: "Name of the AppContainer this realtime platform belongs to"
                pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                maxLength: 63
                default: "health-service-idp"
              
              # Simple optional properties with defaults
              database:
                type: string
                enum: ["postgres", "mysql", "mongodb"]
                default: "postgres"
                description: "Database type for backend storage"
              visualization:
                type: string  
                enum: ["metabase", "grafana"]
                default: "metabase"
                description: "Analytics dashboard platform"
              iot:
                type: boolean
                default: true
                description: "Enable MQTT IoT broker"
                
              # Advanced optional properties (still simple)
              mqttUsers:
                type: array
                description: "MQTT user credentials"
                items:
                  type: object
                  properties:
                    username: 
                      type: string
                    password: 
                      type: string
                  required: ["username", "password"]
              dataRetention:
                type: string
                pattern: "^[0-9]+[dwm]$"
                default: "7d"
                description: "Data retention period (e.g. 7d, 30d, 6m)"
              # RT-1 (#156): declarative Kafka topics. The composition's
              # topic-provisioning Job loops over this and POSTs each to the
              # Lenses HQ REST API. Absent/empty -> the Job seeds the default
              # health-domain topic set (backward compatible).
              topics:
                type: array
                description: "Kafka topics to provision via Lenses HQ"
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      pattern: '^[a-zA-Z0-9._-]+$'
                      maxLength: 249
                    partitions:
                      type: integer
                      minimum: 1
                      default: 3
                    retention:
                      type: integer
                      description: "retention.ms"
                      minimum: 1
                      default: 604800000
                  required: ["name"]
              scaling:
                type: object
                properties:
                  minReplicas: 
                    type: integer
                    minimum: 1
                    default: 1
                  maxReplicas: 
                    type: integer
                    minimum: 1
                    default: 5
              snowflake:
                type: object
                properties:
                  enabled:
                    type: boolean
                    default: false
                  credentialsSecret:
                    type: string
              # analytics-platform: Kafka Connect connector instances. The
              # composition's connector-provisioning Job loops over this and
              # PUTs each to the bundled Connect (:8083). Absent/empty -> the
              # Job is not rendered (backward compatible).
              connectors:
                type: array
                description: "Kafka Connect connector instances to PUT to the bundled Connect (:8083)."
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    class:
                      type: string
                    config:
                      type: object
                      additionalProperties:
                        type: string
                    secretRefs:
                      type: array
                      items:
                        type: string
                  required: ["name", "class"]
              # analytics-platform: Lenses SQL stream processors. The
              # composition's processor-provisioning Job loops over this and
              # submits each .sql to Lenses HQ. Absent/empty -> the Job is not
              # rendered (backward compatible).
              processors:
                type: array
                description: "Lenses SQL stream processors to deploy."
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    sql:
                      type: string
                  required: ["name", "sql"]
            required: ["name"]
                  
          status:
            type: object
            properties:
              # Standard status fields
              ready: 
                type: boolean
              message: 
                type: string
              # Connection endpoints exposed as secrets
              secrets:
                type: object
                properties:
                  mqtt: 
                    type: string
                    description: "MQTT connection secret name"
                  kafka: 
                    type: string
                    description: "Kafka connection secret name"
                  database: 
                    type: string
                    description: "Database connection secret name"
                  metabase: 
                    type: string
                    description: "Analytics dashboard secret name"
                  lenses: 
                    type: string
                    description: "Stream processing UI secret name"
              # External access URLs
              endpoints:
                type: object
                properties:
                  lensesUI: 
                    type: string
                  metabaseUI: 
                    type: string
                  mqttWebSocket: 
                    type: string
                  realtimeService:
                    type: string
                    description: "Real-time application service URL"