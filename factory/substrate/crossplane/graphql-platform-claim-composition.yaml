---
# Simplified GraphQLPlatformClaim Composition - No database dependencies
# Creates minimal infrastructure for GraphQL gateway service discovery.
#
# XP-MODERN (#158): rewritten from legacy spec.resources patch-and-transform to the
# platform-idiomatic Crossplane v2 function-go-templating pipeline (mirrors
# factory/production-lines/traditional-cloud/adapters/composition/application-claim-composition.yaml).
# All 6 resources are now provider-kubernetes Objects (kubernetes.m.crossplane.io/v1alpha1
# + ClusterProviderConfig 'kubernetes-provider'), behaviour-preserving 1:1: same
# Namespace/ConfigMap/ServiceAccount/ClusterRole/ClusterRoleBinding/NetworkPolicy, same
# spec.name-derived names, namespaced resources in the '<name>-graphql' namespace.
# The hasura-backup variant (graphql-platform-claim-composition-hasura-backup.yaml)
# is the deferred DB-backed artifact and stays untouched.

apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xgraphqlplatformclaims.platform.example.org
  labels:
    crossplane.io/xrd: xgraphqlplatformclaims.platform.example.org
spec:
  writeConnectionSecretsToNamespace: crossplane-system
  compositeTypeRef:
    apiVersion: platform.example.org/v1alpha1
    kind: XGraphQLPlatformClaim
  mode: Pipeline
  pipeline:
  - step: render
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $spec := .observed.composite.resource.spec }}
          {{- $name := $spec.name }}
          ---
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-graphql-namespace'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: graphql-namespace
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: '{{ $name }}-graphql'
                  labels:
                    platform.example.org/type: graphql
                    app.kubernetes.io/component: graphql-gateway
            providerConfigRef:
              kind: ClusterProviderConfig
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-gateway-config'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: gateway-config
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: '{{ $name }}-gateway-config'
                  namespace: '{{ $name }}-graphql'
                data:
                  gateway-name: '{{ $name }}'
                  config.yaml: |
                    # GraphQL Gateway Configuration
                    gateway:
                      name: "{{ $name }}"
                      autoDiscovery: true
                      refreshInterval: "5m"
                    serviceDiscovery:
                      selector:
                        app.kubernetes.io/managed-by: kubevela
                      namespaces: ["default"]
                    cors:
                      enabled: true
                      origin: "*"
                    playground:
                      enabled: true
            providerConfigRef:
              kind: ClusterProviderConfig
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-graphql-service-account'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: graphql-service-account
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: ServiceAccount
                metadata:
                  name: '{{ $name }}-discovery-sa'
                  namespace: '{{ $name }}-graphql'
            providerConfigRef:
              kind: ClusterProviderConfig
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-graphql-cluster-role'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: graphql-cluster-role
          spec:
            forProvider:
              manifest:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRole
                metadata:
                  name: '{{ $name }}-discovery-role'
                rules:
                - apiGroups:
                  - serving.knative.dev
                  resources:
                  - services
                  verbs:
                  - get
                  - list
                  - watch
                - apiGroups:
                  - ''
                  resources:
                  - services
                  - endpoints
                  verbs:
                  - get
                  - list
                  - watch
                - apiGroups:
                  - apps
                  resources:
                  - deployments
                  verbs:
                  - get
                  - list
                  - watch
            providerConfigRef:
              kind: ClusterProviderConfig
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-graphql-cluster-role-binding'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: graphql-cluster-role-binding
          spec:
            forProvider:
              manifest:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRoleBinding
                metadata:
                  name: '{{ $name }}-discovery-binding'
                subjects:
                - kind: ServiceAccount
                  name: '{{ $name }}-discovery-sa'
                  namespace: '{{ $name }}-graphql'
                roleRef:
                  kind: ClusterRole
                  name: '{{ $name }}-discovery-role'
                  apiGroup: rbac.authorization.k8s.io
            providerConfigRef:
              kind: ClusterProviderConfig
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.m.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-graphql-network-policy'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: graphql-network-policy
          spec:
            forProvider:
              manifest:
                apiVersion: networking.k8s.io/v1
                kind: NetworkPolicy
                metadata:
                  name: '{{ $name }}-gateway-policy'
                  namespace: '{{ $name }}-graphql'
                spec:
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/component: graphql-gateway
                  policyTypes:
                  - Ingress
                  - Egress
                  ingress:
                  - from:
                    - namespaceSelector: {}
                    ports:
                    - protocol: TCP
                      port: 8080
                  egress:
                  - to: []
                    ports:
                    - protocol: TCP
                      port: 8080
                    - protocol: TCP
                      port: 443
                    - protocol: UDP
                      port: 53
            providerConfigRef:
              kind: ClusterProviderConfig
              name: kubernetes-provider
