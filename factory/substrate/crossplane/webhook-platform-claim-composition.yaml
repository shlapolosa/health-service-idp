# WebhookPlatformClaim Composition (#WH-1).
#
# Creates an outbound-webhook delivery platform in the <name>-webhook namespace:
#   - svix-server  (engine; svix/svix-server:v1.69.0, MIT) Deployment + Service
#   - Postgres     (svix metadata + delivery logs)         Deployment + Service + PVC + Secret
#   - Redis        (svix queue/retry backoff + cache)       Deployment + Service
#   - <name>-svix-credentials Secret  (SVIX_JWT_SECRET + SVIX_MAIN_SECRET + SVIX_ADMIN_TOKEN,
#                                      all MINTED at apply-time by the creds-init Job — never in git)
#   - App-Portal Gateway + VirtualService  <-- EXTERNALLY EXPOSED self-service UI + ingest API
#   - event-type reconcile Job (registers spec.eventTypes[] in Svix via REST, idempotent)
#
# SHAPE: identical provider-kubernetes Object wrapping as
# factory/substrate/crossplane/realtime-platform-claim-composition.yaml. Per the
# RT-COMPOSITION-V2 (#165) lesson, every composed resource is a CLUSTER-SCOPED
# kubernetes.crossplane.io/v1alpha1 Object with providerConfigRef.name: kubernetes-provider,
# and EACH manifest carries its own `namespace: <name>-webhook` (the XR is LegacyCluster /
# cluster-scoped, so it cannot supply a namespace to a namespaced .m. Object — that path
# 0/N-fails with "empty namespace may not be set"). Single `render` step only — no
# function-auto-ready (not installed; realtime uses one step too).
#
# SVIX ENV CONTRACT (verified against svix-server config.default.toml @ main, 2026-06-13):
#   Convention: every TOML key `foo` is settable as env var SVIX_FOO.
#   VERIFIED keys used below: SVIX_DB_DSN, SVIX_REDIS_DSN, SVIX_QUEUE_TYPE=redis,
#     SVIX_CACHE_TYPE=redis, SVIX_JWT_SECRET, SVIX_MAIN_SECRET, SVIX_LISTEN_ADDRESS.
#   NOT A SERVER ENV (left out, see comment at the engine block): the App-Portal public
#     base URL is a CLIENT concern (passed when minting a portal magic-link via the API),
#     NOT a svix-server env var. The earlier skeleton's SVIX_WHITELABEL_SETTINGS does not
#     exist in the config and was removed.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: webhook-platform-claim
  labels:
    crossplane.io/xrd: xwebhookplatformclaims.platform.example.org
    platform.example.org/composition: webhook-platform
spec:
  writeConnectionSecretsToNamespace: crossplane-system
  compositeTypeRef:
    apiVersion: platform.example.org/v1alpha1
    kind: XWebhookPlatformClaim
  mode: Pipeline
  pipeline:
  - step: render
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $spec := .observed.composite.resource.spec }}
          {{- $name := $spec.name }}
          {{- $ns := printf "%s-webhook" $name }}
          {{- $engineImage := $spec.engineImage | default "svix/svix-server:v1.69.0" }}
          {{- /* External host for the App Portal + ingest API — shared LB nip.io host. */}}
          {{- $portalHost := $spec.portalHost | default (printf "%s-webhook-portal.20.233.105.82.nip.io" $name) }}
          {{- /* App namespace = where the OAM Application (and the bridge that envFroms
                 <name>-conn) lives. The CD writes <name>-conn into context.namespace, which
                 Crossplane surfaces here as claimRef.namespace. Default "default" for the
                 common case + first-render (claimRef populated post-bind). The reconcile Job
                 patches <name>-conn THERE (not the engine ns) so the bridge sees the token. */}}
          {{- $appNs := dig "claimRef" "namespace" "default" $spec }}
          ---
          # --- Namespace ------------------------------------------------------
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-namespace'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-namespace
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: '{{ $ns }}'
                  labels:
                    app.kubernetes.io/part-of: webhook-platform
                    istio-injection: enabled
            providerConfigRef:
              name: kubernetes-provider
          ---
          # --- Postgres storage (PVC) -----------------------------------------
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-postgres-storage'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-postgres-storage
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: PersistentVolumeClaim
                metadata:
                  name: svix-postgres-storage
                  namespace: '{{ $ns }}'
                spec:
                  accessModes:
                  - ReadWriteOnce
                  storageClassName: default
                  resources:
                    requests:
                      storage: 5Gi
            providerConfigRef:
              name: kubernetes-provider
          ---
          # --- Postgres credentials Secret (svix/svix/svix; base64) -----------
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-postgres-secret'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-postgres-secret
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: svix-postgres-secret
                  namespace: '{{ $ns }}'
                type: Opaque
                stringData:
                  POSTGRES_DB: svix
                  POSTGRES_USER: svix
                  POSTGRES_PASSWORD: svix
            providerConfigRef:
              name: kubernetes-provider
          ---
          # --- Postgres Deployment --------------------------------------------
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-postgres'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-postgres
          spec:
            forProvider:
              manifest:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: '{{ $name }}-svix-postgres'
                  namespace: '{{ $ns }}'
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      app.kubernetes.io/name: svix-postgres
                  template:
                    metadata:
                      labels:
                        app.kubernetes.io/name: svix-postgres
                    spec:
                      securityContext:
                        runAsNonRoot: true
                        runAsUser: 999
                        fsGroup: 999
                      containers:
                      - name: postgres
                        image: postgres:16
                        ports:
                        - containerPort: 5432
                          name: postgres
                        env:
                        - name: POSTGRES_DB
                          value: svix
                        - name: POSTGRES_USER
                          value: svix
                        - name: POSTGRES_PASSWORD
                          value: svix
                        - name: PGDATA
                          value: /var/lib/postgresql/data/pgdata
                        volumeMounts:
                        - name: postgres-storage
                          mountPath: /var/lib/postgresql/data
                      volumes:
                      - name: postgres-storage
                        persistentVolumeClaim:
                          claimName: svix-postgres-storage
            providerConfigRef:
              name: kubernetes-provider
          ---
          # --- Postgres Service -----------------------------------------------
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-postgres-service'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-postgres-service
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: Service
                metadata:
                  name: '{{ $name }}-svix-postgres'
                  namespace: '{{ $ns }}'
                spec:
                  selector:
                    app.kubernetes.io/name: svix-postgres
                  ports:
                  - port: 5432
                    targetPort: 5432
                    name: postgres
            providerConfigRef:
              name: kubernetes-provider
          ---
          # --- Redis Deployment (queue/backoff + cache) -----------------------
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-redis'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-redis
          spec:
            forProvider:
              manifest:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: '{{ $name }}-svix-redis'
                  namespace: '{{ $ns }}'
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      app.kubernetes.io/name: svix-redis
                  template:
                    metadata:
                      labels:
                        app.kubernetes.io/name: svix-redis
                    spec:
                      securityContext:
                        runAsNonRoot: true
                        runAsUser: 999
                        fsGroup: 999
                      containers:
                      - name: redis
                        image: redis:7-alpine
                        # Persistence on so a restart doesn't wipe the in-flight
                        # delivery queue (svix recommends persistent redis).
                        args: ['redis-server', '--appendonly', 'yes']
                        ports:
                        - containerPort: 6379
                          name: redis
                        volumeMounts:
                        - name: redis-data
                          mountPath: /data
                      volumes:
                      - name: redis-data
                        emptyDir: {}
            providerConfigRef:
              name: kubernetes-provider
          ---
          # --- Redis Service --------------------------------------------------
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-redis-service'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-redis-service
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: Service
                metadata:
                  name: '{{ $name }}-svix-redis'
                  namespace: '{{ $ns }}'
                spec:
                  selector:
                    app.kubernetes.io/name: svix-redis
                  ports:
                  - port: 6379
                    targetPort: 6379
                    name: redis
            providerConfigRef:
              name: kubernetes-provider
          ---
          # === creds-init Job =================================================
          # Mints SVIX_JWT_SECRET + SVIX_MAIN_SECRET (random) and an admin JWT
          # (via `svix-server jwt generate`) into <name>-svix-credentials.
          # IDEMPOTENT: exits early if the Secret already carries the keys, so a
          # re-reconcile / pod restart never rotates a live token. NO secret values
          # in git — they are generated here at apply-time. Uses an in-cluster
          # ServiceAccount (svix-creds-init) bound to a Role that can read/create
          # the one Secret in this namespace.
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-creds-sa'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-creds-sa
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: ServiceAccount
                metadata:
                  name: svix-creds-init
                  namespace: '{{ $ns }}'
            providerConfigRef:
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-creds-role'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-creds-role
          spec:
            forProvider:
              manifest:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: Role
                metadata:
                  name: svix-creds-init
                  namespace: '{{ $ns }}'
                rules:
                - apiGroups: ['']
                  resources: ['secrets']
                  verbs: ['get', 'create', 'update', 'patch']
            providerConfigRef:
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-creds-rolebinding'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-creds-rolebinding
          spec:
            forProvider:
              manifest:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: svix-creds-init
                  namespace: '{{ $ns }}'
                subjects:
                - kind: ServiceAccount
                  name: svix-creds-init
                  namespace: '{{ $ns }}'
                roleRef:
                  kind: Role
                  name: svix-creds-init
                  apiGroup: rbac.authorization.k8s.io
            providerConfigRef:
              name: kubernetes-provider
          ---
          # Cross-namespace RBAC: the reconcile Job (SA svix-creds-init in the engine ns)
          # must patch the <name>-conn secret in the APP ns ({{ $appNs }}) where the bridge
          # envFroms it. Grant a Role THERE + a RoleBinding whose subject is the engine-ns SA.
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-conn-role'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-conn-role
          spec:
            forProvider:
              manifest:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: Role
                metadata:
                  name: '{{ $name }}-svix-conn-patch'
                  namespace: '{{ $appNs }}'
                rules:
                - apiGroups: ['']
                  resources: ['secrets']
                  verbs: ['get', 'patch', 'update']
            providerConfigRef:
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-conn-rolebinding'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-conn-rolebinding
          spec:
            forProvider:
              manifest:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: '{{ $name }}-svix-conn-patch'
                  namespace: '{{ $appNs }}'
                subjects:
                - kind: ServiceAccount
                  name: svix-creds-init
                  namespace: '{{ $ns }}'
                roleRef:
                  kind: Role
                  name: '{{ $name }}-svix-conn-patch'
                  apiGroup: rbac.authorization.k8s.io
            providerConfigRef:
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-creds-job'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-creds-job
          spec:
            forProvider:
              manifest:
                apiVersion: batch/v1
                kind: Job
                metadata:
                  name: '{{ $name }}-svix-creds-init'
                  namespace: '{{ $ns }}'
                  labels:
                    app.kubernetes.io/name: svix-creds-init
                    app.kubernetes.io/component: setup
                spec:
                  backoffLimit: 3
                  template:
                    metadata:
                      annotations:
                        sidecar.istio.io/inject: 'false'
                    spec:
                      serviceAccountName: svix-creds-init
                      restartPolicy: OnFailure
                      securityContext:
                        runAsNonRoot: true
                        runAsUser: 1000
                      # BUG-A FIX (2026-06-13): the previous in-shell HMAC mint
                      # (openssl over a hand-built {"iss","sub","iat","exp"} payload)
                      # produced a token the server rejected with 401
                      # "Invalid token". ROOT CAUSE (verified against svix-server
                      # @ v1.69.0 src/core/security.rs + src/main.rs): svix-server
                      # signs/verifies with the `jwt_simple` crate, whose Claims
                      # ALSO carry auto-generated `nbf`, `iat`, `exp` AND a `jti`
                      # nonce, serialized in jwt_simple's own canonical form.
                      # verify_token() is strict — a naive shell-built payload can
                      # NEVER reproduce the exact signed bytes, so the HMAC never
                      # matches. The ONLY by-construction-valid mint is the server's
                      # OWN `svix-server jwt generate` CLI, run with the SAME
                      # SVIX_JWT_SECRET. cfg::load() builds jwt_signing_config from
                      # SVIX_JWT_SECRET via HS256Key::from_bytes(secret.as_bytes())
                      # (raw utf-8). The CLI loads cfg but `jwt generate` calls only
                      # generate_org_token() — it never opens DB/Redis, and
                      # config.default.toml supplies a default db_dsn, so no backing
                      # service is needed; we also leave SVIX_CACHE_TYPE/QUEUE_TYPE
                      # unset so they default to memory (no redis_dsn required).
                      #
                      # initContainers run IN ORDER before the main container:
                      #   1. seed-secrets (alpine/k8s): random JWT + MAIN secrets ->
                      #      shared emptyDir. (svix image lacks openssl; generate
                      #      the secrets here.) Skips re-gen entirely if the live
                      #      Secret already exists (idempotent — never rotate).
                      #   2. mint-token (svix image): `svix-server jwt generate`
                      #      reads SVIX_JWT_SECRET=$(cat /seed/jwt_secret) and prints
                      #      "Token (Bearer): <jwt>" -> we strip the prefix into
                      #      /seed/admin_token. Token + server now agree by
                      #      construction.
                      #   3. main (alpine/k8s): kubectl create the credentials Secret
                      #      from the seeded files (idempotent: skip if it exists).
                      initContainers:
                      - name: seed-secrets
                        image: alpine/k8s:1.28.4
                        command:
                        - sh
                        - -c
                        - |
                          set -e
                          # Idempotent: if the live Secret already exists, leave the
                          # seed dir EMPTY of fresh secrets and instead re-seed from
                          # the existing Secret so we never rotate a live key/token.
                          if kubectl get secret "$SECRET_NAME" -n "$NS" >/dev/null 2>&1; then
                            echo "$SECRET_NAME exists — re-seeding from live Secret (no rotation)"
                            kubectl get secret "$SECRET_NAME" -n "$NS" \
                              -o jsonpath='{.data.SVIX_JWT_SECRET}'  | base64 -d > /seed/jwt_secret
                            kubectl get secret "$SECRET_NAME" -n "$NS" \
                              -o jsonpath='{.data.SVIX_MAIN_SECRET}' | base64 -d > /seed/main_secret
                            kubectl get secret "$SECRET_NAME" -n "$NS" \
                              -o jsonpath='{.data.SVIX_ADMIN_TOKEN}' | base64 -d > /seed/admin_token
                            touch /seed/existed
                            exit 0
                          fi
                          head -c 32 /dev/urandom | base64 | tr -d '/+=' | head -c 40 > /seed/jwt_secret
                          head -c 32 /dev/urandom | base64 | tr -d '/+=' | head -c 40 > /seed/main_secret
                          echo "seeded fresh SVIX_JWT_SECRET + SVIX_MAIN_SECRET"
                        env:
                        - name: SECRET_NAME
                          value: '{{ $name }}-svix-credentials'
                        - name: NS
                          value: '{{ $ns }}'
                        volumeMounts:
                        - name: seed
                          mountPath: /seed
                      - name: mint-token
                        image: '{{ $engineImage }}'   # svix/svix-server:v1.69.0 — pinned (HARD-3)
                        command:
                        - sh
                        - -c
                        - |
                          set -e
                          # If step 1 re-seeded a live token, do NOT re-mint (no rotation).
                          if [ -f /seed/existed ]; then
                            echo "live admin token preserved — skipping mint"
                            exit 0
                          fi
                          # `svix-server jwt generate` signs with this exact secret,
                          # so the server (same secret) verifies it. Output line is
                          # literally "Token (Bearer): <jwt>"; strip the prefix.
                          export SVIX_JWT_SECRET="$(cat /seed/jwt_secret)"
                          OUT="$(svix-server jwt generate "$ORG_ID")"
                          # Strip the "Token (Bearer): " prefix; printf (no trailing
                          # newline) so the Secret value is the EXACT token bytes.
                          TOKEN="$(echo "$OUT" | sed -n 's/^Token (Bearer): //p' | head -1)"
                          [ -n "$TOKEN" ]
                          printf '%s' "$TOKEN" > /seed/admin_token
                          test -s /seed/admin_token
                          echo "minted admin JWT via svix-server jwt generate"
                        env:
                        # Svix default org id (security.rs default_org_id()); org-level
                        # token => admin. Passed explicitly for determinism.
                        - name: ORG_ID
                          value: 'org_23rb8YdGqMT0qIzpgGwdXfHirMu'
                        # `jwt generate` validates the FULL config, not just jwt_secret:
                        # the image defaults queue_type=redis + cache_type=redis, which
                        # demand a redis_dsn we don't have at mint time. Force in-memory
                        # so validation passes with only SVIX_JWT_SECRET. (Mint needs no
                        # real queue/cache — it just HS256-signs an org token.)
                        - name: SVIX_QUEUE_TYPE
                          value: 'memory'
                        - name: SVIX_CACHE_TYPE
                          value: 'memory'
                        volumeMounts:
                        - name: seed
                          mountPath: /seed
                      containers:
                      - name: apply
                        image: alpine/k8s:1.28.4
                        command:
                        - sh
                        - -c
                        - |
                          set -e
                          # Idempotent: never overwrite a live Secret.
                          if kubectl get secret "$SECRET_NAME" -n "$NS" >/dev/null 2>&1; then
                            echo "$SECRET_NAME already exists — leaving live credentials untouched"
                            exit 0
                          fi
                          kubectl create secret generic "$SECRET_NAME" -n "$NS" \
                            --from-file=SVIX_JWT_SECRET=/seed/jwt_secret \
                            --from-file=SVIX_MAIN_SECRET=/seed/main_secret \
                            --from-file=SVIX_ADMIN_TOKEN=/seed/admin_token
                          echo "created $SECRET_NAME (admin JWT minted by svix-server jwt generate)"
                        env:
                        - name: SECRET_NAME
                          value: '{{ $name }}-svix-credentials'
                        - name: NS
                          value: '{{ $ns }}'
                        volumeMounts:
                        - name: seed
                          mountPath: /seed
                      volumes:
                      # Shared scratch across init + main containers; never persisted.
                      - name: seed
                        emptyDir: {}
            providerConfigRef:
              name: kubernetes-provider
          ---
          # --- Svix engine Deployment -----------------------------------------
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-svix'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-svix
          spec:
            forProvider:
              manifest:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: '{{ $name }}-svix'
                  namespace: '{{ $ns }}'
                  labels:
                    app.kubernetes.io/name: svix-server
                    # Data-plane proof hook: a contract-test can exercise the live
                    # engine (create app+endpoint, send msg, assert delivery).
                    contract-test.cafe.io/enabled: 'true'
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      app.kubernetes.io/name: svix-server
                  template:
                    metadata:
                      labels:
                        app.kubernetes.io/name: svix-server
                    spec:
                      securityContext:
                        runAsNonRoot: true
                        runAsUser: 1000
                      # Wait for postgres + the creds secret before booting svix.
                      initContainers:
                      - name: wait-postgres
                        image: postgres:16
                        command:
                        - sh
                        - -c
                        - |
                          until pg_isready -h {{ $name }}-svix-postgres -U svix; do
                            echo "waiting for postgres..."; sleep 3
                          done
                      containers:
                      - name: svix-server
                        image: '{{ $engineImage }}'   # HARD-3: pinned, never :latest
                        ports:
                        - containerPort: 8071
                        env:
                        # DB/Redis DSNs point at this composition's own services.
                        - name: SVIX_DB_DSN
                          value: 'postgresql://svix:svix@{{ $name }}-svix-postgres.{{ $ns }}.svc.cluster.local:5432/svix'
                        - name: SVIX_REDIS_DSN
                          value: 'redis://{{ $name }}-svix-redis.{{ $ns }}.svc.cluster.local:6379'
                        - name: SVIX_QUEUE_TYPE
                          value: redis
                        - name: SVIX_CACHE_TYPE
                          value: redis
                        - name: SVIX_LISTEN_ADDRESS
                          value: '0.0.0.0:8071'
                        # Secrets minted by the creds-init Job (never in git).
                        - name: SVIX_JWT_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: '{{ $name }}-svix-credentials'
                              key: SVIX_JWT_SECRET
                        - name: SVIX_MAIN_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: '{{ $name }}-svix-credentials'
                              key: SVIX_MAIN_SECRET
                        # NOTE (open question, verified): svix-server has NO env var
                        # for the App-Portal PUBLIC base URL. The portal URL is supplied
                        # by the CLIENT when minting a magic-link via POST /api/v1/app/
                        # {app}/dashboard (the bridge / portal-launcher passes
                        # WEBHOOK_PORTAL_URL from the <name>-conn secret). The external
                        # host is fronted by the Istio Gateway/VirtualService below.
                        resources:
                          requests:
                            memory: 128Mi
                            cpu: 100m
                          limits:
                            memory: 512Mi
                            cpu: 500m
            providerConfigRef:
              name: kubernetes-provider
          ---
          # --- Svix engine Service --------------------------------------------
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-svix-svc'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-svix-svc
          spec:
            forProvider:
              manifest:
                apiVersion: v1
                kind: Service
                metadata:
                  name: '{{ $name }}-svix'
                  namespace: '{{ $ns }}'
                spec:
                  selector:
                    app.kubernetes.io/name: svix-server
                  ports:
                  - name: http
                    port: 8071
                    targetPort: 8071
            providerConfigRef:
              name: kubernetes-provider
          ---
          # === EXTERNALLY-EXPOSED self-service App Portal =====================
          # Istio Gateway on the shared ingressgateway, bound to the external nip.io
          # host. This makes endpoint/key self-management reachable by third parties
          # WITHOUT platform-team involvement. Mirrors the realtime mqtt/lenses
          # Gateway/VirtualService (shared `istio: ingressgateway` selector).
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-portal-gateway'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-portal-gateway
          spec:
            forProvider:
              manifest:
                apiVersion: networking.istio.io/v1beta1
                kind: Gateway
                metadata:
                  name: webhook-portal-gateway
                  namespace: '{{ $ns }}'
                spec:
                  selector:
                    istio: ingressgateway
                  servers:
                  - port:
                      number: 80
                      name: http
                      protocol: HTTP
                    hosts:
                    - '{{ $portalHost }}'
            providerConfigRef:
              name: kubernetes-provider
          ---
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-portal-virtualservice'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-portal-virtualservice
          spec:
            forProvider:
              manifest:
                apiVersion: networking.istio.io/v1beta1
                kind: VirtualService
                metadata:
                  name: webhook-portal-virtualservice
                  namespace: '{{ $ns }}'
                spec:
                  hosts:
                  - '{{ $portalHost }}'
                  gateways:
                  - webhook-portal-gateway
                  http:
                  # The Svix server serves BOTH the REST API (/api) and the App-Portal
                  # SPA + magic-link session endpoints on the same port. One external
                  # host fronts both:
                  #  - external consumers hit the portal (magic-link UI) to self-manage
                  #    their endpoints + signing keys
                  #  - the registration/ingest REST API is the same origin and can ALSO
                  #    be published through APIM (expose-api) for programmatic
                  #    registration (see plan §APIM).
                  - route:
                    - destination:
                        host: '{{ $name }}-svix.{{ $ns }}.svc.cluster.local'
                        port:
                          number: 8071
            providerConfigRef:
              name: kubernetes-provider
          ---
          # === platform-bootstrap reconcile Job ==============================
          # Runs AFTER the engine is up (it waits on /health). Three jobs in one,
          # all idempotent, all with a token that actually validates (BUG-A fix):
          #
          #  1) SHARED APP (#5): create-or-get the platform Svix "application"
          #     (uid `platform-events`). This is the ONE app the bridge posts to
          #     and that external consumers register endpoints on (event-type-
          #     filtered fan-out). POST /api/v1/app with a uid is create-or-return.
          #
          #  2) EVENT TYPES (BUG-B fix): the old reconcile used a PUT-then-POST that
          #     never actually created the types (PUT-by-name 404s pre-create on this
          #     Svix, and the `|| POST` was masked by `set -e`). Now we POST each
          #     declared type and treat a 409 "already exists" as success, so the
          #     types are really registered (had to be hand-created live before).
          #
          #  3) CONN PATCH (#5): write WEBHOOK_APP_ID + WEBHOOK_ADMIN_TOKEN +
          #     WEBHOOK_ENGINE_API into BOTH <name>-svix-credentials AND <name>-conn,
          #     so the bridge gets EVERYTHING from one `envFrom: <name>-conn`. The
          #     <name>-conn secret is created by the CD (pure-CUE) with the static
          #     URLs; here we add the runtime app-id + token (never in git).
          #
          # Always runs (even with no eventTypes) because the shared-app + conn-patch
          # are required for the bridge regardless of declared types.
          apiVersion: kubernetes.crossplane.io/v1alpha1
          kind: Object
          metadata:
            name: '{{ $name }}-webhook-bootstrap-reconcile'
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: webhook-bootstrap-reconcile
          spec:
            forProvider:
              manifest:
                apiVersion: batch/v1
                kind: Job
                metadata:
                  name: '{{ $name }}-svix-bootstrap-reconcile'
                  namespace: '{{ $ns }}'
                  labels:
                    app.kubernetes.io/name: svix-bootstrap-reconcile
                    app.kubernetes.io/component: setup
                spec:
                  backoffLimit: 5
                  template:
                    metadata:
                      annotations:
                        sidecar.istio.io/inject: 'false'
                    spec:
                      # Reuse the creds-init SA (secrets get/create/update/patch in this ns).
                      serviceAccountName: svix-creds-init
                      restartPolicy: OnFailure
                      containers:
                      - name: reconcile
                        # alpine/k8s ships BOTH kubectl (conn patch) and curl (Svix REST).
                        image: alpine/k8s:1.28.4
                        env:
                        - name: SVIX_ADMIN_TOKEN
                          valueFrom:
                            secretKeyRef:
                              name: '{{ $name }}-svix-credentials'
                              key: SVIX_ADMIN_TOKEN
                        - name: API
                          value: 'http://{{ $name }}-svix.{{ $ns }}.svc.cluster.local:8071/api/v1'
                        - name: ENGINE_API
                          value: 'http://{{ $name }}-svix.{{ $ns }}.svc.cluster.local:8071/api/v1'
                        - name: APP_UID
                          value: 'platform-events'
                        - name: NS
                          value: '{{ $ns }}'
                        - name: CONN_SECRET
                          value: '{{ $name }}-conn'
                        # The <name>-conn secret lives in the APP namespace (where the
                        # bridge runs + envFroms it), NOT the engine ns. The CD writes it
                        # into context.namespace == claimRef.namespace.
                        - name: CONN_NS
                          value: '{{ $appNs }}'
                        - name: CREDS_SECRET
                          value: '{{ $name }}-svix-credentials'
                        command:
                        - sh
                        - -c
                        - |
                          set -e
                          AUTH="Authorization: Bearer $SVIX_ADMIN_TOKEN"
                          CT='Content-Type: application/json'

                          echo "waiting for svix api..."
                          until curl -fsS "$API/health/" >/dev/null 2>&1 || curl -fsS "${API%/api/v1}/health" >/dev/null 2>&1; do
                            sleep 3
                          done

                          # 1) Shared app: POST with a uid is create-or-return on Svix.
                          #    Capture the canonical app id from the response.
                          APP_RESP=$(curl -fsS -X POST "$API/app/" -H "$AUTH" -H "$CT" \
                            -d "{\"name\":\"platform-events\",\"uid\":\"$APP_UID\"}" 2>/dev/null || true)
                          APP_ID=$(printf '%s' "$APP_RESP" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -1)
                          # On a re-run the create may 409/return differently; fall back to GET by uid.
                          if [ -z "$APP_ID" ]; then
                            APP_RESP=$(curl -fsS "$API/app/$APP_UID/" -H "$AUTH" 2>/dev/null || true)
                            APP_ID=$(printf '%s' "$APP_RESP" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -1)
                          fi
                          # The uid itself is a valid addressing key for /app/<uid>/msg,
                          # so fall back to it if the id parse failed.
                          [ -n "$APP_ID" ] || APP_ID="$APP_UID"
                          echo "shared app ready: $APP_ID"

                          # 2) Event types: POST each; 409 (exists) is success.
                          reg() {
                            NAME="$1"; DESC="$2"
                            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/event-type/" \
                              -H "$AUTH" -H "$CT" \
                              -d "{\"name\":\"$NAME\",\"description\":\"$DESC\"}")
                            case "$code" in
                              2*) echo "event-type $NAME created" ;;
                              409) echo "event-type $NAME already exists" ;;
                              *)   echo "event-type $NAME register HTTP $code (continuing)" ;;
                            esac
                          }
                          {{- range $e := $spec.eventTypes }}
                          reg "{{ $e.name }}" "{{ $e.description | default $e.name }}"
                          {{- end }}

                          # 3) Publish runtime binding into BOTH secrets so the bridge
                          #    envFroms ONE secret (<name>-conn) and gets everything.
                          #    Build the merge-patch JSON inline (no heredoc — keeps the
                          #    YAML literal-scalar indentation simple + unambiguous).
                          PATCH="{\"stringData\":{\"WEBHOOK_APP_ID\":\"$APP_ID\",\"WEBHOOK_ADMIN_TOKEN\":\"$SVIX_ADMIN_TOKEN\",\"WEBHOOK_ENGINE_API\":\"$ENGINE_API\"}}"
                          # CREDS secret lives in the engine ns; CONN secret lives in the
                          # APP ns (bridge envFroms it there). Patch each in its own ns.
                          kubectl patch secret "$CREDS_SECRET" -n "$NS" --type merge -p "$PATCH"
                          echo "patched $CREDS_SECRET (-n $NS) with WEBHOOK_APP_ID/ADMIN_TOKEN/ENGINE_API"
                          kubectl patch secret "$CONN_SECRET" -n "$CONN_NS" --type merge -p "$PATCH"
                          echo "patched $CONN_SECRET (-n $CONN_NS) with WEBHOOK_APP_ID/ADMIN_TOKEN/ENGINE_API"
                          echo "webhook bootstrap reconcile complete"
                        resources:
                          requests:
                            memory: 64Mi
                            cpu: 50m
                          limits:
                            memory: 128Mi
                            cpu: 100m
            providerConfigRef:
              name: kubernetes-provider
