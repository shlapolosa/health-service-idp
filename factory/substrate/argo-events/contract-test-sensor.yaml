---
# HARD-4 (#171): per-component-type post-deploy CONTRACT TEST on ksvc readiness.
#
# WHY this exists: components ship "Ready" without data-plane proof. RT-1 was
# green for days while ZERO telemetry flowed — a Knative readiness probe proves
# the TRANSPORT (the pod accepts connections) but NOT the PIPELINE (a real message
# travels consume->broadcast->ws, ingest->topic, or processor->transform->topic).
# During RT-1 we hand-ran "rt1-flow" (an in-cluster pod using aiokafka+websockets
# that produced a marker to the consumed topic and asserted it arrived on /ws).
# This sensor PRODUCTISES that hand-run: when a labelled ksvc becomes Ready it
# fires a contract-test Job (factory/substrate/contract-tests/runner.py) that runs
# the type-appropriate data-plane proof and emits a one-line JSON verdict.
#
# DESIGN — mirrors EVENT-2 (ksvc-ready-apim-publish.yaml) EXACTLY:
#   * same resource EventSource shape watching serving.knative.dev/services (UPDATE),
#   * same Ready==True gjson array filter,
#   * same k8s `create` Job trigger parameterised from the ksvc event payload.
# It does NOT touch EVENT-2's SA/RBAC or any existing sensor — it stands up its
# OWN SA (contract-test-event-sa) so the two are independent. The Job reads creds
# at RUNTIME via envFrom the component's <comp>-conn secret (public-repo safe).
#
# DETECTION (how the component type/role is keyed) — stated explicitly:
#   * type  = the ksvc's `app.kubernetes.io/component` label (stamped by every CD:
#             realtime-service / graphql-gateway / webservice) -> CHECK_TYPE.
#   * role  = (realtime only) the `realtime-service.oam.dev/role` annotation if the
#             CD stamps it -> CHECK_ROLE; absent, runner.py infers it from the
#             CONSUME_*/PRODUCE_*/WEBSOCKET env (gateway/ingest/processor).
#   * app   = `app.oam.dev/name` label (KubeVela-stamped) -> COMPONENT_APP, used
#             only for the Job's idempotency name + result label.
#
# SCOPE: the EventSource label filter opts in ONLY ksvcs that asked for a contract
# test via `contract-test.cafe.io/enabled: "true"`. (That label is NOT yet stamped
# by any CD — a follow-up CD change, owned by other agents, adds it. Until then this
# sensor is inert: no Jobs fire, nothing existing changes. See the README.)
#
# IDEMPOTENCY: the Job is named deterministically per component+revision
#   ct-<component>-<revision-hash>
# from the ksvc's `serving.knative.dev/configurationGeneration` label, so repeated
# Ready flaps of the SAME revision do not stack Jobs (a create of an existing name
# is rejected — safe no-op). A genuinely new revision gets a new name and re-tests.
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: contract-test-watcher
  namespace: argo-events
spec:
  template:
    serviceAccountName: contract-test-event-sa
  resource:
    contract-test-ksvc:
      namespace: default
      group: serving.knative.dev
      version: v1
      resource: services
      eventTypes:
        - UPDATE
      # Opt-in: only ksvcs labelled contract-test.cafe.io/enabled=true. Keeps the
      # watch + bus traffic scoped and makes the contract test strictly additive
      # (no labelled services today => zero behaviour change).
      filter:
        labels:
          - key: contract-test.cafe.io/enabled
            operation: "=="
            value: "true"
---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: contract-test-on-ready
  namespace: argo-events
spec:
  template:
    serviceAccountName: contract-test-event-sa
  dependencies:
    - name: contract-test-dep
      eventSourceName: contract-test-watcher
      eventName: contract-test-ksvc
      # Fire only when the Knative Ready condition is True (same gjson array filter
      # idiom as EVENT-2: pick conditions[type=="Ready"], compare .status).
      filters:
        dataLogicalOperator: "and"
        data:
          - path: 'body.status.conditions.#(type=="Ready").status'
            type: string
            value:
              - "True"
  triggers:
    - template:
        name: contract-test-trigger
        k8s:
          operation: create
          source:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                # Deterministic name (overridden per-event via parameters below):
                # ct-<component>-<configurationGeneration>. A re-fire for the same
                # revision tries to create the same name and is rejected (no stack).
                name: ct-PLACEHOLDER
                namespace: default
                labels:
                  app.kubernetes.io/component: contract-test
                  app.kubernetes.io/managed-by: argo-events
                  contract-test.cafe.io/source: sensor
              spec:
                ttlSecondsAfterFinished: 1800
                backoffLimit: 0          # one shot — a contract test is pass/fail, not retry-to-green
                template:
                  metadata:
                    labels:
                      app.kubernetes.io/component: contract-test
                  spec:
                    restartPolicy: Never
                    securityContext:
                      runAsNonRoot: true
                      runAsUser: 1000
                    containers:
                      - name: contract-test
                        # Pinned to the immutable sha tag (HARD-3 rule: never
                        # :latest). Bump this tag when
                        # .github/workflows/contract-test-runner-ci.yml pushes
                        # a new runner build.
                        image: healthidpuaeacr.azurecr.io/contract-test-runner:de7e599
                        # The component's normalized connection secret. envFrom it
                        # so KAFKA_BOOTSTRAP_SERVERS + CONSUME_*/PRODUCE_* + any APIM
                        # sub-key land as env at RUNTIME (never baked in the image).
                        # optional:true => a component with no -conn secret (e.g. a
                        # plain webservice/health check) still runs.
                        envFrom:
                          - secretRef:
                              name: PLACEHOLDER-conn
                              optional: true
                        env:
                          # All overridden per-event from the ksvc payload below.
                          - name: COMPONENT_NAME
                            value: PLACEHOLDER_SVC
                          - name: COMPONENT_NS
                            value: default
                          - name: COMPONENT_APP
                            value: ""
                          - name: CHECK_TYPE
                            value: "webservice"
                          - name: CHECK_ROLE
                            value: ""
                          # KSVC_URL intentionally NOT set: runner.py's load_config
                          # computes http://<COMPONENT_NAME>.<COMPONENT_NS>.svc.cluster.local
                          # itself, so we avoid brittle string-concat across params.
                          - name: WS_TOKEN
                            value: "ct-probe"
                          - name: CONTRACT_TIMEOUT
                            value: "60"
                          # APIM mode is OFF in-cluster by default. To exercise the
                          # external path, a CD/annotation can set these (env flag).
                          - name: APIM_MODE
                            value: "false"
                          # Topic bindings (live finding, first fire): the per-topic
                          # CONSUME_*/PRODUCE_* vars live on the COMPONENT ksvc env,
                          # NOT in its -conn secret, so envFrom doesn't carry them.
                          # The params below extract them from the ksvc event payload
                          # (gjson array query) into these aggregates; runner.py
                          # parses the JSON-array value.
                          - name: CONSUME_TOPICS
                            value: ""
                          - name: PRODUCE_TOPICS
                            value: ""
                          - name: WEBSOCKET
                            value: ""
          # Per-event parameterisation: stamp the Job from the ksvc event payload.
          # `value:` on each src is the fallback when the field/annotation is absent.
          parameters:
            # --- idempotent Job name: ct-<latestCreatedRevisionName> ---
            # (live finding, fifth fire: the configurationGeneration LABEL does not
            # exist on the ksvc top-level payload — the old key always fell back to
            # "0", so ONE Job per component ever existed and re-fires for new
            # revisions were rejected; the Job also raced the rollout and tested the
            # OLD revision. status.latestCreatedRevisionName IS in the payload and
            # is unique per revision: same revision => same name => no stacking;
            # new revision => new name => re-test.)
            - src:
                dependencyName: contract-test-dep
                dataKey: body.status.latestCreatedRevisionName
                value: "unknown-rev"
              dest: metadata.name
              operation: overwrite
            - src:
                dependencyName: contract-test-dep
                value: "ct-"
              dest: metadata.name
              operation: prepend
            # namespace for the Job itself
            - src:
                dependencyName: contract-test-dep
                dataKey: body.metadata.namespace
              dest: metadata.namespace
            # envFrom secretRef = the component's OWN first envFrom secret from the
            # ksvc payload (live finding, second fire: the realtime BINDING secret
            # is the PLATFORM's <realtime>-conn — e.g. rtdemo-stream-conn — not
            # <component>-conn, which doesn't exist; the empty mount left
            # KAFKA_BOOTSTRAP_SERVERS blank). Fallback to a harmless nonexistent
            # name (optional:true) when the ksvc has no envFrom at all.
            - src:
                dependencyName: contract-test-dep
                dataKey: body.spec.template.spec.containers.0.envFrom.0.secretRef.name
                value: "contract-test-no-conn"
              dest: spec.template.spec.containers.0.envFrom.0.secretRef.name
              operation: overwrite
            # COMPONENT_NAME (env 0)
            - src:
                dependencyName: contract-test-dep
                dataKey: body.metadata.name
              dest: spec.template.spec.containers.0.env.0.value
            # COMPONENT_NS (env 1)
            - src:
                dependencyName: contract-test-dep
                dataKey: body.metadata.namespace
              dest: spec.template.spec.containers.0.env.1.value
            # COMPONENT_APP (env 2) <- app.oam.dev/name label
            - src:
                dependencyName: contract-test-dep
                dataKey: body.metadata.labels.app\.oam\.dev/name
                value: ""
              dest: spec.template.spec.containers.0.env.2.value
            # CHECK_TYPE (env 3) <- app.kubernetes.io/component label
            - src:
                dependencyName: contract-test-dep
                dataKey: body.metadata.labels.app\.kubernetes\.io/component
                value: "webservice"
              dest: spec.template.spec.containers.0.env.3.value
            # CHECK_ROLE (env 4) <- realtime-service.oam.dev/role annotation (optional)
            - src:
                dependencyName: contract-test-dep
                dataKey: body.metadata.annotations.realtime-service\.oam\.dev/role
                value: ""
              dest: spec.template.spec.containers.0.env.4.value
            # CONSUME_TOPICS (env 8) <- gjson array of the ksvc's CONSUME_* env values
            - src:
                dependencyName: contract-test-dep
                dataKey: 'body.spec.template.spec.containers.0.env.#(name%"CONSUME_*")#.value'
                value: ""
              dest: spec.template.spec.containers.0.env.8.value
            # PRODUCE_TOPICS (env 9) <- gjson array of the ksvc's PRODUCE_* env values
            - src:
                dependencyName: contract-test-dep
                dataKey: 'body.spec.template.spec.containers.0.env.#(name%"PRODUCE_*")#.value'
                value: ""
              dest: spec.template.spec.containers.0.env.9.value
            # WEBSOCKET (env 10) <- the ksvc's WEBSOCKET_ENABLED env value
            - src:
                dependencyName: contract-test-dep
                dataKey: 'body.spec.template.spec.containers.0.env.#(name=="WEBSOCKET_ENABLED").value'
                value: ""
              dest: spec.template.spec.containers.0.env.10.value
          retryStrategy:
            steps: 3
            duration: "3s"
            factor: 2
---
# ServiceAccount for the EventSource (watch ksvc) + Sensor (create the Job).
# Independent of EVENT-2's apim-publish-event-sa so neither owns the other.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: contract-test-event-sa
  namespace: argo-events
---
# EventSource side: watch Knative Services cluster-wide (list/watch) + emit Events.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: contract-test-event-role
rules:
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: contract-test-event-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: contract-test-event-role
subjects:
  - kind: ServiceAccount
    name: contract-test-event-sa
    namespace: argo-events
---
# Sensor side, namespaced to `default`: create the contract-test Job and READ the
# <comp>-conn secret it envFroms. Least privilege: jobs (create/get/list/delete)
# and secrets (get/list) ONLY — it creates nothing else.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: contract-test-job-creator
  namespace: default
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: contract-test-job-creator-binding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: contract-test-job-creator
subjects:
  - kind: ServiceAccount
    name: contract-test-event-sa
    namespace: argo-events
