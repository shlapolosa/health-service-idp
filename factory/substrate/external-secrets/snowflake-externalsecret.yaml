# ANALYTICS-PLATFORM: shared-default Snowflake warehouse credentials (GitOps).
#
# This is the GitOps-applied warehouse secret — the shared `snowflake-conn` that
# exists cluster-side regardless of whether an OAM declares a `snowflake`
# component or an `analytics-platform` overlay (both of those render their OWN
# per-instance ExternalSecret with the same shape; THIS one is the platform
# default so the credentialsSecret is always resolvable).
#
# Source: Azure Key Vault kv-socrates-6706 via the azure-keyvault
# ClusterSecretStore (see azure-keyvault-store.yaml). apiVersion matches the
# platform's ESO (v2.5 → external-secrets.io/v1), the SAME version used by
# azure-keyvault-store.yaml and auth0-idp.cd.yaml.
#
# Emitted snowflake-conn keys:
#   SNOWFLAKE_ACCOUNT      <- KV  snowflake-account
#   SNOWFLAKE_USER         <- KV  snowflake-user
#   SNOWFLAKE_PRIVATE_KEY  <- KV  snowflake-private-key
#   SNOWFLAKE_DATABASE     =  INGEST   (literal)
#   SNOWFLAKE_SCHEMA       =  INGEST   (literal)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: snowflake-conn
  namespace: default
  labels:
    binding.cafe.io/category: warehouse
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    name: snowflake-conn
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SNOWFLAKE_ACCOUNT: "{{ .account }}"
        SNOWFLAKE_USER: "{{ .user }}"
        SNOWFLAKE_PRIVATE_KEY: "{{ .privateKey }}"
        # DATABASE/SCHEMA are literals, not Key Vault secrets.
        SNOWFLAKE_DATABASE: "INGEST"
        SNOWFLAKE_SCHEMA: "INGEST"
  data:
    - secretKey: account
      remoteRef:
        key: snowflake-account
    - secretKey: user
      remoteRef:
        key: snowflake-user
    - secretKey: privateKey
      remoteRef:
        key: snowflake-private-key
