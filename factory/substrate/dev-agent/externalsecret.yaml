# DEV-AGENT W2: SKELETON ExternalSecret for the dev-agent credentials.
#
# *** PLACEHOLDERS ONLY — NO REAL VALUES. Uncomment + fill when wiring ESO. ***
#
# ENGINE SWAP: the coding engine is opencode (GPT-5.4 via the Azure APIM gateway,
# openai-compatible). The agent therefore needs APIM_SUBSCRIPTION_KEY (the
# long-lived APIM gateway subscription key — preferred over the 1h SP JWT for
# unattended use) — NOT ANTHROPIC_API_KEY.
#
# Target Secret: dev-agent-secrets (envFrom'd by the sensor-created Job):
#   GITHUB_TOKEN          -> Key Vault secret: dev-agent-github-token
#                            (Socrates-FactoryBot installation token or PAT with
#                             repo scope on shlapolosa/<app> + <app>-gitops)
#   APIM_SUBSCRIPTION_KEY -> Key Vault secret: dev-agent-apim-subscription-key
#                            (sent as header Ocp-Apim-Subscription-Key by
#                             opencode.json {env:APIM_SUBSCRIPTION_KEY})
#
# Key Vault: kv-socrates-6706 (rg-ai-usecase-poc) — same vault as the
# Capability Factory secrets. The ClusterSecretStore name below must match the
# one already used by the platform's ESO install.
#
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: dev-agent-secrets
#   namespace: dev-agent-system
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     kind: ClusterSecretStore
#     name: azure-keyvault            # <-- match the existing platform store
#   target:
#     name: dev-agent-secrets
#     creationPolicy: Owner
#   data:
#     - secretKey: GITHUB_TOKEN
#       remoteRef:
#         key: dev-agent-github-token             # <-- create in Key Vault first
#     - secretKey: APIM_SUBSCRIPTION_KEY
#       remoteRef:
#         key: dev-agent-apim-subscription-key    # <-- create in Key Vault first
#
# Until ESO is wired, a manual (NEVER committed) secret unblocks testing:
#   kubectl -n dev-agent-system create secret generic dev-agent-secrets \
#     --from-literal=GITHUB_TOKEN=... --from-literal=APIM_SUBSCRIPTION_KEY=...
apiVersion: v1
kind: ConfigMap
metadata:
  name: dev-agent-secrets-readme
  namespace: dev-agent-system
data:
  note: |
    dev-agent-secrets is NOT managed in git. It carries GITHUB_TOKEN +
    APIM_SUBSCRIPTION_KEY (engine = opencode/GPT-5.4 via APIM; NO Anthropic key).
    See the commented ExternalSecret skeleton in
    factory/substrate/dev-agent/externalsecret.yaml.
