# DEV-AGENT W2: egress lockdown for the dev-agent Job pods.
#
# ENGINE SWAP (security-critical): the coding engine is opencode (GPT-5.4 via the
# Azure APIM gateway). The LLM egress target is therefore the APIM host, NOT
# Anthropic. api.anthropic.com is DROPPED from the intended allowlist; the APIM
# gateway host is ADDED. Direct-to-Foundry is blocked anyway (401) — all model
# traffic MUST go through APIM.
#
# INTENT (the allowlist this policy approximates):
#   ALLOW  github.com                                  (clone / push)
#   ALLOW  aigw-apim-dev-w4x7ibwk4e2is.azure-api.net   (GPT-5.4 via APIM, 443)
#   ALLOW  kube-apiserver                              (verify-loop reads)
#   ALLOW  DNS (kube-dns / CoreDNS)
#   DROP   api.anthropic.com                           (engine no longer Anthropic)
#   DROP   everything else (all non-443 egress, all in-cluster lateral movement)
#
# REALITY with vanilla AKS NetworkPolicy (no FQDN support): we can only scope by
# port, so the L3/L4 rule below is "any 443 + DNS". FQDN-scoped egress (the exact
# github.com + APIM-host allowlist, with api.anthropic.com DENIED) needs Cilium
# (CiliumNetworkPolicy toFQDNs) or Calico DNS policy — see the commented
# CiliumNetworkPolicy companion at the bottom; adopt it to make the
# anthropic-drop / apim-add an enforced L7 control rather than documented intent.
# The pod also has NO ingress at all.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dev-agent-egress
  namespace: dev-agent-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dev-agent
  policyTypes:
    - Ingress
    - Egress
  ingress: []   # nothing talks TO the agent
  egress:
    # DNS (kube-dns / CoreDNS)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS: github.com + the APIM gateway host + the AKS apiserver (all 443).
    # api.anthropic.com is intentionally NOT part of the intended allowlist any
    # more (engine swapped to opencode/GPT-5.4-via-APIM). Tighten to the explicit
    # FQDNs (and an explicit anthropic DENY) via the Cilium policy below once
    # Cilium/Calico DNS policy is available.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
