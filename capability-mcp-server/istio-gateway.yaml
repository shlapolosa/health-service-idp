# North of this, APIM terminates + does Entra validate-jwt + rate-limit (DEFERRED P0). This Gateway/VS
# exposes the MCP for that backend (and for in-cluster/n8n testing). MCP endpoint is /mcp (FastMCP).
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: capability-mcp-gateway
  namespace: default
spec:
  selector: { istio: ingressgateway }
  servers:
  - port: { number: 80, name: http, protocol: HTTP }
    hosts: ["*"]
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: capability-mcp-virtualservice
  namespace: default
spec:
  hosts: ["*"]
  gateways: [capability-mcp-gateway]
  http:
  - match:
    - uri: { prefix: /mcp }
    - uri: { prefix: /healthz }
    route:
    - destination:
        host: capability-mcp-server.default.svc.cluster.local
        port: { number: 80 }
