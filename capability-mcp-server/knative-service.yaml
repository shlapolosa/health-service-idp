apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: capability-mcp-server
  namespace: default
  labels: { app: capability-mcp-server, service-type: mcp-server }
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"      # always-on: SSE sessions are long-lived
        autoscaling.knative.dev/maxScale: "5"
    spec:
      serviceAccountName: capability-mcp-server
      containerConcurrency: 100                     # Streamable-HTTP/SSE keeps connections open
      timeoutSeconds: 600
      imagePullSecrets:
      - name: acr-credentials
      volumes:
      - name: argo-token
        secret:
          secretName: argo-token
      containers:
      - name: capability-mcp-server
        image: healthidpuaeacr.azurecr.io/capability-mcp-server:v0.10
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: ARGO_SERVER_URL
          value: "http://argo-server.argo:2746"
        - name: ARGO_TOKEN_FILE
          value: "/var/run/secrets/argo/token"
        - name: OAM_NAMESPACE
          value: "default"
        - name: CAPABILITY_FACTORY_DIR
          value: "/capability-factory"
        - name: GITHUB_OWNER
          value: "shlapolosa"
        - name: GITOPS_REPO
          value: "health-service-idp-gitops"
        - name: GITOPS_BRANCH
          value: "main"
        - name: PERSONAL_ACCESS_TOKEN
          valueFrom:
            secretKeyRef: { name: github-credentials, key: personal-access-token }
        # --- Entra JWT validation (Phase 0 injects these + flips AUTH_DISABLED to "false") ---
        - name: AUTH_DISABLED
          value: "true"          # TODO(P0): set false once APIM_AUDIENCE/ENTRA_TENANT are injected
        - name: APIM_AUDIENCE
          value: ""              # api://<apimAppId>  (from copilots APIM, DEFERRED P0)
        - name: ENTRA_TENANT
          value: ""              # <tenant-id>        (DEFERRED P0)
        - name: ALLOWED_OIDS
          value: ""              # agent SP + n8n app OIDs (optional allow-list)
        # --- DNS-rebinding allow-list (FastMCP transport security). CSV. Empty=disabled. ---
        - name: ALLOWED_HOSTS
          value: "capability-mcp-server.default.20.233.105.82.nip.io,capability-mcp-server.default,capability-mcp-server.default.svc,capability-mcp-server.default.svc.cluster.local,localhost"
        volumeMounts:
        - name: argo-token
          mountPath: /var/run/secrets/argo
          readOnly: true
        resources:
          requests: { cpu: "250m", memory: "256Mi" }
          limits: { cpu: "1", memory: "512Mi" }
        readinessProbe:
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 30
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities: { drop: ["ALL"] }
  traffic:
  - latestRevision: true
    percent: 100
