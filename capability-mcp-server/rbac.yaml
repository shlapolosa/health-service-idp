apiVersion: v1
kind: ServiceAccount
metadata:
  name: capability-mcp-server
  namespace: default
  labels: { app: capability-mcp-server, service-type: mcp-server }
---
# Narrow read access: list/get OAM definitions (for catalog + vela render/dry-run) + the vela-system
# schema ConfigMaps. Workflow submission goes through the Argo REST API with the mounted argo-token
# (its own RBAC), so this SA needs NO workflow-create permission.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capability-mcp-server
  labels: { app: capability-mcp-server }
rules:
- apiGroups: ["core.oam.dev"]
  resources: ["componentdefinitions", "traitdefinitions", "policydefinitions",
              "workflowstepdefinitions", "definitionrevisions", "applications"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]   # vela-system component-schema-* (non-secret)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capability-mcp-server
  labels: { app: capability-mcp-server }
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capability-mcp-server
subjects:
- kind: ServiceAccount
  name: capability-mcp-server
  namespace: default
