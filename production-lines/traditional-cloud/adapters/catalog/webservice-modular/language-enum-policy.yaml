apiVersion: core.oam.dev/v1beta1
kind: PolicyDefinition
metadata:
  name: language-enum
  namespace: default
  annotations:
    definition.oam.dev/description: >
      Validates that any auto-scaffold-bootstrap trait declares a language
      in the platform's supported set. Default: python, java, nodejs, rasa.
      Adding a new language = updating this policy's parameter — no other
      code change required.
    policy.oam.dev/enforcement: "advisory"
    policy.oam.dev/scope: "auto-scaffold-bootstrap trait"
spec:
  schematic:
    cue:
      template: |
        validate: {
          ok: bool
          reason?: string
        }

        validate: ok: true
        for c in context.components if c.traits != _|_ {
          for t in c.traits if t.type == "auto-scaffold-bootstrap" {
            let lang = t.properties.language
            let allowed = parameter.allowedLanguages
            let matched = [for a in allowed if a == lang {a}]
            if len(matched) == 0 {
              validate: {
                ok:     false
                reason: "auto-scaffold-bootstrap on \(c.name) declares language=\(lang); allowed: \(allowed)"
              }
            }
          }
        }

        parameter: {
          // +usage=Allowed bootstrap languages. Extend by adding to this list.
          allowedLanguages: *["python", "java", "nodejs", "rasa"] | [...string]
        }
