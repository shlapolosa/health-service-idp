    generation: 1
    name: health
    namespace: default
    resourceVersion: "57463015"
    uid: 08083282-288f-48b0-984c-ed9bc07cf5e1
  spec:
    schematic:
      cue:
        template: |
          output: {
            apiVersion: "standard.oam.dev/v1alpha1"
            kind: "HealthScope"
            metadata: {
              name: context.appName + "-health"
              namespace: context.namespace
            }
            spec: {
              probeInterval: parameter.probeInterval
              probeTimeout: parameter.probeTimeout
              workloadRefs: [
                for comp in context.components {
                  {
                    apiVersion: comp.apiVersion
                    kind: comp.kind
                    name: comp.name
                  }
                }
              ]
            }
          }

          parameter: {
            // Optional
            probeInterval: *30 | int
            probeTimeout: *10 | int
          }
