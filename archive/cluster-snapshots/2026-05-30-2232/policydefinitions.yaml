    name: override
    namespace: default
    resourceVersion: "57470741"
    uid: 22f6ab60-2e97-445c-a1be-a0ca6be52df1
  spec:
    schematic:
      cue:
        template: |
          output: {
            apiVersion: "standard.oam.dev/v1alpha1"
            kind: "Override"
            metadata: {
              name: context.appName + "-overrides"
              namespace: context.namespace
            }
            spec: {
              components: [
