                        [ \"$FRAMEWORK\" = \"chatbot\" ]; then\n  COMPONENT_TYPE=\"rasa-chatbot\"\n
                        \ COMPONENT_PORT=\"5005\"\nelse\n  COMPONENT_TYPE=\"webservice\"\n
                        \ COMPONENT_PORT=\"8080\"\nfi\n\n# Determine registry based
                        on configuration\n# Check if we should use ACR or Docker Hub\nDEFAULT_REGISTRY=\"${DEFAULT_REGISTRY:-acr}\"
                        \ # Default to ACR\n\nif [ \"$DEFAULT_REGISTRY\" = \"acr\"
                        ]; then\n  IMAGE_REGISTRY=\"healthidpuaeacr.azurecr.io\"\n
                        \ IMAGE_PREFIX=\"\"\nelse\n  IMAGE_REGISTRY=\"docker.io\"\n
                        \ IMAGE_PREFIX=\"socrates12345/\"\nfi\n\nCOMPONENT_YAML=\"\n
                        \ - name: $SERVICE_NAME\n    type: $COMPONENT_TYPE\n    properties:\n
                        \     name: $SERVICE_NAME\n      image: ${IMAGE_REGISTRY}/${IMAGE_PREFIX}$SERVICE_NAME:latest\n
                        \     language: $LANGUAGE\n      framework: $FRAMEWORK\n      port:
                        $COMPONENT_PORT\n      healthPath: /health\"\n\n# Add realtime
                        platform integration if specified\nif [ -n \"$REALTIME_PLATFORM\"
                        ] && [ \"$REALTIME_PLATFORM\" != \"none\" ]; then\n  COMPONENT_YAML=\"${COMPONENT_YAML}\n
                        \     realtime: $REALTIME_PLATFORM\n      websocket: true\"\nfi\n\n#
                        Add database if specified\nif [ \"$DATABASE\" != \"none\"
                        ] && [ -n \"$DATABASE\" ]; then\n  COMPONENT_YAML=\"${COMPONENT_YAML}\n
                        \     database: $DATABASE\"\nfi\n\n# Add cache if specified\nif
                        [ \"$CACHE\" != \"none\" ] && [ -n \"$CACHE\" ]; then\n  COMPONENT_YAML=\"${COMPONENT_YAML}\n
                        \     cache: $CACHE\"\nfi\n\n# Add AppContainer reference\nCOMPONENT_YAML=\"${COMPONENT_YAML}\n
                        \     appContainer: $APP_CONTAINER\n      exposeApi: true\"\n\n#
                        If component exists, we'll replace it entirely\nif [ \"$COMPONENT_EXISTS\"
                        = \"true\" ]; then\n  echo \"\U0001F504 Replacing existing
                        component...\"\n  \n  # Create a new OAM application with
                        just our component (simpler approach)\n  # Keep everything
                        before components section\n  sed -n '1,/components:/p' oam/applications/application.yaml
                        > temp_app.yaml\n  \n  # Add our component\n  echo \"$COMPONENT_YAML\"
                        | sed 's/^/        /' >> temp_app.yaml\n  \n  # Keep everything
                        after policies (if exists) or add policies section\n  if grep
                        -q \"policies:\" oam/applications/application.yaml; then\n
                        \   sed -n '/policies:/,$p' oam/applications/application.yaml
                        >> temp_app.yaml\n  fi\n  \n  mv temp_app.yaml oam/applications/application.yaml\n
                        \ \nelif grep -q \"components: \\[\\]\" oam/applications/application.yaml;
                        then\n  echo \"\U0001F504 Adding first component to empty
                        OAM Application...\"\n  \n  # Replace empty components array
                        with the new component\n  sed -i \"s/components: \\[\\]/components:$COMPONENT_YAML/\"
                        oam/applications/application.yaml\n  \nelif grep -q \"components:\"
                        oam/applications/application.yaml; then\n  echo \"\U0001F504
                        Adding component to existing OAM Application...\"\n  \n  #
                        Find the line number of components: and add the new component\n
                        \ COMPONENTS_LINE=$(grep -n \"components:\" oam/applications/application.yaml
                        | cut -d: -f1)\n  \n  # Create temp file with the new component
                        added\n  head -n $COMPONENTS_LINE oam/applications/application.yaml
                        > temp_app.yaml\n  echo \"$COMPONENT_YAML\" | sed 's/^/        /'
                        >> temp_app.yaml\n  tail -n +$((COMPONENTS_LINE + 1)) oam/applications/application.yaml
                        >> temp_app.yaml\n  \n  mv temp_app.yaml oam/applications/application.yaml\n
                        \ \nelse\n  echo \"❌ No components section found in OAM Application\"\n
                        \ exit 1\nfi\n\n# Add or update topology policy for multi-cluster
                        deployment\n# Check if targetVCluster is \"host\" - if so,
                        skip topology policy\nif [ \"$VCLUSTER_TARGET\" = \"host\"
                        ]; then\n  echo \"\U0001F3E0 Deploying to host cluster - skipping
                        topology policy\"\n  # Remove any existing topology policy
                        if present\n  if grep -q \"deploy-to-vcluster\" oam/applications/application.yaml;
                        then\n    echo \"Removing existing topology policy for host
                        deployment...\"\n    # Remove the policy section\n    sed
                        -i '/- name: deploy-to-vcluster/,+4d' oam/applications/application.yaml\n
                        \   # If policies section is now empty, remove it too\n    if
                        grep -q \"policies: \\[\\]\" oam/applications/application.yaml;
                        then\n      sed -i '/policies: \\[\\]/d' oam/applications/application.yaml\n
                        \   fi\n  fi\nelse\n  echo \"\U0001F3AF Adding topology policy
                        for vCluster deployment...\"\n  if ! grep -q \"policies:\"
                        oam/applications/application.yaml; then\n    echo \"  policies:\"
                        >> oam/applications/application.yaml\n    echo \"  - name:
                        deploy-to-vcluster\" >> oam/applications/application.yaml\n
                        \   echo \"    type: topology\" >> oam/applications/application.yaml\n
                        \   echo \"    properties:\" >> oam/applications/application.yaml\n
                        \   echo \"      clusters: [\\\"$VCLUSTER_TARGET\\\"]\" >>
                        oam/applications/application.yaml\n    echo \"      namespace:
                        \\\"default\\\"\" >> oam/applications/application.yaml\n  else\n
                        \   # Update existing policy\n    if grep -q \"deploy-to-vcluster\"
                        oam/applications/application.yaml; then\n      echo \"\U0001F504
                        Updating existing topology policy...\"\n      # Update the
                        clusters line\n      sed -i \"s/clusters: \\[.*\\]/clusters:
                        [\\\"$VCLUSTER_TARGET\\\"]/\" oam/applications/application.yaml\n
                        \     sed -i \"s/namespace: \\\".*\\\"/namespace: \\\"default\\\"/\"
                        oam/applications/application.yaml\n    else\n      # Add new
                        policy to existing policies section\n      echo \"  - name:
                        deploy-to-vcluster\" >> oam/applications/application.yaml\n
                        \     echo \"    type: topology\" >> oam/applications/application.yaml\n
                        \     echo \"    properties:\" >> oam/applications/application.yaml\n
                        \     echo \"      clusters: [\\\"$VCLUSTER_TARGET\\\"]\"
                        >> oam/applications/application.yaml\n      echo \"      namespace:
                        \\\"default\\\"\" >> oam/applications/application.yaml\n    fi\n
                        \ fi\nfi\n\necho \"✅ Updated OAM Application with topology
                        policy:\"\ncat oam/applications/application.yaml\n\n# Create
                        vCluster-specific manifests\necho \"\U0001F4C1 Creating vCluster-specific
                        manifests for $VCLUSTER_TARGET...\"\n\n# Create ApplicationClaim
                        for vCluster processing\ncat > vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME/application-claim.yaml
                        << EOF\napiVersion: platform.example.org/v1alpha1\nkind: ApplicationClaim\nmetadata:\n
                        \ name: $SERVICE_NAME\n  namespace: default\n  annotations:\n
                        \   webservice.oam.dev/source: \"$BOOTSTRAP_SOURCE\"\n    webservice.oam.dev/processed-by:
                        \"host-cluster-composition\"\nspec:\n  appContainer: $APP_CONTAINER\n
                        \ name: $SERVICE_NAME\n  language: $LANGUAGE\n  framework:
                        $FRAMEWORK\n  database: $DATABASE\n  cache: $CACHE\nEOF\n\n#
                        Create OAM Application for vCluster KubeVela processing\n#
                        ALWAYS use default namespace for OAM Application (where WorkloadDefinitions
                        exist)\n# The topology policy will handle deployment to the
                        correct location\nOAM_NAMESPACE=\"default\"\n\ncat > vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME/oam-application.yaml
                        << EOF\napiVersion: core.oam.dev/v1beta1\nkind: Application\nmetadata:\n
                        \ name: $SERVICE_NAME-app\n  namespace: $OAM_NAMESPACE\nspec:\n
                        \ components:\n  - name: $SERVICE_NAME\n    type: webservice\n
                        \   properties:\n      image: \"docker.io/socrates12345/$SERVICE_NAME:v1.0.0\"\n
                        \     port: 8080\n      healthPath: \"/health\"\n      language:
                        $LANGUAGE\n      framework: $FRAMEWORK\n$(if [ \"$DATABASE\"
                        != \"none\" ]; then\necho \"      database: $DATABASE\n      envFrom:\n
                        \     - secretRef:\n          name: \\\"${SERVICE_NAME}-db-secret\\\"\"\nfi)\n
                        \     environment:\n        LOG_LEVEL: \"INFO\"\n        AGENT_TYPE:
                        \"$SERVICE_NAME\"\n  policies:\n  - name: deploy-to-vcluster\n
                        \   type: topology\n    properties:\n      clusters: [\"$VCLUSTER_TARGET\"]\n
                        \     namespace: \"default\"\nEOF\n\n# Create ArgoCD Application
                        for this service\ncat > vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME/argocd-app.yaml
                        << EOF\napiVersion: argoproj.io/v1alpha1\nkind: Application\nmetadata:\n
                        \ name: $SERVICE_NAME\n  namespace: argocd\nspec:\n  project:
                        default\n  source:\n    repoURL: https://github.com/$GITHUB_USER/$APP_CONTAINER-gitops\n
                        \   targetRevision: main\n    path: vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME\n
                        \   directory:\n      include: '{application-claim.yaml,oam-application.yaml}'\n
                        \ destination:\n    server: https://kubernetes.default.svc\n
                        \   namespace: default\n  syncPolicy:\n    automated:\n      prune:
                        true\n      selfHeal: true\nEOF\n\necho \"✅ Created vCluster-specific
                        manifests in vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME/\"\n\n#
                        Commit and push changes\ngit add oam/applications/application.yaml\ngit
                        add vcluster/$VCLUSTER_TARGET/applications/$SERVICE_NAME/\ngit
                        commit -m \"Add $SERVICE_NAME webservice component to OAM
                        Application (Target: $VCLUSTER_TARGET, Lang: $LANGUAGE, Framework:
                        $FRAMEWORK, DB: $DATABASE, Cache: $CACHE)\"\n\ngit push\n\necho
                        \"\U0001F389 Successfully updated OAM Application with $SERVICE_NAME
                        webservice component\"\n"
                      env:
