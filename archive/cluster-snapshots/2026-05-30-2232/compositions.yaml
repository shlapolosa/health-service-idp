                        README.md && sed -i \"s/GraphQL Gateway/$SERVICE_NAME Gateway/g\"
                        README.md\n  [ -f \"docker-compose.yml\" ] && sed -i \"s/graphql-gateway/$SERVICE_NAME/g\"
                        docker-compose.yml\n  [ -f \"package.json\" ] && sed -i \"s/Federation
