                    containers:
                    - command:
                      - /bin/sh
                      - -c
                      - "set -e\necho \"\U0001F517 Registering vCluster with ArgoCD
                        for OAM deployment...\"\n\n# Skip if deploying to host cluster\nif
                        [ \"${VCLUSTER_NAME}\" = \"host\" ] || [ -z \"${VCLUSTER_NAME}\"
