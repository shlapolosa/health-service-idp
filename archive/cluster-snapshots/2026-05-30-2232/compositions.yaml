        -e\\necho \\\"Setting up source repository structure for $APP_NAME...\\\"\\n\\n#
        Install required tools (including jq for JSON parsing)\\n# Note: kubectl is
        not in Alpine repos, use curl to download it\\napk add --no-cache git curl
        jq python3 py3-pip\\n\\n# Download kubectl binary\\ncurl -LO \\\"https://dl.k8s.io/release/$(curl
        -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl\\\"\\nchmod
        +x kubectl\\nmv kubectl /usr/local/bin/\\n\\nTEMP_DIR=\\\"/tmp/repo-$APP_NAME\\\"\\nmkdir
        -p $TEMP_DIR\\ncd $TEMP_DIR\\n\\n# Clone the repository\\ngit clone $SOURCE_CLONE_URL
        .\\n\\n# Configure git with authentication for push\\ngit config user.name
        \\\"AppContainer Setup\\\"\\ngit config user.email \\\"appcontainer@platform.local\\\"\\ngit
        remote set-url origin \\\"https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git\\\"\\n\\n#
        Create microservices container structure\\nmkdir -p microservices\\nmkdir
        -p shared-libs/common\\nmkdir -p .github/workflows\\nmkdir -p .github/scripts\\n\\n#
        Copy the version manager script\\ncat \\u003e .github/scripts/version-manager.sh
        \\u003c\\u003c 'EOF'\\n#!/bin/bash\\nset -e\\n\\n# Semantic Versioning Manager
        for GitOps\\n# Generates semantic versions with commit SHA for container tagging\\n\\nSCRIPT_DIR=\\\"$(cd
        \\\"$(dirname \\\"${BASH_SOURCE[0]}\\\")\\\" \\u0026\\u0026 pwd)\\\"\\nPROJECT_ROOT=\\\"$(cd
        \\\"$SCRIPT_DIR/../..\\\" \\u0026\\u0026 pwd)\\\"\\n\\n# Default values\\nMAJOR_VERSION=1\\nMINOR_VERSION=1\\nBASE_VERSION_FILE=\\\"$PROJECT_ROOT/.version\\\"\\n\\n#
        Read base version from file if it exists\\nif [ -f \\\"$BASE_VERSION_FILE\\\"
        ]; then\\n    BASE_VERSION=$(cat \\\"$BASE_VERSION_FILE\\\")\\n    MAJOR_VERSION=$(echo
        \\\"$BASE_VERSION\\\" | cut -d. -f1)\\n    MINOR_VERSION=$(echo \\\"$BASE_VERSION\\\"
        | cut -d. -f2)\\nfi\\n\\n# Function to get commit count for patch version\\nget_patch_version()
        {\\n    git rev-list --count HEAD 2\\u003e/dev/null || echo \\\"0\\\"\\n}\\n\\n#
        Function to get short commit SHA\\nget_commit_sha() {\\n    git rev-parse
        --short=7 HEAD 2\\u003e/dev/null || echo \\\"unknown\\\"\\n}\\n\\n# Function
        to get branch name (sanitized for container tags)\\nget_branch_name() {\\n
        \   local branch=$(git rev-parse --abbrev-ref HEAD 2\\u003e/dev/null || echo
        \\\"unknown\\\")\\n    # Sanitize branch name for container registry\\n    echo
        \\\"$branch\\\" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]'\\n}\\n\\n#
        Function to check if this is a release branch\\nis_release_branch() {\\n    local
        branch=$(get_branch_name)\\n    [[ \\\"$branch\\\" == \\\"main\\\" || \\\"$branch\\\"
        == \\\"master\\\" || \\\"$branch\\\" =~ ^release/.* ]]\\n}\\n\\n# Function
        to generate semantic version\\ngenerate_semantic_version() {\\n    local service_name=\\\"$1\\\"\\n
        \   local commit_sha=$(get_commit_sha)\\n    \\n    # Use major.minor.sha
        format for Docker compatibility\\n    local semver=\\\"$MAJOR_VERSION.$MINOR_VERSION.$commit_sha\\\"\\n
        \   \\n    echo \\\"$semver\\\"\\n}\\n\\n# Function to generate container
        tags\\ngenerate_container_tags() {\\n    local service_name=\\\"$1\\\"\\n
        \   local registry=\\\"${2:-docker.io/socrates12345}\\\"\\n    local commit_sha=$(get_commit_sha)\\n
        \   local branch=$(get_branch_name)\\n    local semver=$(generate_semantic_version
        \\\"$service_name\\\")\\n    \\n    # Base image name\\n    local image_base=\\\"$registry/$service_name\\\"\\n
        \   \\n    # Generate multiple tags\\n    local tags=()\\n    \\n    # 1.
        Full semantic version tag\\n    tags+=(\\\"$image_base:$semver\\\")\\n    \\n
        \   # 2. Short SHA tag\\n    tags+=(\\\"$image_base:$commit_sha\\\")\\n    \\n
        \   # 3. Branch-specific tag\\n    tags+=(\\\"$image_base:$branch-$commit_sha\\\")\\n
        \   \\n    # 4. Latest tag for main/master branch\\n    if is_release_branch;
        then\\n        tags+=(\\\"$image_base:latest\\\")\\n        tags+=(\\\"$image_base:$MAJOR_VERSION\\\")\\n
        \       tags+=(\\\"$image_base:$MAJOR_VERSION.$MINOR_VERSION\\\")\\n    fi\\n
        \   \\n    # 5. Development tag for feature branches\\n    if [[ \\\"$branch\\\"
        == \\\"develop\\\" ]]; then\\n        tags+=(\\\"$image_base:develop\\\")\\n
        \   fi\\n    \\n    # Return as comma-separated string\\n    IFS=','\\n    echo
        \\\"${tags[*]}\\\"\\n}\\n\\n# Main function\\nmain() {\\n    local command=\\\"$1\\\"\\n
        \   local service_name=\\\"$2\\\"\\n    local registry=\\\"${3:-docker.io/socrates12345}\\\"\\n
        \   \\n    case \\\"$command\\\" in\\n        \\\"version\\\")\\n            generate_semantic_version
        \\\"$service_name\\\"\\n            ;;\\n        \\\"tags\\\")\\n            generate_container_tags
        \\\"$service_name\\\" \\\"$registry\\\"\\n            ;;\\n        \\\"help\\\"|*)\\n
        \           cat \\u003c\\u003c HELP_EOF\\nUsage: $0 \\u003ccommand\\u003e
        [service_name] [registry]\\n\\nCommands:\\n  version \\u003cservice\\u003e
        \          Generate semantic version\\n  tags \\u003cservice\\u003e [registry]
        \  Generate container tags\\n  help                        Show this help\\n\\nExamples:\\n
        \ $0 version accommodation-service\\n  $0 tags accommodation-service\\nHELP_EOF\\n
        \           ;;\\n    esac\\n}\\n\\n# Run main function with all arguments\\nmain
        \\\"$@\\\"\\nEOF\\n\\n# Make version manager executable\\nchmod +x .github/scripts/version-manager.sh\\n\\n#
        Create .version file\\necho \\\"1.1\\\" \\u003e .version\\n\\n# Copy the comprehensive
        GitOps workflow from template\\nwget -q -O .github/workflows/comprehensive-gitops.yml
        https://raw.githubusercontent.com/shlapolosa/health-service-idp/main/crossplane/templates/comprehensive-gitops-template.yml
        || {\\n  echo \\\"Failed to download workflow template, using fallback...\\\"\\n
        \ # Fallback: minimal workflow if template download fails\\n  cat \\u003e
        .github/workflows/comprehensive-gitops.yml \\u003c\\u003c 'FALLBACK_EOF'\\nname:
        Comprehensive GitOps Pipeline\\non:\\n  push:\\n    branches: [ main ]\\n
        \   paths: [ 'microservices/**' ]\\nenv:\\n  # Docker Hub settings (default)\\n
        \ DOCKERHUB_REGISTRY: docker.io\\n  DOCKERHUB_USERNAME: socrates12345\\n  #
        ACR settings\\n  ACR_REGISTRY: healthidpuaeacr.azurecr.io\\n  ACR_NAME: healthidpuaeacr\\n
        \ # Default registry selection\\n  DEFAULT_REGISTRY: acr  # or 'dockerhub'
        or 'both'\\n  # Legacy variables\\n  REGISTRY: docker.io\\n  REGISTRY_USERNAME:
        socrates12345\\n  GITOPS_REPO: APP_NAME_PLACEHOLDER-gitops\\njobs:\\n  minimal-deploy:\\n
        \   runs-on: ubuntu-latest\\n    steps:\\n      - uses: actions/checkout@v4\\n
        \     - name: Build and deploy\\n        run: echo \\\"Minimal deployment
        pipeline activated\\\"\\nFALLBACK_EOF\\n}\\n\\n# Substitute app name in the
        workflow  \\nsed -i \\\"s/APP_NAME_PLACEHOLDER/$APP_NAME/g\\\" .github/workflows/comprehensive-gitops.yml\\n\\n#
        Replace placeholders in workflow file\\n\\n# Create shared library structure\\ncat
        \\u003e shared-libs/common/README.md \\u003c\\u003c 'EOF'\\n# Common Shared
        Library\\n\\nThis directory contains shared code and utilities used across
        all microservices in this app container.\\n\\n## Structure\\n- src/ - Shared
        source code\\n- tests/ - Shared tests\\n- docs/ - Shared documentation\\nEOF\\n\\n#
        Create microservices README\\ncat \\u003e microservices/README.md \\u003c\\u003c
        EOF\\n# Microservices\\n\\nThis directory contains all microservices for the
        application container.\\nEach subdirectory represents a single microservice
        following CLAUDE.md standards.\\n\\n## Adding New Microservices\\n\\nUse ApplicationClaim
        to add new microservices:\\n\\n\\\\`\\\\`\\\\`yaml\\napiVersion: platform.example.org/v1alpha1\\nkind:
        ApplicationClaim\\nmetadata:\\n  name: my-service\\nspec:\\n  appContainer:
        $APP_NAME\\n  name: my-service\\n  language: python\\n  framework: fastapi\\n
        \ database: postgres\\n  cache: redis\\n\\\\`\\\\`\\\\`\\n\\n## Current Services\\n\\n-
        (Services will be listed here as they are added)\\nEOF\\n\\n# Create main
        README\\ncat \\u003e README.md \\u003c\\u003c EOF\\n# $APP_NAME Application
        Container\\n\\nCLAUDE.md-compliant microservices application container with
        GitOps deployment.\\n\\n## Architecture\\n\\nThis application container follows
        the CLAUDE.md development methodology:\\n\\n- **Microservices**: Each service
        in `microservices/` follows Onion Architecture\\n- **Shared Libraries**: Common
        code in `shared-libs/`\\n- **GitOps**: Automated deployment via companion
        GitOps repository\\n- **CI/CD**: Automatic building and deployment of changed
        services\\n\\n## Structure\\n\\n\\\\`\\\\`\\\\`\\n$APP_NAME/\\n├── microservices/
        \         # Individual microservices\\n├── shared-libs/           # Shared
        libraries and utilities  \\n├── .github/workflows/     # CI/CD pipelines\\n└──
        README.md              # This file\\n\\\\`\\\\`\\\\`\\n\\n## Development Workflow\\n\\n1.
        Create microservices using ApplicationClaim in your vCluster\\n2. CI/CD automatically
        detects changes in `microservices/`\\n3. Changed services are built and deployed
        via GitOps\\n4. Monitor deployments in ArgoCD\\n\\n## Adding New Services\\n\\nEdit
        the OAM Application in the GitOps repository:\\n\\n\\\\`\\\\`\\\\`yaml\\n#
        File: oam/application.yaml\\napiVersion: core.oam.dev/v1beta1\\nkind: Application\\nmetadata:\\n
        \ name: $APP_NAME\\nspec:\\n  components:\\n  - name: my-service\\n    type:
        microservice-with-db\\n    properties:\\n      language: python\\n      framework:
        fastapi\\n      database: postgres\\n      cache: redis\\n\\\\`\\\\`\\\\`\\n\\n##
        GitOps Repository\\n\\nDeployment manifests are managed in the companion GitOps
        repository:\\n`$GITOPS_CLONE_URL`\\nEOF\\n\\n# Create two separate commits
        to ensure GitHub Actions detect-changes works\\ngit config user.name \\\"AppContainer
        Setup\\\"\\ngit config user.email \\\"appcontainer@platform.local\\\"\\n\\n#
        First commit: Initial README only\\n# Idempotent: skip commit/push if nothing
        changed (handles Crossplane Object retries)\\necho \\\"# $APP_NAME\\\" \\u003e
        README.md\\necho \\\"\\\" \\u003e\\u003e README.md\\necho \\\"CLAUDE.md-compliant
        microservice application container.\\\" \\u003e\\u003e README.md\\ngit add
        README.md\\ngit diff --cached --quiet || git commit -m \\\"Initial commit
        - create repository\\\"\\n\\n# Second commit: Add all microservice structure\\ngit
        add .\\ngit diff --cached --quiet || git commit -m \\\"Initialize CLAUDE.md-compliant
        app container structure\\n\\n- Add microservices directory structure\\n- Add
        comprehensive GitOps CI/CD pipeline\\n- Add shared libraries framework\\n-
        Add documentation and examples\\n- Follow CLAUDE.md development methodology\\\"\\n\\ngit
        push origin HEAD || true\\n\\necho \\\"Source repository structure created
        successfully with 2 commits\\\"\\n\\n# Setup GitHub repository secrets for
        CI/CD\\necho \\\"Setting up GitHub repository secrets...\\\"\\n\\n# Get repository
        public key for secret encryption\\nPUBLIC_KEY_RESPONSE=$(curl -s -H \\\"Authorization:
        token ${GITHUB_TOKEN}\\\" \\\\\\n  \\\"https://api.github.com/repos/${GITHUB_REPO}/actions/secrets/public-key\\\")\\n\\nPUBLIC_KEY=$(echo
        \\\"$PUBLIC_KEY_RESPONSE\\\" | jq -r '.key')\\nKEY_ID=$(echo \\\"$PUBLIC_KEY_RESPONSE\\\"
        | jq -r '.key_id')\\n\\nif [ -z \\\"$PUBLIC_KEY\\\" ] || [ -z \\\"$KEY_ID\\\"
        ]; then\\n  echo \\\"Warning: Could not retrieve public key for repository
        secrets\\\"\\nelse\\n  # Install python for encryption\\n  apk add --no-cache
        python3 py3-pip\\n  pip3 install pynacl\\n  \\n  # Create encryption script\\n
        \ cat \\u003e /tmp/encrypt_secret.py \\u003c\\u003c 'ENCRYPT_EOF'\\nimport
        sys\\nimport base64\\nfrom nacl import encoding, public\\n\\ndef encrypt_secret(public_key:
        str, secret_value: str) -\\u003e str:\\n    public_key = public.PublicKey(public_key.encode(\\\"utf-8\\\"),
        encoding.Base64Encoder())\\n    sealed_box = public.SealedBox(public_key)\\n
        \   encrypted = sealed_box.encrypt(secret_value.encode(\\\"utf-8\\\"))\\n
        \   return base64.b64encode(encrypted).decode(\\\"utf-8\\\")\\n\\nif __name__
        == \\\"__main__\\\":\\n    print(encrypt_secret(sys.argv[1], sys.argv[2]))\\nENCRYPT_EOF\\n
        \ \\n  # Create PERSONAL_ACCESS_TOKEN secret\\n  ENCRYPTED_TOKEN=$(python3
        /tmp/encrypt_secret.py \\\"$PUBLIC_KEY\\\" \\\"$GITHUB_TOKEN\\\")\\n  curl
        -X PUT \\\\\\n    -H \\\"Authorization: token ${GITHUB_TOKEN}\\\" \\\\\\n
        \   -H \\\"Accept: application/vnd.github.v3+json\\\" \\\\\\n    \\\"https://api.github.com/repos/${GITHUB_REPO}/actions/secrets/PERSONAL_ACCESS_TOKEN\\\"
        \\\\\\n    -d \\\"{\\\\\\\"encrypted_value\\\\\\\":\\\\\\\"$ENCRYPTED_TOKEN\\\\\\\",\\\\\\\"key_id\\\\\\\":\\\\\\\"$KEY_ID\\\\\\\"}\\\"\\n
        \ \\n  # Get Docker password from secret (using docker-credentials which has
        plain password field)\\n  DOCKER_PASSWORD=$(kubectl get secret docker-credentials
        -n default -o jsonpath='{.data.password}' | base64 -d)\\n  \\n  if [ -n \\\"$DOCKER_PASSWORD\\\"
        ]; then\\n    # Create DOCKER_PASSWORD secret\\n    ENCRYPTED_PASSWORD=$(python3
        /tmp/encrypt_secret.py \\\"$PUBLIC_KEY\\\" \\\"$DOCKER_PASSWORD\\\")\\n    curl
        -X PUT \\\\\\n      -H \\\"Authorization: token ${GITHUB_TOKEN}\\\" \\\\\\n
        \     -H \\\"Accept: application/vnd.github.v3+json\\\" \\\\\\n      \\\"https://api.github.com/repos/${GITHUB_REPO}/actions/secrets/DOCKER_PASSWORD\\\"
        \\\\\\n      -d \\\"{\\\\\\\"encrypted_value\\\\\\\":\\\\\\\"$ENCRYPTED_PASSWORD\\\\\\\",\\\\\\\"key_id\\\\\\\":\\\\\\\"$KEY_ID\\\\\\\"}\\\"\\n
        \   \\n    echo \\\"✅ Docker Hub secret created\\\"\\n  else\\n    echo \\\"⚠️
        \ Docker password not found in secret\\\"\\n  fi\\n  \\n  # Get Azure credentials
        from secret if it exists\\n  AZURE_CREDS=$(kubectl get secret azure-credentials
        -n default -o jsonpath='{.data.azure-creds\\\\.json}' 2\\u003e/dev/null |
        base64 -d 2\\u003e/dev/null || echo \\\"\\\")\\n  \\n  if [ -n \\\"$AZURE_CREDS\\\"
        ]; then\\n    # Create AZURE_CREDENTIALS secret for GitHub Actions\\n    ENCRYPTED_AZURE=$(python3
        /tmp/encrypt_secret.py \\\"$PUBLIC_KEY\\\" \\\"$AZURE_CREDS\\\")\\n    curl
        -X PUT \\\\\\n      -H \\\"Authorization: token ${GITHUB_TOKEN}\\\" \\\\\\n
        \     -H \\\"Accept: application/vnd.github.v3+json\\\" \\\\\\n      \\\"https://api.github.com/repos/${GITHUB_REPO}/actions/secrets/AZURE_CREDENTIALS\\\"
        \\\\\\n      -d \\\"{\\\\\\\"encrypted_value\\\\\\\":\\\\\\\"$ENCRYPTED_AZURE\\\\\\\",\\\\\\\"key_id\\\\\\\":\\\\\\\"$KEY_ID\\\\\\\"}\\\"\\n
        \   \\n    echo \\\"✅ Azure credentials secret created\\\"\\n  else\\n    echo
        \\\"⚠️  Azure credentials not found (optional)\\\"\\n  fi\\n  \\n  echo \\\"✅
        GitHub secrets setup completed\\\"\\nfi\\n\\necho \\\"Source repository setup
        completed successfully\\\"\\n\"],\"env\":[{\"name\":\"APP_NAME\",\"value\":\"placeholder\"},{\"name\":\"SOURCE_CLONE_URL\",\"value\":\"placeholder\"},{\"name\":\"GITOPS_CLONE_URL\",\"value\":\"placeholder\"},{\"name\":\"DOCKER_REGISTRY_USER\",\"value\":\"placeholder\"},{\"name\":\"GITHUB_TOKEN\",\"valueFrom\":{\"secretKeyRef\":{\"key\":\"token\",\"name\":\"github-credentials\"}}},{\"name\":\"GITHUB_REPO\",\"value\":\"placeholder\"}],\"image\":\"alpine:3.18\",\"name\":\"source-repo-setup\"}],\"restartPolicy\":\"OnFailure\",\"serviceAccountName\":\"crossplane-github-provider\"}},\"ttlSecondsAfterFinished\":600}}},\"providerConfigRef\":{\"name\":\"kubernetes-provider\"}}},\"name\":\"source-repo-setup\",\"patches\":[{\"fromFieldPath\":\"spec.name\",\"toFieldPath\":\"spec.forProvider.manifest.metadata.name\",\"transforms\":[{\"string\":{\"fmt\":\"%s-source-setup\"},\"type\":\"string\"}],\"type\":\"FromCompositeFieldPath\"},{\"fromFieldPath\":\"spec.name\",\"toFieldPath\":\"spec.forProvider.manifest.spec.template.spec.containers[0].env[0].value\",\"type\":\"FromCompositeFieldPath\"},{\"combine\":{\"strategy\":\"string\",\"string\":{\"fmt\":\"https://github.com/%s/%s.git\"},\"variables\":[{\"fromFieldPath\":\"spec.gitHubOrg\"},{\"fromFieldPath\":\"spec.name\"}]},\"toFieldPath\":\"spec.forProvider.manifest.spec.template.spec.containers[0].env[1].value\",\"type\":\"CombineFromComposite\"},{\"combine\":{\"strategy\":\"string\",\"string\":{\"fmt\":\"https://github.com/%s/%s-gitops.git\"},\"variables\":[{\"fromFieldPath\":\"spec.gitHubOrg\"},{\"fromFieldPath\":\"spec.name\"}]},\"policy\":{\"fromFieldPath\":\"Required\"},\"toFieldPath\":\"spec.forProvider.manifest.spec.template.spec.containers[0].env[2].value\",\"type\":\"CombineFromComposite\"},{\"fromFieldPath\":\"spec.gitHubOrg\",\"toFieldPath\":\"spec.forProvider.manifest.spec.template.spec.containers[0].env[3].value\",\"type\":\"FromCompositeFieldPath\"},{\"combine\":{\"strategy\":\"string\",\"string\":{\"fmt\":\"%s/%s\"},\"variables\":[{\"fromFieldPath\":\"spec.gitHubOrg\"},{\"fromFieldPath\":\"spec.name\"}]},\"toFieldPath\":\"spec.forProvider.manifest.spec.template.spec.containers[0].env[5].value\",\"type\":\"CombineFromComposite\"},{\"fromFieldPath\":\"spec.name\",\"toFieldPath\":\"metadata.name\",\"transforms\":[{\"string\":{\"fmt\":\"%s-source-setup\"},\"type\":\"string\"}],\"type\":\"FromCompositeFieldPath\"}]},{\"base\":{\"apiVersion\":\"kubernetes.crossplane.io/v1alpha1\",\"kind\":\"Object\",\"spec\":{\"forProvider\":{\"manifest\":{\"apiVersion\":\"batch/v1\",\"kind\":\"Job\",\"metadata\":{\"name\":\"placeholder\",\"namespace\":\"default\"},\"spec\":{\"backoffLimit\":2,\"template\":{\"spec\":{\"containers\":[{\"command\":[\"/bin/sh\",\"-c\",\"set
        -e\\n# S-CP-002 fix: alpine/git lacks curl/jq; the secret-setup\\n# block
        below uses curl + jq to call api.github.com. Install\\n# them once at the
        top so `set -e` never sees `curl: not found`.\\napk add --no-cache curl jq
        \\u003e/dev/null\\necho \\\"Setting up GitOps repository structure for $APP_NAME...\\\"\\n\\nTEMP_DIR=\\\"/tmp/gitops-$APP_NAME\\\"\\nmkdir
        -p $TEMP_DIR\\ncd $TEMP_DIR\\n\\n# Clone the GitOps repository with authentication\\ngit
        clone \\\"https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}-gitops.git\\\"
        .\\n\\n# Configure git for commits\\ngit config user.name \\\"GitOps Setup\\\"\\ngit
        config user.email \\\"gitops@platform.local\\\"\\n\\n# Create GitOps structure
        matching OAM-DRIVEN-DEVELOPMENT-GUIDE.md\\nmkdir -p apps\\nmkdir -p apps/environments/{dev,staging,production}\\nmkdir
        -p oam/applications\\nmkdir -p oam/components  \\nmkdir -p oam/workflows\\nmkdir
        -p manifests\\nmkdir -p .github/workflows\\n\\n# Determine registry based
        on configuration\\nDEFAULT_REGISTRY=\\\"${DEFAULT_REGISTRY:-acr}\\\"  # Default
        to ACR\\n\\nif [ \\\"$DEFAULT_REGISTRY\\\" = \\\"acr\\\" ]; then\\n  IMAGE_REGISTRY=\\\"healthidpuaeacr.azurecr.io\\\"\\n
        \ IMAGE_PREFIX=\\\"\\\"\\nelse\\n  IMAGE_REGISTRY=\\\"docker.io\\\"\\n  IMAGE_PREFIX=\\\"socrates12345/\\\"\\nfi\\n\\n#
        Create blank OAM Application template\\n# Always use default namespace for
        OAM (where WorkloadDefinitions exist)\\n# S-CP-005 fix: only write if file
        does not already exist (or contains\\n# only the placeholder shape). On Crossplane
        Object retry this Job re-runs,\\n# and previously it clobbered oam-updater's
        commits — which had correctly\\n# written `clusters: [\\\"host\\\"]` (or removed
        the topology policy entirely\\n# for host deployments) — with this stale placeholder.\\n#
        The topology policy is added by oam-updater (application-claim-composition)\\n#
        based on ApplicationClaim.spec.targetVCluster. Do NOT bake it into the\\n#
        blank template — for host deployments the topology policy must be ABSENT,\\n#
        and hardcoding `clusters: [\\\"$APP_NAME\\\"]` here misroutes deploys when
        the\\n# template is the file the workflow ends up with.\\nif [ -f oam/applications/application.yaml
        ] \\u0026\\u0026 ! grep -q \\\"Will be updated with actual vCluster name\\\"
        oam/applications/application.yaml; then\\n  echo \\\"\U0001F4C4 oam/applications/application.yaml
        already exists with non-template content — preserving\\\"\\nelse\\ncat \\u003e
        oam/applications/application.yaml \\u003c\\u003c EOF\\napiVersion: core.oam.dev/v1beta1\\nkind:
        Application\\nmetadata:\\n  name: $APP_NAME\\n  namespace: default\\nspec:\\n
        \ components:\\n  - name: $APP_NAME\\n    type: webservice\\n    properties:\\n
        \     name: $APP_NAME\\n      image: ${IMAGE_REGISTRY}/${IMAGE_PREFIX}$APP_NAME:latest\\n
        \     language: python\\n      framework: fastapi\\n      port: 8080\\n      healthPath:
        /health\\n      database: postgres\\n      cache: redis\\n  # NOTE: topology
        policy intentionally omitted — added by oam-updater\\n  # when targetVCluster
        != \\\"host\\\". Host deployments need no topology policy.\\n  # Add your
        components here using the following types:\\n  # - microservice-with-db: Full-featured
        microservice with database and cache\\n  # - react-frontend: React TypeScript
        frontend with Material-UI\\n  # - static-site: Static website hosting\\n  #
        - kafka-service: Event streaming service\\n  # - data-pipeline: ETL and data
        processing workflows\\n  # \\n  # Example:\\n  # components:\\n  # - name:
        api-backend\\n  #   type: microservice-with-db\\n  #   properties:\\n  #     language:
        python\\n  #     framework: fastapi\\n  #     database: postgres\\n  #     cache:
        redis\\n  #     exposeApi: true\\n  # - name: web-frontend\\n  #   type: react-frontend\\n
        \ #   properties:\\n  #     framework: react\\n  #     styling: material-ui\\n
        \ #     apiEndpoint: /api\\n  \\n  # Note: Workflow orchestration is handled
        by KubeVela WorkflowStepDefinitions\\n  # installed in the cluster, not embedded
        in the application spec.\\n  # See /crossplane/oam/workflow-step-definitions.yaml
        for orchestration logic.\\nEOF\\nfi\\n\\n# Create workflow templates directory\\ncat
        \\u003e oam/workflows/README.md \\u003c\\u003c 'EOF'\\n# OAM Workflows\\n\\nThis
        directory contains KubeVela workflow definitions for managing application
        lifecycle.\\n\\n## Available Workflows\\n\\n- crossplane-integration.yaml
        - Handles OAM → Crossplane ApplicationClaim creation\\n- dependency-management.yaml
        - Manages component dependencies and ordering\\n- failure-recovery.yaml -
        Handles failure scenarios and cleanup\\n\\n## Usage\\n\\nWorkflows are automatically
        triggered when OAM Applications are created or updated.\\nThe system handles:\\n\\n1.
        **Infrastructure Provisioning**: Databases, caches, messaging systems\\n2.
        **Application Deployment**: Microservices, frontends, static sites\\n3. **Pipeline
        Orchestration**: Data processing workflows\\n4. **Dependency Management**:
        Proper ordering and readiness checks\\n5. **Failure Recovery**: Cleanup and
        retry mechanisms\\nEOF\\n\\n# Create components directory with examples\\ncat
        \\u003e oam/components/README.md \\u003c\\u003c EOF\\n# OAM Components\\n\\nThis
        directory contains generated OAM Component definitions created by ApplicationClaims.\\n\\n##
        Generated Components\\n\\nWhen you add components to `oam/applications/application.yaml`,
        the system automatically:\\n\\n1. Creates ApplicationClaims in the vCluster\\n2.
        Generates OAM Component definitions here\\n3. Creates Kubernetes manifests
        in `../manifests/`\\n4. Updates ArgoCD applications for deployment\\n\\n##
        Component Types\\n\\n- **microservice-with-db**: Full-featured microservice
        with database and cache\\n- **react-frontend**: React TypeScript frontend
        with Material-UI\\n- **static-site**: Static website hosting\\n- **kafka-service**:
        Event streaming service\\n- **data-pipeline**: ETL and data processing workflows\\n\\n##
        Example Generated Component\\n\\n\\\\`\\\\`\\\\`yaml\\napiVersion: core.oam.dev/v1beta1\\nkind:
        Component\\nmetadata:\\n  name: user-service\\n  namespace: $APP_NAME\\nspec:\\n
        \ workload:\\n    apiVersion: serving.knative.dev/v1\\n    kind: Service\\n
        \   metadata:\\n      name: user-service\\n    spec:\\n      template:\\n
        \       spec:\\n          containers:\\n          - name: user-service\\n
        \           image: docker.io/socrates12345/user-service:latest\\n  parameters:\\n
        \ - name: image\\n    fieldPaths: [\\\"spec.template.spec.containers[0].image\\\"]\\n\\\\`\\\\`\\\\`\\nEOF\\n\\n#
        Create OAM Application ArgoCD Application\\ncat \\u003e apps/oam-application.yaml
        \\u003c\\u003c EOF\\napiVersion: argoproj.io/v1alpha1\\nkind: Application\\nmetadata:\\n
        \ name: $APP_NAME-oam-app\\n  namespace: argocd\\n  finalizers:\\n    - resources-finalizer.argocd.argoproj.io\\n
        \ annotations:\\n    argocd.argoproj.io/sync-wave: \\\"1\\\"\\n    notifications.argoproj.io/subscribe.on-sync-succeeded.slack:
        \\\"deployments\\\"\\nspec:\\n  project: default\\n  source:\\n    repoURL:
        $GITOPS_CLONE_URL\\n    targetRevision: HEAD\\n    path: oam/applications\\n
        \ destination:\\n    server: https://kubernetes.default.svc\\n    namespace:
        $APP_NAME\\n  syncPolicy:\\n    automated:\\n      prune: true\\n      selfHeal:
        true\\n    syncOptions:\\n      - CreateNamespace=true\\n      - RespectIgnoreDifferences=true\\n
        \   retry:\\n      limit: 5\\n      backoff:\\n        duration: 5s\\n        factor:
        2\\n        maxDuration: 3m\\n  # Watch for changes in OAM Application\\n
        \ info:\\n  - name: Description\\n    value: OAM Application that drives Crossplane
        ApplicationClaim creation\\n  - name: Workflow\\n    value: Automatically
        creates ApplicationClaims when OAM components are added\\nEOF\\n\\n# Create
        ArgoCD Application for OAM Applications\\ncat \\u003e apps/oam-application.yaml
        \\u003c\\u003c EOF\\napiVersion: argoproj.io/v1alpha1\\nkind: Application\\nmetadata:\\n
        \ name: $APP_NAME-oam-application\\n  namespace: argocd\\n  annotations:\\n
        \   argocd.argoproj.io/sync-wave: \\\"2\\\"\\nspec:\\n  project: default\\n
        \ source:\\n    repoURL: $GITOPS_CLONE_URL\\n    targetRevision: HEAD\\n    path:
        oam/applications\\n  destination:\\n    server: https://kubernetes.default.svc\\n
        \   namespace: vela-system\\n  syncPolicy:\\n    automated:\\n      prune:
        true\\n      selfHeal: true\\n    syncOptions:\\n      - CreateNamespace=true\\n
        \     - ServerSideApply=true\\nEOF\\n\\n# Create App of Apps ArgoCD Application\\ncat
        \\u003e apps/app-of-apps.yaml \\u003c\\u003c EOF\\napiVersion: argoproj.io/v1alpha1\\nkind:
        Application\\nmetadata:\\n  name: $APP_NAME-app-of-apps\\n  namespace: argocd\\n
        \ finalizers:\\n    - resources-finalizer.argocd.argoproj.io\\nspec:\\n  project:
        default\\n  source:\\n    repoURL: $GITOPS_CLONE_URL\\n    targetRevision:
        HEAD\\n    path: apps\\n  destination:\\n    server: https://kubernetes.default.svc\\n
        \   namespace: $APP_NAME\\n  syncPolicy:\\n    automated:\\n      prune: true\\n
        \     selfHeal: true\\n    syncOptions:\\n      - CreateNamespace=true\\nEOF\\n\\n#
        Create ApplicationSet for microservices\\n\\n# Create OAM trigger workflow
        for GitOps changes\\ncat \\u003e .github/workflows/oam-sync-trigger.yml \\u003c\\u003c
        'EOF'\\nname: OAM Sync Trigger\\n\\non:\\n  push:\\n    branches: [ main ]\\n
        \   paths:\\n      - 'oam/applications/**'\\n      - 'oam/components/**'\\n
        \ workflow_dispatch:\\n\\njobs:\\n  trigger-argocd-sync:\\n    runs-on: ubuntu-latest\\n
        \   steps:\\n      - name: Checkout code\\n        uses: actions/checkout@v4\\n
        \     \\n      - name: Trigger ArgoCD Sync\\n        run: |\\n          echo
        \\\"\U0001F504 OAM files changed, triggering ArgoCD sync...\\\"\\n          #
        ArgoCD will automatically sync due to automated sync policy\\n          #
        This workflow ensures the change is tracked and logged\\n          \\n      -
        name: Log OAM Changes\\n        run: |\\n          echo \\\"\U0001F4DD OAM
        Application changes detected:\\\"\\n          git diff HEAD~1 HEAD -- oam/applications/
        oam/components/ || true\\n          echo \\\"✅ Changes will be synced to cluster
        via ArgoCD\\\"\\nEOF\\n\\n# Create GitOps update workflow from template\\ncat
        \\u003e .github/workflows/deployment-update.yml \\u003c\\u003c 'EOF'\\nname:
        GitOps Deployment Update\\n\\non:\\n  repository_dispatch:\\n    types: [update-deployments,
        simple-update]\\n\\npermissions:\\n  contents: write\\n\\njobs:\\n  update-manifests:\\n
        \   runs-on: ubuntu-latest\\n    steps:\\n      - name: Checkout GitOps repository\\n
        \       uses: actions/checkout@v4\\n        with:\\n          token: ${{ secrets.GITHUB_TOKEN
        }}\\n\\n      - name: Update deployment manifests\\n        run: |\\n          echo
        \\\"\U0001F680 Processing GitOps deployment update...\\\"\\n          \\n
        \         # Extract dispatch payload\\n          SERVICES=\\\"${{ github.event.client_payload.services
        }}\\\"\\n          VERSION_INFO=\\\"${{ github.event.client_payload.version_info
        }}\\\"\\n          SOURCE_COMMIT=\\\"${{ github.event.client_payload.source_commit
        }}\\\"\\n          REGISTRY=\\\"${{ github.event.client_payload.registry }}\\\"\\n
        \         WORKFLOW_RUN=\\\"${{ github.event.client_payload.workflow_run }}\\\"\\n
        \         \\n          echo \\\"Services to update: $SERVICES\\\"\\n          echo
        \\\"Version info: $VERSION_INFO\\\" \\n          echo \\\"Source commit: $SOURCE_COMMIT\\\"\\n
        \         echo \\\"Registry: $REGISTRY\\\"\\n          \\n          # Handle
        different event types\\n          if [ \\\"${{ github.event.action }}\\\"
        = \\\"simple-update\\\" ]; then\\n            echo \\\"\U0001F4CB Processing
        simple-update event\\\"\\n            COMMIT_SHA=\\\"${{ github.event.client_payload.commit_sha
        }}\\\"\\n          else\\n            echo \\\"\U0001F4CB Processing update-deployments
        event\\\"\\n            # Parse deployments from payload\\n            DEPLOYMENTS='${{
        toJson(github.event.client_payload.deployments) }}'\\n            echo \\\"Deployments:
        $DEPLOYMENTS\\\"\\n          fi\\n          \\n          # Update each service's
        manifest\\n          IFS=',' read -ra SERVICE_ARRAY \\u003c\\u003c\\u003c
        \\\"$SERVICES\\\"\\n          \\n          for service in \\\"${SERVICE_ARRAY[@]}\\\";
        do\\n            echo \\\"\U0001F504 Updating $service manifest...\\\"\\n
        \           \\n            if [ \\\"${{ github.event.action }}\\\" = \\\"simple-update\\\"
        ]; then\\n              # Simple update: construct image from registry and
        commit\\n              NEW_IMAGE=\\\"${REGISTRY}/$service:$COMMIT_SHA\\\"\\n
        \           else\\n              # Complex update: extract from deployments
        JSON\\n              echo \\\"\U0001F50D Parsing deployments JSON for service:
        $service\\\"\\n              echo \\\"Raw deployments: $DEPLOYMENTS\\\"\\n
        \             \\n              # Parse the JSON string (it comes as a string,
        not object)\\n              DEPLOYMENTS_PARSED=$(echo \\\"$DEPLOYMENTS\\\"
        | jq -r '. // empty')\\n              if [ \\\"$DEPLOYMENTS_PARSED\\\" = \\\"null\\\"
        ] || [ -z \\\"$DEPLOYMENTS_PARSED\\\" ]; then\\n                # Try parsing
        as raw string\\n                DEPLOYMENTS_PARSED=\\\"$DEPLOYMENTS\\\"\\n
        \             fi\\n              \\n              NEW_IMAGE=$(echo \\\"$DEPLOYMENTS_PARSED\\\"
        | jq -r \\\".\\\\\\\"$service\\\\\\\".image // empty\\\")\\n              COMMIT_SHA=$(echo
        \\\"$DEPLOYMENTS_PARSED\\\" | jq -r \\\".\\\\\\\"$service\\\\\\\".commit //
        empty\\\")\\n              \\n              echo \\\"Extracted - Image: $NEW_IMAGE,
        Commit: $COMMIT_SHA\\\"\\n              \\n              if [ -z \\\"$NEW_IMAGE\\\"
        ] || [ \\\"$NEW_IMAGE\\\" = \\\"null\\\" ]; then\\n                echo \\\"⚠️
        No image found for service $service in deployments payload\\\"\\n                echo
        \\\"Available keys in deployments:\\\"\\n                echo \\\"$DEPLOYMENTS_PARSED\\\"
        | jq -r 'keys[]?' 2\\u003e/dev/null || echo \\\"Failed to parse keys\\\"\\n
        \               continue\\n              fi\\n            fi\\n            \\n
        \           echo \\\"\U0001F4DD Updating $service to image: $NEW_IMAGE\\\"\\n
        \           \\n            # Update multiple OAM file locations\\n            #
        1. Main OAM application file\\n            MAIN_OAM=\\\"oam/applications/application.yaml\\\"\\n
        \           \\n            # 2. Service-specific OAM files in vcluster directories\\n
        \           VCLUSTER_OAM_FILES=$(find . -path \\\"*/vcluster/*/applications/${service}/oam-application.yaml\\\"
        2\\u003e/dev/null)\\n            \\n            # 3. Look for any OAM file
        containing the service\\n            OTHER_OAM_FILES=$(grep -l \\\"name: ${service}\\\"
        oam/**/*.yaml 2\\u003e/dev/null || true)\\n            \\n            # Update
        main OAM file if it exists and contains the service\\n            if [ -f
        \\\"$MAIN_OAM\\\" ] \\u0026\\u0026 grep -q \\\"name: ${service}\\\" \\\"$MAIN_OAM\\\";
        then\\n              echo \\\"\U0001F4C4 Updating main OAM: $MAIN_OAM\\\"\\n
        \             echo \\\"Current image line:\\\"\\n              grep \\\"image:\\\"
        \\\"$MAIN_OAM\\\" | head -1\\n              # Update image - handle both with
        and without registry prefix\\n              sed -i \\\"s|image: docker.io/socrates12345/${service}:.*|image:
        $NEW_IMAGE|g\\\" \\\"$MAIN_OAM\\\"\\n              sed -i \\\"s|image: ${service}:.*|image:
        $NEW_IMAGE|g\\\" \\\"$MAIN_OAM\\\"\\n              echo \\\"Updated image
        line:\\\"\\n              grep \\\"image:\\\" \\\"$MAIN_OAM\\\" | head -1\\n
        \             echo \\\"✅ Updated main OAM manifest\\\"\\n            fi\\n
        \           \\n            # Update vCluster-specific OAM files\\n            if
        [ ! -z \\\"$VCLUSTER_OAM_FILES\\\" ]; then\\n              for oam_file in
        $VCLUSTER_OAM_FILES; do\\n                echo \\\"\U0001F4C4 Updating vCluster
        OAM: $oam_file\\\"\\n                sed -i \\\"s|image: .*/${service}:.*|image:
        $NEW_IMAGE|g\\\" \\\"$oam_file\\\"\\n                \\n                #
        Update version labels if they exist\\n                if [ ! -z \\\"$COMMIT_SHA\\\"
        ]; then\\n                  sed -i \\\"s|version: .*|version: $COMMIT_SHA|g\\\"
        \\\"$oam_file\\\"\\n                fi\\n                echo \\\"✅ Updated
        vCluster OAM: $oam_file\\\"\\n              done\\n            fi\\n            \\n
        \           # Update any other OAM files containing the service\\n            if
        [ ! -z \\\"$OTHER_OAM_FILES\\\" ]; then\\n              for oam_file in $OTHER_OAM_FILES;
        do\\n                if [ \\\"$oam_file\\\" != \\\"$MAIN_OAM\\\" ]; then\\n
        \                 echo \\\"\U0001F4C4 Updating additional OAM: $oam_file\\\"\\n
        \                 sed -i \\\"s|image: .*/${service}:.*|image: $NEW_IMAGE|g\\\"
        \\\"$oam_file\\\"\\n                  echo \\\"✅ Updated: $oam_file\\\"\\n
        \               fi\\n              done\\n            fi\\n            \\n
        \           # Report if no files were found\\n            if [ ! -f \\\"$MAIN_OAM\\\"
        ] \\u0026\\u0026 [ -z \\\"$VCLUSTER_OAM_FILES\\\" ] \\u0026\\u0026 [ -z \\\"$OTHER_OAM_FILES\\\"
        ]; then\\n              echo \\\"⚠️ Warning: Could not find any OAM files
        for $service\\\"\\n              echo \\\"Available OAM files:\\\"\\n              find
        . -name \\\"*.yaml\\\" -path \\\"*/oam/*\\\" -o -path \\\"*/vcluster/*\\\"
        | head -20\\n            fi\\n          done\\n\\n      - name: Commit and
        push changes\\n        run: |\\n          # Configure git\\n          git
        config user.name \\\"GitOps Bot\\\"\\n          git config user.email \\\"gitops-bot@github.com\\\"\\n
        \         \\n          # Check if there are changes\\n          if git diff
        --quiet; then\\n            echo \\\"ℹ️ No changes detected in GitOps manifests\\\"\\n
        \         else\\n            echo \\\"\U0001F4CB Changes detected:\\\"\\n
        \           git diff --name-only\\n            \\n            # Show what
        changed\\n            echo \\\"\U0001F4DD Detailed changes:\\\"\\n            git
        diff\\n            \\n            # Commit changes\\n            git add .\\n
        \           git commit -m \\\"chore: update service deployments from source
        commit ${{ github.event.client_payload.source_commit }}\\n\\n            Services
        updated: ${{ github.event.client_payload.services }}\\n            Source
        workflow: ${{ github.event.client_payload.workflow_run }}\\n            Triggered
        by: repository_dispatch\\n            \\n            Updated images:\\n            $(echo
        '${{ toJson(github.event.client_payload.deployments) }}' | jq -r 'to_entries[]
        | \\\"- \\\\(.key): \\\\(.value.image)\\\"' 2\\u003e/dev/null || echo \\\"-
        Services: ${{ github.event.client_payload.services }}\\\")\\\"\\n            \\n
        \           git push\\n            \\n            echo \\\"✅ GitOps manifests
        updated and pushed successfully!\\\"\\n            echo \\\"\U0001F504 ArgoCD
        will now detect and deploy the changes\\\"\\n          fi\\n\\n      - name:
        Summary\\n        run: |\\n          echo \\\"## \U0001F3AF GitOps Deployment
        Update Complete\\\" \\u003e\\u003e $GITHUB_STEP_SUMMARY\\n          echo \\\"\\\"
        \\u003e\\u003e $GITHUB_STEP_SUMMARY\\n          echo \\\"**Services Updated:**
        ${{ github.event.client_payload.services }}\\\" \\u003e\\u003e $GITHUB_STEP_SUMMARY\\n
        \         echo \\\"**Source Commit:** \\\\`${{ github.event.client_payload.source_commit
        }}\\\\`\\\" \\u003e\\u003e $GITHUB_STEP_SUMMARY\\n          echo \\\"**Registry:**
        ${{ github.event.client_payload.registry }}\\\" \\u003e\\u003e $GITHUB_STEP_SUMMARY\\n
        \         echo \\\"\\\" \\u003e\\u003e $GITHUB_STEP_SUMMARY\\n          echo
        \\\"\U0001F680 **Next Steps:** ArgoCD will detect manifest changes and deploy
        to cluster\\\" \\u003e\\u003e $GITHUB_STEP_SUMMARY\\nEOF\\n\\n# Create README\\ncat
        \\u003e README.md \\u003c\\u003c EOF\\n# $APP_NAME GitOps Repository\\n\\nThis
        repository contains the GitOps deployment manifests for the $APP_NAME application
        container.\\n\\n## Structure\\n\\n\\\\`\\\\`\\\\`\\n$APP_NAME-gitops/\\n├──
        apps/                    # ArgoCD Applications\\n│   ├── app-of-apps.yaml
        \   # Main App of Apps\\n│   └── environments/       # Environment-specific
        configs\\n├── oam/                     # OAM Applications and Components\\n│
        \  ├── applications/        # OAM Applications (edit here)\\n│   ├── components/
        \         # Generated OAM Components\\n│   └── workflows/           # Workflow
        definitions\\n├── manifests/               # Kubernetes manifests per service\\n│
        \  ├── service-1/          # Each microservice directory\\n│   └── service-2/\\n└──
        .github/workflows/       # GitOps automation\\n\\\\`\\\\`\\\\`\\n\\n## Deployment
        Flow\\n\\n1. Source repository CI/CD builds and pushes images\\n2. Source
        CI/CD sends repository_dispatch to this repo\\n3. GitOps workflow updates
        manifest files with new image tags\\n4. ArgoCD detects changes and deploys
        to cluster\\n\\n## ArgoCD Applications\\n\\n- **App of Apps**: `$APP_NAME-app-of-apps`
        - Main application managing all microservices\\n- **ApplicationSet**: Automatically
        creates ArgoCD apps for each service in `manifests/`\\n\\n## Adding New Services\\n\\nWhen
        ApplicationClaim creates a new microservice, it automatically:\\n1. Creates
        a directory in manifests/[service-name]/\\n2. Generates Knative service and
        OAM component manifests\\n3. Updates the ApplicationSet to include the new
        service\\nEOF\\n\\n# Commit and push\\n# Idempotent: skip commit/push if nothing
        changed (handles Crossplane Object retries)\\ngit config user.name \\\"GitOps
        Setup\\\"\\ngit config user.email \\\"gitops@platform.local\\\"\\ngit add
        .\\ngit diff --cached --quiet || git commit -m \\\"Initialize GitOps repository
        structure\\n\\n- Add ArgoCD App of Apps pattern\\n- Add ApplicationSet for
        microservices\\n- Add GitOps update automation\\n- Add environment structure\\n-
        Add OAM and manifests directories\\\"\\ngit push origin HEAD || true\\n\\n#
        Setup GitHub repository secrets for GitOps workflows\\necho \\\"Setting up
        GitHub repository secrets for GitOps...\\\"\\n\\n# Get repository public key
        for secret encryption\\nPUBLIC_KEY_RESPONSE=$(curl -s -H \\\"Authorization:
        token ${GITHUB_TOKEN}\\\" \\\\\\n  \\\"https://api.github.com/repos/${GITHUB_REPO}-gitops/actions/secrets/public-key\\\")\\n\\nPUBLIC_KEY=$(echo
        \\\"$PUBLIC_KEY_RESPONSE\\\" | jq -r '.key')\\nKEY_ID=$(echo \\\"$PUBLIC_KEY_RESPONSE\\\"
        | jq -r '.key_id')\\n\\nif [ -z \\\"$PUBLIC_KEY\\\" ] || [ -z \\\"$KEY_ID\\\"
        ]; then\\n  echo \\\"Warning: Could not retrieve public key for repository
        secrets\\\"\\nelse\\n  # Install python for encryption\\n  apk add --no-cache
        python3 py3-pip\\n  pip3 install pynacl\\n  \\n  # Create encryption script\\n
        \ cat \\u003e /tmp/encrypt_secret.py \\u003c\\u003c 'ENCRYPT_EOF'\\nimport
        sys\\nimport base64\\nfrom nacl import encoding, public\\n\\ndef encrypt_secret(public_key:
        str, secret_value: str) -\\u003e str:\\n    public_key = public.PublicKey(public_key.encode(\\\"utf-8\\\"),
        encoding.Base64Encoder())\\n    sealed_box = public.SealedBox(public_key)\\n
        \   encrypted = sealed_box.encrypt(secret_value.encode(\\\"utf-8\\\"))\\n
        \   return base64.b64encode(encrypted).decode(\\\"utf-8\\\")\\n\\nif __name__
        == \\\"__main__\\\":\\n    print(encrypt_secret(sys.argv[1], sys.argv[2]))\\nENCRYPT_EOF\\n
        \ \\n  # Create PERSONAL_ACCESS_TOKEN secret for GitOps operations\\n  ENCRYPTED_TOKEN=$(python3
        /tmp/encrypt_secret.py \\\"$PUBLIC_KEY\\\" \\\"$GITHUB_TOKEN\\\")\\n  curl
        -X PUT \\\\\\n    -H \\\"Authorization: token ${GITHUB_TOKEN}\\\" \\\\\\n
        \   -H \\\"Accept: application/vnd.github.v3+json\\\" \\\\\\n    \\\"https://api.github.com/repos/${GITHUB_REPO}-gitops/actions/secrets/PERSONAL_ACCESS_TOKEN\\\"
        \\\\\\n    -d \\\"{\\\\\\\"encrypted_value\\\\\\\":\\\\\\\"$ENCRYPTED_TOKEN\\\\\\\",\\\\\\\"key_id\\\\\\\":\\\\\\\"$KEY_ID\\\\\\\"}\\\"\\n
        \ \\n  echo \\\"✅ GitOps repository secrets created successfully\\\"\\nfi\\n\\necho
