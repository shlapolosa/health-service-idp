                        = \"lenses\"\n  storage.postgres.password = \"lenses\"\n  provisioning.path
                        = \"/mnt/settings\"\n  sql.state.dir = \"/data/lsql-state-dir\"\n
                        \ secret.file = \"/data/security.conf\"\n  storage.directory
                        = \"/data/lenses\"\n  \n  connectors.info = [\n    {       \n
