                      - "set -e\n\n# Check if this is a RASA chatbot service\nif [
                        \"$LANGUAGE\" != \"rasa\" ] || [ \"$FRAMEWORK\" != \"chatbot\"
                        ]; then\n  echo \"❌ Skipping chat repository creation - not
