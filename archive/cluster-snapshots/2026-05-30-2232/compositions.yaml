                        chatbot)\"\n  echo \"✅ Chat repository creation skipped successfully\"\n
                        \ exit 0\nfi\n\n# Install git, curl, and jq\napk add --no-cache
                        git curl jq\necho \"Adding Rasa chatbot microservice $SERVICE_NAME
                        to unified repository $APP_CONTAINER...\"\n\n# Clone unified
                        AppContainer repository\nTEMP_DIR=\"/tmp/unified-repo-$SERVICE_NAME\"\nmkdir
                        -p $TEMP_DIR\ncd $TEMP_DIR\n\n# First check if AppContainer
                        repository exists\nREPO_EXISTS=$(curl -s -H \"Authorization:
                        token $GITHUB_TOKEN\" \\\n  https://api.github.com/repos/$GITHUB_USER/$APP_CONTAINER
                        | jq -r '.name // \"null\"')\n\nif [ \"$REPO_EXISTS\" = \"null\"
                        ]; then\n  echo \"❌ AppContainer repository $APP_CONTAINER
                        does not exist yet\"\n  echo \"⏳ Waiting for AppContainer
                        to be created by other jobs...\"\n  exit 1\nfi\n\necho \"✅
                        AppContainer repository exists, cloning...\"\ngit clone https://$GITHUB_TOKEN@github.com/$GITHUB_USER/$APP_CONTAINER.git
                        .\n\n# Check if microservice already exists\nif [ -d \"microservices/$SERVICE_NAME\"
                        ]; then\n  echo \"⚠️  Microservice $SERVICE_NAME already exists
                        in $APP_CONTAINER\"\n  echo \"\U0001F504 Updating existing
                        microservice...\"\nelse\n  echo \"➕ Adding new microservice
                        $SERVICE_NAME to $APP_CONTAINER\"\n  \n  # Clone chat-template
                        to get the template\n  TEMPLATE_DIR=\"/tmp/chat-template\"\n
                        \ git clone https://$GITHUB_TOKEN@github.com/$GITHUB_USER/chat-template.git
                        $TEMPLATE_DIR\n  \n  # Copy template microservice structure\n
                        \ mkdir -p microservices/$SERVICE_NAME\n  cp -r $TEMPLATE_DIR/microservices/chat-template/*
                        microservices/$SERVICE_NAME/\n  \n  # Add chat-specific GitHub
                        Actions workflow if not exists\n  if [ ! -f \".github/workflows/chat-gitops.yml\"
                        ]; then\n    cp $TEMPLATE_DIR/.github/workflows/chat-gitops.yml
                        .github/workflows/\n  fi\n  \n  rm -rf $TEMPLATE_DIR\nfi\n\n#
                        Customize for the specific service\nsed -i \"s/chat-template/$SERVICE_NAME/g\"
                        microservices/$SERVICE_NAME/docker-compose.yml\nsed -i \"s/Development
                        Bot/$SERVICE_NAME Bot/g\" microservices/$SERVICE_NAME/docker-compose.yml\nsed
                        -i \"s/Customer Support Bot/$SERVICE_NAME Support Bot/g\"
                        microservices/$SERVICE_NAME/domain.yml\n\n# Update OAM files
                        with correct service name\nfind microservices/$SERVICE_NAME/oam/
                        -name \"*.yaml\" -exec sed -i \"s/chat-template/$SERVICE_NAME/g\"
                        {} \\;\n\n# Set git configuration\ngit config user.name \"Crossplane
                        Bot\"\ngit config user.email \"crossplane@health-service-idp.local\"\n\n#
                        Add and commit changes to unified repository\ngit add microservices/$SERVICE_NAME/\nif
                        [ -f \".github/workflows/chat-gitops.yml\" ]; then\n  git
                        add .github/workflows/chat-gitops.yml\nfi\n\n# Check if there
                        are changes to commit\nif git diff --staged --quiet; then\n
                        \ echo \"⚠️  No changes to commit for $SERVICE_NAME\"\nelse\n
                        \ git commit -m \"feat: add RASA chatbot microservice $SERVICE_NAME\"
                        -m \"- Add complete RASA chatbot implementation with dual-container
                        pattern\" -m \"- Include Rasa server and Actions server configurations\"
                        -m \"- Add chat-specific GitHub Actions workflow for Docker
                        builds\" -m \"- Support for natural language understanding
                        and custom actions\" -m \"- Ready for OAM deployment with
                        knative services\" -m \"\U0001F916 Generated with [Claude
                        Code](https://claude.ai/code)\" -m \"Co-Authored-By: Claude
                        <noreply@anthropic.com>\"\n  \n  git push origin main\n  echo
                        \"✅ RASA chatbot microservice $SERVICE_NAME added to unified
                        repository $APP_CONTAINER\"\nfi\n"
