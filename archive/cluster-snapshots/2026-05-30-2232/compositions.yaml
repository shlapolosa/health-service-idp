                  \n                  targetNamespace=\"http://bpmn.io/schema/bpmn\">\n
                  \ <bpmn:process id=\"microservice-orchestration\" name=\"Microservice
                  Orchestration\" isExecutable=\"true\">\n    \n    <bpmn:startEvent
                  id=\"StartEvent_1\" name=\"Request Received\">\n      <bpmn:outgoing>Flow_to_discover</bpmn:outgoing>\n
                  \   </bpmn:startEvent>\n    \n    <bpmn:serviceTask id=\"ServiceTask_Discover\"
                  name=\"Discover Services\">\n      <bpmn:extensionElements>\n        <zeebe:taskDefinition
                  type=\"discover-microservices\" />\n      </bpmn:extensionElements>\n
                  \     <bpmn:incoming>Flow_to_discover</bpmn:incoming>\n      <bpmn:outgoing>Flow_to_parallel</bpmn:outgoing>\n
                  \   </bpmn:serviceTask>\n    \n    <bpmn:parallelGateway id=\"ParallelGateway_Split\"
                  name=\"Split\">\n      <bpmn:incoming>Flow_to_parallel</bpmn:incoming>\n
                  \     <bpmn:outgoing>Flow_to_service_a</bpmn:outgoing>\n      <bpmn:outgoing>Flow_to_service_b</bpmn:outgoing>\n
                  \   </bpmn:parallelGateway>\n    \n    <bpmn:serviceTask id=\"ServiceTask_A\"
                  name=\"Call Service A\">\n      <bpmn:extensionElements>\n        <zeebe:taskDefinition
                  type=\"call-microservice-a\" />\n      </bpmn:extensionElements>\n
                  \     <bpmn:incoming>Flow_to_service_a</bpmn:incoming>\n      <bpmn:outgoing>Flow_from_service_a</bpmn:outgoing>\n
                  \   </bpmn:serviceTask>\n    \n    <bpmn:serviceTask id=\"ServiceTask_B\"
                  name=\"Call Service B\">\n      <bpmn:extensionElements>\n        <zeebe:taskDefinition
                  type=\"call-microservice-b\" />\n      </bpmn:extensionElements>\n
                  \     <bpmn:incoming>Flow_to_service_b</bpmn:incoming>\n      <bpmn:outgoing>Flow_from_service_b</bpmn:outgoing>\n
                  \   </bpmn:serviceTask>\n    \n    <bpmn:parallelGateway id=\"ParallelGateway_Join\"
                  name=\"Join\">\n      <bpmn:incoming>Flow_from_service_a</bpmn:incoming>\n
                  \     <bpmn:incoming>Flow_from_service_b</bpmn:incoming>\n      <bpmn:outgoing>Flow_to_aggregate</bpmn:outgoing>\n
                  \   </bpmn:parallelGateway>\n    \n    <bpmn:serviceTask id=\"ServiceTask_Aggregate\"
                  name=\"Aggregate Results\">\n      <bpmn:extensionElements>\n        <zeebe:taskDefinition
                  type=\"aggregate-results\" />\n      </bpmn:extensionElements>\n
                  \     <bpmn:incoming>Flow_to_aggregate</bpmn:incoming>\n      <bpmn:outgoing>Flow_to_end</bpmn:outgoing>\n
                  \   </bpmn:serviceTask>\n    \n    <bpmn:endEvent id=\"EndEvent_1\"
                  name=\"Process Complete\">\n      <bpmn:incoming>Flow_to_end</bpmn:incoming>\n
                  \   </bpmn:endEvent>\n    \n    <!-- Sequence Flows -->\n    <bpmn:sequenceFlow
