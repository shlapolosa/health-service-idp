                        \     name          = \"Snowflake Kafka Connector\"\n      sink
                        \         = true\n      description   = \"Writes Kafka data
                        into Snowflake for analytics.\"\n      docs          = \"https://docs.snowflake.com/en/user-guide/kafka-connector.html\"\n
                        \     author        = \"Snowflake\"\n    }\n  ]\n}\nEOF\n\n#
