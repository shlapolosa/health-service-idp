                        > /mnt/settings/provisioning.yaml << EOF\nlensesHq:\n  - configuration:\n
                        \     agentKey:\n        value: $AGENT_KEY\n      port:\n
                        \       value: 10000\n      server:\n        value: lenses-hq\n
                        \   name: lenses-hq\n    tags: ['hq']\n    version: 1\nkafka:\n
                        \ - name: kafka\n    version: 1\n    tags: ['kafka', 'dev']\n
                        \   configuration:\n      kafkaBootstrapServers:\n        value:
                        [PLAINTEXT://$KAFKA_SERVICE.$NAMESPACE.svc.cluster.local:9092]\n
                        \     protocol:\n        value: PLAINTEXT\nconfluentSchemaRegistry:\n
                        \ - name: schema-registry\n    version: 1\n    tags: ['dev']\n
                        \   configuration:\n      schemaRegistryUrls:\n        value:
                        [http://$KAFKA_SERVICE.$NAMESPACE.svc.cluster.local:8081]\nconnect:\n
                        \ - name: dev\n    version: 1\n    tags: ['dev']\n    configuration:\n
                        \     workers:\n        value: [http://$KAFKA_SERVICE.$NAMESPACE.svc.cluster.local:8083]\n
                        \     aes256Key:\n        value: 0123456789abcdef0123456789abcdef\nEOF\n"
