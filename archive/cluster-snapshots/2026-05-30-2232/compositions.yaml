    - base:
        apiVersion: kubernetes.crossplane.io/v1alpha1
        kind: Object
        spec:
          forProvider:
            manifest:
              apiVersion: batch/v1
              kind: Job
              metadata:
                labels:
                  app.kubernetes.io/name: kafka-config
                name: kafka-config-job
                namespace: placeholder-realtime
              spec:
                template:
                  spec:
                    containers:
                    - command:
                      - sh
                      - -c
                      - "# Wait for Kafka to be ready\necho \"Waiting for Kafka to
                        be ready...\"\nuntil kubectl exec -n $NAMESPACE deployment/demo-kafka
                        -- curl -f http://localhost:9092 >/dev/null 2>&1 || kubectl
                        exec -n $NAMESPACE deployment/demo-kafka -- supervisorctl
                        status broker | grep RUNNING >/dev/null; do\n  echo \"Waiting
                        for Kafka...\"\n  sleep 5\ndone\n\n# Wait for Schema Registry
                        to be ready\necho \"Waiting for Schema Registry to be ready...\"\nuntil
                        kubectl exec -n $NAMESPACE deployment/demo-kafka -- curl -f
                        http://localhost:8081/subjects >/dev/null 2>&1; do\n  echo
                        \"Waiting for Schema Registry...\"\n  sleep 5\ndone\n\n# Wait
                        for Kafka Connect to be ready\necho \"Waiting for Kafka Connect
                        to be ready...\"\nuntil kubectl exec -n $NAMESPACE deployment/demo-kafka
                        -- curl -f http://localhost:8083/connectors >/dev/null 2>&1;
                        do\n  echo \"Waiting for Kafka Connect...\"\n  sleep 5\ndone\n\necho
                        \"All Kafka services are ready! Installing Snowflake connector...\"\n\n#
                        Install Snowflake connector in Kafka container\necho \"\U0001F4E6
                        Installing Snowflake Kafka Connector...\"\nkubectl exec -n
                        $NAMESPACE deployment/demo-kafka -- bash -c \"\n  # Update
                        package list and install wget if not present\n  apt-get update
                        && apt-get install -y wget || echo 'wget already installed'\n
                        \ \n  # Download Snowflake Kafka Connector if not exists\n
                        \ if [ ! -f /connectors/snowflake-kafka-connector-3.1.0.jar
                        ]; then\n    cd /connectors\n    echo 'Downloading Snowflake
                        Kafka Connector...'\n    wget -O snowflake-kafka-connector-3.1.0.jar
                        https://repo1.maven.org/maven2/com/snowflake/snowflake-kafka-connector/3.1.0/snowflake-kafka-connector-3.1.0.jar\n
                        \   echo 'Snowflake connector downloaded successfully'\n  else\n
                        \   echo 'Snowflake connector already exists'\n  fi\n  \n
                        \ # Restart Kafka Connect to load new connector\n  echo 'Restarting
                        Kafka Connect to load connector...'\n  if supervisorctl status
                        connect-distributed | grep -q RUNNING; then\n    supervisorctl
                        restart connect-distributed\n    echo 'Kafka Connect restarted
                        successfully'\n  else\n    echo 'Kafka Connect not running,
                        starting...'\n    supervisorctl start connect-distributed\n
                        \ fi\n\"\n\n# Wait for Kafka Connect to restart and be ready\necho
                        \"⏳ Waiting for Kafka Connect to restart...\"\nsleep 10\nuntil
                        kubectl exec -n $NAMESPACE deployment/demo-kafka -- curl -f
                        http://localhost:8083/connectors >/dev/null 2>&1; do\n  echo
                        \"Waiting for Kafka Connect to be ready after restart...\"\n
                        \ sleep 5\ndone\n\n# Verify Snowflake connector is available\necho
                        \"\U0001F50D Verifying Snowflake connector installation...\"\nRETRIES=0\nMAX_RETRIES=10\nwhile
                        [ $RETRIES -lt $MAX_RETRIES ]; do\n  if kubectl exec -n $NAMESPACE
                        deployment/demo-kafka -- curl -s http://demo-kafka:8083/connector-plugins
                        | grep -q \"SnowflakeSinkConnector\"; then\n    echo \"✅ Snowflake
                        connector installed and available!\"\n    break\n  else\n
                        \   echo \"Waiting for connector to be available... (attempt
                        $((RETRIES + 1))/$MAX_RETRIES)\"\n    sleep 10\n    RETRIES=$((RETRIES
                        + 1))\n  fi\ndone\n\nif [ $RETRIES -eq $MAX_RETRIES ]; then\n
                        \ echo \"⚠️  Snowflake connector installation may have failed\"\nfi\n\necho
                        \"\U0001F389 Kafka configuration job completed successfully!\"\n"
                      env:
                      - name: NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      image: alpine/k8s:1.28.4
                      name: kafka-config
                    restartPolicy: OnFailure
