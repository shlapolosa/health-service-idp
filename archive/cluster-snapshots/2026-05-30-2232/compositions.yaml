                        +x /tmp/vcluster\n\n# Get vCluster kubeconfig\n/tmp/vcluster
                        connect $VCLUSTER_NAME --namespace $NAMESPACE --update-current=false
                        --kube-config=/tmp/kubeconfig.yaml\nexport KUBECONFIG=/tmp/kubeconfig.yaml\n\n#
                        Check if Knative is already installed\nif kubectl get namespace
                        knative-serving >/dev/null 2>&1; then\n  echo \"✅ Knative
