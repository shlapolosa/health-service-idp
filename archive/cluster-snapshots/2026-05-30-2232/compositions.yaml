                        -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl\"\nchmod
                        +x kubectl\nmv kubectl /usr/local/bin/\n\nTEMP_DIR=\"/tmp/repo-$APP_NAME\"\nmkdir
                        -p $TEMP_DIR\ncd $TEMP_DIR\n\n# Clone the repository\ngit
