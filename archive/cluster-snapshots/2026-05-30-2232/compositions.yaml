                        \"Waiting for AppContainerClaim $APP_CONTAINER to be ready...\"\n\nTIMEOUT=300\nELAPSED=0\n\nwhile
                        [ $ELAPSED -lt $TIMEOUT ]; do\n  # Check if AppContainerClaim
                        exists and get repository URL\n  REPO_URL=$(kubectl get appcontainerclaim
                        \"$APP_CONTAINER\" -n \"$NAMESPACE\" -o jsonpath='{.status.sourceRepository.url}'
                        2>/dev/null || echo \"\")\n  CLONE_URL=$(kubectl get appcontainerclaim
                        \"$APP_CONTAINER\" -n \"$NAMESPACE\" -o jsonpath='{.status.sourceRepository.cloneUrl}'
                        2>/dev/null || echo \"\")\n  \n  if [ -n \"$REPO_URL\" ];
                        then\n    echo \"✅ Found repository URL: $REPO_URL\"\n    echo
                        \"✅ Found clone URL: $CLONE_URL\"\n    \n    # Find associated
                        Knative service\n    KNATIVE_SERVICE=\"\"\n    if kubectl
                        get ksvc \"$SERVICE_NAME\" -n \"$NAMESPACE\" >/dev/null 2>&1;
                        then\n      KNATIVE_SERVICE=\"$SERVICE_NAME\"\n    elif kubectl
                        get ksvc \"${SERVICE_NAME}-realtime-service\" -n \"$NAMESPACE\"
                        >/dev/null 2>&1; then\n      KNATIVE_SERVICE=\"${SERVICE_NAME}-realtime-service\"\n
                        \   elif kubectl get ksvc \"${SERVICE_NAME}-service\" -n \"$NAMESPACE\"
                        >/dev/null 2>&1; then\n      KNATIVE_SERVICE=\"${SERVICE_NAME}-service\"\n
                        \   fi\n    \n    echo \"Found Knative Service: $KNATIVE_SERVICE\"\n
                        \   \n    # Update ApplicationClaim status\n    kubectl patch
                        applicationclaim \"$SERVICE_NAME\" -n \"$NAMESPACE\" --type=merge
                        --subresource=status -p \"{\n      \\\"status\\\": {\n        \\\"repository\\\":
                        {\n          \\\"url\\\": \\\"$REPO_URL\\\",\n          \\\"cloneUrl\\\":
                        \\\"$CLONE_URL\\\"\n        },\n        \\\"application\\\":
                        {\n          \\\"knativeService\\\": \\\"$KNATIVE_SERVICE\\\"\n
                        \       }\n      }\n    }\"\n    \n    echo \"✅ ApplicationClaim
                        status synchronized from AppContainerClaim\"\n    exit 0\n
                        \ fi\n  \n  echo \"Waiting for AppContainerClaim repository
                        status... (${ELAPSED}s/${TIMEOUT}s)\"\n  sleep 10\n  ELAPSED=$((ELAPSED
                        + 10))\ndone\n\necho \"❌ Timeout waiting for AppContainerClaim
                        repository status\"\nexit 1\n"
