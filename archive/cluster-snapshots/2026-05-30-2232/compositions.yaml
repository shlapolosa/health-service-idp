                        ${{ github.event.client_payload.registry }}\" >> $GITHUB_STEP_SUMMARY\n
                        \         echo \"\" >> $GITHUB_STEP_SUMMARY\n          echo
                        \"\U0001F680 **Next Steps:** ArgoCD will detect manifest changes
                        and deploy to cluster\" >> $GITHUB_STEP_SUMMARY\nEOF\n\n#
                        Create README\ncat > README.md << EOF\n# $APP_NAME GitOps
                        Repository\n\nThis repository contains the GitOps deployment
                        manifests for the $APP_NAME application container.\n\n## Structure\n\n\\`\\`\\`\n$APP_NAME-gitops/\n├──
                        apps/                    # ArgoCD Applications\n│   ├── app-of-apps.yaml
                        \   # Main App of Apps\n│   └── environments/       # Environment-specific
                        configs\n├── oam/                     # OAM Applications and
                        Components\n│   ├── applications/        # OAM Applications
                        (edit here)\n│   ├── components/          # Generated OAM
                        Components\n│   └── workflows/           # Workflow definitions\n├──
