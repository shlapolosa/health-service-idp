                        \"$SECRET_COUNT\"\n    secret-injector.platform.example.org/discovered-secrets:
                        \"$DISCOVERED_SECRETS\"\ntype: Opaque\nstringData:\n  REALTIME_PLATFORM_NAME:
                        \"$REALTIME_PLATFORM_NAME\"\n  WEBSERVICE_NAME: \"$WEBSERVICE_NAME\"\n
                        \ INTEGRATION_ENABLED: \"true\"\n  SECRET_DISCOVERY_PATTERN:
                        \"${REALTIME_PLATFORM_NAME}-*-secret\"\n  DISCOVERED_SECRET_COUNT:
                        \"$SECRET_COUNT\"\nEOF\n\n# Annotate the webservice for integration
                        status\necho \"\U0001F4DD Updating webservice annotations...\"\n\nkubectl
                        annotate ksvc \"$WEBSERVICE_NAME\" -n \"$TARGET_NAMESPACE\"
