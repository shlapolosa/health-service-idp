                        \\\n    -d \"{\\\"encrypted_value\\\":\\\"$ENCRYPTED_TOKEN\\\",\\\"key_id\\\":\\\"$KEY_ID\\\"}\"\n
                        \ \n  echo \"✅ GitOps repository secrets created successfully\"\nfi\n\necho
                        \"GitOps repository setup completed successfully\"\n"
