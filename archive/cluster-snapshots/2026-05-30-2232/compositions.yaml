                        knative-serving controller >/dev/null 2>&1; then\n    echo
                        \"✅ Knative is already installed\"\n    exit 0\n  fi\nfi\n\necho
                        \"\U0001F4E6 Installing Knative Serving...\"\n\n# Create namespace\nkubectl
                        create namespace knative-serving --dry-run=client -o yaml
                        | kubectl apply -f -\n\n# Install Knative Serving CRDs and
                        Core\nkubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.12.0/serving-crds.yaml\nkubectl
                        apply -f https://github.com/knative/serving/releases/download/knative-v1.12.0/serving-core.yaml\n\n#
                        Install Kourier as the networking layer (lightweight alternative
