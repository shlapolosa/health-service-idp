                        docker.io\n  REGISTRY_USERNAME: socrates12345\n  GITOPS_REPO:
                        APP_NAME_PLACEHOLDER-gitops\njobs:\n  minimal-deploy:\n    runs-on:
                        ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n
                        \     - name: Build and deploy\n        run: echo \"Minimal
                        deployment pipeline activated\"\nFALLBACK_EOF\n}\n\n# Substitute
