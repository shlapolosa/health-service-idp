    - base:
        apiVersion: kubernetes.crossplane.io/v1alpha1
        kind: Object
        spec:
          forProvider:
            manifest:
              apiVersion: batch/v1
              kind: CronJob
              metadata:
                name: multi-env-secret-sync
                namespace: default
              spec:
                concurrencyPolicy: Replace
                jobTemplate:
                  spec:
                    template:
                      spec:
                        containers:
                        - command:
                          - sh
                          - -c
                          - "echo \"Starting multi-environment secret sync...\"\n\n#
                            Get all realtime namespaces\nNAMESPACES=$(kubectl get
                            ns -l app.kubernetes.io/part-of=realtime-platform -o jsonpath='{.items[*].metadata.name}')\n\nif
                            [ -z \"$NAMESPACES\" ]; then\n  echo \"No realtime-platform
                            namespaces found\"\n  exit 0\nfi\n\nfor ns in $NAMESPACES;
                            do\n  echo \"Processing namespace: $ns\"\n  \n  # Check
                            if namespace still exists (it might have been deleted)\n
                            \ if ! kubectl get namespace \"$ns\" >/dev/null 2>&1;
                            then\n    echo \"⚠️  Namespace $ns no longer exists, skipping...\"\n
                            \   continue\n  fi\n  \n  # Get the base secret from default
                            namespace\n  BASE_SECRET=$(kubectl get secret lenses-credentials
                            -n default -o yaml 2>/dev/null)\n  if [ $? -ne 0 ]; then\n
                            \   echo \"ERROR: lenses-credentials secret not found
                            in default namespace\"\n    continue\n  fi\n  \n  # Look
                            for namespace-specific agent key\n  AGENT_KEY_VAR=\"${ns}-agent-key\"\n
                            \ AGENT_KEY=$(kubectl get configmap env-agent-keys -n
                            default -o jsonpath=\"{.data.${AGENT_KEY_VAR}}\" 2>/dev/null
                            || echo \"\")\n  \n  if [ -z \"$AGENT_KEY\" ]; then\n
                            \   echo \"WARNING: No agent key found for namespace $ns\"\n
                            \   continue\n  fi\n  \n  echo \"Found agent key for $ns\"\n
                            \ \n  # Copy base secret to target namespace\n  echo \"$BASE_SECRET\"
                            | \\\n    sed \"s/namespace: default/namespace: $ns/\"
                            | \\\n    sed '/resourceVersion:/d' | \\\n    sed '/uid:/d'
                            | \\\n    sed '/creationTimestamp:/d' | \\\n    kubectl
                            apply -f -\n  \n  # Add namespace-specific agent key using
                            kubectl patch\n  AGENT_KEY_B64=$(echo -n \"$AGENT_KEY\"
                            | base64 -w 0)\n  kubectl patch secret lenses-credentials
                            -n $ns --type='merge' -p=\"{\\\"data\\\":{\\\"AGENT_KEY\\\":\\\"$AGENT_KEY_B64\\\"}}\"\n
                            \ \n  if [ $? -eq 0 ]; then\n    echo \"✅ Secret synced
                            successfully to $ns\"\n    \n    # Check if lenses-agent
                            deployment exists before restarting\n    if kubectl get
                            deployment lenses-agent -n $ns >/dev/null 2>&1; then\n
                            \     echo \"\U0001F504 Restarting lenses-agent in $ns...\"\n
                            \     kubectl rollout restart deployment/lenses-agent
                            -n $ns\n    else\n      echo \"ℹ️  No lenses-agent deployment
                            found in $ns (may not be deployed yet)\"\n    fi\n    \n
                            \ else\n    echo \"❌ Failed to sync secret to $ns\"\n
                            \ fi\ndone\n\necho \"Multi-environment secret sync completed\"\n"
                          image: alpine/k8s:1.28.4
                          name: sync-secrets
                        restartPolicy: OnFailure
                        serviceAccountName: secret-copier
                schedule: '*/2 * * * *'
          providerConfigRef:
            name: kubernetes-provider
      name: multi-env-secret-sync-cronjob
      patches:
      - fromFieldPath: spec.name
        toFieldPath: metadata.name
        transforms:
        - string:
            fmt: '%s-multi-env-secret-sync'
            type: Format
          type: string
        type: FromCompositeFieldPath
      readinessChecks:
      - matchCondition:
          status: "True"
          type: Ready
        type: MatchCondition
    writeConnectionSecretsToNamespace: crossplane-system
