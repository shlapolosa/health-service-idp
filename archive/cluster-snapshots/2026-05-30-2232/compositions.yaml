    - base:
        apiVersion: kubernetes.crossplane.io/v1alpha1
        kind: Object
        spec:
          forProvider:
            manifest:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: placeholder
                namespace: placeholder
              spec:
                backoffLimit: 2
                template:
                  spec:
                    containers:
                    - command:
                      - /bin/sh
                      - -c
                      - "set -e\necho \"Registering vCluster with ClusterGateway...\"\n\nVCLUSTER_NAME=\"${VCLUSTER_NAME}\"\nNAMESPACE=\"${NAMESPACE}\"\n\n#
                        Install vela CLI\necho \"Installing vela CLI...\"\nwget -q
                        -O /tmp/vela https://github.com/kubevela/kubevela/releases/download/v1.9.11/vela-v1.9.11-linux-amd64.tar.gz\ntar
                        -xzf /tmp/vela -C /tmp/\nchmod +x /tmp/linux-amd64/vela\nexport
                        PATH=/tmp/linux-amd64:$PATH\n\n# Wait for vCluster creation
                        job to complete first\necho \"Waiting for vCluster creation
                        job to complete...\"\nkubectl wait --for=condition=complete
                        job/${VCLUSTER_NAME}-vcluster-create -n ${NAMESPACE} --timeout=600s
                        || {\n  echo \"vCluster creation job did not complete, checking
                        status...\"\n  kubectl get job/${VCLUSTER_NAME}-vcluster-create
                        -n ${NAMESPACE}\n}\n\n# Wait for vCluster pod to be ready\necho
                        \"Waiting for vCluster pod to be ready...\"\nkubectl wait
                        --for=condition=ready pod -l app=vcluster -n $NAMESPACE --timeout=300s
                        || true\n\n# Wait for vCluster secret to be created\necho
                        \"Waiting for vCluster secret...\"\nfor i in $(seq 1 60);
                        do\n  if kubectl get secret vc-${VCLUSTER_NAME} -n ${NAMESPACE}
                        >/dev/null 2>&1; then\n    echo \"vCluster secret found!\"\n
                        \   break\n  fi\n  echo \"Waiting for vCluster secret... ($i/60)\"\n
                        \ sleep 5\ndone\n\n# Wait for the exposed vCluster LoadBalancer
                        to get an external IP\necho \"Waiting for vCluster LoadBalancer
                        external IP...\"\nLB_IP=\"\"\nfor i in $(seq 1 30); do\n  LB_IP=$(kubectl
                        get svc ${VCLUSTER_NAME}-lb -n ${NAMESPACE} -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
                        2>/dev/null)\n  [ -n \"$LB_IP\" ] && break\n  echo \"Waiting
                        for LB IP... ($i/30)\"\n  sleep 10\ndone\nif [ -z \"$LB_IP\"
                        ]; then\n  echo \"❌ vCluster LoadBalancer never got an external
                        IP\"\n  exit 1\nfi\necho \"vCluster LoadBalancer IP: ${LB_IP}\"\n\n#
                        Build the join kubeconfig FROM THE vCluster SECRET (it is
                        complete and has a\n# current-context, unlike 'vcluster connect
                        --print' which only prints status).\n# Point the server at
                        the LB IP and skip TLS verify (LB IP is not in the cert SAN).\necho
                        \"Building vCluster kubeconfig from secret vc-${VCLUSTER_NAME}...\"\nkubectl
                        get secret vc-${VCLUSTER_NAME} -n ${NAMESPACE} -o jsonpath='{.data.config}'
                        | base64 -d \\\n  | sed \"s|server: https://localhost:8443|server:
                        https://${LB_IP}:443|\" \\\n  | sed \"/certificate-authority-data:/d\"
                        \\\n  | yq e '.clusters[0].cluster.\"insecure-skip-tls-verify\"
                        = true' - > /tmp/vcluster.kubeconfig\nENDPOINT=\"${LB_IP}\"\necho
                        \"vCluster endpoint: $ENDPOINT (LoadBalancer IP)\"\n\n# Patch
                        the vc-<name> secret's config so the host Crossplane ProviderConfig
                        (which reads\n# vc-<name>/config) reaches the vCluster via
                        the LB IP instead of localhost:8443. Without\n# this, the
                        kubevela-access SA/CRB/token Objects can't be created in the
                        vCluster and the\n# claim never becomes Ready.\necho \"Patching
                        vc-${VCLUSTER_NAME} secret config to the LB-IP kubeconfig...\"\nkubectl
                        patch secret vc-${VCLUSTER_NAME} -n ${NAMESPACE} --type=merge
                        \\\n  -p \"{\\\"data\\\":{\\\"config\\\":\\\"$(base64 < /tmp/vcluster.kubeconfig
                        | tr -d '\\n')\\\"}}\" || true\n\n# Register vCluster with
                        KubeVela using vela cluster join\necho \"Registering vCluster
                        with KubeVela...\"\n\n# First, try to detach the existing
                        cluster if it exists\nif vela cluster list | grep -q ${VCLUSTER_NAME};
                        then\n  echo \"Existing cluster registration found, detaching
                        first...\"\n  vela cluster detach ${VCLUSTER_NAME} 2>/dev/null
                        || true\n  sleep 5\nfi\n\n# Now register the vCluster with
                        the new endpoint\nfor attempt in $(seq 1 3); do\n  if vela
                        cluster join /tmp/vcluster.kubeconfig --name ${VCLUSTER_NAME};
                        then\n    echo \"✅ Successfully registered vCluster!\"\n    break\n
                        \ else\n    echo \"Registration attempt $attempt failed, retrying
                        in 30s...\"\n    sleep 30\n  fi\ndone\n\n# Verify registration\necho
                        \"Verifying cluster registration...\"\nif vela cluster list
                        | grep -q ${VCLUSTER_NAME}; then\n  echo \"✅ vCluster ${VCLUSTER_NAME}
                        successfully registered with KubeVela\"\n  \n  # Create namespace
                        in vCluster for OAM deployment\n  echo \"Creating namespace
                        ${VCLUSTER_NAME} in vCluster...\"\n  export KUBECONFIG=/tmp/vcluster.kubeconfig\n
                        \ kubectl create namespace ${VCLUSTER_NAME} --dry-run=client
                        -o yaml | kubectl apply -f -\n  echo \"✅ Namespace ${VCLUSTER_NAME}
                        created in vCluster\"\n  \n  # Also create the default namespace
                        if not exists (for KubeVela)\n  kubectl create namespace default
                        --dry-run=client -o yaml | kubectl apply -f -\n  \n  # Create
                        knative-docker-sa service account in default namespace\n  echo
                        \"Creating knative-docker-sa service account in default namespace...\"\n
                        \ kubectl create serviceaccount knative-docker-sa -n default
                        --dry-run=client -o yaml | kubectl apply -f -\n  \n  # Copy
                        IMAGE PULL secrets into the vCluster so Knative can pull PRIVATE\n
                        \ # images. Generated microservices push to ACR (healthidpuaeacr.azurecr.io),\n
                        \ # so acr-credentials is REQUIRED. BUG FIXED (ADR-037): previously
                        ONLY the\n  # Docker Hub docker-registry-secret was copied
                        and acr-credentials was never\n  # seeded, so ACR pulls failed
                        \"UNAUTHORIZED\" -> RevisionMissing/ContainerMissing\n  #
                        and the service never started. Knative pods run as knative-docker-sa,
                        so we\n  # also attach the pull secret to that SA (and default)
                        -> every revision pulls\n  # from ACR without needing per-app
                        registry config.\n  echo \"Copying image pull secrets (acr-credentials
                        + docker-registry-secret) into vCluster...\"\n  unset KUBECONFIG\n
                        \ for PULL_NS in default ${VCLUSTER_NAME}; do\n    KUBECONFIG=/tmp/vcluster.kubeconfig
                        kubectl create namespace ${PULL_NS} --dry-run=client -o yaml
                        | KUBECONFIG=/tmp/vcluster.kubeconfig kubectl apply -f - 2>/dev/null
                        || true\n    KUBECONFIG=/tmp/vcluster.kubeconfig kubectl create
                        serviceaccount knative-docker-sa -n ${PULL_NS} --dry-run=client
                        -o yaml | KUBECONFIG=/tmp/vcluster.kubeconfig kubectl apply
                        -f - 2>/dev/null || true\n    for PULL_SECRET in acr-credentials
                        docker-registry-secret; do\n      kubectl get secret ${PULL_SECRET}
                        -n default -o yaml 2>/dev/null \\\n        | sed -e '/resourceVersion:/d'
                        -e '/uid:/d' -e '/creationTimestamp:/d' -e '/selfLink:/d'
                        -e '/namespace:/d' \\\n        | KUBECONFIG=/tmp/vcluster.kubeconfig
                        kubectl apply -n ${PULL_NS} -f - >/dev/null 2>&1 \\\n        &&
                        echo \"  ok ${PULL_SECRET} -> ${PULL_NS}\" \\\n        ||
                        echo \"  note: ${PULL_SECRET} not in host/default; skipped
                        for ${PULL_NS}\"\n    done\n    for SA in knative-docker-sa
                        default; do\n      KUBECONFIG=/tmp/vcluster.kubeconfig kubectl
                        patch serviceaccount ${SA} -n ${PULL_NS} \\\n        -p '{\"imagePullSecrets\":[{\"name\":\"acr-credentials\"}]}'
                        2>/dev/null \\\n        && echo \"  ok ${SA}@${PULL_NS} imagePullSecrets=acr-credentials\"
                        || true\n    done\n  done\n  export KUBECONFIG=/tmp/vcluster.kubeconfig\n
                        \ \n  # Apply webservice WorkloadDefinition to vCluster for
                        Knative support\n  echo \"Applying webservice WorkloadDefinition
                        to vCluster (best-effort)...\"\n  cat <<'WD_EOF' | kubectl
                        apply -f - || echo \"WorkloadDefinition CRD not present in
                        vCluster (expected - KubeVela renders in host and syncs the
                        Knative Service); skipping\"\n  apiVersion: core.oam.dev/v1beta1\n
                        \ kind: WorkloadDefinition\n  metadata:\n    name: webservice\n
                        \   namespace: default\n    annotations:\n      definition.oam.dev/description:
                        \"Knative Service workload for serverless deployment\"\n  spec:\n
                        \   definitionRef:\n      name: services.serving.knative.dev\n
                        \   schematic:\n      cue:\n        template: |\n          output:
                        {\n            apiVersion: \"serving.knative.dev/v1\"\n            kind:
                        \"Service\"\n            metadata: {\n              name:
                        context.name\n              namespace: context.namespace\n
                        \           }\n            spec: {\n              template:
                        {\n                metadata: {\n                  annotations:
                        {\n                    \"autoscaling.knative.dev/minScale\":
                        \"0\"\n                    \"autoscaling.knative.dev/maxScale\":
                        \"10\"\n                  }\n                }\n                spec:
                        {\n                  containers: [{\n                    image:
                        parameter.image\n                    ports: [{\n                      containerPort:
                        parameter.port\n                    }]\n                    resources:
                        {\n                      limits: {\n                        cpu:
                        \"500m\"\n                        memory: \"512Mi\"\n                      }\n
                        \                   }\n                  }]\n                }\n
                        \             }\n            }\n          }\n          parameter:
                        {\n            image: string\n            port: *8080 | int\n
                        \         }\nWD_EOF\n  echo \"✅ WorkloadDefinition applied
                        to vCluster\"\nelse\n  echo \"⚠️ vCluster registration may
                        have failed, please check manually\"\nfi\n"
                      env:
                      - name: VCLUSTER_NAME
                        value: placeholder
                      - name: NAMESPACE
                        value: placeholder
                      image: alpine/k8s:1.28.4
                      name: register-clustergateway
                    restartPolicy: OnFailure
                    serviceAccountName: crossplane-admin
                ttlSecondsAfterFinished: 600
          providerConfigRef:
            name: kubernetes-provider
      name: vcluster-register-clustergateway
      patches:
      - fromFieldPath: spec.name
        toFieldPath: metadata.name
        transforms:
        - string:
            fmt: '%s-register-clustergateway'
            type: Format
          type: string
        type: FromCompositeFieldPath
      - fromFieldPath: spec.name
        toFieldPath: spec.forProvider.manifest.metadata.name
        transforms:
        - string:
            fmt: '%s-register-clustergateway'
            type: Format
          type: string
        type: FromCompositeFieldPath
      - fromFieldPath: spec.name
        toFieldPath: spec.forProvider.manifest.metadata.namespace
        type: FromCompositeFieldPath
      - fromFieldPath: spec.name
        toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].env[0].value
        type: FromCompositeFieldPath
      - fromFieldPath: spec.name
        toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].env[1].value
        type: FromCompositeFieldPath
      readinessChecks:
      - matchCondition:
          status: "True"
          type: Ready
