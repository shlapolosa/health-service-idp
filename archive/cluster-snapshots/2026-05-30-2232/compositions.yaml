                  />\n    <bpmn:sequenceFlow id=\"Flow_to_parallel\" sourceRef=\"ServiceTask_Discover\"
                  targetRef=\"ParallelGateway_Split\" />\n    <bpmn:sequenceFlow id=\"Flow_to_service_a\"
