                      - "set -e\necho \"\U0001F50D Secret Injector: Discovering realtime
                        platform secrets...\"\necho \"Target webservice: $WEBSERVICE_NAME\"\necho
                        \"Realtime platform: $REALTIME_PLATFORM_NAME\"\necho \"Namespace:
                        $TARGET_NAMESPACE\"\n\n# Standardized secret naming pattern:
                        {platform-name}-{service}-secret\nKAFKA_SECRET=\"${REALTIME_PLATFORM_NAME}-kafka-secret\"\nMQTT_SECRET=\"${REALTIME_PLATFORM_NAME}-mqtt-secret\"\nDB_SECRET=\"${REALTIME_PLATFORM_NAME}-db-secret\"\nMETABASE_SECRET=\"${REALTIME_PLATFORM_NAME}-metabase-secret\"\nLENSES_SECRET=\"${REALTIME_PLATFORM_NAME}-lenses-secret\"\n\necho
                        \"\U0001F4CB Expected secret names:\"\necho \"  Kafka: $KAFKA_SECRET\"\necho
                        \"  MQTT: $MQTT_SECRET\" \necho \"  Database: $DB_SECRET\"\necho
                        \"  Metabase: $METABASE_SECRET\"\necho \"  Lenses: $LENSES_SECRET\"\n\n#
                        Discover available secrets\nDISCOVERED_SECRETS=\"\"\nSECRET_COUNT=0\n\necho
                        \"\U0001F50E Discovering available secrets...\"\nfor SECRET
                        in $KAFKA_SECRET $MQTT_SECRET $DB_SECRET $METABASE_SECRET
                        $LENSES_SECRET; do\n  if kubectl get secret \"$SECRET\" -n
                        \"$TARGET_NAMESPACE\" --ignore-not-found 2>/dev/null | grep
                        -q \"$SECRET\"; then\n    echo \"✅ Found: $SECRET\"\n    DISCOVERED_SECRETS=\"$DISCOVERED_SECRETS
                        $SECRET\"\n    SECRET_COUNT=$((SECRET_COUNT + 1))\n    \n
                        \   # Add discoverability labels\n    kubectl label secret
                        \"$SECRET\" -n \"$TARGET_NAMESPACE\" \\\n      \"app.kubernetes.io/discoverable=true\"
                        \\\n      \"realtime.platform.example.org/name=$REALTIME_PLATFORM_NAME\"
                        \\\n      \"webservice.example.org/injectable=true\" \\\n
                        \     --overwrite 2>/dev/null || echo \"Warning: Could not
                        label $SECRET\"\n  else\n    echo \"❌ Missing: $SECRET\"\n
                        \ fi\ndone\n\necho \"\U0001F4CA Discovery Summary:\"\necho
                        \"  Total secrets found: $SECRET_COUNT\"\necho \"  Discovered
                        secrets: $DISCOVERED_SECRETS\"\n\nif [ $SECRET_COUNT -eq 0
                        ]; then\n  echo \"⚠️ No secrets discovered for realtime platform:
                        $REALTIME_PLATFORM_NAME\"\n  echo \"   Ensure the realtime
                        platform is deployed and secrets are created\"\n  exit 0\nfi\n\n#
                        Find target webservice (Knative Service)\necho \"\U0001F3AF
                        Looking for webservice: $WEBSERVICE_NAME\"\n\nif ! kubectl
