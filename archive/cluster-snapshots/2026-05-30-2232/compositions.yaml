                  />\n    <bpmn:sequenceFlow id=\"Flow_to_end\" sourceRef=\"ServiceTask_Aggregate\"
                  targetRef=\"EndEvent_1\" />\n    \n  </bpmn:process>\n</bpmn:definitions>\n"
                saga-compensation.bpmn: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<bpmn:definitions
                  xmlns:bpmn=\"http://www.omg.org/spec/BPMN/20100524/MODEL\" \n                  xmlns:zeebe=\"http://camunda.org/schema/zeebe/1.0\"
                  \n                  id=\"Definitions_saga_compensation\" \n                  targetNamespace=\"http://bpmn.io/schema/bpmn\">\n
                  \ <bpmn:process id=\"saga-compensation\" name=\"SAGA with Compensation\"
                  isExecutable=\"true\">\n    \n    <bpmn:startEvent id=\"StartEvent_Saga\"
                  name=\"Start SAGA\">\n      <bpmn:outgoing>Flow_to_step1</bpmn:outgoing>\n
                  \   </bpmn:startEvent>\n    \n    <bpmn:serviceTask id=\"Step1\"
