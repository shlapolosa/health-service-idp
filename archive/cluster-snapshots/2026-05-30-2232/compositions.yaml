                        https://github.com/argoproj/argo-cd/releases/download/v2.13.0/argocd-linux-amd64\nchmod
                        +x /usr/local/bin/argocd\n\n# Install vcluster CLI\necho \"\U0001F4E6
                        Installing vCluster CLI...\"\ncurl -L -o /usr/local/bin/vcluster
                        https://github.com/loft-sh/vcluster/releases/download/v0.19.5/vcluster-linux-amd64\nchmod
                        +x /usr/local/bin/vcluster\n\n# Wait for vCluster to be ready\necho
                        \"⏳ Waiting for vCluster to be ready...\"\nfor i in $(seq
                        1 60); do\n  if kubectl get secret -n ${VCLUSTER_NAMESPACE}
                        | grep -q \"vc-${VCLUSTER_NAME}\"; then\n    echo \"✅ vCluster
                        secret found\"\n    break\n  fi\n  echo \"Waiting for vCluster
                        secret... ($i/60)\"\n  sleep 5\ndone\n\n# Get vCluster kubeconfig
                        using vcluster CLI\necho \"\U0001F4E5 Getting vCluster kubeconfig...\"\nvcluster
                        connect ${VCLUSTER_NAME} -n ${VCLUSTER_NAMESPACE} --print
                        > /tmp/vcluster.kubeconfig || {\n  # Fallback to manual extraction\n
                        \ kubectl get secret vc-${VCLUSTER_NAME} -n ${VCLUSTER_NAMESPACE}
                        \\\n    -o jsonpath='{.data.config}' | base64 -d > /tmp/vcluster.kubeconfig\n}\n\n#
                        ArgoCD Configuration\nARGOCD_INGRESS_URL=\"${ARGOCD_INGRESS_URL:-af433f091b55640038c23af3a641d716-112208284.us-west-2.elb.amazonaws.com}\"\nARGOCD_PASSWORD=$(kubectl
                        get secret argocd-initial-admin-secret -n argocd -o jsonpath=\"{.data.password}\"
                        | base64 -d)\n\n# Login to ArgoCD\necho \"\U0001F510 Logging
                        into ArgoCD...\"\nargocd login ${ARGOCD_INGRESS_URL}:80 \\\n
                        \ --grpc-web-root-path /argocd \\\n  --username admin \\\n
                        \ --password ${ARGOCD_PASSWORD} \\\n  --insecure \\\n  --plaintext
                        || {\n    echo \"⚠️ Failed to login to ArgoCD, continuing
                        anyway\"\n  }\n\n# Register vCluster with ArgoCD using CLI\necho
                        \"\U0001F4DD Registering vCluster with ArgoCD...\"\n\n# Check
                        if already registered\nif argocd cluster list | grep -q \"${VCLUSTER_NAME}\";
                        then\n  echo \"Cluster already registered, removing old registration\"\n
                        \ argocd cluster rm ${VCLUSTER_NAME} -y 2>/dev/null || true\nfi\n\n#
                        Add the cluster\nCONTEXT_NAME=$(kubectl config get-contexts
                        --kubeconfig=/tmp/vcluster.kubeconfig -o name | head -1)\nargocd
                        cluster add ${CONTEXT_NAME} \\\n  --kubeconfig /tmp/vcluster.kubeconfig
                        \\\n  --name ${VCLUSTER_NAME} \\\n  --yes || {\n    echo \"⚠️
