- apiVersion: core.oam.dev/v1beta1
  kind: ComponentDefinition
  metadata:
    annotations:
      definition.oam.dev/description: Camunda 8 orchestrator with full UI stack for
        process design, monitoring, and human task management
      definition.oam.dev/requires-source-code: "true"
      kubectl.kubernetes.io/last-applied-configuration: "{\"apiVersion\":\"core.oam.dev/v1beta1\",\"kind\":\"ComponentDefinition\",\"metadata\":{\"annotations\":{\"definition.oam.dev/description\":\"Camunda
        8 orchestrator with full UI stack for process design, monitoring, and human
        task management\",\"definition.oam.dev/requires-source-code\":\"true\"},\"name\":\"camunda-orchestrator\",\"namespace\":\"default\"},\"spec\":{\"schematic\":{\"cue\":{\"template\":\"//
        Primary Output: Camunda Orchestrator (Zeebe) Knative Service\\noutput: {\\n
        \ apiVersion: \\\"serving.knative.dev/v1\\\"\\n  kind: \\\"Service\\\"\\n
        \ metadata: {\\n    name: context.name\\n    namespace: context.namespace\\n
        \   labels: {\\n      \\\"app.kubernetes.io/name\\\": context.name\\n      \\\"app.kubernetes.io/component\\\":
        \\\"camunda-orchestrator\\\"\\n      \\\"app.kubernetes.io/managed-by\\\":
        \\\"kubevela\\\"\\n      \\\"app.kubernetes.io/part-of\\\": \\\"orchestration-platform\\\"\\n
        \     \\\"orchestration.platform/type\\\": \\\"camunda\\\"\\n      \\\"camunda.io/component\\\":
        \\\"zeebe\\\"\\n    }\\n    annotations: {\\n      if parameter.targetEnvironment
        != _|_ {\\n        \\\"app.oam.dev/cluster\\\": parameter.targetEnvironment\\n
        \     }\\n      \\\"orchestrator.oam.dev/realtime-platform\\\": parameter.realtimePlatform\\n
        \     \\\"orchestrator.oam.dev/workflow-patterns\\\": \\\"saga,choreography,orchestration\\\"\\n
        \     \\\"orchestrator.oam.dev/ui-enabled\\\": \\\"\\\\(parameter.enableUI)\\\"\\n
        \     if parameter.repository != _|_ {\\n        \\\"orchestrator.oam.dev/repository\\\":
        parameter.repository\\n        \\\"orchestrator.oam.dev/trigger-repo-creation\\\":
        \\\"true\\\"\\n      }\\n    }\\n  }\\n  spec: {\\n    template: {\\n      metadata:
        {\\n        annotations: {\\n          \\\"autoscaling.knative.dev/minScale\\\":
        \\\"\\\\(parameter.minScale)\\\"\\n          \\\"autoscaling.knative.dev/maxScale\\\":
        \\\"\\\\(parameter.maxScale)\\\"\\n          if parameter.targetConcurrency
        != _|_ {\\n            \\\"autoscaling.knative.dev/target\\\": \\\"\\\\(parameter.targetConcurrency)\\\"\\n
        \         }\\n        }\\n        labels: {\\n          \\\"app.kubernetes.io/name\\\":
        context.name\\n          \\\"app.kubernetes.io/version\\\": parameter.version\\n
        \         \\\"orchestration.platform/type\\\": \\\"camunda\\\"\\n          \\\"camunda.io/component\\\":
        \\\"zeebe\\\"\\n        }\\n      }\\n      spec: {\\n        serviceAccountName:
        \\\"camunda-orchestrator-sa\\\"\\n        volumes: [\\n          {\\n            name:
        \\\"workflow-config\\\"\\n            configMap: {\\n              name: (*parameter.configMapName
        | context.name + \\\"-config\\\")\\n            }\\n          },\\n          {\\n
        \           name: \\\"bpmn-models\\\"\\n            configMap: {\\n              name:
        (*parameter.bpmnConfigMapName | context.name + \\\"-bpmn\\\")\\n            }\\n
        \         }\\n        ]\\n        containers: [{\\n          image: (*parameter.zeebeImage
        | \\\"camunda/zeebe:8.3.3\\\")\\n          name: \\\"zeebe\\\"\\n          ports:
        [{\\n            containerPort: 9600\\n            name: \\\"grpc\\\"\\n          },
        {\\n            containerPort: 8080\\n            name: \\\"http\\\"\\n          }]\\n
        \         resources: {\\n            limits: {\\n              cpu: parameter.resources.cpu\\n
        \             memory: parameter.resources.memory\\n            }\\n            requests:
        {\\n              cpu: \\\"500m\\\"\\n              memory: \\\"512Mi\\\"\\n
        \           }\\n          }\\n          volumeMounts: [\\n            {\\n
        \             name: \\\"workflow-config\\\"\\n              mountPath: \\\"/app/config\\\"\\n
        \           },\\n            {\\n              name: \\\"bpmn-models\\\"\\n
        \             mountPath: \\\"/app/bpmn\\\"\\n            }\\n          ]\\n
        \         env: [\\n            {\\n              name: \\\"ZEEBE_BROKER_CLUSTER_NODEID\\\"\\n
        \             value: \\\"0\\\"\\n            },\\n            {\\n              name:
        \\\"ZEEBE_BROKER_CLUSTER_PARTITIONSCOUNT\\\"\\n              value: \\\"1\\\"\\n
        \           },\\n            {\\n              name: \\\"ZEEBE_BROKER_CLUSTER_REPLICATIONFACTOR\\\"\\n
        \             value: \\\"1\\\"\\n            },\\n            {\\n              name:
        \\\"ZEEBE_BROKER_CLUSTER_CLUSTERSIZE\\\"\\n              value: \\\"1\\\"\\n
        \           },\\n            {\\n              name: \\\"ZEEBE_BROKER_GATEWAY_ENABLE\\\"\\n
        \             value: \\\"true\\\"\\n            },\\n            {\\n              name:
        \\\"REALTIME_PLATFORM_SERVICE\\\"\\n              value: parameter.realtimePlatform
        + \\\".\\\" + context.namespace + \\\".svc.cluster.local\\\"\\n            },\\n
        \           {\\n              name: \\\"EVENT_STREAMING_ENABLED\\\"\\n              value:
        \\\"\\\\(parameter.enableEventStreaming)\\\"\\n            },\\n            {\\n
        \             name: \\\"KAFKA_TOPICS_PREFIX\\\"\\n              value: parameter.topicsPrefix\\n
        \           },\\n            {\\n              name: \\\"ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME\\\"\\n
        \             value: \\\"io.camunda.zeebe.exporter.ElasticsearchExporter\\\"\\n
        \           },\\n            {\\n              name: \\\"ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL\\\"\\n
        \             value: \\\"http://\\\" + context.name + \\\"-elasticsearch:9200\\\"\\n
        \           }\\n          ] + [\\n            for k, v in parameter.environment
        {\\n              name: k\\n              value: v\\n            },\\n          ]\\n
        \         if parameter.envFrom != _|_ {\\n            envFrom: parameter.envFrom\\n
        \         }\\n          livenessProbe: {\\n            httpGet: {\\n              path:
        \\\"/ready\\\"\\n              port: 9600\\n            }\\n            initialDelaySeconds:
        30\\n            periodSeconds: 30\\n          }\\n          readinessProbe:
        {\\n            httpGet: {\\n              path: \\\"/health\\\"\\n              port:
        9600\\n            }\\n            initialDelaySeconds: 30\\n            periodSeconds:
        30\\n          }\\n        }]\\n      }\\n    }\\n  }\\n}\\n\\n// Base outputs
        always include infrastructure\\noutputs: {\\n  \\\"orchestration-infrastructure\\\":
        {\\n    apiVersion: \\\"platform.example.org/v1alpha1\\\"\\n    kind: \\\"OrchestrationPlatformClaim\\\"\\n
        \   metadata: {\\n      name: context.name + \\\"-infrastructure\\\"\\n      namespace:
        context.namespace\\n      labels: {\\n        \\\"app.kubernetes.io/name\\\":
        context.name\\n        \\\"app.kubernetes.io/component\\\": \\\"orchestration-infrastructure\\\"\\n
        \       \\\"app.kubernetes.io/part-of\\\": \\\"orchestration-platform\\\"\\n
        \     }\\n    }\\n    spec: {\\n      orchestratorName: context.name\\n      realtimePlatformService:
        parameter.realtimePlatform\\n      camundaMode: parameter.camundaMode\\n      enableEventStreaming:
        parameter.enableEventStreaming\\n      sagaPatterns: parameter.sagaPatterns\\n
        \     enableUI: parameter.enableUI\\n      resources: {\\n        cpu: parameter.resources.cpu\\n
        \       memory: parameter.resources.memory\\n      }\\n      if parameter.targetEnvironment
        != _|_ {\\n        targetEnvironment: parameter.targetEnvironment\\n      }\\n
        \   }\\n  }\\n}\\n\\n// Conditional outputs based on UI enablement\\nif parameter.enableUI
        != _|_ \\u0026\\u0026 parameter.enableUI == true {\\n  outputs: {\\n    //
        Always include infrastructure\\n    \\\"orchestration-infrastructure\\\":
        outputs[\\\"orchestration-infrastructure\\\"]\\n    \\n    // Camunda Operate
        - Process Monitoring UI\\n    \\\"camunda-operate\\\": {\\n      apiVersion:
        \\\"serving.knative.dev/v1\\\"\\n      kind: \\\"Service\\\"\\n      metadata:
        {\\n        name: context.name + \\\"-operate\\\"\\n        namespace: context.namespace\\n
        \       labels: {\\n          \\\"app.kubernetes.io/name\\\": context.name
        + \\\"-operate\\\"\\n          \\\"app.kubernetes.io/component\\\": \\\"camunda-operate\\\"\\n
        \         \\\"app.kubernetes.io/part-of\\\": \\\"orchestration-platform\\\"\\n
        \         \\\"camunda.io/component\\\": \\\"operate\\\"\\n        }\\n        annotations:
        {\\n          if parameter.targetEnvironment != _|_ {\\n            \\\"app.oam.dev/cluster\\\":
        parameter.targetEnvironment\\n          }\\n        }\\n      }\\n      spec:
        {\\n        template: {\\n          metadata: {\\n            annotations:
        {\\n              \\\"autoscaling.knative.dev/minScale\\\": \\\"1\\\"\\n              \\\"autoscaling.knative.dev/maxScale\\\":
        \\\"3\\\"\\n            }\\n          }\\n          spec: {\\n            serviceAccountName:
        \\\"camunda-orchestrator-sa\\\"\\n            containers: [{\\n              image:
        (*parameter.operateImage | \\\"camunda/operate:8.3.3\\\")\\n              name:
        \\\"operate\\\"\\n              ports: [{\\n                containerPort:
        8080\\n                name: \\\"http\\\"\\n              }]\\n              resources:
        {\\n                limits: {\\n                  cpu: \\\"500m\\\"\\n                  memory:
        \\\"1Gi\\\"\\n                }\\n                requests: {\\n                  cpu:
        \\\"200m\\\"\\n                  memory: \\\"512Mi\\\"\\n                }\\n
        \             }\\n              env: [\\n                {\\n                  name:
        \\\"CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS\\\"\\n                  value: context.name
        + \\\".\\\" + context.namespace + \\\".svc.cluster.local:9600\\\"\\n                },\\n
        \               {\\n                  name: \\\"CAMUNDA_OPERATE_ELASTICSEARCH_URL\\\"\\n
        \                 value: \\\"http://\\\" + context.name + \\\"-elasticsearch:9200\\\"\\n
        \               },\\n                {\\n                  name: \\\"CAMUNDA_OPERATE_ELASTICSEARCH_HOST\\\"\\n
        \                 value: context.name + \\\"-elasticsearch\\\"\\n                },\\n
        \               {\\n                  name: \\\"CAMUNDA_OPERATE_ELASTICSEARCH_PORT\\\"\\n
        \                 value: \\\"9200\\\"\\n                },\\n                {\\n
        \                 name: \\\"SPRING_PROFILES_ACTIVE\\\"\\n                  value:
        \\\"dev\\\"\\n                },\\n                {\\n                  name:
        \\\"LOGGING_LEVEL_IO_CAMUNDA\\\"\\n                  value: \\\"INFO\\\"\\n
        \               }\\n              ]\\n              livenessProbe: {\\n                httpGet:
        {\\n                  path: \\\"/actuator/health\\\"\\n                  port:
        8080\\n                }\\n                initialDelaySeconds: 60\\n                periodSeconds:
        30\\n              }\\n              readinessProbe: {\\n                httpGet:
        {\\n                  path: \\\"/actuator/health/readiness\\\"\\n                  port:
        8080\\n                }\\n                initialDelaySeconds: 30\\n                periodSeconds:
        30\\n              }\\n            }]\\n          }\\n        }\\n      }\\n
        \   }\\n    \\n    // Camunda Tasklist - Human Task Management UI\\n    \\\"camunda-tasklist\\\":
        {\\n      apiVersion: \\\"serving.knative.dev/v1\\\"\\n      kind: \\\"Service\\\"\\n
        \     metadata: {\\n        name: context.name + \\\"-tasklist\\\"\\n        namespace:
        context.namespace\\n        labels: {\\n          \\\"app.kubernetes.io/name\\\":
        context.name + \\\"-tasklist\\\"\\n          \\\"app.kubernetes.io/component\\\":
        \\\"camunda-tasklist\\\"\\n          \\\"app.kubernetes.io/part-of\\\": \\\"orchestration-platform\\\"\\n
        \         \\\"camunda.io/component\\\": \\\"tasklist\\\"\\n        }\\n        annotations:
        {\\n          if parameter.targetEnvironment != _|_ {\\n            \\\"app.oam.dev/cluster\\\":
        parameter.targetEnvironment\\n          }\\n        }\\n      }\\n      spec:
        {\\n        template: {\\n          metadata: {\\n            annotations:
        {\\n              \\\"autoscaling.knative.dev/minScale\\\": \\\"1\\\"\\n              \\\"autoscaling.knative.dev/maxScale\\\":
        \\\"3\\\"\\n            }\\n          }\\n          spec: {\\n            serviceAccountName:
        \\\"camunda-orchestrator-sa\\\"\\n            containers: [{\\n              image:
        (*parameter.tasklistImage | \\\"camunda/tasklist:8.3.3\\\")\\n              name:
        \\\"tasklist\\\"\\n              ports: [{\\n                containerPort:
        8080\\n                name: \\\"http\\\"\\n              }]\\n              resources:
        {\\n                limits: {\\n                  cpu: \\\"500m\\\"\\n                  memory:
        \\\"1Gi\\\"\\n                }\\n                requests: {\\n                  cpu:
        \\\"200m\\\"\\n                  memory: \\\"512Mi\\\"\\n                }\\n
        \             }\\n              env: [\\n                {\\n                  name:
        \\\"CAMUNDA_TASKLIST_ZEEBE_GATEWAYADDRESS\\\"\\n                  value: context.name
        + \\\".\\\" + context.namespace + \\\".svc.cluster.local:9600\\\"\\n                },\\n
        \               {\\n                  name: \\\"CAMUNDA_TASKLIST_ELASTICSEARCH_URL\\\"\\n
        \                 value: \\\"http://\\\" + context.name + \\\"-elasticsearch:9200\\\"\\n
        \               },\\n                {\\n                  name: \\\"CAMUNDA_TASKLIST_ELASTICSEARCH_HOST\\\"\\n
        \                 value: context.name + \\\"-elasticsearch\\\"\\n                },\\n
        \               {\\n                  name: \\\"CAMUNDA_TASKLIST_ELASTICSEARCH_PORT\\\"\\n
        \                 value: \\\"9200\\\"\\n                },\\n                {\\n
        \                 name: \\\"SPRING_PROFILES_ACTIVE\\\"\\n                  value:
        \\\"dev\\\"\\n                },\\n                {\\n                  name:
        \\\"GRAPHQL_PLAYGROUND_ENABLED\\\"\\n                  value: \\\"true\\\"\\n
        \               }\\n              ]\\n              livenessProbe: {\\n                httpGet:
        {\\n                  path: \\\"/actuator/health\\\"\\n                  port:
        8080\\n                }\\n                initialDelaySeconds: 60\\n                periodSeconds:
        30\\n              }\\n              readinessProbe: {\\n                httpGet:
        {\\n                  path: \\\"/actuator/health/readiness\\\"\\n                  port:
        8080\\n                }\\n                initialDelaySeconds: 30\\n                periodSeconds:
        30\\n              }\\n            }]\\n          }\\n        }\\n      }\\n
        \   }\\n  }\\n}\\n\\n// Optional: Camunda Optimize for analytics (when explicitly
        enabled)\\nif parameter.enableOptimize != _|_ \\u0026\\u0026 parameter.enableOptimize
        == true \\u0026\\u0026 parameter.enableUI == true {\\n  outputs: {\\n    //
        Include all previous outputs\\n    \\\"orchestration-infrastructure\\\": outputs[\\\"orchestration-infrastructure\\\"]\\n
        \   \\\"camunda-operate\\\": outputs[\\\"camunda-operate\\\"]\\n    \\\"camunda-tasklist\\\":
        outputs[\\\"camunda-tasklist\\\"]\\n    \\n    // Add Optimize\\n    \\\"camunda-optimize\\\":
        {\\n      apiVersion: \\\"serving.knative.dev/v1\\\"\\n      kind: \\\"Service\\\"\\n
        \     metadata: {\\n        name: context.name + \\\"-optimize\\\"\\n        namespace:
        context.namespace\\n        labels: {\\n          \\\"app.kubernetes.io/name\\\":
        context.name + \\\"-optimize\\\"\\n          \\\"app.kubernetes.io/component\\\":
        \\\"camunda-optimize\\\"\\n          \\\"app.kubernetes.io/part-of\\\": \\\"orchestration-platform\\\"\\n
        \         \\\"camunda.io/component\\\": \\\"optimize\\\"\\n        }\\n      }\\n
        \     spec: {\\n        template: {\\n          spec: {\\n            serviceAccountName:
        \\\"camunda-orchestrator-sa\\\"\\n            containers: [{\\n              image:
        (*parameter.optimizeImage | \\\"camunda/optimize:3.11.0\\\")\\n              name:
        \\\"optimize\\\"\\n              ports: [{\\n                containerPort:
        8090\\n                name: \\\"http\\\"\\n              }]\\n              resources:
        {\\n                limits: {\\n                  cpu: \\\"1000m\\\"\\n                  memory:
        \\\"2Gi\\\"\\n                }\\n                requests: {\\n                  cpu:
        \\\"500m\\\"\\n                  memory: \\\"1Gi\\\"\\n                }\\n
        \             }\\n              env: [\\n                {\\n                  name:
        \\\"CAMUNDA_OPTIMIZE_ZEEBE_ENABLED\\\"\\n                  value: \\\"true\\\"\\n
        \               },\\n                {\\n                  name: \\\"CAMUNDA_OPTIMIZE_ZEEBE_NAME\\\"\\n
        \                 value: context.name\\n                },\\n                {\\n
        \                 name: \\\"CAMUNDA_OPTIMIZE_ZEEBE_CONTACTPOINT\\\"\\n                  value:
        context.name + \\\".\\\" + context.namespace + \\\".svc.cluster.local:9600\\\"\\n
        \               },\\n                {\\n                  name: \\\"CAMUNDA_OPTIMIZE_ELASTICSEARCH_HOST\\\"\\n
