      definition.oam.dev/description: Auth0 identity provider integration via External
        Secrets
      definition.oam.dev/requires-source-code: "false"
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"core.oam.dev/v1beta1","kind":"ComponentDefinition","metadata":{"annotations":{"definition.oam.dev/description":"Auth0 identity provider integration via External Secrets","definition.oam.dev/requires-source-code":"false"},"name":"auth0-idp","namespace":"default"},"spec":{"schematic":{"cue":{"template":"output: {\n  apiVersion: \"external-secrets.io/v1\"\n  kind: \"ExternalSecret\"\n  metadata: {\n    name: parameter.name + \"-auth0-credentials\"\n    namespace: context.namespace\n    if parameter.targetEnvironment != _|_ {\n      annotations: {\n        \"app.oam.dev/cluster\": parameter.targetEnvironment\n      }\n    }\n  }\n  spec: {\n    refreshInterval: \"1h\"\n    secretStoreRef: {\n      kind: \"ClusterSecretStore\"\n      name: \"aws-secretsmanager\"\n    }\n    target: {\n      name: parameter.name + \"-auth0-credentials\"\n      creationPolicy: \"Owner\"\n    }\n    data: [\n      {\n        secretKey: \"clientId\"\n        remoteRef: {\n          key: \"auth0/credentials\"\n          property: \"clientId\"\n        }\n      },\n      {\n        secretKey: \"clientSecret\"\n        remoteRef: {\n          key: \"auth0/credentials\"\n          property: \"clientSecret\"\n        }\n      },\n      {\n        secretKey: \"domain\"\n        remoteRef: {\n          key: \"auth0/credentials\"\n          property: \"domain\"\n        }\n      },\n      {\n        secretKey: \"audience\"\n        remoteRef: {\n          key: \"auth0/credentials\"\n          property: \"audience\"\n        }\n      }\n    ]\n  }\n}\n\nparameter: {\n  // Required\n  name: string\n  \n  // Optional\n  targetEnvironment?: string\n}\n"}},"workload":{"definition":{"apiVersion":"external-secrets.io/v1","kind":"ExternalSecret"},"type":"externalsecrets.external-secrets.io"}}}
