          \ STATUS=$(kubectl get infrastructureclaim {{inputs.parameters.claim_name}}
          \\\n    -n crossplane-system \\\n    -o jsonpath='{.status.ready}' 2>/dev/null)\n
          \ \n  if [ \"$STATUS\" = \"true\" ]; then\n    echo \"✅ Infrastructure {{inputs.parameters.claim_name}}
          is ready!\"\n    \n    # Check for Helm release\n    RELEASE=$(kubectl get
          releases.helm -n crossplane-system \\\n      -l crossplane.io/claim-name={{inputs.parameters.claim_name}}
          \\\n      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)\n    \n    if
          [ ! -z \"$RELEASE\" ]; then\n      echo \"Helm release: $RELEASE\"\n      kubectl
          get release $RELEASE -n crossplane-system\n    fi\n    \n    exit 0\n  fi\n
          \ \n  echo \"Waiting... ($i/120)\"\n  sleep 10\ndone\n\necho \"❌ Timeout
          waiting for infrastructure\"\nkubectl describe infrastructureclaim {{inputs.parameters.claim_name}}
          -n crossplane-system\nexit 1\n"
