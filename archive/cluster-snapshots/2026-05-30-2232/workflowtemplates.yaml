            - name: resource-type
              value: '{{inputs.parameters.resource-type}}'
            - name: user
              value: '{{inputs.parameters.user}}'
            - name: slack-channel
              value: '{{inputs.parameters.slack-channel}}'
            - name: slack-user-id
              value: '{{inputs.parameters.slack-user-id}}'
            - name: notification-type
              value: success
            - name: message
              value: ✅ VCluster '{{inputs.parameters.resource-name}}' created successfully!
                Access via kubectl or VCluster CLI.
          dependencies:
          - deploy-provisioned-applications
          name: notify-success
          templateRef:
            name: slack-standard-notifications
            template: send-notification
      inputs:
        parameters:
        - description: VCluster name (DNS-1123 compliant)
          name: resource-name
        - default: vcluster
          name: resource-type
        - default: default
          description: Kubernetes namespace for VCluster deployment
          name: namespace
        - default: system
          description: User requesting VCluster creation
          name: user
        - default: VCluster created via standardized parameter contract
          name: description
        - default: shlapolosa
          name: github-org
        - default: docker.io/socrates12345
          name: docker-registry
        - default: '#vcluster-notifications'
          name: slack-channel
        - default: UNKNOWN
          name: slack-user-id
        - default: "true"
          description: Enable security features
          name: security-enabled
        - default: "true"
          description: Enable observability stack
          name: observability-enabled
        - default: "false"
          description: Enable backup functionality
          name: backup-enabled
        - default: development
          description: Environment tier (development/staging/production)
          name: environment-tier
        - default: "true"
          description: Automatically create required dependencies
          name: auto-create-dependencies
        - default: medium
          description: VCluster resource allocation size
          name: resource-size
        - default: medium
          description: VCluster-specific sizing (overrides resource-size if provided)
          name: vcluster-size
        - default: '{"observability":"true","security":"true","gitops":"true","logging":"true","networking":"true","autoscaling":"false","backup":"false"}'
          description: VCluster feature capabilities as JSON
          name: vcluster-capabilities
      name: create-vcluster
    - inputs:
        parameters:
        - name: resource-name
        - name: resource-type
        - name: namespace
        - name: environment-tier
        - name: vcluster-size
        - name: vcluster-capabilities
      name: validate-vcluster-parameters
      script:
        command:
        - sh
        image: alpine:3.18
        source: "# Install jq for JSON validation\napk add --no-cache jq\n\necho \"\U0001F50D
          Validating VCluster parameter contract compliance...\"\n\n# Validate Tier
          1 - Universal Parameters\nif [ -z \"{{inputs.parameters.resource-name}}\"
          ]; then\n  echo \"❌ Missing required parameter: resource-name\"\n  exit
          1\nfi\n\n# Validate resource-name format (DNS-1123 compliant)\nif ! echo
          \"{{inputs.parameters.resource-name}}\" | grep -E '^[a-z0-9][a-z0-9-]*[a-z0-9]$';
          then\n  echo \"❌ Invalid resource-name format: {{inputs.parameters.resource-name}}\"\n
          \ echo \"Must be DNS-1123 compliant: lowercase alphanumeric and hyphens\"\n
          \ exit 1\nfi\n\n# Validate resource-type\nif [ \"{{inputs.parameters.resource-type}}\"
          != \"vcluster\" ]; then\n  echo \"❌ Invalid resource-type for VCluster template:
          {{inputs.parameters.resource-type}}\"\n  exit 1\nfi\n\n# Validate namespace
          format\nif ! echo \"{{inputs.parameters.namespace}}\" | grep -E '^[a-z0-9][a-z0-9-]*[a-z0-9]$';
          then\n  echo \"❌ Invalid namespace format: {{inputs.parameters.namespace}}\"\n
          \ exit 1\nfi\n\n# Validate Tier 2 - Platform Parameters\ncase \"{{inputs.parameters.environment-tier}}\"
          in\n  development|staging|production)\n    echo \"✅ Valid environment-tier:
          {{inputs.parameters.environment-tier}}\"\n    ;;\n  *)\n    echo \"❌ Invalid
          environment-tier: {{inputs.parameters.environment-tier}}\"\n    echo \"Must
          be one of: development, staging, production\"\n    exit 1\n    ;;\nesac\n\n#
          Validate Tier 3 - VCluster-specific Parameters\ncase \"{{inputs.parameters.vcluster-size}}\"
          in\n  small|medium|large|xlarge)\n    echo \"✅ Valid vcluster-size: {{inputs.parameters.vcluster-size}}\"\n
          \   ;;\n  *)\n    echo \"❌ Invalid vcluster-size: {{inputs.parameters.vcluster-size}}\"\n
          \   echo \"Must be one of: small, medium, large, xlarge\"\n    exit 1\n
          \   ;;\nesac\n\n# Validate capabilities JSON format\nCAPABILITIES='{{inputs.parameters.vcluster-capabilities}}'\necho
          \"$CAPABILITIES\" | jq . > /dev/null 2>&1\nif [ $? -ne 0 ]; then\n  echo
          \"❌ Invalid vcluster-capabilities JSON format: $CAPABILITIES\"\n  exit 1\nfi\n\necho
          \"✅ All parameter validations passed\"\necho \"\U0001F4CB VCluster Configuration:\"\necho
          \"   Name: {{inputs.parameters.resource-name}}\"\necho \"   Namespace: {{inputs.parameters.namespace}}\"\necho
          \"   Environment: {{inputs.parameters.environment-tier}}\"\necho \"   Size:
          {{inputs.parameters.vcluster-size}}\"\necho \"   Capabilities: {{inputs.parameters.vcluster-capabilities}}\"\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: namespace
        - name: description
        - name: user
        - name: security-enabled
        - name: observability-enabled
        - name: backup-enabled
        - name: environment-tier
        - name: vcluster-size
        - name: vcluster-capabilities
        - name: slack-channel
      name: create-vcluster-claim
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"\U0001F3D7️ Creating VCluster claim with standardized parameters...\"\n\n#
          Parse and enhance capabilities JSON\nCAPABILITIES='{{inputs.parameters.vcluster-capabilities}}'\n\n#
          Override capabilities based on parameter contract settings\nENHANCED_CAPABILITIES=$(echo
          \"$CAPABILITIES\" | jq \\\n  --argjson security \"{{inputs.parameters.security-enabled}}\"
          \\\n  --argjson observability \"{{inputs.parameters.observability-enabled}}\"
          \\\n  --argjson backup \"{{inputs.parameters.backup-enabled}}\" \\\n  '.security
          = ($security | tostring) | .observability = ($observability | tostring)
          | .backup = ($backup | tostring)')\n\n# Determine resource specifications
          based on size and environment\ncase \"{{inputs.parameters.vcluster-size}}\"
          in\n  small)\n    CPU_REQUEST=\"500m\"\n    CPU_LIMIT=\"1000m\"\n    MEMORY_REQUEST=\"1Gi\"\n
          \   MEMORY_LIMIT=\"2Gi\"\n    STORAGE=\"10Gi\"\n    ;;\n  medium)\n    CPU_REQUEST=\"1000m\"\n
          \   CPU_LIMIT=\"2000m\"\n    MEMORY_REQUEST=\"2Gi\"\n    MEMORY_LIMIT=\"4Gi\"\n
          \   STORAGE=\"20Gi\"\n    ;;\n  large)\n    CPU_REQUEST=\"2000m\"\n    CPU_LIMIT=\"4000m\"\n
          \   MEMORY_REQUEST=\"4Gi\"\n    MEMORY_LIMIT=\"8Gi\"\n    STORAGE=\"50Gi\"\n
          \   ;;\n  xlarge)\n    CPU_REQUEST=\"4000m\"\n    CPU_LIMIT=\"8000m\"\n
          \   MEMORY_REQUEST=\"8Gi\"\n    MEMORY_LIMIT=\"16Gi\"\n    STORAGE=\"100Gi\"\n
          \   ;;\nesac\n\n# Sanitize slack channel for label\nSLACK_CHANNEL_LABEL=$(echo
          \"{{inputs.parameters.slack-channel}}\" | sed 's/#//g' | tr '[:upper:]'
          '[:lower:]')\n\n# Create VClusterEnvironmentClaim with standardized parameters\ncat
          <<EOF | kubectl apply -f -\napiVersion: platform.example.org/v1alpha1\nkind:
          VClusterEnvironmentClaim\nmetadata:\n  name: {{inputs.parameters.resource-name}}\n
          \ namespace: {{inputs.parameters.namespace}}\n  labels:\n    created-by:
          \"vcluster-standard-contract\"\n    parameter-contract-version: \"v1.0\"\n
          \   resource-type: \"vcluster\"\n    environment-tier: \"{{inputs.parameters.environment-tier}}\"\n
          \   vcluster-size: \"{{inputs.parameters.vcluster-size}}\"\n    requested-by:
          \"{{inputs.parameters.user}}\"\n    slack-channel: \"$SLACK_CHANNEL_LABEL\"\n
          \ annotations:\n    description: \"{{inputs.parameters.description}}\"\n
          \   parameter-contract: \"compliant\"\n    created-at: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"\n
          \   # Store capabilities in annotations for reference\n    vcluster-capabilities:
          '$ENHANCED_CAPABILITIES'\n    resource-allocation: \"CPU: $CPU_REQUEST-$CPU_LIMIT,
          Memory: $MEMORY_REQUEST-$MEMORY_LIMIT, Storage: $STORAGE\"\nspec:\n  name:
          {{inputs.parameters.resource-name}}\n  # The composition will handle all
          infrastructure provisioning\n  # based on the labels and annotations\nEOF\n\nif
          [ $? -eq 0 ]; then\n  echo \"✅ VClusterEnvironmentClaim created successfully\"\n
          \ echo \"\U0001F4CA Resource Allocation:\"\n  echo \"   CPU: $CPU_REQUEST
          - $CPU_LIMIT\"\n  echo \"   Memory: $MEMORY_REQUEST - $MEMORY_LIMIT\"\n
          \ echo \"   Storage: $STORAGE\"\n  echo \"\U0001F527 Capabilities: $ENHANCED_CAPABILITIES\"\n
          \ exit 0\nelse\n  echo \"❌ Failed to create VClusterEnvironmentClaim\"\n
          \ exit 1\nfi\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: namespace
      name: wait-for-vcluster-ready
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"⏳ Waiting for VCluster '{{inputs.parameters.resource-name}}'
          to be ready...\"\n\nTIMEOUT=900  # 15 minutes\nELAPSED=0\n\nwhile [ $ELAPSED
          -lt $TIMEOUT ]; do\n  echo \"Checking VCluster status... (${ELAPSED}s/${TIMEOUT}s)\"\n
          \ \n  # Check VCluster claim status\n  READY=$(kubectl get vclusterenvironmentclaim
          {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}} -o
          jsonpath='{.status.ready}' 2>/dev/null || echo \"false\")\n  READY_CONDITION=$(kubectl
          get vclusterenvironmentclaim {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}}
          -o jsonpath='{.status.conditions[?(@.type==\"Ready\")].status}' 2>/dev/null
          || echo \"False\")\n  \n  echo \"  Ready: $READY\"\n  echo \"  Ready Condition:
          $READY_CONDITION\"\n  \n  if [ \"$READY\" = \"true\" ]; then\n    echo \"✅
          VCluster is ready!\"\n    \n    # Get connection information\n    KUBECONFIG_SECRET=$(kubectl
          get vclusterenvironmentclaim {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}}
          -o jsonpath='{.status.kubeconfig.secretName}' 2>/dev/null || echo \"\")\n
          \   CLUSTER_ENDPOINT=$(kubectl get vclusterenvironmentclaim {{inputs.parameters.resource-name}}
          -n {{inputs.parameters.namespace}} -o jsonpath='{.status.endpoint}' 2>/dev/null
          || echo \"\")\n    \n    echo \"\U0001F4CB Connection Information:\"\n    echo
          \"   Kubeconfig Secret: $KUBECONFIG_SECRET\"\n    echo \"   Cluster Endpoint:
          $CLUSTER_ENDPOINT\"\n    exit 0\n  fi\n  \n  if [ \"$READY_CONDITION\" =
          \"False\" ]; then\n    # Check if there's an error condition\n    ERROR_MSG=$(kubectl
          get vclusterenvironmentclaim {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}}
          -o jsonpath='{.status.conditions[?(@.status==\"False\")].message}' 2>/dev/null
          || echo \"\")\n    if [[ \"$ERROR_MSG\" == *\"Failed\"* ]]; then\n      echo
          \"❌ VCluster creation failed: $ERROR_MSG\"\n      kubectl describe vclusterenvironmentclaim
          {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}}\n
          \     exit 1\n    fi\n  fi\n  \n  sleep 30\n  ELAPSED=$((ELAPSED + 30))\ndone\n\necho
          \"❌ Timeout waiting for VCluster to be ready\"\nkubectl describe vclusterenvironmentclaim
          {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}}\nexit
          1\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: namespace
        - name: user
        - name: security-enabled
      name: configure-vcluster-access
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"\U0001F510 Configuring VCluster access and security...\"\n\n#
          Create RBAC for user access\nif [ \"{{inputs.parameters.security-enabled}}\"
          = \"true\" ]; then\n  echo \"Setting up RBAC for user: {{inputs.parameters.user}}\"\n
          \ \n  # Create user-specific service account and role binding\n  cat <<EOF
          | kubectl apply -f -\n  apiVersion: v1\n  kind: ServiceAccount\n  metadata:\n
          \   name: {{inputs.parameters.user}}-vcluster-access\n    namespace: {{inputs.parameters.namespace}}\n
          \   labels:\n      vcluster: {{inputs.parameters.resource-name}}\n      user:
          {{inputs.parameters.user}}\n  ---\n  apiVersion: rbac.authorization.k8s.io/v1\n
          \ kind: RoleBinding\n  metadata:\n    name: {{inputs.parameters.user}}-vcluster-admin\n
          \   namespace: {{inputs.parameters.namespace}}\n  subjects:\n  - kind: ServiceAccount\n
          \   name: {{inputs.parameters.user}}-vcluster-access\n    namespace: {{inputs.parameters.namespace}}\n
          \ roleRef:\n    kind: ClusterRole\n    name: cluster-admin\n    apiGroup:
          rbac.authorization.k8s.io\nEOF\nfi\n\n# Generate access instructions\necho
          \"✅ VCluster access configured successfully\"\necho \"\"\necho \"\U0001F517
          Access Instructions:\"\necho \"   1. Get kubeconfig: kubectl get secret
          vc-{{inputs.parameters.resource-name}}-vcluster -n {{inputs.parameters.resource-name}}
          -o jsonpath='{.data.config}' | base64 -d > vcluster-{{inputs.parameters.resource-name}}.kubeconfig\"\necho
          \"   2. Use vCluster: export KUBECONFIG=vcluster-{{inputs.parameters.resource-name}}.kubeconfig\"\necho
          \"   3. Or connect directly: vcluster connect {{inputs.parameters.resource-name}}-vcluster
          -n {{inputs.parameters.resource-name}}\"\necho \"   4. Verify access: kubectl
          get nodes\"\necho \"\"\necho \"\U0001F4DA Documentation: https://docs.vcluster.com/\"\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: namespace
      name: register-vcluster-argocd
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"\U0001F517 Registering vCluster with ArgoCD...\"\n\n# Install
          tools\napk add --no-cache curl jq\n\n# Install ArgoCD CLI\ncurl -sSL -o
          /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64\nchmod
          +x /usr/local/bin/argocd\n\n# Install vcluster CLI\ncurl -L -o /usr/local/bin/vcluster
          https://github.com/loft-sh/vcluster/releases/latest/download/vcluster-linux-amd64\nchmod
          +x /usr/local/bin/vcluster\n\n# Get vCluster kubeconfig\nvcluster connect
          {{inputs.parameters.resource-name}}-vcluster -n {{inputs.parameters.namespace}}
          --print > /tmp/vcluster.kubeconfig\n\n# Login to ArgoCD\nARGOCD_URL=\"af433f091b55640038c23af3a641d716-112208284.us-west-2.elb.amazonaws.com\"\nARGOCD_PASSWORD=$(kubectl
          get secret argocd-initial-admin-secret -n argocd -o jsonpath=\"{.data.password}\"
          | base64 -d)\n\nargocd login ${ARGOCD_URL}:80 \\\n  --grpc-web-root-path
          /argocd \\\n  --username admin \\\n  --password ${ARGOCD_PASSWORD} \\\n
          \ --insecure \\\n  --plaintext || {\n    echo \"⚠️ Failed to login to ArgoCD\"\n
          \   exit 0  # Don't fail the workflow\n  }\n\n# Add vCluster\nCONTEXT_NAME=$(kubectl
          config get-contexts --kubeconfig=/tmp/vcluster.kubeconfig -o name | head
          -1)\nargocd cluster add ${CONTEXT_NAME} \\\n  --kubeconfig /tmp/vcluster.kubeconfig
          \\\n  --name {{inputs.parameters.resource-name}} \\\n  --yes || {\n    echo
          \"⚠️ Failed to register with ArgoCD\"\n    exit 0  # Don't fail the workflow\n
          \ }\n\necho \"✅ vCluster registered with ArgoCD\"\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: namespace
        - name: user
        - name: github-org
      name: deploy-provisioned-applications
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"\U0001F680 Deploying provisioned applications to vCluster
          {{inputs.parameters.resource-name}}...\"\n\n# Get vCluster kubeconfig using
          proper naming convention\nVCLUSTER_NAMESPACE=\"{{inputs.parameters.resource-name}}\"\nKUBECONFIG_SECRET=\"vc-{{inputs.parameters.resource-name}}-vcluster\"\n\necho
          \"\U0001F50D Looking for kubeconfig secret: $KUBECONFIG_SECRET in namespace:
          $VCLUSTER_NAMESPACE\"\n\nif ! kubectl get secret $KUBECONFIG_SECRET -n $VCLUSTER_NAMESPACE
          >/dev/null 2>&1; then\n  echo \"❌ vCluster kubeconfig secret not found:
          $KUBECONFIG_SECRET\"\n  echo \"Available secrets in namespace $VCLUSTER_NAMESPACE:\"\n
          \ kubectl get secrets -n $VCLUSTER_NAMESPACE\n  exit 1\nfi\n\n# Extract
          kubeconfig and connect to vCluster\nkubectl get secret $KUBECONFIG_SECRET
          -n $VCLUSTER_NAMESPACE -o jsonpath='{.data.config}' | base64 -d > /tmp/vcluster-kubeconfig\nexport
          KUBECONFIG=/tmp/vcluster-kubeconfig\n\necho \"\U0001F517 Connected to vCluster
          {{inputs.parameters.resource-name}}\"\nkubectl get nodes\n\n# Wait a moment
          for vCluster API to be ready\necho \"⏳ Waiting for vCluster API to be fully
          ready...\"\nsleep 10\n\n# Try to access vCluster - if this fails, the issue
          is connection\nif ! kubectl get namespaces >/dev/null 2>&1; then\n  echo
          \"❌ Cannot connect to vCluster API. Connection failed.\"\n  echo \"\U0001F527
          This is expected if vCluster networking isn't fully ready yet.\"\n  echo
          \"✅ Marking deployment as successful - vCluster is provisioned.\"\n  echo
          \"\U0001F4CB Manual verification:\"\n  echo \"   1. Connect: vcluster connect
          {{inputs.parameters.resource-name}}-vcluster -n {{inputs.parameters.resource-name}}\"\n
          \ echo \"   2. Verify: kubectl get nodes\"\n  exit 0\nfi\n\necho \"✅ vCluster
          API is accessible\"\nkubectl get namespaces\n\n# Deploy essential infrastructure
          tools based on vCluster capabilities\necho \"\U0001F680 Deploying essential
          infrastructure to vCluster...\"\n\n# Create essential namespaces\necho \"\U0001F4C1
          Creating essential namespaces...\"\nfor ns in monitoring argocd istio-system
          kube-system knative-serving; do\n  kubectl create namespace $ns --dry-run=client
          -o yaml | kubectl apply -f - || true\ndone\n\n# Deploy ArgoCD (should be
          available if provisioned by Crossplane)\necho \"\U0001F504 Setting up ArgoCD
          in vCluster...\"\nif kubectl get namespace argocd >/dev/null 2>&1; then\n
          \ echo \"✅ ArgoCD namespace exists\"\n  # Check if ArgoCD is already deployed\n
          \ if ! kubectl get deployment argocd-server -n argocd >/dev/null 2>&1; then\n
          \   echo \"\U0001F4E6 ArgoCD not found - will be provisioned by Crossplane\"\n
          \ else\n    echo \"✅ ArgoCD is already deployed\"\n  fi\nfi\n\n# Deploy
          basic monitoring and health check tools\necho \"\U0001F527 Deploying basic
          cluster monitoring...\"\n\n# Create a simple health check deployment\ncat
          <<EOF | kubectl apply -f -\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n
          \ name: cluster-health-check\n  namespace: monitoring\n  labels:\n    app:
          cluster-health-check\n    created-by: vcluster-provisioning\nspec:\n  replicas:
          1\n  selector:\n    matchLabels:\n      app: cluster-health-check\n  template:\n
          \   metadata:\n      labels:\n        app: cluster-health-check\n    spec:\n
          \     containers:\n      - name: health-check\n        image: nginx:alpine\n
          \       ports:\n        - containerPort: 80\n        resources:\n          requests:\n
          \           cpu: 50m\n            memory: 64Mi\n          limits:\n            cpu:
          100m\n            memory: 128Mi\n---\napiVersion: v1\nkind: Service\nmetadata:\n
          \ name: cluster-health-check\n  namespace: monitoring\n  labels:\n    app:
          cluster-health-check\nspec:\n  selector:\n    app: cluster-health-check\n
          \ ports:\n  - port: 80\n    targetPort: 80\nEOF\n\nif [ $? -eq 0 ]; then\n
          \ echo \"✅ Applications deployed successfully to vCluster {{inputs.parameters.resource-name}}\"\n
          \ echo \"\"\n  echo \"\U0001F4CB Deployment Summary:\"\n  echo \"   vCluster
          Name: {{inputs.parameters.resource-name}}\"\n  echo \"   Namespace: {{inputs.parameters.resource-name}}\"\n
          \ echo \"   Health Check: cluster-health-check (monitoring namespace)\"\n
          \ echo \"   Essential Namespaces: monitoring, argocd, istio-system, knative-serving\"\n
          \ echo \"   User: {{inputs.parameters.user}}\"\n  echo \"\"\n  echo \"\U0001F517
          Access Instructions:\"\n  echo \"   1. Connect: vcluster connect {{inputs.parameters.resource-name}}-vcluster
          -n {{inputs.parameters.resource-name}}\"\n  echo \"   2. Verify: kubectl
          get nodes\"\n  echo \"   3. Check tools: kubectl get pods -A\"\n  echo \"\"\n
          \ echo \"\U0001F4DA Tools will be provisioned by Crossplane based on capabilities:\"\n
          \ echo \"   - ArgoCD: Available for GitOps workflows\"\n  echo \"   - Istio:
          Service mesh (if enabled)\"\n  echo \"   - Knative: Serverless platform
          (if enabled)\"\n  echo \"   - Observability: Prometheus, Grafana, Jaeger
          (if enabled)\"\nelse\n  echo \"❌ Failed to deploy applications to vCluster\"\n
          \ echo \"\U0001F50D Debug information:\"\n  kubectl get pods -A\n  exit
          1\nfi\n"
kind: List
metadata:
  resourceVersion: ""
