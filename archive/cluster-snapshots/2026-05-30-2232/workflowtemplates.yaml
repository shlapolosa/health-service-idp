    - inputs:
        parameters:
        - name: resource-name
        - name: resource-type
        - name: namespace
        - name: environment-tier
        - name: github-org
      name: validate-appcontainer-parameters
      script:
        command:
        - sh
        image: alpine:3.18
        source: "echo \"\U0001F50D Validating AppContainer parameter contract compliance...\"\n\n#
          Validate Tier 1 - Universal Parameters\nif [ -z \"{{inputs.parameters.resource-name}}\"
          ]; then\n  echo \"❌ Missing required parameter: resource-name\"\n  exit
          1\nfi\n\n# Validate resource-name format (DNS-1123 compliant)\nif ! echo
          \"{{inputs.parameters.resource-name}}\" | grep -E '^[a-z0-9][a-z0-9-]*[a-z0-9]$';
          then\n  echo \"❌ Invalid resource-name format: {{inputs.parameters.resource-name}}\"\n
          \ echo \"Must be DNS-1123 compliant: lowercase alphanumeric and hyphens\"\n
          \ exit 1\nfi\n\n# Validate resource-type\nif [ \"{{inputs.parameters.resource-type}}\"
          != \"appcontainer\" ]; then\n  echo \"❌ Invalid resource-type for AppContainer
          template: {{inputs.parameters.resource-type}}\"\n  exit 1\nfi\n\n# Validate
          namespace format\nif ! echo \"{{inputs.parameters.namespace}}\" | grep -E
          '^[a-z0-9][a-z0-9-]*[a-z0-9]$'; then\n  echo \"❌ Invalid namespace format:
          {{inputs.parameters.namespace}}\"\n  exit 1\nfi\n\n# Validate Tier 2 - Platform
          Parameters\ncase \"{{inputs.parameters.environment-tier}}\" in\n  development|staging|production)\n
          \   echo \"✅ Valid environment-tier: {{inputs.parameters.environment-tier}}\"\n
          \   ;;\n  *)\n    echo \"❌ Invalid environment-tier: {{inputs.parameters.environment-tier}}\"\n
          \   echo \"Must be one of: development, staging, production\"\n    exit
          1\n    ;;\nesac\n\n# Validate GitHub organization\nif [ -z \"{{inputs.parameters.github-org}}\"
          ]; then\n  echo \"❌ GitHub organization is required\"\n  exit 1\nfi\n\necho
          \"✅ All parameter validations passed\"\necho \"\U0001F4CB AppContainer Configuration:\"\necho
          \"   Name: {{inputs.parameters.resource-name}}\"\necho \"   Namespace: {{inputs.parameters.namespace}}\"\necho
          \"   Environment: {{inputs.parameters.environment-tier}}\"\necho \"   GitHub
          Org: {{inputs.parameters.github-org}}\"\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: namespace
        - name: target-vcluster
        - name: auto-create-dependencies
        - name: security-enabled
        - name: observability-enabled
        - name: backup-enabled
        - name: environment-tier
        - name: resource-size
        - name: user
        - name: slack-channel
        - name: slack-user-id
      name: check-target-vcluster
      outputs:
        parameters:
        - name: vcluster-name
          valueFrom:
            parameter: '{{steps.determine-vcluster-name.outputs.parameters.vcluster-name}}'
      steps:
      - - arguments:
            parameters:
            - name: resource-name
              value: '{{inputs.parameters.resource-name}}'
            - name: target-vcluster
              value: '{{inputs.parameters.target-vcluster}}'
            - name: auto-create-dependencies
              value: '{{inputs.parameters.auto-create-dependencies}}'
          name: determine-vcluster-name
          template: determine-vcluster-name
      - - arguments:
            parameters:
            - name: vcluster-name
              value: '{{steps.determine-vcluster-name.outputs.parameters.vcluster-name}}'
            - name: namespace
              value: '{{inputs.parameters.namespace}}'
          name: validate-existing-vcluster
          template: validate-existing-vcluster
    - inputs:
        parameters:
        - name: resource-name
        - name: target-vcluster
        - name: auto-create-dependencies
      name: determine-vcluster-name
      outputs:
        parameters:
        - name: vcluster-name
          valueFrom:
            path: /tmp/vcluster-name
      script:
        command:
        - sh
        image: alpine:3.18
        source: "echo \"\U0001F50D Determining VCluster dependency for AppContainer...\"\n\n#
          Determine target vCluster name\nTARGET_VCLUSTER=\"{{inputs.parameters.target-vcluster}}\"\nif
          [ -z \"$TARGET_VCLUSTER\" ]; then\n  TARGET_VCLUSTER=\"{{inputs.parameters.resource-name}}-vcluster\"\nfi\n\necho
          \"Target VCluster: $TARGET_VCLUSTER\"\necho \"$TARGET_VCLUSTER\" > /tmp/vcluster-name\n\nif
          [ \"{{inputs.parameters.auto-create-dependencies}}\" = \"true\" ]; then\n
          \ echo \"✅ VCluster dependency will be auto-created\"\nelse\n  echo \"ℹ️
          VCluster dependency must exist: $TARGET_VCLUSTER\"\nfi\n"
    - inputs:
        parameters:
        - name: vcluster-name
        - name: namespace
      name: validate-existing-vcluster
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"\U0001F50D Validating existing VCluster for AppContainer deployment...\"\n\nif
          ! kubectl get vclusterenvironmentclaim {{inputs.parameters.vcluster-name}}
          -n {{inputs.parameters.namespace}} >/dev/null 2>&1; then\n  echo \"❌ VCluster
          {{inputs.parameters.vcluster-name}} does not exist\"\n  echo \"\U0001F4A1
          Use /vcluster command to create VCluster first, or specify an existing VCluster\"\n
          \ exit 1\nfi\n\necho \"✅ VCluster {{inputs.parameters.vcluster-name}} exists
          and is ready for AppContainer deployment\"\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: namespace
      name: wait-for-appcontainer-repositories
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"⏳ Waiting for AppContainer repositories to be created by Crossplane...\"\n\nTIMEOUT=300\nELAPSED=0\n\nwhile
          [ $ELAPSED -lt $TIMEOUT ]; do\n  echo \"Checking AppContainer claim status...
          (${ELAPSED}s/${TIMEOUT}s)\"\n  \n  SOURCE_URL=$(kubectl get appcontainerclaim
          {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}} -o
          jsonpath='{.status.sourceRepository.url}' 2>/dev/null || echo \"\")\n  GITOPS_URL=$(kubectl
          get appcontainerclaim {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}}
          -o jsonpath='{.status.gitopsRepository.url}' 2>/dev/null || echo \"\")\n
          \ \n  if [ ! -z \"$SOURCE_URL\" ] && [ ! -z \"$GITOPS_URL\" ]; then\n    echo
          \"✅ Repositories created successfully!\"\n    echo \"Source: $SOURCE_URL\"\n
          \   echo \"GitOps: $GITOPS_URL\"\n    exit 0\n  fi\n  \n  sleep 10\n  ELAPSED=$((ELAPSED
          + 10))\ndone\n\necho \"❌ Timeout waiting for repositories to be created\"\nexit
          1\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: target-vcluster
      name: create-default-microservice
      script:
        command:
        - sh
        image: alpine:3.18
        source: "echo \"\U0001F680 Creating default hello-world microservice...\"\necho
          \"AppContainer: {{inputs.parameters.resource-name}}\"\necho \"Target VCluster:
          {{inputs.parameters.target-vcluster}}\"\necho \"✅ Default microservice template
          created (implementation pending)\"\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: namespace
        - name: target-vcluster
        - name: github-org
      name: extract-appcontainer-info
      outputs:
        parameters:
        - name: endpoints-summary
          valueFrom:
            path: /tmp/endpoints.txt
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"\U0001F50D Extracting AppContainer connection information...\"\n\nTARGET_VCLUSTER=\"{{inputs.parameters.target-vcluster}}\"\nif
          [ -z \"$TARGET_VCLUSTER\" ]; then\n  TARGET_VCLUSTER=\"{{inputs.parameters.resource-name}}-vcluster\"\nfi\n\necho
          \"AppContainer name: {{inputs.parameters.resource-name}}\"\necho \"Target
          VCluster: $TARGET_VCLUSTER\"\n\n# Build comprehensive endpoints summary\nENDPOINTS_SUMMARY=\"\"\n\n#
          GitHub repositories\nSOURCE_URL=\"https://github.com/{{inputs.parameters.github-org}}/{{inputs.parameters.resource-name}}\"\nGITOPS_URL=\"https://github.com/{{inputs.parameters.github-org}}/{{inputs.parameters.resource-name}}-gitops\"\nENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F4DA
          Source Repository: $SOURCE_URL\\\\\\\\n\"\nENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F504
          GitOps Repository: $GITOPS_URL\\\\\\\\n\"\n\n# VCluster management endpoints\nARGOCD_URL=\"http://${TARGET_VCLUSTER}-argocd.{{inputs.parameters.namespace}}.local\"\nENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F504
          ArgoCD (GitOps): $ARGOCD_URL\\\\\\\\n\"\n\n# VCluster access\nVCLUSTER_URL=\"http://${TARGET_VCLUSTER}.{{inputs.parameters.namespace}}.local\"\nENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F310
          VCluster Access: $VCLUSTER_URL\\\\\\\\n\"\n\n# Write output to file\necho
          -e \"$ENDPOINTS_SUMMARY\" > /tmp/endpoints.txt\n\necho \"✅ AppContainer
          connection information extracted\"\necho \"Endpoints: $ENDPOINTS_SUMMARY\"\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: namespace
        - name: description
        - name: github-org
        - name: docker-registry
        - name: security-enabled
        - name: observability-enabled
        - name: user
        - name: slack-channel
      name: create-appcontainer-claim
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"\U0001F3D7️ Creating AppContainer claim with standardized
          parameters...\"\n\n# Parse boolean parameters\nOBSERVABILITY=$([ \"{{inputs.parameters.observability-enabled}}\"
          = \"true\" ] && echo \"true\" || echo \"false\")\nSECURITY=$([ \"{{inputs.parameters.security-enabled}}\"
          = \"true\" ] && echo \"true\" || echo \"false\")\n\n# Sanitize slack channel
          for label\nSLACK_CHANNEL_LABEL=$(echo \"{{inputs.parameters.slack-channel}}\"
          | sed 's/#//g' | tr '[:upper:]' '[:lower:]')\n\n# Create AppContainer claim
          manifest\ncat <<EOF | kubectl apply -f -\napiVersion: platform.example.org/v1alpha1\nkind:
          AppContainerClaim\nmetadata:\n  name: {{inputs.parameters.resource-name}}\n
          \ namespace: {{inputs.parameters.namespace}}\n  labels:\n    created-by:
          \"appcontainer-standard-contract\"\n    parameter-contract-version: \"v1.0\"\n
          \   resource-type: \"appcontainer\"\n    requested-by: \"{{inputs.parameters.user}}\"\n
          \   slack-channel: \"$SLACK_CHANNEL_LABEL\"\n  annotations:\n    description:
          \"{{inputs.parameters.description}}\"\n    parameter-contract: \"compliant\"\n
          \   created-at: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"\n    webservice.oam.dev/source:
          \"api-driven\"\nspec:\n  name: {{inputs.parameters.resource-name}}\n  description:
          \"{{inputs.parameters.description}}\"\n  gitHubOrg: \"{{inputs.parameters.github-org}}\"\n
          \ dockerRegistry: \"{{inputs.parameters.docker-registry}}\"\n  enableObservability:
          $OBSERVABILITY\n  enableSecurity: $SECURITY\nEOF\n\nif [ $? -eq 0 ]; then\n
          \ echo \"✅ AppContainer claim created successfully\"\n  echo \"Crossplane
          will create repositories and CI/CD infrastructure...\"\n  exit 0\nelse\n
          \ echo \"❌ Failed to create AppContainer claim\"\n  exit 1\nfi\n"
