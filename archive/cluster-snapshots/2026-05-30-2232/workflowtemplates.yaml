      name: validate-microservice-parameters
      script:
        command:
        - sh
        image: stedolan/jq:latest
        source: "echo \"\U0001F50D Validating Microservice parameter contract compliance...\"\n\n#
          Validate Tier 1 - Universal Parameters\nif [ -z \"{{inputs.parameters.resource-name}}\"
          ]; then\n  echo \"❌ Missing required parameter: resource-name\"\n  exit
          1\nfi\n\n# Validate resource-name format (DNS-1123 compliant)\nif ! echo
          \"{{inputs.parameters.resource-name}}\" | grep -E '^[a-z0-9][a-z0-9-]*[a-z0-9]$';
          then\n  echo \"❌ Invalid resource-name format: {{inputs.parameters.resource-name}}\"\n
          \ echo \"Must be DNS-1123 compliant: lowercase alphanumeric and hyphens\"\n
          \ exit 1\nfi\n\n# Validate resource-type\ncase \"{{inputs.parameters.resource-type}}\"
          in\n  microservice|realtime-platform)\n    echo \"✅ Valid resource-type:
          {{inputs.parameters.resource-type}}\"\n    ;;\n  *)\n    echo \"❌ Invalid
          resource-type for Microservice template: {{inputs.parameters.resource-type}}\"\n
          \   echo \"Must be one of: microservice, realtime-platform\"\n    exit 1\n
          \   ;;\nesac\n\n# Validate namespace format\nif ! echo \"{{inputs.parameters.namespace}}\"
          | grep -E '^[a-z0-9][a-z0-9-]*[a-z0-9]$'; then\n  echo \"❌ Invalid namespace
          format: {{inputs.parameters.namespace}}\"\n  exit 1\nfi\n\n# Validate Tier
          2 - Platform Parameters\ncase \"{{inputs.parameters.environment-tier}}\"
          in\n  development|staging|production)\n    echo \"✅ Valid environment-tier:
          {{inputs.parameters.environment-tier}}\"\n    ;;\n  *)\n    echo \"❌ Invalid
          environment-tier: {{inputs.parameters.environment-tier}}\"\n    echo \"Must
          be one of: development, staging, production\"\n    exit 1\n    ;;\nesac\n\n#
          Validate Tier 3 - Microservice-specific Parameters\ncase \"{{inputs.parameters.microservice-language}}\"
          in\n  python|java|go|nodejs|rust|rasa)\n    echo \"✅ Valid microservice-language:
          {{inputs.parameters.microservice-language}}\"\n    ;;\n  *)\n    echo \"❌
          Invalid microservice-language: {{inputs.parameters.microservice-language}}\"\n
          \   echo \"Must be one of: python, java, go, nodejs, rust, rasa\"\n    exit
          1\n    ;;\nesac\n\ncase \"{{inputs.parameters.microservice-framework}}\"
          in\n  fastapi|springboot|gin|express|axum|auto|chatbot|graphql-gateway)\n
          \   echo \"✅ Valid microservice-framework: {{inputs.parameters.microservice-framework}}\"\n
          \   ;;\n  *)\n    echo \"❌ Invalid microservice-framework: {{inputs.parameters.microservice-framework}}\"\n
          \   echo \"Must be one of: fastapi, springboot, gin, express, axum, auto,
          chatbot, graphql-gateway\"\n    exit 1\n    ;;\nesac\n\ncase \"{{inputs.parameters.microservice-database}}\"
          in\n  none|postgres|postgresql|mysql|mongodb|cassandra)\n    echo \"✅ Valid
          microservice-database: {{inputs.parameters.microservice-database}}\"\n    ;;\n
          \ *)\n    echo \"❌ Invalid microservice-database: {{inputs.parameters.microservice-database}}\"\n
          \   echo \"Must be one of: none, postgres, postgresql, mysql, mongodb, cassandra\"\n
          \   exit 1\n    ;;\nesac\n\ncase \"{{inputs.parameters.microservice-cache}}\"
          in\n  none|redis|memcached|hazelcast)\n    echo \"✅ Valid microservice-cache:
          {{inputs.parameters.microservice-cache}}\"\n    ;;\n  *)\n    echo \"❌ Invalid
          microservice-cache: {{inputs.parameters.microservice-cache}}\"\n    echo
          \"Must be one of: none, redis, memcached, hazelcast\"\n    exit 1\n    ;;\nesac\n\n#
          Validate GitHub organization\nif [ -z \"{{inputs.parameters.github-org}}\"
          ]; then\n  echo \"❌ GitHub organization is required\"\n  exit 1\nfi\n\necho
          \"✅ All parameter validations passed\"\necho \"\U0001F4CB Microservice Configuration:\"\necho
          \"   Name: {{inputs.parameters.resource-name}}\"\necho \"   Namespace: {{inputs.parameters.namespace}}\"\necho
          \"   Environment: {{inputs.parameters.environment-tier}}\"\necho \"   Language:
          {{inputs.parameters.microservice-language}}\"\necho \"   Framework: {{inputs.parameters.microservice-framework}}\"\necho
          \"   Database: {{inputs.parameters.microservice-database}}\"\necho \"   Cache:
          {{inputs.parameters.microservice-cache}}\"\necho \"   GitHub Org: {{inputs.parameters.github-org}}\"\n"
    - inputs:
