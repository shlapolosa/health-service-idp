        != 'Succeeded' || '{{steps.apply-consumer-oam.status}}' == 'Failed' || '{{steps.extract-microservice-info.status}}'
        == 'Failed'\"}]]},{\"inputs\":{\"parameters\":[{\"name\":\"resource-name\"},{\"name\":\"resource-type\"},{\"name\":\"namespace\"},{\"name\":\"environment-tier\"},{\"name\":\"microservice-language\"},{\"name\":\"microservice-framework\"},{\"name\":\"microservice-database\"},{\"name\":\"microservice-cache\"},{\"name\":\"github-org\"}]},\"name\":\"validate-microservice-parameters\",\"script\":{\"command\":[\"sh\"],\"image\":\"stedolan/jq:latest\",\"source\":\"echo
        \\\"\U0001F50D Validating Microservice parameter contract compliance...\\\"\\n\\n#
        Validate Tier 1 - Universal Parameters\\nif [ -z \\\"{{inputs.parameters.resource-name}}\\\"
        ]; then\\n  echo \\\"❌ Missing required parameter: resource-name\\\"\\n  exit
        1\\nfi\\n\\n# Validate resource-name format (DNS-1123 compliant)\\nif ! echo
        \\\"{{inputs.parameters.resource-name}}\\\" | grep -E '^[a-z0-9][a-z0-9-]*[a-z0-9]$';
        then\\n  echo \\\"❌ Invalid resource-name format: {{inputs.parameters.resource-name}}\\\"\\n
        \ echo \\\"Must be DNS-1123 compliant: lowercase alphanumeric and hyphens\\\"\\n
        \ exit 1\\nfi\\n\\n# Validate resource-type\\ncase \\\"{{inputs.parameters.resource-type}}\\\"
        in\\n  microservice|realtime-platform)\\n    echo \\\"✅ Valid resource-type:
        {{inputs.parameters.resource-type}}\\\"\\n    ;;\\n  *)\\n    echo \\\"❌ Invalid
        resource-type for Microservice template: {{inputs.parameters.resource-type}}\\\"\\n
        \   echo \\\"Must be one of: microservice, realtime-platform\\\"\\n    exit
        1\\n    ;;\\nesac\\n\\n# Validate namespace format\\nif ! echo \\\"{{inputs.parameters.namespace}}\\\"
        | grep -E '^[a-z0-9][a-z0-9-]*[a-z0-9]$'; then\\n  echo \\\"❌ Invalid namespace
        format: {{inputs.parameters.namespace}}\\\"\\n  exit 1\\nfi\\n\\n# Validate
        Tier 2 - Platform Parameters\\ncase \\\"{{inputs.parameters.environment-tier}}\\\"
        in\\n  development|staging|production)\\n    echo \\\"✅ Valid environment-tier:
        {{inputs.parameters.environment-tier}}\\\"\\n    ;;\\n  *)\\n    echo \\\"❌
        Invalid environment-tier: {{inputs.parameters.environment-tier}}\\\"\\n    echo
        \\\"Must be one of: development, staging, production\\\"\\n    exit 1\\n    ;;\\nesac\\n\\n#
        Validate Tier 3 - Microservice-specific Parameters\\ncase \\\"{{inputs.parameters.microservice-language}}\\\"
        in\\n  python|java|go|nodejs|rust|rasa)\\n    echo \\\"✅ Valid microservice-language:
        {{inputs.parameters.microservice-language}}\\\"\\n    ;;\\n  *)\\n    echo
        \\\"❌ Invalid microservice-language: {{inputs.parameters.microservice-language}}\\\"\\n
        \   echo \\\"Must be one of: python, java, go, nodejs, rust, rasa\\\"\\n    exit
        1\\n    ;;\\nesac\\n\\ncase \\\"{{inputs.parameters.microservice-framework}}\\\"
        in\\n  fastapi|springboot|gin|express|axum|auto|chatbot|graphql-gateway)\\n
        \   echo \\\"✅ Valid microservice-framework: {{inputs.parameters.microservice-framework}}\\\"\\n
        \   ;;\\n  *)\\n    echo \\\"❌ Invalid microservice-framework: {{inputs.parameters.microservice-framework}}\\\"\\n
        \   echo \\\"Must be one of: fastapi, springboot, gin, express, axum, auto,
        chatbot, graphql-gateway\\\"\\n    exit 1\\n    ;;\\nesac\\n\\ncase \\\"{{inputs.parameters.microservice-database}}\\\"
        in\\n  none|postgres|postgresql|mysql|mongodb|cassandra)\\n    echo \\\"✅
        Valid microservice-database: {{inputs.parameters.microservice-database}}\\\"\\n
        \   ;;\\n  *)\\n    echo \\\"❌ Invalid microservice-database: {{inputs.parameters.microservice-database}}\\\"\\n
        \   echo \\\"Must be one of: none, postgres, postgresql, mysql, mongodb, cassandra\\\"\\n
        \   exit 1\\n    ;;\\nesac\\n\\ncase \\\"{{inputs.parameters.microservice-cache}}\\\"
        in\\n  none|redis|memcached|hazelcast)\\n    echo \\\"✅ Valid microservice-cache:
        {{inputs.parameters.microservice-cache}}\\\"\\n    ;;\\n  *)\\n    echo \\\"❌
        Invalid microservice-cache: {{inputs.parameters.microservice-cache}}\\\"\\n
        \   echo \\\"Must be one of: none, redis, memcached, hazelcast\\\"\\n    exit
        1\\n    ;;\\nesac\\n\\n# Validate GitHub organization\\nif [ -z \\\"{{inputs.parameters.github-org}}\\\"
        ]; then\\n  echo \\\"❌ GitHub organization is required\\\"\\n  exit 1\\nfi\\n\\necho
        \\\"✅ All parameter validations passed\\\"\\necho \\\"\U0001F4CB Microservice
        Configuration:\\\"\\necho \\\"   Name: {{inputs.parameters.resource-name}}\\\"\\necho
        \\\"   Namespace: {{inputs.parameters.namespace}}\\\"\\necho \\\"   Environment:
        {{inputs.parameters.environment-tier}}\\\"\\necho \\\"   Language: {{inputs.parameters.microservice-language}}\\\"\\necho
        \\\"   Framework: {{inputs.parameters.microservice-framework}}\\\"\\necho
        \\\"   Database: {{inputs.parameters.microservice-database}}\\\"\\necho \\\"
        \  Cache: {{inputs.parameters.microservice-cache}}\\\"\\necho \\\"   GitHub
        Org: {{inputs.parameters.github-org}}\\\"\\n\"}},{\"inputs\":{\"parameters\":[{\"name\":\"resource-name\"},{\"name\":\"namespace\"},{\"name\":\"parent-appcontainer\"},{\"name\":\"description\"},{\"name\":\"github-org\"},{\"name\":\"docker-registry\"},{\"name\":\"security-enabled\"},{\"name\":\"observability-enabled\"},{\"name\":\"backup-enabled\"},{\"name\":\"environment-tier\"},{\"name\":\"resource-size\"},{\"name\":\"user\"},{\"name\":\"slack-channel\"},{\"name\":\"slack-user-id\"},{\"name\":\"repository-name\"},{\"name\":\"target-vcluster\"}]},\"name\":\"ensure-repositories\",\"outputs\":{\"parameters\":[{\"name\":\"repository-name\",\"valueFrom\":{\"parameter\":\"{{steps.determine-repository-name.outputs.parameters.repository-name}}\"}},{\"name\":\"vcluster-name\",\"valueFrom\":{\"parameter\":\"{{steps.determine-repository-name.outputs.parameters.vcluster-name}}\"}}]},\"steps\":[[{\"arguments\":{\"parameters\":[{\"name\":\"resource-name\",\"value\":\"{{inputs.parameters.resource-name}}\"},{\"name\":\"parent-appcontainer\",\"value\":\"{{inputs.parameters.parent-appcontainer}}\"},{\"name\":\"repository-name\",\"value\":\"{{inputs.parameters.repository-name}}\"},{\"name\":\"target-vcluster\",\"value\":\"{{inputs.parameters.target-vcluster}}\"}]},\"name\":\"determine-repository-name\",\"template\":\"determine-repository-name\"}],[{\"arguments\":{\"parameters\":[{\"name\":\"repository-name\",\"value\":\"{{steps.determine-repository-name.outputs.parameters.repository-name}}\"},{\"name\":\"microservice-name\",\"value\":\"{{inputs.parameters.resource-name}}\"},{\"name\":\"namespace\",\"value\":\"{{inputs.parameters.namespace}}\"},{\"name\":\"description\",\"value\":\"{{inputs.parameters.description}}\"},{\"name\":\"github-org\",\"value\":\"{{inputs.parameters.github-org}}\"},{\"name\":\"docker-registry\",\"value\":\"{{inputs.parameters.docker-registry}}\"},{\"name\":\"user\",\"value\":\"{{inputs.parameters.user}}\"},{\"name\":\"slack-channel\",\"value\":\"{{inputs.parameters.slack-channel}}\"},{\"name\":\"slack-user-id\",\"value\":\"{{inputs.parameters.slack-user-id}}\"}]},\"name\":\"create-or-update-appcontainer\",\"template\":\"create-or-update-appcontainer\"}]]},{\"inputs\":{\"parameters\":[{\"name\":\"resource-name\"},{\"name\":\"namespace\"},{\"name\":\"description\"},{\"name\":\"microservice-language\"},{\"name\":\"microservice-framework\"},{\"name\":\"microservice-database\"},{\"name\":\"microservice-cache\"},{\"name\":\"microservice-expose-api\"},{\"name\":\"target-vcluster\"},{\"name\":\"user\"},{\"name\":\"slack-channel\"},{\"name\":\"repository-name\"},{\"name\":\"bootstrap-source\"},{\"name\":\"microservice-realtime\"}]},\"name\":\"create-microservice-claim\",\"script\":{\"command\":[\"sh\"],\"image\":\"alpine/k8s:1.28.4\",\"source\":\"echo
        \\\"\U0001F3D7️ Creating ApplicationClaim with standardized parameters...\\\"\\n\\n#
        Framework auto-derivation\\nFRAMEWORK=\\\"{{inputs.parameters.microservice-framework}}\\\"\\nif
        [ \\\"$FRAMEWORK\\\" = \\\"auto\\\" ]; then\\n  case \\\"{{inputs.parameters.microservice-language}}\\\"
        in\\n    python) FRAMEWORK=\\\"fastapi\\\" ;;\\n    java) FRAMEWORK=\\\"springboot\\\"
        ;;\\n    go) FRAMEWORK=\\\"gin\\\" ;;\\n    nodejs) FRAMEWORK=\\\"express\\\"
        ;;\\n    rust) FRAMEWORK=\\\"axum\\\" ;;\\n    rasa) FRAMEWORK=\\\"chatbot\\\"
        ;;\\n    *) FRAMEWORK=\\\"fastapi\\\" ;;\\n  esac\\nfi\\n\\n# Parse boolean
        parameters\\nEXPOSE_API=$([ \\\"{{inputs.parameters.microservice-expose-api}}\\\"
        = \\\"true\\\" ] \\u0026\\u0026 echo \\\"true\\\" || echo \\\"false\\\")\\n\\n#
        Sanitize slack channel for label\\nSLACK_CHANNEL_LABEL=$(echo \\\"{{inputs.parameters.slack-channel}}\\\"
        | sed 's/#//g' | tr '[:upper:]' '[:lower:]')\\n\\n# Use the repository name
        that was determined in ensure-repositories step\\nREPO_NAME=\\\"{{inputs.parameters.repository-name}}\\\"\\n\\n#
        Target vCluster has already been determined by determine-repository-name step\\n#
        and passed through ensure-repositories outputs\\nTARGET_VCLUSTER=\\\"{{inputs.parameters.target-vcluster}}\\\"\\n\\n#
        Always set targetVCluster (it's either specified or defaulted to repo name)\\nVCLUSTER_SPEC=\\\"targetVCluster:
        \\\\\\\"$TARGET_VCLUSTER\\\\\\\"\\\"\\n\\necho \\\"\U0001F3AF Deploying to
        vCluster: $TARGET_VCLUSTER\\\"\\n\\n# Create ApplicationClaim manifest that
        references the AppContainer\\ncat \\u003c\\u003cEOF | kubectl apply -f -\\napiVersion:
        platform.example.org/v1alpha1\\nkind: ApplicationClaim\\nmetadata:\\n  name:
        {{inputs.parameters.resource-name}}\\n  namespace: {{inputs.parameters.namespace}}\\n
        \ labels:\\n    created-by: \\\"microservice-standard-contract\\\"\\n    parameter-contract-version:
        \\\"v1.0\\\"\\n    resource-type: \\\"microservice\\\"\\n    microservice-language:
        \\\"{{inputs.parameters.microservice-language}}\\\"\\n    microservice-framework:
        \\\"$FRAMEWORK\\\"\\n    microservice-database: \\\"{{inputs.parameters.microservice-database}}\\\"\\n
        \   microservice-cache: \\\"{{inputs.parameters.microservice-cache}}\\\"\\n
        \   requested-by: \\\"{{inputs.parameters.user}}\\\"\\n    slack-channel:
        \\\"$SLACK_CHANNEL_LABEL\\\"\\n    parent-appcontainer: \\\"$REPO_NAME\\\"\\n
        \ annotations:\\n    description: \\\"{{inputs.parameters.description}}\\\"\\n
        \   parameter-contract: \\\"compliant\\\"\\n    created-at: \\\"$(date -u
        +%Y-%m-%dT%H:%M:%SZ)\\\"\\n    webservice.oam.dev/source: \\\"{{inputs.parameters.bootstrap-source}}\\\"\\n
        \   webservice.oam.dev/vcluster: \\\"{{inputs.parameters.target-vcluster}}\\\"\\nspec:\\n
        \ name: {{inputs.parameters.resource-name}}\\n  language: \\\"{{inputs.parameters.microservice-language}}\\\"\\n
        \ framework: \\\"$FRAMEWORK\\\"\\n  database: \\\"{{inputs.parameters.microservice-database}}\\\"\\n
        \ cache: \\\"{{inputs.parameters.microservice-cache}}\\\"\\n  exposeApi: $EXPOSE_API\\n
        \ appContainer: \\\"$REPO_NAME\\\"\\n  $(if [ -n \\\"{{inputs.parameters.microservice-realtime}}\\\"
        ] \\u0026\\u0026 [ \\\"{{inputs.parameters.microservice-realtime}}\\\" !=
        \\\"\\\" ] \\u0026\\u0026 [ \\\"{{inputs.parameters.microservice-realtime}}\\\"
        != \\\"false\\\" ]; then echo \\\"realtime: \\\\\\\"{{inputs.parameters.microservice-realtime}}\\\\\\\"\\\";
        fi)\\n  $VCLUSTER_SPEC\\nEOF\\n\\nif [ $? -eq 0 ]; then\\n  echo \\\"✅ ApplicationClaim
        created successfully\\\"\\n  echo \\\"\U0001F4E6 Microservice Configuration:\\\"\\n
        \ echo \\\"   Language: {{inputs.parameters.microservice-language}}\\\"\\n
        \ echo \\\"   Framework: $FRAMEWORK\\\"\\n  echo \\\"   Database: {{inputs.parameters.microservice-database}}\\\"\\n
        \ echo \\\"   Cache: {{inputs.parameters.microservice-cache}}\\\"\\n  echo
        \\\"   Expose API: $EXPOSE_API\\\"\\n  echo \\\"   Target vCluster: $TARGET_VCLUSTER\\\"\\n
        \ echo \\\"\\\"\\n  echo \\\"Crossplane will now create:\\\"\\n  echo \\\"
        \ \U0001F680 Knative service: {{inputs.parameters.resource-name}}\\\"\\n  echo
        \\\"  \U0001F4C1 Repository structure with CLAUDE.md compliance\\\"\\n  echo
        \\\"  \U0001F527 CI/CD pipeline with GitHub Actions\\\"\\n  echo \\\"  \U0001F3AF
        vCluster deployment: $TARGET_VCLUSTER\\\"\\n  echo \\\"  \U0001F4CA Database
        resources (if enabled)\\\"\\n  echo \\\"  \U0001F4BE Cache resources (if enabled)\\\"\\n
        \ exit 0\\nelse\\n  echo \\\"❌ Failed to create ApplicationClaim\\\"\\n  exit
        1\\nfi\\n\"}},{\"inputs\":{\"parameters\":[{\"name\":\"resource-name\"},{\"name\":\"namespace\"}]},\"name\":\"wait-for-microservice-ready\",\"script\":{\"command\":[\"sh\"],\"image\":\"alpine/k8s:1.28.4\",\"source\":\"echo
        \\\"⏳ Waiting for ApplicationClaim to be ready by Crossplane...\\\"\\n\\nTIMEOUT=600\\nELAPSED=0\\n\\nwhile
        [ $ELAPSED -lt $TIMEOUT ]; do\\n  echo \\\"Checking ApplicationClaim status...
        (${ELAPSED}s/${TIMEOUT}s)\\\"\\n  \\n  # Check if Ready condition is True\\n
        \ READY_STATUS=$(kubectl get applicationclaim {{inputs.parameters.resource-name}}
        -n {{inputs.parameters.namespace}} \\\\\\n    -o jsonpath='{.status.conditions[?(@.type==\\\"Ready\\\")].status}'
        2\\u003e/dev/null || echo \\\"False\\\")\\n  \\n  # For ApplicationClaim created
        by composition, check if it's synced and ready\\n  SYNCED=$(kubectl get applicationclaim
        {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}} \\\\\\n
        \   -o jsonpath='{.status.conditions[?(@.type==\\\"Synced\\\")].status}' 2\\u003e/dev/null
        || echo \\\"False\\\")\\n  \\n  # Try to get any repository or infrastructure
        info\\n  REPOSITORY_URL=$(kubectl get applicationclaim {{inputs.parameters.resource-name}}
        -n {{inputs.parameters.namespace}} \\\\\\n    -o jsonpath='{.status.repository.url}'
        2\\u003e/dev/null || echo \\\"\\\")\\n  KNATIVE_SERVICE=$(kubectl get applicationclaim
        {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}} \\\\\\n
        \   -o jsonpath='{.status.application.knativeService}' 2\\u003e/dev/null ||
        echo \\\"\\\")\\n  \\n  # Check XApplicationClaim if needed\\n  if [ -z \\\"$REPOSITORY_URL\\\"
        ]; then\\n    XR_NAME=$(kubectl get applicationclaim {{inputs.parameters.resource-name}}
        -n {{inputs.parameters.namespace}} \\\\\\n      -o jsonpath='{.spec.resourceRef.name}'
        2\\u003e/dev/null || echo \\\"\\\")\\n    if [ ! -z \\\"$XR_NAME\\\" ]; then\\n
        \     REPOSITORY_URL=$(kubectl get xapplicationclaim $XR_NAME \\\\\\n        -o
        jsonpath='{.status.repository.url}' 2\\u003e/dev/null || echo \\\"\\\")\\n
        \   fi\\n  fi\\n  \\n  if [ \\\"$READY_STATUS\\\" = \\\"True\\\" ] \\u0026\\u0026
        [ \\\"$SYNCED\\\" = \\\"True\\\" ]; then\\n    echo \\\"✅ ApplicationClaim
        ready!\\\"\\n    echo \\\"Ready Status: $READY_STATUS\\\"\\n    echo \\\"Synced:
        $SYNCED\\\"\\n    if [ ! -z \\\"$REPOSITORY_URL\\\" ]; then\\n      echo \\\"Repository:
        $REPOSITORY_URL\\\"\\n    fi\\n    if [ ! -z \\\"$KNATIVE_SERVICE\\\" ]; then\\n
        \     echo \\\"Knative Service: $KNATIVE_SERVICE\\\"\\n    fi\\n    echo \\\"CLAUDE.md-compliant
        structure: Ready\\\"\\n    exit 0\\n  fi\\n  \\n  echo \\\"  Ready: $READY_STATUS\\\"\\n
        \ echo \\\"  Synced: $SYNCED\\\"\\n  echo \\\"  Repository: $REPOSITORY_URL\\\"\\n
        \ echo \\\"  Knative Service: $KNATIVE_SERVICE\\\"\\n  \\n  sleep 15\\n  ELAPSED=$((ELAPSED
        + 15))\\ndone\\n\\necho \\\"❌ Timeout waiting for ApplicationClaim to be ready\\\"\\nexit
        1\\n\"}},{\"inputs\":{\"parameters\":[{\"name\":\"resource-name\"},{\"name\":\"namespace\"},{\"name\":\"target-vcluster\"},{\"name\":\"github-org\"},{\"name\":\"microservice-language\"},{\"name\":\"microservice-database\"},{\"name\":\"microservice-cache\"},{\"name\":\"microservice-realtime\"},{\"name\":\"repository-name\"}]},\"name\":\"extract-microservice-info\",\"outputs\":{\"parameters\":[{\"name\":\"endpoints-summary\",\"valueFrom\":{\"path\":\"/tmp/endpoints.txt\"}},{\"name\":\"artifacts-summary\",\"valueFrom\":{\"path\":\"/tmp/artifacts.txt\"}},{\"name\":\"external-endpoints\",\"valueFrom\":{\"path\":\"/tmp/external-endpoints.txt\"}}]},\"script\":{\"command\":[\"sh\"],\"image\":\"alpine/k8s:1.28.4\",\"source\":\"echo
        \\\"\U0001F50D Extracting comprehensive microservice artifacts and endpoints...\\\"\\n\\n#
        Use the repository name that was determined in ensure-repositories step\\nREPO_NAME=\\\"{{inputs.parameters.repository-name}}\\\"\\nMICROSERVICE_NAME=\\\"{{inputs.parameters.resource-name}}\\\"\\nNAMESPACE=\\\"{{inputs.parameters.namespace}}\\\"\\nREALTIME_PLATFORM=\\\"{{inputs.parameters.microservice-realtime}}\\\"\\n\\nTARGET_VCLUSTER=\\\"{{inputs.parameters.target-vcluster}}\\\"\\nif
        [ -z \\\"$TARGET_VCLUSTER\\\" ]; then\\n  TARGET_VCLUSTER=\\\"${REPO_NAME}-vcluster\\\"\\nfi\\n\\necho
        \\\"Repository name: $REPO_NAME\\\"\\necho \\\"Microservice name: $MICROSERVICE_NAME\\\"\\necho
        \\\"Namespace: $NAMESPACE\\\"\\necho \\\"Target VCluster: $TARGET_VCLUSTER\\\"\\necho
        \\\"Realtime Platform: ${REALTIME_PLATFORM:-'None'}\\\"\\n\\n# =============================================================================\\n#
        DETECT CREATED ARTIFACTS\\n# =============================================================================\\necho
        \\\"\U0001F4E6 Detecting created Kubernetes artifacts...\\\"\\n\\nARTIFACTS_SUMMARY=\\\"\\\"\\nEXTERNAL_ENDPOINTS=\\\"\\\"\\nENDPOINTS_SUMMARY=\\\"\\\"\\n\\n#
        Check for Knative Service (primary microservice)\\nif kubectl get ksvc \\\"$MICROSERVICE_NAME\\\"
        -n \\\"$NAMESPACE\\\" \\u003e/dev/null 2\\u003e\\u00261; then\\n  ARTIFACTS_SUMMARY=\\\"${ARTIFACTS_SUMMARY}✅
        Knative Service: $MICROSERVICE_NAME\\\\\\\\n\\\"\\n  \\n  # Get Knative Service
        URL\\n  KNATIVE_URL=$(kubectl get ksvc \\\"$MICROSERVICE_NAME\\\" -n \\\"$NAMESPACE\\\"
        -o jsonpath='{.status.url}' 2\\u003e/dev/null || echo \\\"\\\")\\n  if [ !
        -z \\\"$KNATIVE_URL\\\" ]; then\\n    ENDPOINTS_SUMMARY=\\\"${ENDPOINTS_SUMMARY}\U0001F680
        Microservice API: $KNATIVE_URL\\\\\\\\n\\\"\\n    \\n    # Check if externally
        accessible\\n    if echo \\\"$KNATIVE_URL\\\" | grep -v \\\"\\\\.local\\\"
        | grep -v \\\"cluster\\\\.local\\\" \\u003e/dev/null; then\\n      EXTERNAL_ENDPOINTS=\\\"${EXTERNAL_ENDPOINTS}\U0001F310
        External API: $KNATIVE_URL\\\\\\\\n\\\"\\n    fi\\n  fi\\nfi\\n\\n# Check
        for Application (OAM)\\nif kubectl get application \\\"$MICROSERVICE_NAME\\\"
        -n \\\"$NAMESPACE\\\" \\u003e/dev/null 2\\u003e\\u00261; then\\n  ARTIFACTS_SUMMARY=\\\"${ARTIFACTS_SUMMARY}✅
        OAM Application: $MICROSERVICE_NAME\\\\\\\\n\\\"\\nfi\\n\\n# Check for ApplicationClaim
        (if created via ApplicationClaim workflow)\\nif kubectl get applicationclaim
        \\\"$MICROSERVICE_NAME\\\" -n \\\"$NAMESPACE\\\" \\u003e/dev/null 2\\u003e\\u00261;
        then\\n  ARTIFACTS_SUMMARY=\\\"${ARTIFACTS_SUMMARY}✅ ApplicationClaim: $MICROSERVICE_NAME\\\\\\\\n\\\"\\nfi\\n\\n#
        Check for Deployment (traditional K8s)\\nif kubectl get deployment \\\"$MICROSERVICE_NAME\\\"
        -n \\\"$NAMESPACE\\\" \\u003e/dev/null 2\\u003e\\u00261; then\\n  ARTIFACTS_SUMMARY=\\\"${ARTIFACTS_SUMMARY}✅
        Deployment: $MICROSERVICE_NAME\\\\\\\\n\\\"\\nfi\\n\\n# Check for Services\\nSERVICES=$(kubectl
        get svc -n \\\"$NAMESPACE\\\" -l \\\"app.kubernetes.io/name=$MICROSERVICE_NAME\\\"
        --no-headers 2\\u003e/dev/null | awk '{print $1}' || echo \\\"\\\")\\nif [
        ! -z \\\"$SERVICES\\\" ]; then\\n  for SVC in $SERVICES; do\\n    ARTIFACTS_SUMMARY=\\\"${ARTIFACTS_SUMMARY}✅
        Service: $SVC\\\\\\\\n\\\"\\n    \\n    # Check for LoadBalancer services
        with external IPs\\n    SVC_TYPE=$(kubectl get svc \\\"$SVC\\\" -n \\\"$NAMESPACE\\\"
        -o jsonpath='{.spec.type}' 2\\u003e/dev/null)\\n    if [ \\\"$SVC_TYPE\\\"
        = \\\"LoadBalancer\\\" ]; then\\n      EXTERNAL_IP=$(kubectl get svc \\\"$SVC\\\"
        -n \\\"$NAMESPACE\\\" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2\\u003e/dev/null)\\n
        \     EXTERNAL_HOSTNAME=$(kubectl get svc \\\"$SVC\\\" -n \\\"$NAMESPACE\\\"
        -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2\\u003e/dev/null)\\n
