        - name: microservice-realtime
      name: create-microservice-claim
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"\U0001F3D7️ Creating ApplicationClaim with standardized parameters...\"\n\n#
          Framework auto-derivation\nFRAMEWORK=\"{{inputs.parameters.microservice-framework}}\"\nif
          [ \"$FRAMEWORK\" = \"auto\" ]; then\n  case \"{{inputs.parameters.microservice-language}}\"
          in\n    python) FRAMEWORK=\"fastapi\" ;;\n    java) FRAMEWORK=\"springboot\"
          ;;\n    go) FRAMEWORK=\"gin\" ;;\n    nodejs) FRAMEWORK=\"express\" ;;\n
          \   rust) FRAMEWORK=\"axum\" ;;\n    rasa) FRAMEWORK=\"chatbot\" ;;\n    *)
          FRAMEWORK=\"fastapi\" ;;\n  esac\nfi\n\n# Parse boolean parameters\nEXPOSE_API=$([
          \"{{inputs.parameters.microservice-expose-api}}\" = \"true\" ] && echo \"true\"
          || echo \"false\")\n\n# Sanitize slack channel for label\nSLACK_CHANNEL_LABEL=$(echo
          \"{{inputs.parameters.slack-channel}}\" | sed 's/#//g' | tr '[:upper:]'
          '[:lower:]')\n\n# Use the repository name that was determined in ensure-repositories
          step\nREPO_NAME=\"{{inputs.parameters.repository-name}}\"\n\n# Target vCluster
          has already been determined by determine-repository-name step\n# and passed
          through ensure-repositories outputs\nTARGET_VCLUSTER=\"{{inputs.parameters.target-vcluster}}\"\n\n#
          Always set targetVCluster (it's either specified or defaulted to repo name)\nVCLUSTER_SPEC=\"targetVCluster:
          \\\"$TARGET_VCLUSTER\\\"\"\n\necho \"\U0001F3AF Deploying to vCluster: $TARGET_VCLUSTER\"\n\n#
          Create ApplicationClaim manifest that references the AppContainer\ncat <<EOF
          | kubectl apply -f -\napiVersion: platform.example.org/v1alpha1\nkind: ApplicationClaim\nmetadata:\n
          \ name: {{inputs.parameters.resource-name}}\n  namespace: {{inputs.parameters.namespace}}\n
          \ labels:\n    created-by: \"microservice-standard-contract\"\n    parameter-contract-version:
          \"v1.0\"\n    resource-type: \"microservice\"\n    microservice-language:
          \"{{inputs.parameters.microservice-language}}\"\n    microservice-framework:
          \"$FRAMEWORK\"\n    microservice-database: \"{{inputs.parameters.microservice-database}}\"\n
          \   microservice-cache: \"{{inputs.parameters.microservice-cache}}\"\n    requested-by:
          \"{{inputs.parameters.user}}\"\n    slack-channel: \"$SLACK_CHANNEL_LABEL\"\n
          \   parent-appcontainer: \"$REPO_NAME\"\n  annotations:\n    description:
          \"{{inputs.parameters.description}}\"\n    parameter-contract: \"compliant\"\n
          \   created-at: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"\n    webservice.oam.dev/source:
          \"{{inputs.parameters.bootstrap-source}}\"\n    webservice.oam.dev/vcluster:
          \"{{inputs.parameters.target-vcluster}}\"\nspec:\n  name: {{inputs.parameters.resource-name}}\n
          \ language: \"{{inputs.parameters.microservice-language}}\"\n  framework:
          \"$FRAMEWORK\"\n  database: \"{{inputs.parameters.microservice-database}}\"\n
          \ cache: \"{{inputs.parameters.microservice-cache}}\"\n  exposeApi: $EXPOSE_API\n
          \ appContainer: \"$REPO_NAME\"\n  $(if [ -n \"{{inputs.parameters.microservice-realtime}}\"
          ] && [ \"{{inputs.parameters.microservice-realtime}}\" != \"\" ] && [ \"{{inputs.parameters.microservice-realtime}}\"
          != \"false\" ]; then echo \"realtime: \\\"{{inputs.parameters.microservice-realtime}}\\\"\";
          fi)\n  $VCLUSTER_SPEC\nEOF\n\nif [ $? -eq 0 ]; then\n  echo \"✅ ApplicationClaim
          created successfully\"\n  echo \"\U0001F4E6 Microservice Configuration:\"\n
          \ echo \"   Language: {{inputs.parameters.microservice-language}}\"\n  echo
          \"   Framework: $FRAMEWORK\"\n  echo \"   Database: {{inputs.parameters.microservice-database}}\"\n
          \ echo \"   Cache: {{inputs.parameters.microservice-cache}}\"\n  echo \"
          \  Expose API: $EXPOSE_API\"\n  echo \"   Target vCluster: $TARGET_VCLUSTER\"\n
          \ echo \"\"\n  echo \"Crossplane will now create:\"\n  echo \"  \U0001F680
          Knative service: {{inputs.parameters.resource-name}}\"\n  echo \"  \U0001F4C1
          Repository structure with CLAUDE.md compliance\"\n  echo \"  \U0001F527
          CI/CD pipeline with GitHub Actions\"\n  echo \"  \U0001F3AF vCluster deployment:
          $TARGET_VCLUSTER\"\n  echo \"  \U0001F4CA Database resources (if enabled)\"\n
          \ echo \"  \U0001F4BE Cache resources (if enabled)\"\n  exit 0\nelse\n  echo
          \"❌ Failed to create ApplicationClaim\"\n  exit 1\nfi\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: namespace
      name: wait-for-microservice-ready
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"⏳ Waiting for ApplicationClaim to be ready by Crossplane...\"\n\nTIMEOUT=600\nELAPSED=0\n\nwhile
          [ $ELAPSED -lt $TIMEOUT ]; do\n  echo \"Checking ApplicationClaim status...
          (${ELAPSED}s/${TIMEOUT}s)\"\n  \n  # Check if Ready condition is True\n
          \ READY_STATUS=$(kubectl get applicationclaim {{inputs.parameters.resource-name}}
          -n {{inputs.parameters.namespace}} \\\n    -o jsonpath='{.status.conditions[?(@.type==\"Ready\")].status}'
          2>/dev/null || echo \"False\")\n  \n  # For ApplicationClaim created by
          composition, check if it's synced and ready\n  SYNCED=$(kubectl get applicationclaim
          {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}} \\\n
          \   -o jsonpath='{.status.conditions[?(@.type==\"Synced\")].status}' 2>/dev/null
          || echo \"False\")\n  \n  # Try to get any repository or infrastructure
          info\n  REPOSITORY_URL=$(kubectl get applicationclaim {{inputs.parameters.resource-name}}
          -n {{inputs.parameters.namespace}} \\\n    -o jsonpath='{.status.repository.url}'
          2>/dev/null || echo \"\")\n  KNATIVE_SERVICE=$(kubectl get applicationclaim
          {{inputs.parameters.resource-name}} -n {{inputs.parameters.namespace}} \\\n
          \   -o jsonpath='{.status.application.knativeService}' 2>/dev/null || echo
          \"\")\n  \n  # Check XApplicationClaim if needed\n  if [ -z \"$REPOSITORY_URL\"
          ]; then\n    XR_NAME=$(kubectl get applicationclaim {{inputs.parameters.resource-name}}
          -n {{inputs.parameters.namespace}} \\\n      -o jsonpath='{.spec.resourceRef.name}'
          2>/dev/null || echo \"\")\n    if [ ! -z \"$XR_NAME\" ]; then\n      REPOSITORY_URL=$(kubectl
          get xapplicationclaim $XR_NAME \\\n        -o jsonpath='{.status.repository.url}'
          2>/dev/null || echo \"\")\n    fi\n  fi\n  \n  if [ \"$READY_STATUS\" =
          \"True\" ] && [ \"$SYNCED\" = \"True\" ]; then\n    echo \"✅ ApplicationClaim
          ready!\"\n    echo \"Ready Status: $READY_STATUS\"\n    echo \"Synced: $SYNCED\"\n
          \   if [ ! -z \"$REPOSITORY_URL\" ]; then\n      echo \"Repository: $REPOSITORY_URL\"\n
          \   fi\n    if [ ! -z \"$KNATIVE_SERVICE\" ]; then\n      echo \"Knative
          Service: $KNATIVE_SERVICE\"\n    fi\n    echo \"CLAUDE.md-compliant structure:
          Ready\"\n    exit 0\n  fi\n  \n  echo \"  Ready: $READY_STATUS\"\n  echo
          \"  Synced: $SYNCED\"\n  echo \"  Repository: $REPOSITORY_URL\"\n  echo
          \"  Knative Service: $KNATIVE_SERVICE\"\n  \n  sleep 15\n  ELAPSED=$((ELAPSED
          + 15))\ndone\n\necho \"❌ Timeout waiting for ApplicationClaim to be ready\"\nexit
          1\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: namespace
        - name: target-vcluster
        - name: github-org
        - name: microservice-language
        - name: microservice-database
        - name: microservice-cache
        - name: microservice-realtime
        - name: repository-name
      name: extract-microservice-info
      outputs:
        parameters:
        - name: endpoints-summary
          valueFrom:
            path: /tmp/endpoints.txt
        - name: artifacts-summary
          valueFrom:
            path: /tmp/artifacts.txt
        - name: external-endpoints
          valueFrom:
            path: /tmp/external-endpoints.txt
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"\U0001F50D Extracting comprehensive microservice artifacts
          and endpoints...\"\n\n# Use the repository name that was determined in ensure-repositories
          step\nREPO_NAME=\"{{inputs.parameters.repository-name}}\"\nMICROSERVICE_NAME=\"{{inputs.parameters.resource-name}}\"\nNAMESPACE=\"{{inputs.parameters.namespace}}\"\nREALTIME_PLATFORM=\"{{inputs.parameters.microservice-realtime}}\"\n\nTARGET_VCLUSTER=\"{{inputs.parameters.target-vcluster}}\"\nif
          [ -z \"$TARGET_VCLUSTER\" ]; then\n  TARGET_VCLUSTER=\"${REPO_NAME}-vcluster\"\nfi\n\necho
          \"Repository name: $REPO_NAME\"\necho \"Microservice name: $MICROSERVICE_NAME\"\necho
          \"Namespace: $NAMESPACE\"\necho \"Target VCluster: $TARGET_VCLUSTER\"\necho
          \"Realtime Platform: ${REALTIME_PLATFORM:-'None'}\"\n\n# =============================================================================\n#
          DETECT CREATED ARTIFACTS\n# =============================================================================\necho
          \"\U0001F4E6 Detecting created Kubernetes artifacts...\"\n\nARTIFACTS_SUMMARY=\"\"\nEXTERNAL_ENDPOINTS=\"\"\nENDPOINTS_SUMMARY=\"\"\n\n#
          Check for Knative Service (primary microservice)\nif kubectl get ksvc \"$MICROSERVICE_NAME\"
          -n \"$NAMESPACE\" >/dev/null 2>&1; then\n  ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅
          Knative Service: $MICROSERVICE_NAME\\\\n\"\n  \n  # Get Knative Service
          URL\n  KNATIVE_URL=$(kubectl get ksvc \"$MICROSERVICE_NAME\" -n \"$NAMESPACE\"
          -o jsonpath='{.status.url}' 2>/dev/null || echo \"\")\n  if [ ! -z \"$KNATIVE_URL\"
          ]; then\n    ENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F680 Microservice
          API: $KNATIVE_URL\\\\n\"\n    \n    # Check if externally accessible\n    if
          echo \"$KNATIVE_URL\" | grep -v \"\\.local\" | grep -v \"cluster\\.local\"
          >/dev/null; then\n      EXTERNAL_ENDPOINTS=\"${EXTERNAL_ENDPOINTS}\U0001F310
          External API: $KNATIVE_URL\\\\n\"\n    fi\n  fi\nfi\n\n# Check for Application
          (OAM)\nif kubectl get application \"$MICROSERVICE_NAME\" -n \"$NAMESPACE\"
          >/dev/null 2>&1; then\n  ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅ OAM Application:
          $MICROSERVICE_NAME\\\\n\"\nfi\n\n# Check for ApplicationClaim (if created
          via ApplicationClaim workflow)\nif kubectl get applicationclaim \"$MICROSERVICE_NAME\"
          -n \"$NAMESPACE\" >/dev/null 2>&1; then\n  ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅
          ApplicationClaim: $MICROSERVICE_NAME\\\\n\"\nfi\n\n# Check for Deployment
          (traditional K8s)\nif kubectl get deployment \"$MICROSERVICE_NAME\" -n \"$NAMESPACE\"
          >/dev/null 2>&1; then\n  ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅ Deployment:
          $MICROSERVICE_NAME\\\\n\"\nfi\n\n# Check for Services\nSERVICES=$(kubectl
          get svc -n \"$NAMESPACE\" -l \"app.kubernetes.io/name=$MICROSERVICE_NAME\"
          --no-headers 2>/dev/null | awk '{print $1}' || echo \"\")\nif [ ! -z \"$SERVICES\"
          ]; then\n  for SVC in $SERVICES; do\n    ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅
          Service: $SVC\\\\n\"\n    \n    # Check for LoadBalancer services with external
          IPs\n    SVC_TYPE=$(kubectl get svc \"$SVC\" -n \"$NAMESPACE\" -o jsonpath='{.spec.type}'
          2>/dev/null)\n    if [ \"$SVC_TYPE\" = \"LoadBalancer\" ]; then\n      EXTERNAL_IP=$(kubectl
          get svc \"$SVC\" -n \"$NAMESPACE\" -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
          2>/dev/null)\n      EXTERNAL_HOSTNAME=$(kubectl get svc \"$SVC\" -n \"$NAMESPACE\"
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)\n
          \     \n      if [ ! -z \"$EXTERNAL_IP\" ]; then\n        EXTERNAL_ENDPOINTS=\"${EXTERNAL_ENDPOINTS}\U0001F310
          LoadBalancer IP: $EXTERNAL_IP\\\\n\"\n      fi\n      if [ ! -z \"$EXTERNAL_HOSTNAME\"
          ]; then\n        EXTERNAL_ENDPOINTS=\"${EXTERNAL_ENDPOINTS}\U0001F310 LoadBalancer:
          $EXTERNAL_HOSTNAME\\\\n\"\n      fi\n    fi\n  done\nfi\n\n# Check for Ingress/Gateway
          resources\nINGRESSES=$(kubectl get ingress -n \"$NAMESPACE\" -l \"app.kubernetes.io/name=$MICROSERVICE_NAME\"
          --no-headers 2>/dev/null | awk '{print $1}' || echo \"\")\nif [ ! -z \"$INGRESSES\"
          ]; then\n  for ING in $INGRESSES; do\n    ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅
          Ingress: $ING\\\\n\"\n    \n    # Extract ingress hostnames\n    INGRESS_HOSTS=$(kubectl
          get ingress \"$ING\" -n \"$NAMESPACE\" -o jsonpath='{.spec.rules[*].host}'
          2>/dev/null)\n    for HOST in $INGRESS_HOSTS; do\n      EXTERNAL_ENDPOINTS=\"${EXTERNAL_ENDPOINTS}\U0001F310
          Ingress Host: https://$HOST\\\\n\"\n    done\n  done\nfi\n\n# Check for
          Istio Gateway\nif kubectl get gateway -n \"$NAMESPACE\" -l \"app.kubernetes.io/name=$MICROSERVICE_NAME\"
          --no-headers >/dev/null 2>&1; then\n  GATEWAY_NAME=$(kubectl get gateway
          -n \"$NAMESPACE\" -l \"app.kubernetes.io/name=$MICROSERVICE_NAME\" --no-headers
          | awk '{print $1}' | head -1)\n  ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅
          Istio Gateway: $GATEWAY_NAME\\\\n\"\nfi\n\n# Check for secrets created\nSECRETS=$(kubectl
          get secrets -n \"$NAMESPACE\" -l \"app.kubernetes.io/name=$MICROSERVICE_NAME\"
          --no-headers 2>/dev/null | awk '{print $1}' || echo \"\")\nif [ ! -z \"$SECRETS\"
          ]; then\n  SECRET_COUNT=$(echo \"$SECRETS\" | wc -l)\n  ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅
          Secrets: $SECRET_COUNT created\\\\n\"\nfi\n\n# =============================================================================\n#
          INFRASTRUCTURE ENDPOINTS  \n# =============================================================================\n\n#
          GitHub repositories\nSOURCE_URL=\"https://github.com/{{inputs.parameters.github-org}}/$REPO_NAME\"\nGITOPS_URL=\"https://github.com/{{inputs.parameters.github-org}}/$REPO_NAME-gitops\"\nENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F4DA
          Source Repository: $SOURCE_URL\\\\n\"\nENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F504
          GitOps Repository: $GITOPS_URL\\\\n\"\n\n# VCluster management endpoints\nARGOCD_URL=\"http://${TARGET_VCLUSTER}-argocd.$NAMESPACE.local\"\nENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F504
          ArgoCD (GitOps): $ARGOCD_URL\\\\n\"\n\n# Database endpoints (if enabled)\nif
          [ \"{{inputs.parameters.microservice-database}}\" != \"none\" ]; then\n
          \ DB_SECRET_NAME=\"${MICROSERVICE_NAME}-db-secret\"\n  if kubectl get secret
          \"$DB_SECRET_NAME\" -n \"$NAMESPACE\" >/dev/null 2>&1; then\n    ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅
          Database Secret: $DB_SECRET_NAME\\\\n\"\n    \n    # Extract database host
          from secret\n    DB_HOST=$(kubectl get secret \"$DB_SECRET_NAME\" -n \"$NAMESPACE\"
          -o jsonpath='{.data.DB_HOST}' 2>/dev/null | base64 -d || echo \"${MICROSERVICE_NAME}-postgres\")\n
          \   DB_PORT=$(kubectl get secret \"$DB_SECRET_NAME\" -n \"$NAMESPACE\" -o
          jsonpath='{.data.DB_PORT}' 2>/dev/null | base64 -d || echo \"5432\")\n    ENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F5C4️
          Database: postgresql://$DB_HOST:$DB_PORT\\\\n\"\n  fi\nfi\n\n# Cache endpoints
          (if enabled)\nif [ \"{{inputs.parameters.microservice-cache}}\" != \"none\"
          ]; then\n  CACHE_SECRET_NAME=\"${MICROSERVICE_NAME}-redis-secret\"\n  if
          kubectl get secret \"$CACHE_SECRET_NAME\" -n \"$NAMESPACE\" >/dev/null 2>&1;
          then\n    ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅ Cache Secret: $CACHE_SECRET_NAME\\\\n\"\n
          \   \n    # Extract cache host from secret\n    CACHE_HOST=$(kubectl get
          secret \"$CACHE_SECRET_NAME\" -n \"$NAMESPACE\" -o jsonpath='{.data.REDIS_HOST}'
          2>/dev/null | base64 -d || echo \"${MICROSERVICE_NAME}-redis\")\n    CACHE_PORT=$(kubectl
          get secret \"$CACHE_SECRET_NAME\" -n \"$NAMESPACE\" -o jsonpath='{.data.REDIS_PORT}'
          2>/dev/null | base64 -d || echo \"6379\")\n    ENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F4BE
          Cache: redis://$CACHE_HOST:$CACHE_PORT\\\\n\"\n  fi\nfi\n\n# =============================================================================\n#
          REALTIME PLATFORM INTEGRATION\n# =============================================================================\n\nif
          [ ! -z \"$REALTIME_PLATFORM\" ] && [ \"$REALTIME_PLATFORM\" != \"\" ]; then\n
          \ echo \"\U0001F50D Checking realtime platform integration: $REALTIME_PLATFORM\"\n
          \ \n  # Check for realtime platform secrets using standardized naming\n
          \ REALTIME_SECRETS=\"\"\n  for SERVICE_TYPE in kafka mqtt db metabase lenses;
          do\n    SECRET_NAME=\"${REALTIME_PLATFORM}-${SERVICE_TYPE}-secret\"\n    if
          kubectl get secret \"$SECRET_NAME\" -n \"$NAMESPACE\" >/dev/null 2>&1; then\n
          \     REALTIME_SECRETS=\"${REALTIME_SECRETS}$SECRET_NAME \"\n      \n      case
          $SERVICE_TYPE in\n        kafka)\n          KAFKA_HOST=$(kubectl get secret
          \"$SECRET_NAME\" -n \"$NAMESPACE\" -o jsonpath='{.data.KAFKA_BOOTSTRAP_SERVERS}'
          2>/dev/null | base64 -d || echo \"${REALTIME_PLATFORM}-kafka:9092\")\n          ENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F4E1
          Kafka: $KAFKA_HOST\\\\n\"\n          ;;\n        mqtt)\n          MQTT_HOST=$(kubectl
          get secret \"$SECRET_NAME\" -n \"$NAMESPACE\" -o jsonpath='{.data.MQTT_HOST}'
          2>/dev/null | base64 -d || echo \"${REALTIME_PLATFORM}-mqtt\")\n          MQTT_PORT=$(kubectl
          get secret \"$SECRET_NAME\" -n \"$NAMESPACE\" -o jsonpath='{.data.MQTT_PORT}'
          2>/dev/null | base64 -d || echo \"1883\")\n          ENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F4F1
          MQTT: mqtt://$MQTT_HOST:$MQTT_PORT\\\\n\"\n          ;;\n        metabase)\n
          \         METABASE_URL=$(kubectl get secret \"$SECRET_NAME\" -n \"$NAMESPACE\"
          -o jsonpath='{.data.METABASE_URL}' 2>/dev/null | base64 -d || echo \"http://${REALTIME_PLATFORM}-metabase:3000\")\n
          \         ENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F4CA Analytics:
          $METABASE_URL\\\\n\"\n          ;;\n        lenses)\n          LENSES_URL=$(kubectl
          get secret \"$SECRET_NAME\" -n \"$NAMESPACE\" -o jsonpath='{.data.LENSES_URL}'
          2>/dev/null | base64 -d || echo \"http://${REALTIME_PLATFORM}-lenses-hq:9991\")\n
          \         ENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F30A Stream Processing:
          $LENSES_URL\\\\n\"\n          ;;\n      esac\n    fi\n  done\n  \n  if [
          ! -z \"$REALTIME_SECRETS\" ]; then\n    SECRET_COUNT=$(echo $REALTIME_SECRETS
          | wc -w)\n    ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅ Realtime Integration:
          $SECRET_COUNT secrets discovered\\\\n\"\n    ENDPOINTS_SUMMARY=\"${ENDPOINTS_SUMMARY}\U0001F517
          Realtime Platform: $REALTIME_PLATFORM\\\\n\"\n  fi\n  \n  # Check for integration
          secret\n  INTEGRATION_SECRET=\"${MICROSERVICE_NAME}-${REALTIME_PLATFORM}-integration\"\n
          \ if kubectl get secret \"$INTEGRATION_SECRET\" -n \"$NAMESPACE\" >/dev/null
          2>&1; then\n    ARTIFACTS_SUMMARY=\"${ARTIFACTS_SUMMARY}✅ Integration Secret:
          $INTEGRATION_SECRET\\\\n\"\n  fi\nfi\n\n# =============================================================================\n#
          CHECK FOR EXTERNAL ACCESS POINTS\n# =============================================================================\n\n#
          Check for Istio Gateway external access\nISTIO_LB_IP=$(kubectl get svc istio-ingressgateway
          -n istio-system -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null
          || echo \"\")\nISTIO_LB_HOSTNAME=$(kubectl get svc istio-ingressgateway
          -n istio-system -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
          2>/dev/null || echo \"\")\n\nif [ ! -z \"$ISTIO_LB_IP\" ] || [ ! -z \"$ISTIO_LB_HOSTNAME\"
          ]; then\n  GATEWAY_ENDPOINT=\"${ISTIO_LB_HOSTNAME:-$ISTIO_LB_IP}\"\n  if
          kubectl get gateway -n \"$NAMESPACE\" >/dev/null 2>&1; then\n    EXTERNAL_ENDPOINTS=\"${EXTERNAL_ENDPOINTS}\U0001F310
          Istio Gateway: http://$GATEWAY_ENDPOINT\\\\n\"\n  fi\nfi\n\n# =============================================================================\n#
          WRITE OUTPUT FILES\n# =============================================================================\n\n#
          Write endpoints summary\necho -e \"$ENDPOINTS_SUMMARY\" > /tmp/endpoints.txt\n\n#
          Write artifacts summary  \necho -e \"$ARTIFACTS_SUMMARY\" > /tmp/artifacts.txt\n\n#
          Write external endpoints\necho -e \"$EXTERNAL_ENDPOINTS\" > /tmp/external-endpoints.txt\n\n#
          =============================================================================\n#
          LOGGING\n# =============================================================================\n\necho
          \"✅ Comprehensive artifact and endpoint extraction completed\"\necho \"\"\necho
          \"\U0001F4E6 CREATED ARTIFACTS:\"\necho -e \"$ARTIFACTS_SUMMARY\"\necho
          \"\"\necho \"\U0001F517 INTERNAL ENDPOINTS:\"\necho -e \"$ENDPOINTS_SUMMARY\"
          \necho \"\"\necho \"\U0001F310 EXTERNAL ENDPOINTS:\"\nif [ ! -z \"$EXTERNAL_ENDPOINTS\"
          ]; then\n  echo -e \"$EXTERNAL_ENDPOINTS\"\nelse\n  echo \"None detected
          (services are internal-only)\"\nfi\n"
    - inputs:
        parameters:
        - name: resource-name
        - name: parent-appcontainer
        - name: repository-name
        - name: target-vcluster
      name: determine-repository-name
      outputs:
        parameters:
        - name: repository-name
          valueFrom:
            path: /tmp/repository-name
        - name: vcluster-name
          valueFrom:
            path: /tmp/vcluster-name
      script:
        command:
        - sh
        image: alpine:3.18
        source: "echo \"\U0001F50D Determining repository and vCluster names...\"\n\n#
          Use provided repository name or derive from microservice name\nif [ -n \"{{inputs.parameters.repository-name}}\"
          ] && [ \"{{inputs.parameters.repository-name}}\" != \"\" ]; then\n  REPOSITORY_NAME=\"{{inputs.parameters.repository-name}}\"\n
          \ echo \"✅ Using provided repository name: $REPOSITORY_NAME\"\nelse\n  #
          Use resource name as repository name when not explicitly provided\n  REPOSITORY_NAME=\"{{inputs.parameters.resource-name}}\"\n
          \ echo \"✅ Auto-derived repository name: $REPOSITORY_NAME\"\nfi\n\n# Determine
          target vCluster - use provided or default to repository name\nTARGET_VCLUSTER=\"{{inputs.parameters.target-vcluster}}\"\nif
          [ -z \"$TARGET_VCLUSTER\" ] || [ \"$TARGET_VCLUSTER\" = \"\" ]; then\n  #
          Default to repository name (no suffix needed)\n  VCLUSTER_NAME=\"$REPOSITORY_NAME\"\n
          \ echo \"✅ No vCluster specified, defaulting to repository name: $VCLUSTER_NAME\"\nelse\n
          \ # Use the specified vCluster\n  VCLUSTER_NAME=\"$TARGET_VCLUSTER\"\n  echo
          \"✅ Using specified vCluster: $VCLUSTER_NAME\"\nfi\n\necho \"Microservice:
          {{inputs.parameters.resource-name}}\"\necho \"Repository: $REPOSITORY_NAME\"\necho
          \"Target vCluster: $VCLUSTER_NAME\"\n\necho \"$REPOSITORY_NAME\" > /tmp/repository-name\necho
          \"$VCLUSTER_NAME\" > /tmp/vcluster-name\n"
    - inputs:
        parameters:
        - name: repository-name
        - name: microservice-name
        - name: namespace
        - name: description
        - name: github-org
        - name: docker-registry
        - name: user
        - name: slack-channel
        - name: slack-user-id
      name: create-or-update-appcontainer
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "echo \"\U0001F3D7️ Creating or updating AppContainer for microservice
          repositories...\"\n\n# Sanitize slack channel for label\nSLACK_CHANNEL_LABEL=$(echo
          \"{{inputs.parameters.slack-channel}}\" | sed 's/#//g' | tr '[:upper:]'
          '[:lower:]')\n\n# Check if AppContainer already exists\nif kubectl get appcontainerclaim
          {{inputs.parameters.repository-name}} -n {{inputs.parameters.namespace}}
          >/dev/null 2>&1; then\n  echo \"✅ AppContainer {{inputs.parameters.repository-name}}
          already exists\"\n  echo \"\U0001F4E6 Repositories already created - will
          add microservice to existing structure\"\nelse\n  echo \"\U0001F527 Creating
          AppContainer claim for repositories...\"\n  cat <<EOF | kubectl apply --validate=false
          -f -\napiVersion: platform.example.org/v1alpha1\nkind: AppContainerClaim\nmetadata:\n
          \ name: {{inputs.parameters.repository-name}}\n  namespace: {{inputs.parameters.namespace}}\n
          \ labels:\n    created-by: \"microservice-standard-contract\"\n    resource-type:
          \"appcontainer\"\n    requested-by: \"{{inputs.parameters.user}}\"\n    slack-channel:
          \"$SLACK_CHANNEL_LABEL\"\n    context: \"repository-management\"\nspec:\n
          \ name: {{inputs.parameters.repository-name}}\n  description: \"AppContainer
          for {{inputs.parameters.description}}\"\n  gitHubOrg: \"{{inputs.parameters.github-org}}\"\n
          \ dockerRegistry: \"{{inputs.parameters.docker-registry}}\"\n  enableObservability:
          true\n  enableSecurity: true\nEOF\nfi\n\necho \"✅ AppContainer management
          completed successfully\"\necho \"\U0001F4E6 AppContainer will create both
          source and GitOps repositories\"\necho \"\U0001F4C1 Microservice will be
          added to microservices/ folder structure\"\n"
    - inputs:
        parameters:
        - name: target-vcluster
        - name: auto-create-dependencies
        - name: namespace
        - name: user
        - name: slack-channel
        - name: slack-user-id
      name: ensure-target-vcluster
      script:
        command:
        - sh
        image: alpine/k8s:1.28.4
        source: "VCLUSTER_NAME=\"{{inputs.parameters.target-vcluster}}\"\nAUTO_CREATE=\"{{inputs.parameters.auto-create-dependencies}}\"\n\necho
          \"\U0001F50D Checking deployment target: $VCLUSTER_NAME\"\n\n# Check if
          deploying to host cluster\nif [ \"$VCLUSTER_NAME\" = \"host\" ]; then\n
          \ echo \"\U0001F3E0 Deploying to host cluster - skipping vCluster creation\"\n
          \ exit 0\nfi\n\n# The vCluster name has already been determined (either
          specified or defaulted to repo name)\nif [ -z \"$VCLUSTER_NAME\" ] || [
          \"$VCLUSTER_NAME\" = \"\" ]; then\n  echo \"❌ Error: vCluster name is empty
          (this shouldn't happen)\"\n  exit 1\nfi\n\n# Check if vCluster namespace
          exists\nif kubectl get namespace \"$VCLUSTER_NAME\" >/dev/null 2>&1; then\n
          \ echo \"✅ vCluster namespace exists: $VCLUSTER_NAME\"\n  \n  # Check if
          vCluster is actually running using vcluster CLI\n  if kubectl get statefulset
          \"$VCLUSTER_NAME\" -n \"$VCLUSTER_NAME\" >/dev/null 2>&1; then\n    echo
          \"✅ vCluster is running: $VCLUSTER_NAME\"\n    exit 0\n  fi\nfi\n\n# Check
          if auto-create is enabled\nif [ \"$AUTO_CREATE\" != \"true\" ]; then\n  echo
          \"❌ Target vCluster '$VCLUSTER_NAME' does not exist and auto-create is disabled\"\n
          \ echo \"Please create the vCluster first or enable auto-create-dependencies\"\n
          \ exit 1\nfi\n\necho \"\U0001F4E6 vCluster '$VCLUSTER_NAME' not found, creating
          it...\"\n\n# Create VClusterEnvironmentClaim to trigger vCluster creation\ncat
          <<EOFVC | kubectl apply -f -\napiVersion: platform.example.org/v1alpha1\nkind:
          VClusterEnvironmentClaim\nmetadata:\n  name: $VCLUSTER_NAME\n  namespace:
          {{inputs.parameters.namespace}}\n  labels:\n    created-by: \"microservice-standard-contract\"\n
          \   created-for: \"microservice-deployment\"\n    requested-by: \"{{inputs.parameters.user}}\"\n
          \   environment: \"development\"\n    managed-by: \"platform\"\n  annotations:\n
          \   description: \"vCluster for microservice deployment\"\n    created-at:
          \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"\n    capabilities.knative: \"true\"\n
          \   capabilities.istio: \"true\"\n    capabilities.observability: \"true\"\nspec:\n
