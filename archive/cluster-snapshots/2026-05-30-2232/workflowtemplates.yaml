        image: alpine:latest
        source: |
          #!/bin/sh
          VALID_TYPES="postgresql mongodb redis kafka clickhouse"

          if echo "$VALID_TYPES" | grep -q "{{inputs.parameters.infrastructure_type}}"; then
            echo "✅ Valid infrastructure type: {{inputs.parameters.infrastructure_type}}"
            exit 0
          else
            echo "❌ Invalid infrastructure type: {{inputs.parameters.infrastructure_type}}"
            echo "Valid types: $VALID_TYPES"
            exit 1
          fi
    - container:
        args:
        - |
          # Determine resource configuration based on size
          case "{{inputs.parameters.size}}" in
            small)
              CPU="500m"
              MEMORY="1Gi"
              STORAGE="10Gi"
              ;;
            medium)
              CPU="1"
              MEMORY="2Gi"
              STORAGE="50Gi"
              ;;
