              memory: "$MEMORY"
              storage: "$STORAGE"
            connectionSecretRef:
              name: {{inputs.parameters.claim_name}}-connection
              namespace: {{inputs.parameters.namespace}}
          EOF

          echo "✅ InfrastructureClaim created: {{inputs.parameters.claim_name}}"
