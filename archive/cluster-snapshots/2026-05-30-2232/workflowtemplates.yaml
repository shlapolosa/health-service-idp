  spec:
    templates:
    - inputs:
        parameters:
        - description: Resource being processed
          name: resource-name
        - description: Type of resource (microservice, appcontainer, vcluster)
          name: resource-type
        - default: system
          description: User who initiated the operation
          name: user
        - default: '#platform-notifications'
          description: Slack channel for notifications
          name: slack-channel
        - default: UNKNOWN
          description: Slack user ID for direct notifications
          name: slack-user-id
        - description: Type of notification (starting, progress, success, failure)
          name: notification-type
        - description: Notification message content
          name: message
        - default: ""
          description: Kubernetes namespace (optional)
          name: namespace
        - default: ""
          description: Current workflow step (optional)
          name: step-name
        - default: ""
          description: Error details for failure notifications (optional)
          name: error-details
        - default: ""
          description: Service endpoints for success notifications (optional)
          name: endpoints
        - default: ""
          description: Resource capabilities for success notifications (optional)
          name: capabilities
      name: send-notification
      script:
        command:
        - sh
        env:
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              key: webhook-url
              name: slack-webhook
        image: curlimages/curl:8.5.0
        source: "echo \"\U0001F4F1 Sending standardized Slack notification...\"\n\n#
          Determine notification appearance based on type\ncase \"{{inputs.parameters.notification-type}}\"
          in\n  starting)\n    EMOJI=\"\U0001F680\"\n    COLOR=\"good\"\n    PRIORITY=\"normal\"\n
          \   ;;\n  progress)\n    EMOJI=\"⚡\"\n    COLOR=\"warning\"\n    PRIORITY=\"normal\"\n
          \   ;;\n  success)\n    EMOJI=\"✅\"\n    COLOR=\"good\"\n    PRIORITY=\"high\"\n
          \   ;;\n  failure)\n    EMOJI=\"❌\"\n    COLOR=\"danger\"\n    PRIORITY=\"high\"\n
          \   ;;\n  *)\n    EMOJI=\"ℹ️\"\n    COLOR=\"#439FE0\"\n    PRIORITY=\"normal\"\n
          \   ;;\nesac\n\n# Build notification context\nCONTEXT_INFO=\"\"\nif [ !
          -z \"{{inputs.parameters.namespace}}\" ]; then\n  CONTEXT_INFO=\"${CONTEXT_INFO}\\n\U0001F4CD
          Namespace: {{inputs.parameters.namespace}}\"\nfi\nif [ ! -z \"{{inputs.parameters.step-name}}\"
          ]; then\n  CONTEXT_INFO=\"${CONTEXT_INFO}\\n\U0001F504 Step: {{inputs.parameters.step-name}}\"\nfi\n\n#
          Build resource information\nRESOURCE_INFO=\"\U0001F3F7️ Resource: {{inputs.parameters.resource-name}}\\n\U0001F4CB
          Type: {{inputs.parameters.resource-type}}\\n\U0001F464 User: {{inputs.parameters.user}}\"\n\n#
          Add success-specific information\nSUCCESS_INFO=\"\"\nif [ \"{{inputs.parameters.notification-type}}\"
          = \"success\" ]; then\n  if [ ! -z \"{{inputs.parameters.endpoints}}\" ];
          then\n    SUCCESS_INFO=\"${SUCCESS_INFO}\\n\\n\U0001F517 Endpoints:\\n{{inputs.parameters.endpoints}}\"\n
          \ fi\n  if [ ! -z \"{{inputs.parameters.capabilities}}\" ]; then\n    SUCCESS_INFO=\"${SUCCESS_INFO}\\n\\n⚡
          Capabilities:\\n{{inputs.parameters.capabilities}}\"\n  fi\nfi\n\n# Add
          failure-specific information\nFAILURE_INFO=\"\"\nif [ \"{{inputs.parameters.notification-type}}\"
          = \"failure\" ] && [ ! -z \"{{inputs.parameters.error-details}}\" ]; then\n
          \ FAILURE_INFO=\"\\n\\n\U0001F50D Error Details:\\n{{inputs.parameters.error-details}}\"\nfi\n\n#
          Build complete message\nCOMPLETE_MESSAGE=\"${EMOJI} {{inputs.parameters.message}}\\n\\n${RESOURCE_INFO}${CONTEXT_INFO}${SUCCESS_INFO}${FAILURE_INFO}\"\n\n#
          Determine notification target (channel or direct message)\nif [ \"{{inputs.parameters.slack-user-id}}\"
          != \"UNKNOWN\" ] && [ \"{{inputs.parameters.notification-type}}\" = \"failure\"
          ]; then\n  # Send direct message for failures\n  echo \"\U0001F4EC Sending
          direct message to user {{inputs.parameters.slack-user-id}}\"\n  TARGET_CHANNEL=\"@{{inputs.parameters.slack-user-id}}\"\nelse\n
          \ # Send to channel\n  TARGET_CHANNEL=\"{{inputs.parameters.slack-channel}}\"\nfi\n\n#
          Build Slack webhook payload\nTIMESTAMP=$(date +%s)\n\n# Note: This is a
          placeholder implementation\n# In production, you would use actual Slack
          webhook URLs from secrets\necho \"\U0001F4E4 Slack Notification Details:\"\necho
          \"   Channel: $TARGET_CHANNEL\"\necho \"   Type: {{inputs.parameters.notification-type}}\"\necho
          \"   Priority: $PRIORITY\"\necho \"   Color: $COLOR\"\necho \"   Resource:
          {{inputs.parameters.resource-name}} ({{inputs.parameters.resource-type}})\"\necho
          \"   User: {{inputs.parameters.user}}\"\necho \"   Message: {{inputs.parameters.message}}\"\n\n#
          Create structured notification payload\ncat <<EOF > /tmp/slack-payload.json\n{\n
          \ \"channel\": \"$TARGET_CHANNEL\",\n  \"username\": \"Platform Bot\",\n
          \ \"icon_emoji\": \":robot_face:\",\n  \"attachments\": [\n    {\n      \"color\":
          \"$COLOR\",\n      \"title\": \"$EMOJI {{inputs.parameters.resource-type}}
          | {{inputs.parameters.resource-name}}\",\n      \"text\": \"$COMPLETE_MESSAGE\",\n
          \     \"footer\": \"Platform Notifications\",\n      \"footer_icon\": \"https://platform.example.com/icon.png\",\n
          \     \"ts\": $TIMESTAMP,\n      \"fields\": [\n        {\n          \"title\":
          \"Resource Type\",\n          \"value\": \"{{inputs.parameters.resource-type}}\",\n
          \         \"short\": true\n        },\n        {\n          \"title\": \"User\",\n
          \         \"value\": \"{{inputs.parameters.user}}\",\n          \"short\":
          true\n        }\n      ]\n    }\n  ]\n}\nEOF\n\necho \"\U0001F4C4 Generated
          Slack payload:\"\ncat /tmp/slack-payload.json\n\n# Check if webhook URL
          is available from environment variable\nif [ ! -z \"$SLACK_WEBHOOK_URL\"
          ]; then\n  echo \"\U0001F4E4 Sending Slack notification to webhook...\"\n
          \ \n  # Send actual Slack notification\n  RESPONSE=$(curl -s -X POST -H
          'Content-type: application/json' \\\n    --data @/tmp/slack-payload.json
          \\\n    \"$SLACK_WEBHOOK_URL\")\n  \n  if [ $? -eq 0 ] && [ \"$RESPONSE\"
          = \"ok\" ]; then\n    echo \"✅ Slack notification sent successfully to:
          $TARGET_CHANNEL\"\n  else\n    echo \"⚠️ Slack notification failed. Response:
          $RESPONSE\"\n  fi\nelse\n  echo \"⚠️ No Slack webhook URL available (SLACK_WEBHOOK_URL
          environment variable not set)\"\n  echo \"\U0001F4C4 Notification payload
          was prepared but not sent\"\n  echo \"\"\n  echo \"\U0001F4A1 To enable
          Slack notifications, ensure the secret 'slack-webhook' exists in the argo
          namespace:\"\n  echo \"kubectl create secret generic slack-webhook -n argo
          --from-literal=webhook-url='https://hooks.slack.com/services/YOUR/WEBHOOK/URL'\"\nfi\n"
