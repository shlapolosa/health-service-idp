apiVersion: core.oam.dev/v1beta1
kind: ComponentDefinition
metadata:
  name: nats-jetstream
  annotations:
    definition.oam.dev/description: "Native NATS JetStream deployment via Helm with Crossplane-managed lifecycle"
spec:
  workload:
    definition:
      apiVersion: helm.crossplane.io/v1beta1
      kind: Release
    type: releases.helm.crossplane.io
  schematic:
    cue:
      template: |
        output: {
          apiVersion: "helm.crossplane.io/v1beta1"
          kind: "Release"
          metadata: {
            name: context.name
            namespace: "crossplane-system"
          }
          spec: {
            forProvider: {
              chart: {
                name: "nats"
                repository: "https://nats-io.github.io/k8s/helm/charts/"
                version: "1.1.0"
              }
              namespace: context.namespace
              values: {
                config: {
                  cluster: {
                    enabled: true
                    replicas: parameter.replicas
                  }
                  jetstream: {
                    enabled: parameter.jetstreamEnabled
                    fileStore: {
                      enabled: true
                      pvc: {
                        enabled: true
                        size: parameter.storageSize
                      }
                    }
                    memoryStore: {
                      enabled: false
                    }
                  }
                }
                nats: {
                  jetstream: {
                    enabled: parameter.jetstreamEnabled
                  }
                }
                replicaCount: parameter.replicas
              }
            }
          }
        }
        
        parameter: {
          replicas: *3 | int
          storageSize: *"20Gi" | string
          jetstreamEnabled: *true | bool
        }
